body:
  text: 史記索隱卷二十七唐司馬貞撰循吏列傳第五十九按謂本法循理之吏也庳車庳下也音婢高其悃音口本反梱門限也豫賈下音嫁謂臨時評其貴賤不豫定也子産鄭昭君之時按鄭系家云子産鄭成公之少子事簡公定公簡公封子産以六邑子産受其半子産不事昭君亦無徐摯作相之事蓋别有所出太史記異耳太官子期子期亦鄭之公子也左傳國語亦無其說按系家鄭相子駟子孔與子産同時蓋亦子期之兄弟也子産死按左傳及系家云子産死孔子泣曰子産古之遺愛也又韓詩稱子産卒鄭人耕者輟來婦人捐其佩玦也安所讎音售自刎音亡粉反聽微决疑言能察聽微理以决疑獄故周禮司寇以五聽察獄詞氣色耳目也又尚書曰伏念五六日至于旬時是也汲鄭列傳第六十以莊見憚按莊者嚴也謂嚴威也按自漢明帝諱莊故已後莊皆云嚴屋比下音鼻傅柏傅音付人姓柏名為梁將也注一名棄疾漢書名棄疾戇戇愚也音下降反也賜告者數下音數按注賜告得去官家居豫告居官不視事也踰人音庾按漢書愈愈猶勝也此作踰踰謂越過人也貰馬上音時夜反貰賒也鄒氏因勢巧㺯下音路洞反決讞下音魚列反巧詆下音丁禮反吾今召君矣今即今也謂今日後即召君濮陽段客按漢書作段宏常置驛馬長安諸郊按置即驛馬謂於置著馬也四面郊不過算音先管反按謂竹器以言無銅漆也漢書作具器食也大農僦人僦音即就反注辜較音姑角二音按謂當時作大農任賓客就人取庸直也或者貰物以應官取庸故下云多逋負注辜較𣙜者獨也言國家獨酤榷酤也此云辜較亦謂令賞賓客任人専其利故云辜較也賓客益落按落猶零落謂散也下邽音圭縣名屬京兆徐廣曰下邽作下邳儒林列傳第六十一余讀功令按謂學者課功著之於令即今學令是也仲尼于七十餘君按後之記者失辭也按家語等說云孔子歷聘國莫能用謂周鄭齊宋曹衛陳楚杞莒匡等縱歷小國亦無七十餘國也大者為師傅卿相按子夏為魏文侯師子貢為齊相魯聘吳越蓋亦卿也宰豫亦仕齊為卿餘未聞也適戍上音丁革反申培公徐廣云培一作陪音裴韋昭曰培申公之名音浮鄒氏音普來反也韓太傅韓嬰也為常山王太𫝊也濟南伏生按張華云名勝漢紀云字子賤魯高堂謝承云秦氏季代有魯人髙堂伯則伯是其字云生者自漢已來儒者皆號生亦先生省字呼之耳胡毋生毋音無胡毋姓字子都上屬所二千石上時兩反屬音燭屬委也所二千石謂於所部之郡守相常與計偕計計吏也偕俱也謂令與計吏俱詣大常也文章爾雅謂詔書文章雅正訓辭深厚也補中二干石屬蘇林曰屬亦曹吏今縣官文書解云屬某甲文學掌故補郡屬如淳云漢儀弟子射策甲科百人補郎中乙科二百人補大子舍人皆秩比二百石次郡國文學秩百石也申公以弟子從師入見按漢書云申公少與楚元王俱事齊人浮丘伯受詩與劉郢同師按漢書云吕太后時徵浮丘伯在長安申公與元王郢客俱卒學也不傳謂申公不作詩傳但教授有疑則闕耳蘭陵繆生音亡救反繆氏出蘭陵一音穆所謂穆生為楚元王所禮也此家人言耳服䖍云如家人言也按老子道德篇近而觀之理國理身而已故言此家人之言也淮南賁生音肥弟子都養謂倪寬家貧為弟子造食也何休注公羊灼烹為養按有厮養卒厮掌馬養造食善為容漢書作頌亦音容也起其家逸書按孔子臧與安國書云舊書潛于壁室歘爾復出古訓復申唯聞尚書二十八篇取象二十八宿河圖乃有百篇即知以今讎古𨽻篆推科斗以定五十餘篇並為之傳也藝文志曰二十九篇得多六十篇起者謂起發以出也公户滿意公户姓滿意名也按鄧展云二人姓字非也單次上音善單姓次名也魯商瞿按商姓瞿名字子木瞿音劬六代田何按漢書云商瞿授東魯橋庇子庸庸授江東馯臂子弓子弓授燕周醜子寥家家授東武孫虞子乘仲尼弟子傳作淳子人光羽子乘不同也子乘授田何子裝是六代孫也楊何按田何傳東武王同同傳菑川楊何為江都相按仲舒事易王王武帝兄也遼東廟災按漢書以為遼東高廟及長陵園殿災也仲舒為災異記草而未奏主父偃竊而奏之酷吏列傳第六十二昔天下之罔嘗密矣按鹽鐵論云秦法密於凝脂若救火揚沸若本弊不除則其末難止破觚為圜應劭云觚八稜有隅者高祖反秦之政破觚為圜謂除其嚴法約三章耳斫雕為璞應劭云削雕為璞也晉灼云凋弊也斫理凋弊之俗使反質朴郅都音質楊人也漢書云河東大楊人賈姬按姬生趙王彭祖也濟南瞷氏荀悅音間鄒氏劉氏音竝同也中都按中如字謂以法中傷之偶人象漢書作寓人象按寓即偶也謂刻木偶類人形也一云寄人形於木也操下操音七刀反操執也數都尉上音所主反解脫上音紀賣反下音他活反謂脫鉗釱貰貸上音食夜反貰賖也又音勢下音天得反由以宗家任為郎按與國家有外戚姻屬比於宗室故曰宗家也均茵伏按均等也茵車蓐也伏車軾也言二人與由同載一車尚不敢與之均茵軾也謂下之也漢書伏作慿也守勝屠公風俗通云勝屠即申屠趙禹斄人音怡斄縣屬扶風傅爰書韋昭云爰換也古者重刑嫌有愛惡故移換獄書使他官考實之故曰傳爰書也乾沒如淳曰得利為乾失利為沒補廷尉史亭疑法廷史廷尉之吏也亭平也使之平疑事也欲傅古義音附補中都官按謂京師諸官府吏無害蘇林云言若無比也蓋云其公平也俱攻剽說文云剽刺也一云劫又音敷妙反姊姁李竒音吁孟康音詡也少蘊藉藴音慍藉音謝張晏云為人無所避故少所假借也上黨中令按謂補上黨郡中之令史失其縣名修成君子仲按王太后之女號修成君其子名仲猾人佐吏為理按謂豪狷之人干豫吏政故云佐吏為理也而卒起幸甘泉卒音七忽反告緍緍錢貫也漢氏有告緍令揚可主之謂緍錢出入有不出算錢者令得告之也求為可使謂求楊可之使廢格沮事應劭云沮敗已成之事格音閣黎來上音犁黎比也徒請名禍猾吏按漢書作請召猜禍吏服䖍曰徒但也猜惡也應劭曰猜疑也取吏名為好猜疑人作禍敗者而使之按漢書召作名茌平人上音仕疑反為荀彘所縛按漢書云與在將軍荀彘俱擊朝鮮為彘所縛還免為庶人病死惛惛音昏投缿音項器名受投書之器入不可出三倉胡江反置伯格長伯音阡陌格音村落言阡陌村落皆置長也以燻大豪按燻猶燻炙之謂下户之中有姦猾之人今按之以燻逐大姦作沈命法服䖍云沉匿不發覺之法韋昭云沉沒也杜周杜衍人地名外寬內深次骨次至也李竒曰其用法刻至骨大氐盡抵以不道按大氐猶大都也氐音至彌僕彌姓僕名推減上音直追反下音減一作成是也謂推繫之以成獄也蝮鷙上音蝮蛇下音鷙鷹也言其酷比之蝮毒鷹攖大宛列傳第六十三按此傳合在西南夷下不宜在酷吏游俠之間今誤列于此也大宛音菀又於袁反騫漢中人陳夀益部耆舊傳云騫漢中成固人注飲器椑榼椑音白迷反榼音古盍反按謂今之偏榼也必更胸奴中更經也音羮堂邑氏胡奴甘父按謂堂邑縣人家胡奴名甘父也云堂邑父者謂後史家從省唯稱堂邑父而略甘字甘或其姓號經胸奴謂道經胸奴也遣騫謂大宛發遣騫西也為發道驛抵康居發道謂發驛令人導引而至康居也導音道抵至也居音渠也注一云立夫人為王按漢書張騫傳云立其夫人為王也既臣大夏而君之謂月氏以大夏為臣而為之作君也不得月氏要領李竒云要領要契也小顔以為衣有要領劉氏云不得其要害然頗是其意於文字為疏者也奉使君堂邑父之官號扞冞國名也音汗彌二音于填音殿注漢紀按謂荀悅所撰漢紀注拘彌拘音俱彌即罙也則拘彌與扞罙是一也康居音渠其南則河源出焉按漢書西域傳云河有兩源一出葱嶺一出于填山海經云河出崑崙東北隅郭璞云河出崑崙潜行地下至葱嶺山于填國復分流岐出合而東注泑澤已而復行積石為中國河泑即鹽澤也一名蒲昌海西域傳云一出于闐南山下與郭璞注山海經不同廣志云蒲昌海在于蒲類東者也東流注鹽澤鹽水太康地記云河北得水為河塞外得水為海也錢如其王面漢書云幕為人面荀悅云幕音漫無文面也張晏曰錢之文面也作人乘馬錢之幕作人面形韋昭云幕錢背也音漫包愷音慢畫革旁行上音獲小顔云革皮之不柔者韋昭云外夷畫皆旁行今扶南猶中國直下也犁軒漢書作犁靳續漢書一名大秦條枝按三國竝臨西海後漢書云西海環其國惟西北通陸道然漢使自烏弋以還莫有至條枝者有弱水魏略云弱水在大秦西𤣥中記云天下之弱者有崑崙之弱水鴻毛不能載也西王母山海經云玉山西王母所居穆天子傳云天子觴西王母瑤池之上括地圖云崑崙弱水非乘龍不至有三足神鳥為王母取食月氏與安息同按外國傳云外國稱天下有三衆云中國人衆大秦寶衆月氏馬衆身毒國身音乾毒音篤孟康云即天竺也所謂浮圖胡也出徙李竒云徙音斯蜀郡有徙縣也北方閉氐筰韋昭云筰縣在越嶲筰音昨按南越破後殺筰侯以筰都為沉黎郡又有定筰縣博望侯按張騫封號耳非地名小顔云取其能博廣瞻望也尋武帝置博望范亦取斯義也昆莫之父按漢書父名難兜靡為大月氏所殺嗛肉蜚其上上音銜蜚亦飛鑿空按謂西域險厄夲無道路今鑿空而通之也初郡按謂越嶲岐山等郡謂之初者後背叛而併廢之也自酒泉列亭至玉門韋昭云玉門縣名在酒泉又有玉關在龍勒也犁軒眩人韋昭云變化惑人也按魏略云犁靳多竒幻口中吹火自縛自解小顔亦以為植瓜等也李哆音尺奢反又尺者反昧蔡夲大宛將也上音末下音先葛反惡覩夫謂崑崙者乎上惡音烏烏於何也覩見也言張騫窮河源至大夏于填於何而見崑崙為河所出謂禹夲紀及山海經為虛妄也然按山海經河出崑崙東北隅西域傳云南山磧石山為中國河磧石本非河之發源猶尚書導河自熊耳然其實出於冢嶺山乃東經熊耳今推此義河亦然矣則河源本崑崙而潜流至于闐又東流至積石始入中國則山海經及禹貢各互舉耳余敢言也按漢書作所有放哉如淳云放蕩迂濶言不可信也余敢言也亦謂山海經難可信耳而荀悅作效其亦失之素矣游俠列傳六十四功名俱著春秋按春秋謂國史也以言人臣有功名則見記于其國之史是俱著春秋者也獨行君子行音下孟反不饜饜飽也於艷反厄困上音厄已饗其利上音以次音享受也言己受其利則為有德何知必仁義也竊鈎者誅以言小竊則為盜而受誅也侯之門仁義存言人臣委質於侯王門則須存于仁義若遊俠輕健亦何必肯存仁義也久孤於代言拘學守義之士或抱咫尺纎微之事遂久以當代孤負我志而不若卑論儕俗以取寵榮也聲施施音以䜴反扞當代之文罔扞即捍也違扞當代之法網謂紀於法禁也軥牛上音古豆反按大牛當軛小為軥牛隂脫季將軍之厄按季布為漢所購求朱家以布髠鉗為奴載以廣柳車而出之及尊貴而不見之亦高介至義之士然布竟不見報朱家之恩好博按六博戲也濟南瞷氏音間按為郅都所誅陳周庸陳國人姓周名庸代諸白代代郡人有白氏豪俠非一故言諸梁韓無辟梁國人韓姓無辟名辟音避陽翟薛兄音况陜韓孺陜當為郟音如冉反郟音紀洽反漢書作寒孺郭解軹人漢書云河內軹人也隂賊以內心忍害藏命按謂亡命也自喜為俠蘇林云言性喜為俠也負解之勢負恃使之嚼即妙反謂酒盡是人吾所急也按謂吾心中所急言情切急之謂漢書作重也至踐更數過吏弗求數音朔謂頻免之也又音色主反數亦頻也以十數色具反仇家曲聽謂屈曲聽解也且無用按漢書作無庸蘇林曰且無便用吾言待我去令洛陽豪居其間也請得解客舍養之如淳云解多藏亡命者故喜事年少與解同志者知亡命者多歸解故多將軍來欲為解迎亡者而藏之者也不中資按資不滿三百萬已上為不中太原鹵翁漢書作魯公孺魯姓也與徐廣之說不同也東陽田君孺漢書作陳君孺然陳田聲相近亦夲同姓北道諸姚蘇林云道猶方也如淳云京師四出道也東道趙他羽公子舊解以趙他羽公子為二人今按此姓趙名他羽字公子也佞幸列傳第六十五暴伉伉音苦浪反言暴猛伉直皆因關說按關訓通也謂公卿因之而通其詞說劉氏云有所言說皆關由之冠鵕䴊唐劭云鳥名毛可以飾冠許慎云鷩鳥也淮南子云趙武靈王服貝帶鵕䴊漢書秦破趙以其冠賜侍中三倉云鵕䴊神鳥也飛光映天者也傅脂粉上音付宦者則趙同按漢書作趙談此云同者避太史公父名也以濯船濯音棹遲教反衣裻音篤裻者衫襦之橫腰者覺而之上音教文帝悅焉漢書云上曰鄧猶登也悅之唶吮之上仕格反下仕兗反吏輒沒入謂長公主别有物賜通吏輒沒入以充贓也注景帝姊按即館陶公主也乃令假衣食謂公主令人假與衣食竟不得名一錢按始天下名鄧氏錢今皆沒入卒竟無一錢之名也周文仁按漢書稱周仁上文稱周文今兼丈仁恐後人加耳按仁字文寵最過庸按庸常也言仁最被恩寵過於常人乃不甚篤如韓嫣也韓王孫嫣音偃又音於建反按道侯韓說音悅嫣弟江都王歸國入宿衛謂還爵封於天子而請入宿衛給事狗中或犬監也歌初詩按初詩即所新造樂章彌子瑕衛靈公之臣事見說苑也滑稽列傳第六十六按滑亂也稽同也言辨捷之人言非若是說是若非言能亂異同也贅壻猶女之夫也比於子如人痝贅是餘剩之物也喜隱上許既反喜好也喜隱謂好隱語淳于髠苦魂反冠纓索絶按索訓盡言冠纓盡絶也按孔衍春秋後語亦作冠纓盡絶也有禳田者按謂為田求福禳甌窶滿篝按甌窶猶杯樓也窶音如婁古字少耳言豐年收掇易可滿篝籠耳汙耶滿車按司馬彪云汙耶下地田即下田之中有薪可滿車帣韝鞠􅛏帣音卷紀免反謂收袖也韝音溝臂杆也鞠曲躬也􅛏音其紀反與跪同音謂小跪目眙音與瞪同謂直視也杜丑甑反又音丑二反飲可八斗而醉二參按上云五六斗徑醉矣則此為樂亦甚飲可八斗而未徑醉故云可樂醉二三言十有二三醉也注楚莊王時未有趙魏按此辨說者之詞後人所增飾之矣壠竈為槨按皇覽亦說此事以壠竈為礱突也銅歷為棺按歷即釜鬲也齎以薑棗按古者食肉用薑棗禮內則云實棗於其腹中屑桂與薑以灑諸其上而食之是也衣以火光皇覽云火送之著端葬之腸中孟曰若毋逺有所之按謂優孟語叔孫敖之子曰汝毋遠有所之適他境恐王後求汝不得者也優孟按優者倡優也孟字也其優旃亦同旃其字耳優孟在楚旃在秦者也東武侯母按東武縣名侯乳母姓罰適譛之者謂武罰謫譛乳母之人也好讀外家傳語按東方朔亦多博觀外家之語則外家非正經即史傳雜說之書也東方朔按仲長統云遷為滑稽傳序優旃事不稱東方朔非也朔之行事豈直旃孟之比哉而桓談亦以遷內為是又非也滑稽楚詞云將突梯滑稽如脂如韋按崔浩云滑音骨滑稽流酒器也轉注吐酒終日不已言出口成章詞不窮竭若滑稽之吐酒故揚雜酒賦云鴟夷滑稽腹大如壺盡日盛酒日夜借沽是也又姚察云滑稽猶俳諧也滑讀如字稽音計也言諧語滑利其知計疚出故云滑稽陸沉於俗司馬彪云謂無水而沉也與議論共難之按方朔設詞對之即下文是答對之難也重櫟中上逐龍反下音厯重櫟欄楯之下有重欄處也騶牙音鄒按方朔以意自立名而偶中也以有九牙齊等故謂之騶牙猶騶騎然也衣褐懷寶此指東郭先生也言其身衣褐而懷寶玉淳于髡獻鵠於楚按韓詩外傳齊使人獻鵠於楚不言髡又說苑云魏文侯使舍人無釋獻鴻於齊皆略同而事異殆相涉亂也武帝徵北海太守漢書宣帝徵渤海太守龔遂非武帝時此褚先生記謬耳傳曰子産相鄭人不能欺按此三不欺自古傳記先達共所稱述今褚先生因記西門豹而稱之以成說也循吏傳記子産相鄭仁而且明故人不能欺之也子賤理單父人不忍欺按子賤為政清淨彈琴三年不下堂而化是仁恩故不忍欺西門豹理鄴人不敢欺按豹以威化御俗故人不敢欺其德優劣鍾華之評實為允當史記索隱卷二十七
