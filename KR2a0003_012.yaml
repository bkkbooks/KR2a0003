body:
  text: 史記索隱卷十二唐司馬貞撰晉系家第九晉唐叔虞按太叔以夢及手文而名曰虞至成王誅唐之後因戲削桐而封之叔字也故曰唐叔虞而唐有晉水至于燮改其國號曰晉侯然晉初封於唐故稱晉唐叔虞也且唐本堯後封在夏墟而都於鄂鄂今在大夏是也及成王滅唐之後乃分徙之於許郢之間故春秋有唐成公是也即今之唐州也武侯寧族系本作曼期譙周作曼旗也厲侯福系本作輻焉獻侯系本及譙周皆作蘇穆侯弗王鄒誕本作弗生或作沸王並音祕曲沃河東之縣名漢武改曰聞喜翼翼本晉都也自孝侯已下一號翼侯平陽絳邑縣東翼城是也子鱓音時戰反又音善又音陀子都系本作郤而他本亦有作都先晉穆侯晉有兩穆侯言先以别後櫟櫟鄭邑今河南陽翟是也故鄭之十邑有樗有華始都絳春秋莊二十六年傳士蒍城絳是也杜預曰今平陽絳邑縣應劭曰絳水西南也滅霍按永安縣西南汾水西有霍城古霍國有霍水出霍太山滅魏地理志河東北縣古魏國地記亦以為然服虔云在蒲坂非滅耿杜預曰平陽皮氏縣東南有耿鄉地記又曰皮氏縣汾水南耿城是耿國服虔云三國皆姬姓也殊自失太子之行如此妾則見君欲廢而恨之今乃自以恨為失也奔新城國語云申生乃雉於新城廟韋昭云曲沃也新為太子城故曰新城居二日左傳云六日不同齧桑裴氏云左傳作采桑按今平陽曲南七十里河水有采桑津是晉境服虔云翟地亦頗相近然字作齧桑齧桑衛地恐非也東至河內河內河曲也內音汭弟生悼子左傳作卓子音恥角反弟女弟也君弟毋會弟但也使死者復生謂荀息受公命而立奚齊雖復身死不背生時之命是死者復生也生者不慙言生者見荀息不背君命而死不為之羞慙也太子更喪矣更作也更喪謂改喪言後十四年晉不昌汾陽之邑按國語命里克汾陽之田百萬命丕鄭以負蔡之田七十萬今此不言亦其疏略也吕省左傳作吕甥郤稱冀芮三子晉大夫惠公禮倨禮倨謂受玉惰也事見僖十一年韓原在馮翊夏陽北二十里今之韓城縣是馬鷙竹二反謂馬重而陷之於泥輅秦穆服虔云輅迎也音五嫁反鄒誕云五額反翟伐咎如赤狄之别種也隗姓也咎音髙鄒誕本作囷如又云或作囚長女妻重耳左傳伐牆咎如獲二女以叔隗妻趙衰公子取季隗隗生伯倏叔劉則叔隗長季隗少而不同也履鞮即左傳之勃鞮亦曰寺人披可用與音余諸本或為興興起也非翟可用興起故奔之犁二十五年犁猶比也國禮禮重耳以國君之禮禮之也適諸侯禮上音敵且言何以易之子玉請煞重耳楚成王不許言人出言不可輕易之河伯視之視猶見也郇城音荀即文王之子所封又音環王城杜預云馮翊臨晉縣東有故王城今名武鄉城五蛇為輔龍喻重耳五蛇即五臣狐偃趙衰魏武子司空季子及子推也舊云五臣有先軫顛頡今恐二人非其數秦軍河上晉地也患之晉若攻楚則傷楚子送其入秦之德又欲釋宋不救乃虧宋公贈馬之惠進退有難是以患之其勢宜釋宋楚初得曹又新婚于衛今晉執曹伯而分曹衛之地於宋則楚急曹衛其勢宜釋宋宋公成公王臣齊將國歸父秦將小子憗踐土杜預云踐土鄭地然據此文晉師還至衡雍衡雍在河南故劉氏云踐土在河南下文踐土在河北今元城縣西有踐土驛義或然也王若曰父義和按尚書文侯之命是平王命晉文侯仇之語今此文乃襄王命文公重耳之事代數懸隔勳策全乖太史公雖復彌縫左氏而系家頗亦時有疏謬裴氏集解亦引孔馬之注而都不言時代乖角何習迷而同醉也然計平王至襄王為七代仇重耳為十一代而十三侯又平王元年至魯僖二十八年當襄二十年為一百三十餘嵗矣學者頗合討論之而劉伯莊以為蓋天子命晉同此一辭尤非也王庭服虔云王庭是踐土者據二十八年五月公會晉侯盟于踐土又此上文四月甲午作王宫于踐土王庭即王宫也朝王于踐土按左氏傳五月盟于踐土冬會諸侯于溫天王狩于河陽壬申公朝于王所此文亦説冬朝于王當合於河陽溫地不合取五月踐土之文先縠將右行左傳屠擊將右行與此異疑大夫帥據左傳荀林父並是卿而云大夫帥者非也不置佐者當避天子也或新置三行官未備耳乃間令使使謂燭之武東道交交猶好也諸本及左傳皆作主取晉汪以歸按左傳文二年秦孟明視伐晉報殽之役無取晉汪之事又其年冬晉先且居等伐秦取汪彭衙而還則汪是秦邑止可晉伐秦取之豈得秦伐晉而取汪也或者晉先取秦今伐晉而收汪是汪從晉來故曰取晉而歸也彭衙在邵陽北汪不知所在取晉之郩徐云年表曰徵然按文十年左傳春晉人伐秦取少梁夏秦伯伐晉取北徵北徴即年表之徵今云郩者字誤也徵音懲亦馮翊之縣名頃王崩公卿爭權按春秋魯文十二年頃王崩周公閲與王孫蘇爭政故不赴是以車八百乘平周亂文十四年傳又云晉趙盾以諸侯之師八百乘納捷災于邾不克乃還而周公閲與王孫蘇訟于晉趙宣子平王室而復之則以車八百乘自是宣子納邾捷災不關王室之事但文相連耳多恐是誤也示眯明鄒誕云示眯為祁彌也即左傳之提彌明也捷音市移反劉氏亦音祁為時移反則祁提二字同音也而此史記作示者示即周禮古本地神曰祇皆作示字此為祁者蓋由祗提音相近字遂變為祁也眯音米移反以眯為彌亦音相近耳又左氏桑下餓人是靈輒也其示眯明是嗾􅋙者也其人鬬而死即今合二人為一人非也三行如字先縱足用反又本作嗾又作蹴同素后反為殺易以䜴反虜秦將赤赤即斥謂斥候之人也按宣八年左傳晉伐秦獲諜殺諸絳市蓋彼諜即此赤也晉成公六年為魯宣八年正同故知然伐魯取隆劉氏音隆即龍也魯北有龍山又此年當魯成二年經或書齊候伐我北鄙傳曰圍龍又鄒誕及别本作傊字傊當作鄆文十二年季孫行父帥師城諸及鄆注曰傊即鄆也字變耳地理志云在東莞縣東也中行桓子荀林父也蕭桐姪子左傳作叔子荀騅音佳諡文子鄢陵偃又音於連反宦者奪之宦者孟張也我櫟音厯釋例云在河北地闕靡下徐云靡一作歷劉氏音眉綺反即靡笄毋幾為君幾音冀謂望也會諸侯於雞澤六卿強韓趙魏范中行及智氏為六卿初韓趙魏為三卿而分晉政故曰三晉中行寅荀偃之孫也范吉射音亦范獻子士鞅之子以伐四卿時趙魏韓共滅范氏及中行氏而分其地猶有智氏與三晉故曰四卿也出公鑿十七年年表云十八年也智伯乃立昭公曾孫驕是為哀公按趙系家云驕是為懿公又年表云出公十八年次哀公忌二年次懿公驕十七年紀年又云出公二十三年奔楚乃立昭公之孫是為敬公系本亦云昭公生桓子雍雍生忌忌生懿公然晉趙系家及年表各各不同何況紀年之説也哀公四年趙襄子韓康子魏桓子共殺智伯并其地如紀年之説此乃出公二十二年事十五年魏文侯初立按紀年魏文侯初立在敬公十八年幽公之時晉畏畏懼也為衰弱故反朝韓魏也宋忠引此注系本而畏字為衰盜殺幽公紀年云夫人秦嬴賊公於髙寢之上幽公子止是為烈公系本云幽公生烈公止又年表云魏誅幽公立其弟止子孝公頎立系本云孝公傾紀年以孝公為桓公故韓子有晉桓侯十七年孝公卒紀年云桓公二十年趙成侯韓共侯遷桓公於屯留已後更無晉事子靜公俱酒立系本云靜公俱靜公二年魏武侯韓哀侯趙敬侯滅晉後三分其地按紀年魏武侯以桓公十九年卒韓哀侯趙敬侯並以桓公十五年卒又趙系家烈侯十六年與韓分晉封晉君端氏其後十年肅侯遷晉君於屯留楚系家第十卷章名老童故系本云老童生重黎重黎重氏黎氏二官代司天地重為木正黎為火正按左氏傳少昊氏之子曰重顓頊氏之子曰黎今以重黎為一人仍是顓頊之子孫者劉氏云少昊氏之後曰重顓頊氏之後曰重黎對彼重則單稱黎若自言當家則稱重黎故楚及司馬氏皆重黎之後非關少昊之重愚謂此解為當居火正此重黎為火正彼少昊氏之後重自為木正知此重黎即彼之黎也陸終生子六人系本云娶鬼方氏妹曰女嬇長曰昆吾系本云其一曰樊是為昆吾又曰昆吾者衛是宋忠曰昆吾國名已姓所出左傳曰衛侯夢見被髮登昆吾之觀按今濮陽城中有昆吾臺二曰參胡系本云二曰惠連是為參胡參胡者韓是宋忠曰參胡國名斯姓無後三曰彭祖系本云三曰籛是為彭祖彭祖者彭城是虞翻云名翦為彭姓封於大彭四曰會人系本云四曰求言是為鄶人鄶人者鄭是宋忠曰求言名也妘姓所出鄶國也五曰曹姓系本云五曰安是為曹姓曹姓邾是宋忠云安名也曹姓者諸曹所出六曰季連芈姓系本云六曰季連是為芈姓季連者楚是宋忠曰季連名也芈姓所出楚之先芈音彌是反芈羊聲也附沮才敘反熊􅲂一作黮音土感反􅀈音與黮與亶同字亦作亶熊楊鄒誕本作熊錫一作煬楊粵有本作楊雩音吁地名也今音越譙周亦作楊越長子康勾亶王系本康作庸亶作袒注江陵地理志云南郡之縣也楚文王自丹陽徙都之中子紅為鄂王有本作藝經二字音摰紅從下文熊摯紅讀也占史考及鄒氏劉氏等音無藝經恐非也少子執疵為越章王系本無執字越作就子熊摯紅立如此史意即上鄂王紅也譙周以為熊渠卒子熊翔立卒長子摯有疾少子熊延立此云摰紅卒其弟煞而自立曰熊延欲會此代系則翔亦毋庸之弟元嗣熊渠者毋庸既早亡摰紅立而被延煞故史考言摯有疾而此言弒也季徇旬俊反叔堪一作湛熊噩音鄂亦作咢熊坎苦感及一作菌又作欽熊眴徐音舜按玉篇在口部顧氏云楚之先即蚡胃也劉音舜其近代本即有字從目者劉舜音非是為蚡冒古本蚡作羒音憤冒音亡北反或亡報反杜敖上音側狀反成王惲紆粉反左傳作頵紆貧反伐黃汝南弋陽縣故黃國滅夔譙周作滅歸歸即夔之地名歸鄉也寵姬姬當作妹願有進隱隱謂隱藏其意郟鄏按周書郟雒北山名音甲鄏謂田厚鄏故以名焉二十年圍宋以其殺楚使也左傳魯宣公十二年楚子伐蕭蕭人囚楚相宜僚王曰勿殺吾退蕭人殺之是殺楚使也子員立音雲左傳作麏析父封曰據左氏此是右尹子革之詞此蓋誤也僇越大夫常夀過僇辱也殺蔡大夫觀起音官觀姓起名起子從松音費無忌左傳作極極忌聲相近楚恐城郢去年已城郢今又重言據左氏昭二十三年城郢二十四年無重城郢之文是史記誤也吳三公子昭三十年二公子奔楚公子掩餘奔徐公子燭庸奔鍾離此言三公子非也伏師閉塗閉塗即攢塗也故下云惠王後即罷兵歸葬服虔説非榆關此榆關當在大梁之西也蜀伐楚取兹方兹方地名今闕扜關按郡國志巴郡魚復縣有扜關盼子必用矣盼則嬰之同族復搏其士卒膊音亦有作附讀戰國策作整得八邑古本作八邑今亦作八城襄陵縣名在河東此國冠之上音官令尹乃尹中最尊故以國為言猶如卿子冠軍然而大王和之和謂楚與齊相和親注商於在今順陽按地理志丹水及商屬𢎞農今言順陽者是魏晉始分置順陽郡商城丹水俱𨽻之兩國之兵必至兩國韓魏也是我亡於秦謂失商於之地與秦戰丹陽北丹陽在漢中秦破韓宜陽𢎞農之縣在澠池西南昭雎七余反墓在平陽非堯都也秦武遂去之七十里亦非河間之縣則韓之平陽秦之武遂並當在宜陽左右二十六年齊湣王按下文始言二十四年又更有二十六年則此錯云二十六年衍字也當是二十年事又徐廣推校二十年取武遂二十三年歸武遂則此必二十年二十一年事乎咸陽古扶風渭城縣故咸陽城也在水北山南故曰咸陽咸皆也趙主父主字亦或作王鶀鴈鶀音其小鴈也羅鸗吕靜音聾鄒亦音盧動反劉音龍鸗小鳥青首亦小鳬有青首者騶費鄒祕二音見鳥六雙以喻下文秦趙等十二國故曰六雙朝昔之樂昔猶夕也還患音謂繞也射國音石碆作磻音畨石傅弋附音噣鳥於東海噣音晝謂大鳥之有鈎喙者以比齊也還蓋長城以為防上還音患謂繞也蓋者覆也言射者環繞蓋覆使無飛走之路因以長城為防者徐以蓋為益縣非也長城當在濟南顧據午道顧反也午道當在齊西界一從一橫為午道亦未詳其處北達言齊晉既伏牧燕不難也三國布􅢄亦作翅同式豉反二國齊趙燕也擊趙而顧病顧猶反也膺擊韓魏謂韓魏當秦之前故云膺擊俗本作鷹非垂頭中國垂頭猶申頸也言欲吞山東煞共主臣世君共主世君俱是周自謂也共主言周為天下共所宗主也世君言周室代代君於天下塞騶魯之心騶魯有禮義之國今楚欲結怨兩周而奪九鼎是塞鄒魯之心其兵利身謂虎以爪牙為兵而自利於防身也必萬於虎矣攻易而利大也居三代之傳器謂九鼎也吞三翮六翼翮亦作鬲同音厯三翮六翼亦謂九鼎空足曰翮六翼即六耳翼近耳傍事具爾雅夷陵陵名後為縣屬南郡熊元左傳作完至新中按趙地無名新中者中字誤巨鹿有新市疑中當為市蘄機祈二音幾祈音孫檢裴注頻引孫檢不知其人本末蓋齊人越王勾踐系家第十一二十餘世至允常按越在蠻夷少康之後地逺國小春秋之初未通上國國史既微略無世系故紀年稱為粵子據此文勾踐平吳之後周元王始命為伯後遂僭而稱王勾踐按紀年云晉出公十年十一月於粵勾踐卒是􅀢執越敗吳於檇李事在左傳魯定公十四年敗之夫椒符焦二音本又作湫音酒小反賈逵云地名杜預云太湖中椒山也按國語云敗之五湖則椒山為得敗夫椒在哀公元年保棲於會稽鄒誕云保山曰棲猶鳥棲於木以避害也故六韜曰軍處山之髙者則曰棲大夫種大夫官種名也一曰大夫姓猶司馬司徒之比蓋非也持滿者與天與天天與也言持滿不溢與天同道故天與之定傾者與人人主有定傾之功故人與之也節事者以地國語以作與此作以亦與義也言地能財成萬物人主宜節用以法地故地與之韋昭等解恐非行成於吳成者平也求和於吳也間行紀間反間行猶微行乃以美女寶器國語云越飾美女二人使大夫種遺大宰嚭必有當也言悉五千人觸戰或有能當吳兵者故國語作耦耦亦相當對之名又下云無乃傷君王之所愛乎是有當則相傷也逢同逢姓同名故楚有逢伯填撫鎮音柘稽越大夫也國語作諸稽郢疥癬介鮮二音敗之艾陵在魯哀十一年虜齊髙國國惠子髙昭子而父而汝也父夫差也立若若亦汝也取吾眼置吳東門國語云吳王愠曰孤不使大夫得見乃盛以鴟夷投之于江也於黃池在哀十三年太子留守據左氏傳太子名友習流二千人虞書云流宥五刑按流放之罪人使之習戰任為卒伍故有二千人教士四萬人謂常所教練之兵也故孔子曰以不教民戰是謂棄之是也君子六千人謂君所子養有恩惠者人按左氏楚沈尹戌帥都君子以濟師杜預云都君子謂都邑之土有復除者國語王以私卒君子六千人諸御千人諸御謂御理事之官任軍職掌者不且得罪虞翻注蓋依國語之文今望此文謂使者宜速去不且得罪於越義亦通君百家國語云與之夫婦三百是也王鼫與立鼫音石與音餘按紀年云於粵子勾踐卒是菼執次鹿郢立六年卒樂資云越語謂鹿郢為鼫與也子王不夀立紀年云不夀立十年見殺是為盲姑次朱勾立子王翁立紀年於粵子朱勾三十四年滅滕三十五年滅郯三十七年朱勾卒王翳卒子王之侯立紀年云翳三十三年遷于吳三十六年卒七月大子諸咎弒其君翳十月粵殺諸咎粵滑吳人立孚錯枝復君明年大夫寺區定粵亂立初無餘之十二年寺區弟思賦殺其君莽安次無顓無顓八年薨是菼蠋卯故莊子云越人三弒其君子搜患之逃於丹穴不肯出越人薰之艾葉乘以王輿樂資云號曰無顓蓋無顓後乃次無疆也則王之侯即無餘也之侯卒子王無疆立蓋無顓之弟也音其良反試兵南陽此南陽在齊之南界莒之西常郯之境常邑名蓋田文所封邑郯故郯國二邑皆齊之南地商於析酈四邑並屬南陽楚之西南也宗胡宗胡邑名胡姓之宗因以名邑杜預云汝陰縣北有故胡城是夏路以左徐氏以為江夏非也劉氏云楚適諸夏路出方城人向北行以西為左故云夏路以左其意為得也是目論也言越王知晉之失不自覺越之過猶人眼能見毫毛而自不見其睫故謂之目論也復讎龐長沙劉氏云復者發語之聲非也言發語聲者文勢然也則是脫況字耳讎當作犫犫邑名字訛耳則犫龐長沙是三邑也下云竟澤陵當為竟陵澤言竟陵之山澤出材木故楚有七澤蓋其一也合上文為四邑也楚威王無疆北破齊於徐州按紀年粵子無顓薨後十年楚伐徐州遂無楚敗越殺無疆之語是無疆為無顓之後紀年不得録也表會稽山以奉邑國語云乃環會稽三百里以為范蠡之地奉音扶用反鴟夷子皮范蠡自謂也蓋以吳王殺子胥而盛以鴟夷今蠡自以有罪故為號也韋昭曰鴟夷革囊也或曰生牛皮也莊生據其時代非莊周也然驗其行事非子休而誰能信任於楚王乎鄭系家第十二友初封於鄭鄭縣名屬京兆秦武公十一年初縣杜鄭是也又系本云桓公居棫林徙拾宋忠云棫林與拾皆舊地名是封桓公乃名為鄭耳至秦之縣鄭蓋是鄭武公東徙新鄭之後其舊鄭乃是故都故秦始縣之幽王以為司徒韋昭據國語以幽王八年為司徒也虢鄶之君貪而好利鄭語云虢叔恃勢鄶仲恃險皆有驕侈又加之以貪冒是也虢叔文王弟鄶妘姓之國也欲居西方何如國語曰公曰謝西之九州何如韋昭云謝申伯之國謝西有九州五州為鄉其説異耳封叔虞於唐唐者古國堯之後其君曰叔虞何以知然者據此系家下文云唐人之季代曰唐叔虞當武王邑薑方動大叔夢天命而子曰虞與之唐及生有文在手曰虞遂以名之及成王滅唐而國太叔故因以稱唐叔虞故杜預亦曰取唐君之名是也果獻十邑國語云太史伯曰若克二邑鄢蔽補丹依野時歷華君之土也虞翻注皆依國語為記武公掘突譙周云名突滑皆非也蓋古史失其名太史公循舊失而妄記之耳何以知其然者按下文其孫昭公名忽厲公名突豈有孫與祖同名乎當時舊史雜記昭厲忽突之名遂誤以掘突為武公之字耳鄭侵周地取禾隱二年左傳鄭武公莊公為平王卿士王二於虢及王崩周人將畀虢公政夏四月鄭祭足帥師取溫之麥及成周之禾是始朝周桓王杜預曰桓王即位周鄭交惡至是始朝故言始也左傳又曰周桓公言於王曰我周之東遷晉鄭焉依善鄭以勸來者懼猶不蔇況不禮焉鄭不來矣與魯易祊許田許田近許之田魯朝宿之邑祊者鄭所受助祭太山之湯沐邑鄭以天子不能巡守故以祊易許田各從其近莊公與祭仲左傳稱祭仲足蓋祭是邑其人名仲字仲足故傳云祭封人仲足是也此繻葛之戰在魯桓公五年髙渠彌一作彌一作眯並名卑反祝聸左傳作祝聃三公子皆君也此文則數太子忽及子亹為三而杜預云不數太子以子突子亹子儀為三蓋得厲公出居邊邑櫟宋忠曰今潁川之陽翟縣按櫟音歷即鄭初得十邑之歷也煞其大夫單伯依左傳作檀伯檀伯鄭守櫟大夫事在桓十五年此文誤為單伯者蓋亦有所因也按魯莊公十四年厲公自櫟侵鄭事與周單伯會齊師伐宋相連故誤耳公子嬰左傳以鄭子名子此云嬰蓋别有所儀見甫假左傳作傅瑕此本多假借亦依字讀伯父原左傳謂之原繁周惠王弟頽伐王惠王莊王孫僖王子子頽王后姚所生事在莊十九年文公踕立音在接反系本云文公徙鄭宋忠云即新鄭鄭伐滑僖二十四年左傳鄭公子士泄堵俞彌帥師伐滑襄王使伯犕音服左傳王使伯服遊孫伯如鄭請滑杜預云二子周大夫知伯犕即伯服也不賜厲公爵祿此言爵祿與左氏説異左傳云鄭伯享王王以后之盤鑑與之虢公請器王豫之爵則爵酒器是太史公與丘明説别也公怒溉音蔇左傳作瑕悼公沸劉音祕鄒本一作沸一作弗左傳作費扶味反鄦公音許弟睔公遜反兄繻音須鄒氏云一作纁音訓子惲紆粉反左傳作髠原定公入敬王于周避弟子朝之亂史記索隱卷十二
