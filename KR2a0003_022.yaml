body:
  text: 史記索隱卷二十二唐司馬貞撰張耳列傳第二十九大梁按臣瓚今陳留大梁城是也亡命晉灼曰命者名也謂脫名籍而逃匿則削除名籍故以逃為亡命遊外黃地理志屬陳留去抵父客如淳云抵歸也音丁米反請决謂女請父容為决其夬而嫁之張耳絶苦陘地理志屬中山張晏曰章帝醜其名改曰漢昌刎頸交崔浩云言要齊生死斷頸無悔反用門者按門者即餘耳也自以其名而號令里中詐更别求也從白馬渡河按酈食其云白馬之津白馬是津渡其地與黎陽對岸南有五嶺裴氏廣川記云大庾始安臨賀桂陽揭陽斯五嶺時間不容息以言舉事不可失時時幾之迅速其間不容一喘息息頃也舍中曰謂其同舍中之人也漢書作舍人杖馬箠上音丈下之委反石邑地理志屬常山欲附趙難按羈旅勢弱難以立功也獨立趙後謂獨有立六國趙王之後嘗秦軍崔浩云嘗猶試望臣深望怨責也重去將按重訓難也或云重惜也天與不取此辭出國語雅遊鄭氏云雅故也韋昭云雅素也然素亦故也故遊言慣遊從故多人所稱譽南皮地理志屬渤海甘公天官書云齊甘公藝文志云楚有甘公齊楚不同劉歆七略云字逢甘德志林云甘公一名德泜水徐廣音遲蘇林音祇晉灼音丁禮反今俗呼此水則然按地理志音脂則蘇音為得郭景純注山海經云泜水出常山中丘縣箕踞崔浩云屈膝坐其形如箕孱王按服䖍音昨軒反弱小貌也孟康音仕連反齧指按小顔曰齧指以表至誠為其約誓汙王蕭該音一故反說文云汙穢也乃壁人柏人謂於柏人縣館舍壁中著人欲為變也要之置厠文穎云置人厠壁中以伺髙祖也張晏云鑿壁空之令人止中也今按云置厠者置人於復壁中謂之置厠厠者隱側之處因以為言也亦音側刺剟徐廣音丁劣反按掇亦刺也漢書作刺爇張晏云爇灼也說文云燒也箯輿前服䖍云音編編竹木如今峻可以糞除也何休著公羊筍音峻筍者竹箯一名編齊魯已北名為筍郭璞三倉注云箯輿土器絶骯而死蘇林云亢頸大脉也俗所謂胡脉下郎反蕭該或音下浪反尚魯元公主韋昭曰尚奉也不敢言取崔浩云奉事公主小顔云尚配也易曰德尚于中行王弼亦以尚為配恐非其義也魯元王偃魯謂偃以其母號而封也相然信按葛洪要用字苑云然猶爾也謂相和同諾者何也謂然諾相信雖死不顧也勢利交有本作私利交漢書作勢利故廉頗云天下以市道交君有勢利從君無勢則去此固其理是也魏豹彭越列傳第三十魏咎故寧陵君按晉灼云寧陵今梁國縣也即今寧陵是其兄魏咎按彭越傳云魏豹魏王咎從弟真魏後也忠臣乃見老子曰國家昏亂有忠臣此取以為說也遣項它田巴按項它楚將田巴齊將也白駒過隙莊子云無異騏驥之馳過隙則謂馬也小顔云白駒謂日影也隙壁隙也以言速疾若日影過壁隙也與期旦日日出旦日謂明日之朝日出時也擅將其兵擅猶専也東傅海傅音附青衣蘇林曰縣名今為臨邛瓚曰今漢嘉是也西至鄭地理志鄭屬京兆喋血音牒喋猶踐也殺敵踐血而行孝文紀喋血京師是也黥布列傳第三十一六人地理志盧江有六縣蘇林曰今為六安也姓英氏按布本姓英國名也咎繇之後布以少時有人相云當刑而王故漢畫云布改姓黥以厭當之也幾是乎裴駰曰臣瓚音機幾近也楚漢春秋作豈是乎故徐廣云一作豈劉氏作祈祈者語辭也亦通共俳笑之謂衆共以俳輩笑之曹偶曹輩也偶類也謂徒輩之類先從間道鄒氏云間猶閒也謂私也今以間音統莧反間道即他道猶若反間之義嘗為軍鋒按漢書作楚軍前簿簿者鹵簿謂左右按謂隨何因太宰主之太宰膳食之官韋昭曰主舍天下負之以不義負猶被也以不義被其身守徼徼謂邊境亭障以徼繞邊陲恆守之也乘塞按乘者登也登垣塞而守之間以梁地按服䖍曰梁在楚漢之中間注恃一作罷按漢書作罷音皮事已搆按搆訓成也走漢走音奏向也腐儒腐音輔謂之腐儒者言如腐敗之物不任用賁赫上音肥人姓也赫音虛格反疏爵而貴之疏分也漢書曰禹決江疏河尚書曰列爵惟五分土惟三裂地是對文故知疏即分也敖庾之粟按太康地記云秦建敖倉於成臯又云庾故云敖庾也􅀢音烏卦反封薛公千戶劉氏云薛公為封千戶蓋關內侯也徐僮間按地理志臨淮有徐縣僮縣會甀上古外反下持瑞反韋昭云蘄之鄉名漢書作箠應劭音保鉦下亭名長沙哀王哀字誤也是成王臣吳芮之子也茲鄉鄱陽􅀈縣之鄉拔興白曷反疾也妬媢按王劭音媢媢亦妬也漢書外戚傳亦云或結寵妾妬媢之誅又論衡云妬夫媢婦則媢是妬之别名今原英布之誅為疑賁赫與其妃有亂故至滅國所以不得言妬媢是媚也一云男妬曰媢淮隂侯列傳第三十二下鄉按下鄉鄉名屬淮隂郡南昌亭長按楚漢春秋作新昌亭長吾哀王孫劉德曰秦末多失國言王孫公子尊之也蘇林亦同張晏云字王孫非也袴下袴漢書作胯胯股也音枯化反然尋此文作袴欲依字讀何為不通袴下即胯下也亦何必須作胯連敖李竒云楚官張晏云司馬也喑啞上於金反下烏路反喑啞懷怒氣叱咤咤字或作吒上昌栗反下卓嫁反叱咤發怒聲千人皆廢孟康曰廢伏也張晏曰廢偃也言語嘔嘔音吁嘔嘔猶區區也漢書作姁姁鄧展曰姁姁好也張晏音吁何不誅按劉氏云言何所不誅也何不散劉氏云用東歸之兵擊東方之敵此敵無不散敗也秋毫按毫秋乃成又王逸注楚詞云鋭毛為毫夏落秋生也可傳檄按說文云檄二尺書也此云傳檄書以責所伐者絶河關按謂今蒲津關塞臨晉上音先得反臨晉縣名在河東之東岸對舊關陳船欲度臨晉劉氏云陳船地名在舊關之西今之朝邑是也按京兆有船司空縣不名陳船陳船者陳列船欲渡河也襲安邑按劉氏云夏陽舊無船豹不備之而防臨晉耳今安邑被襲故豹遂降也閼與司馬彪郡國志上黨沾縣有閼與聚閼音曷又音嫣與音余又音預新喋血舊音㰱非也按陳湯傳喋血萬里韋昭音徒協反東下井陘按地理志常山石邑縣井陘山在西又穆天子傳云至于陘山之隧升于三道之磴是也間道卑山按謂令從間道小路向前望見陳餘軍營住仍須隱山自蔽勿令趙知也卑音蔽者蓋覆也楚漢春秋作卑山漢書作箄說文云箄蔽也從卑竹聲傳餐如淳曰小飯曰餐謂立待傳餐待破趙乃大食也泜水上徐廣音遲劉氏音脂效首虜如淳曰致也晉灼云效數也鄭𤣥注禮效猶呈見也涉西河此之西河當馮翊也榆衣甘食榆鄒氏音踰美也恐滅亡不久故廢止作業而事美衣甘食日偷茍且也慮不圖久故也漢書作靡衣偷食也醳兵劉氏依劉逵音醳酒謂以酒食養兵士也按史記古釋字皆如此作豈亦謂以酒歡醳兵士故字從酉夾濰水音維地理志濰水琅邪箕縣東北經都昌入海徐廣云出東莞而東北流入海蓋據水經而說少不同耳儋石儋音都濫反石斗也蘇林解為近得鮐音胎吟而不言吟鄒氏音拒蔭反又音琴注一云卒遂不用按漢書及戰國策皆有此文伊盧卿出司馬彪郡國志郊兔死郊音狡狡猾也吳越春秋作郊兔亦通漢書作狡兔戰國策曰東郭逡海內狡兔也其舍人按晉灼曰楚漢春秋云謝公也姚氏按功臣表云慎陽侯樂說淮隂舍人告信反未知孰是韓信盧綰列傳第三十三韓王信楚漢春秋云韓王信都恐謬也諸書不言有韓信都按韓初為韓司徒後訛云申徒因誤以為韓王名耳孽孫張晏云庶子為孽子何休注公羊以為孽賤子猶之伐木有孽生也漢書朝錯云孽子悼惠王是也跂而音企起踵也其鋒東鄉按姚氏云軍中將士氣鋒韋昭曰其氣鋒鋭欲東也注封為穰侯地理志穰縣屬南陽冒頓上音墨又音莫報反白登姚氏按北疆記桑乾河北有白登山冒頓圍漢高之所今猶有壘壁傅兩矢傳音附柴將軍應劭云柴武鄧展云柴奇晉灼云奇武之子應劭說為得此時奇未為將僨於吳蘇林曰僨音奮張晏曰僨僵仆也痿人不忘起痿耳誰反舊音耳睡反於義為疏張揖云痿不能起哀帝紀云帝即位痿痺是也弓高侯地理志屬河間漢書功臣表屬信陵襄城侯按服䖍云縣名功臣表屬魏郡韓嫣音偃又一言反又休延反並通孫增徐廣曰長君之子按博物志字季君也龍額侯五格反又作雒音洛龍雒縣名觖望服䖍音决觖望猶怨也又音企韋昭音冀宛胊人地理志屬濟隂下又云梁人是褚先生之說異也田儋列傳第三十四田儋子市從弟榮榮子廣榮橫各遞為王橫并三齊蝮螫手上音芳服反下音臛又音釋三齊田市王膠東田都王齊田安王濟北齮齕上音蟻下音紇齮齕側齒咬也長短說言欲令此事長則長說之欲令此事短則短說之故戰國策亦名曰短長書是也乃醳齊此豈亦以醳酒之義並古釋字雋永書名也音松兖反無不善畫者莫圖何哉言天下非無善畫之人而不知圖畫田橫及其黨慕義死節之事故歎畫人不知畫此也樊酈滕灌列傳第三十五擊泗水監豐下按監者秦時御史監都也豐下豐縣之下也破泗水守薛西謂破其守於薛縣之西也賜上聞爵張晏云得徑上聞晉灼曰名通於天子也如淳曰或作上聞又引吕氏春秋當證上間間音中間出亳南按亳湯所都今河南偃師有湯亳是也曲遇音齲顒二音邑名也宛陵地理志屬河南號賢成君張晏曰食祿比封君而無邑徐廣曰賜爵有執圭執帛又有爵封而加美號又小顔云楚漢之際權設寵榮假其位號或得邑地或空受爵此例多矣賜重封張晏云益祿也臣瓚以為增封義亦近是而如淳曰正爵名非也小顔以為重封者兼二號蓋為得也譙讓項羽上音誚責也或才笑反或亦作誚擊西丞白水北按西謂隴西之西縣白水水名出武都經西縣東南流言噲擊西縣之丞在白水之北耳徐廣等說皆非也章平章平即章邯子也攻雍斄按雍即扶風雍昌縣斄音台即后稷所封今之武功故斄城是音胎壤東小顔亦以為地名柳中按柳中即細柳地在長安西也灌廢丘最謂以水灌廢丘城陷其功最上也李奇曰廢丘即槐里也上槐里此又言者疑此是小槐里非也按文云攻趙賁下郿槐里栁中咸陽總言是攻陷之邑别言以水灌廢丘其特最也何者初云槐里稱其新名後言最既是舉不欲再見其文故因舊稱廢丘杜之樊鄉按杜陵有樊鄉三秦記曰長安正南山名秦嶺谷名子午一名樊川一名御宿樊鄉即川地屠煮棗檢地理志無煮棗晉說是功臣表有煮棗侯云清河有煮棗城小顔以為攻項籍屠煮棗合在河南非清河之城明矣今按續漢書郡國志在濟隂宛朐也抵薊南抵音丁禮反抵訓至一云抵者丞相之名吕嬃婘屬音須眷二音他廣奪侯按漢書平帝元始二年封噲𤣥孫之章為武陽侯邑千戶酈商音歷高陽人聚名屬陳留略地六月餘事與酈生傳及年表小不同蓋史官意異也於歧比地名闕蓋在河東鄭縣之界栒關按在漢中旬陽縣旬水上之關破將軍焉氏上音於然反下音支縣名屬安定漢書云破鄣邯别將蘇駔軍於泥陽北地縣名駔者龍馬也栒邑按在漢中栒陽地理志右扶風音荀戰龍脫孟康曰地名在燕趙之界其地闕攻其前拒音巨又音矩裴駰云拒方陳鄒氏引左傳有左矩又云一作和和軍門也漢書作前垣小顔以為攻其壁壘之垣也李奇以為前鋒堅蔽若垣墻非也字況酈寄字也鄒氏本作光亦音況紿吕祿紿欺也詐也音待俞侯欒布俞音歈縣名音輸在河東封為繆侯音穆邑也諡曰靖侯漢書無諡為沛廏司御按楚漢春秋云滕公者御也後獄覆按韋昭曰高帝自言不傷嬰嬰證之是獄辭翻覆也注乞鞫按晉令云獄結竟呼囚鞫語罪狀囚若稱枉欲乞鞫者許之也得印一匱按說文云匱匣謂得其時自相部署之印芷陽上音止地名今霸陵也在京兆常蹶兩兒音厥又音巨月反一音居衛反漢書作蹳音撥面雍樹蘇林與晉灼皆言南方及京師謂抱兒為擁樹今則無其言或當時有此說其應服之說蓋疏也食祈陽蓋鄉名也漢書作沂楚無其縣食茲氏縣名也地理志屬太原武泉地理志屬雲中細陽地理志屬汝南卒諡文侯按姚氏云三輔故事曰滕文公墓在飲馬橋東大道南俗人謂之馬冢博物志曰公卿送嬰葬至東都門外馬不行踣地悲鳴得石銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室乃葬之灌嬰號昌文君亦稱宣陵君皆非爵土加美號耳食杜平鄉謂食杜縣之平鄉李必駱甲二人名也姚氏按漢紀桓帝延熙三年追録高祖功臣李必後黃門丞遂為晉陽關內侯也柘公王武按柘縣令也柘縣屬陳連尹蘇林曰楚官也按左傳連敖連尹襄老是留公族高密留縣令稱公族其名也高密縣名在北海漢書作假密地名不知所出未知孰是僮取慮徐取音秋慮音閭取又音趨僮徐是二縣取慮是一縣名破楚騎平陽小顔云此平陽在河南地理志太山有東平陽縣頤鄉徐廣云苦縣有頤鄉音以之反吳郡長下有郡守此長即令也如淳以為雄長非也硰石服䖍音沙劉氏音于卧反注一作銖按漢書作肥銖余與他廣通按他廣樊噲之孫後失封然亦訝太史公序蕭曹樊勝之功悉具則從他廣而得其事故備也史記索隱卷二十二
