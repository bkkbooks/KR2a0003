body:
  text: 史記索隱卷十唐司馬貞撰吳太伯系家第一系家者系諸侯代系也言其下及子孫常有國故孟子曰陳仲子齊之系家又董仲舒曰王者封諸侯非官之也得以代為家也吳太伯國語曰黃池之會晉定公使謂吳王夫差曰夫命圭有命固曰吳伯不曰吳王是吳本伯爵也按范寧解論語曰太者善大之稱伯者長也周太王之元子故曰太伯稱仲雍季歷皆以字配名則伯亦是字又是爵但其名史籍先闕耳弟仲雍伯仲季是兄弟次第之字若表德之字意義與名相符則系本曰吳熟哉居蕃離宋忠曰熟哉仲雍字蕃離今吳之餘暨也解者云雍是熟食故曰雍字熟哉也奔荆蠻號句吳荆者楚之舊號以州而言之曰荆蠻者閩也南夷之名蠻亦稱越此言自號句吳吳名起於太伯明以前未有吳號地在楚越之界故稱荆蠻顔師古注漢書以吳言句者夷語發聲猶言於越爾此言號句吳當如顔解而注引宋忠以為地名者系本居篇曰熟哉居藩離熟始徙句吳宋氏見史記有太伯自號句吳之文遂彌縫解彼云是太伯始所居地名裴氏引之恐非其義藩離既有其地句吳何總不知貞實吳人不聞别有城邑曽名句吳則系本之文或難依信吳地記曰太伯居梅里在闔閭城北五十里許仲雍卒吳地記曰仲雍冢在吳鄉常熟縣西海虞山上與言偃冢竝列故夏虛是為虞仲夏都安邑虞都太陽之虞城在安邑南故曰夏虛左傳曰太伯虞仲太王之昭則虞仲是太王之子必也論語稱虞仲夷逸隱居放言是仲雍稱虞仲今周章之弟亦稱虞仲者蓋周章之弟字仲始封於虞故曰虞仲則仲雍本字仲而又為虞之始祖故後代亦稱虞仲所以祖與孫同號也子轉譙周古史考云柯轉子頗髙古史考作頗夢子卑古史考云卑軫以開晉伐虢春秋經僖公五年冬晉人執虞公左氏二年傳曰晉荀息請以屈産之乘與垂棘之壁假道伐虢宫之奇諌不聽虞公許之且請先伐之遂伐虢滅下陽五年傳曰晉侯復假道伐虢宫之奇諫不聽以其族行曰虞不臘矣八月甲午晉侯圍上陽冬十有二月滅虢師還遂襲虞滅之也太伯至夀夢十九代夀夢是仲雍十九代孫也二年自夀夢已下始有其年春秋唯記卒年計二年當成七年也楚之亡大夫申公巫臣左傳魯成二年曰巫臣使齊及鄭使介反幣而以夏姬行遂奔晉七年傳曰子重子反殺巫臣之族而分其室巫臣遺二子書曰余必使爾罷於奔命以死巫臣使於吳吳子夀夢悅之乃通吳于晉教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人吳始伐楚伐巢伐徐馬陵之會吳入州來子重子反於是乎一嵗七奔命是十六年春秋經襄三年楚公子嬰齊帥師伐吳左傳曰楚子重伐吳為簡之師克鳩兹至于衡山也二十五年王夀夢卒襄十二年經曰秋九月吳子乘卒左傳曰夀夢計從成六年至此正二十五年系本曰吳熟姑徙句吳宋忠曰孰姑夀夢也代謂祝夢乘諸也夀孰音相近姑之言諸也毛詩傳讀姑為諸知熟姑夀夢是一人又名乘也長曰諸樊春秋經書吳子遏左傳稱樊蓋遏是其名諸樊是其號公羊傳遏作謁次曰餘祭左傳曰閽戕戴吳杜預曰戴吳餘祭也又襄二十八年左傳齊慶封奔吳句餘與之朱方杜預曰句餘吳子夷末也計祭餘以襄二十八年卒則二十八年賜慶封邑不得是夷末且句餘餘祭或謂是一人夷末唯史記作餘昧左氏及公羊竝為餘祭夷末句餘音字各異不得為一或杜氏誤耳次曰季札公羊傳曰謁也餘祭也夷末也與季子同母者四人季子弱而才兄弟皆愛之同欲以為君兄弟迅相為君而致國于季子故謁也死餘祭也立餘祭也死夷末也立夷末也死則國宜之季子季子使而亡焉僚者長庶也即之闔閭曰將從先君之命則國宜之季子也如不從君之命則宜立者我也僚惡得為君乎於是使専諸刺僚史記夀夢四子亦約公羊文但以僚為餘昧子為異耳左氏其文不明服䖍用公羊杜預依史記及吳越春秋下注徐廣引系本曰夷昧及僚昧夷光生檢系本今無此語然按左狐庸對趙文子謂夷宋甚德而度其天所啓也此必君之子孫實終之若以僚為末子不應此言又光言我王嗣國是夷昧子且明是庶子諸樊元年已除喪至乃舍之皆襄十四年左氏傳文不義曹君成十三年左傳曰曹宣公卒于師曹人使公子負芻守使公子欣時逆喪秋負芻殺其太子而自立杜預曰皆宣公庶子也負芻成公也欣時子臧也十五年傳曰會于戚執曹成公也執而歸諸京師諸侯將見子臧於王而立之子臧曰前志有之曰聖達節杜預曰聖人應天命不拘常禮也次守節杜預曰謂賢者也下失節杜預曰愚者妄動也為君非吾節也雖不能聖敢失守乎遂進奔宋也君子曰君子者左丘明所為史評仲尼之詞指仲尼為君子也四年晉平公立左傳襄十年春葬晉悼公平公即位是也十三年樊卒春秋經襄二十五年十有二月吳子遏伐楚門于巢卒左傳曰吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒也封於延陵襄三十一年左傳趙文子問於屈狐庸曰延州來季子其果立乎杜預曰延州來季札邑也昭二十七年左傳曰吳子使延州來季子聘于上國杜預曰季子本封延陵後復封州來故曰延州來成七年左傳曰吳入州來杜預曰州來楚邑淮南下蔡縣是昭十三年傳吳滅州來二十三年傳吳伐州來則州來本為楚邑吳光伐滅遂以封季子也地理志㑹稽毗陵縣云季札所居太康也地理志曰故延陵邑季札所居栗頭有季札祠地理志沛郡下蔡縣云古州來國為楚所滅後吳取之至夫差遷昭侯於此公羊傳曰季子去之延陵終身不入吳國何休曰不入吳朝廷也此云封於延陵謂因而賜之以菜邑而杜預春秋釋例土地名則云延州來閼不知何故而為此言也泱泱於良反泱泱猶汪汪洋洋美盛貌也杜預曰和大之聲也渢渢音馮又音泛杜預曰中庸之聲大而寬左傳作大而婉杜預曰婉約也大而約則儉節易行寬字宜讀為婉也招萷韶簫二字體變耳有感感讀為憾字省耳胡暗反象萷音朔又素交反則盟主也注引徐廣曰盟一作明按左傳亦作明此以聽聲知政言其明聽耳非盟會也將舍於宿注引左傳曰將舍於戚按太史公欲自為一家事雖出左氏文則隨義而換既以舍字替宿遂誤宿字下替於戚戚既是邑名理應不易今宜讀宿為戚戚衛邑孫文子舊所食地而又可以畔乎左傳曰而又何樂此畔字宜讀曰樂樂謂所聞鐘聲也畔非其義也趙文子名武也韓宣子名起也魏獻子名鍾舒也七年楚公子圍殺其王今按春秋經襄二十五年吳子遏卒二十九年閽殺吳子餘祭昭十五年吳子夷末卒是餘祭在位四年餘昧在位七十年系家倒錯二王之年此七年正是餘昧之三年昭元年經曰冬十一月楚子麋卒左傳曰楚公子圍將聘于鄭未出境聞王有疾而還入問王疾遂縊而殺孫卿曰以冠纓絞之遂殺其子幕及平夏葬王于郟謂之郟敖也注入棘櫟麻杜預注彼云皆楚東鄙邑譙國酇縣東北有棘亭汝陰新蔡縣東北有櫟亭故解者以麻即襄城縣故麻城是也至雩婁昭五年左傳曰楚子使沈尹射待命於巢薳啓彊待命於雩婁今直言至雩婁略耳餘祭卒春秋襄二十九年經曰閽殺吳子餘祭左傳曰吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀殺之公羊傳曰近刑人則輕死之道是也王餘昧二年楚公子棄疾殺靈王據春秋即昧之十五年也昭十三年經曰夏四月楚公子比自晉歸干楚弒其君䖍于乾溪楚公子棄疾殺公子比左傳具載以詞繁不録公子比棄疾皆靈王弟也比即子干也靈王公子圍也即位後易名為䖍棄疾即位後易名熊居是為平王史記以平王遂有楚國故曰棄疾弒君春秋以子干已為王故曰比殺君彼此各有意義也王僚二年計僚元年當昭十六年比一年公子光亡王舟事在昭十七年左傳也王僚此文以為餘末子公羊傳以為夀夢庶子也光此文以為諸樊子系本以為夷昧子也伍子胥來奔左傳昭二十年曰伍員如吳言伐楚之利於州于杜預曰州于吳子僚也公子光曰是宗為戮而欲反其讐不可從也彼將有他志余姑為之求士而鄙以待之乃見鱄設諸焉而耕於鄙是謂客禮以接待也拔居巢鍾離昭二十四年經曰冬吳滅巢左傳曰楚子為舟師以略吳疆沈尹戌曰此行也楚必亡邑不撫人而勞之吳不動而速之吳人踵楚邊人不備遂滅巢及鍾離乃還也居巢地理志居巢屬盧江鍾離屬九江應劭曰鍾離子之國也初楚邊邑卑梁氏左傳無其事伍子胥初奔吳至待專諸之事依左傳即上五年公子光客之是也事合記於五年不應略彼而更具於此也楚平王卒昭二十六年春秋經書云楚子居卒十二諸侯表及左傳合于僚十一年也十三年春吳據表及左氏傳止合有十二年事竝見昭二十七年左傳也燭庸蓋餘春秋作掩餘史記竝作蓋餘義同而字異或者謂太史公被腐刑不欲言掩也賈逵及杜預及刺客傳皆云二公子王僚母弟而昭二十三年左傳曰光帥右掩餘帥左杜注彼則云掩餘吳王夀夢子又系族譜亦云二公子竝夀夢子若依公羊僚為夀夢子則與系族譜合也専諸勇士専或作剸左傳作鱄設諸刺客傳曰諸棠邑人也母老子弱依王肅解與史記同於理無失服䖍杜預見左傳下文云我爾身也以其子為卿遂强解是無若我何猶言我無若是何語不近情過為迃回非也四月丙子春秋經唯言夏四月左傳亦云丙子當别有按據不知出何書也謁王僚飲謁請也本或作請也夾持鈹音披劉逵注吳都賦鈹兩刃小刀詳為上音陽下如字左傳曰光僞足疾詳即僞也或讀此為字音僞非也豈詳僞重言耶匕首劉氏曰七首短劒也按鹽鐵論以為長尺八寸通俗云其頭類七故曰七首也二公子降楚楚封之舒下又伐楚拔舒殺二公子左傳昭二十七年曰掩餘奔徐燭庸奔鍾吾三十年經曰吳滅徐徐子奔楚左傳曰吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙無封舒之事當是舒徐字亂又且疏略也孫武曰按左氏此年有子胥對耳無孫武事也六年取居巢左傳定二年當為七年四年戰于柏舉吳入郢是也鞭平王尸左氏無此事也今果如何言今欲果敢伐楚可否也堂溪氏注司馬彪云按地理志而知夫差取畨定六年左傳四月己丑吳太子終纍敗楚舟師杜預曰闔閭子夫差兄此以為夫差當謂名異而一人耳左傳又曰獲潘子臣小惟子及大夫七人楚於是乎遷郢於鄀此言畨畨音潘楚邑名子臣即其邑之大夫也孔子相魯定十年左傳曰夏公㑹齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇是也但杜預以為相會儀也而史遷孔子系家云攝行相事按左氏丘以公退曰士兵之又使兹無還揖是攝國相也敗之姑蘇姑蘇臺名在吳縣西三十里左傳定十四年曰越子大敗之靈姑浮以戈擊闔閭闔閭傷指還卒於陘去檇李七里杜預以為檇李在嘉興縣南靈姑浮越大夫也謂曰對曰此為以闔閭謂夫差夫差對闔閭左傳則云對曰者夫差對所使之人也注澒池澒胡貢反水銀以為池注太伯至夫差二十六世史記太伯至夀夢十九代諸樊已下六王唯二十五世大夫伯嚭為太宰按左傳定四年伯嚭為太宰當闔閭九年非夫差代也敗越夫椒賈逵云越地蓋近得之然其地闕不知所在杜預以為太湖中椒山非戰所夫椒山不得為一且夫差以報越為志又伐越當在越地何乃不離吳境近在太湖中又按越語云敗五湖也棲於會稽鳥所止宿曰棲越為吳敗依託於山林故以鳥棲為喻左傳作保國語作棲大夫種大夫官也種名也吳越春秋以為種姓文而劉氏云姓大夫非也有過氏過音戈寒浞之子澆所封國也猗姓國晉地道記曰東萊掖縣有過鄉北有過城古過國也斟灌斟尋注夏同姓賈氏據系本而知也按地理志北海夀光縣應劭曰古斟灌亭是也平夀縣復云故北㘰尋禹後今㘰城也然㘰與斟同注有仍國名未知其國所在春秋經桓五年天王使仍叔之子來聘穀梁經傳並作任叔仍任聲相近或是一地甫吕虢郭之類按地理志東平有任縣蓋古仍國使人誘之左傳云使女艾諜澆遂滅過戈杜預曰諜候也七年敗齊艾陵七年魯哀公之六年也左傳此年無伐齊事哀公十一年敗齊艾陵爾徵百牢事在哀七年是年當夫差八年不應上連七年按左傳曰子服景伯對不聽乃與之非謂季康子使子貢說得不用百牢太宰嚭自别召康子乃使子貢辭之耳為騶伐魯左傳騶作邾聲相近自亂耳杜預注左傳亦曰邾今魯國騶縣是也騶宜音邾十年十一年竝伐齊依左氏合作十一年十二年也子胥懼曰是棄吳也左氏作豢吳豢養也有顛越勿遺左傳曰其顛越不共則劓殄無遺育無俾易種于兹邑是商所以興也今君易之此則艾陵戰時也使子胥於齊左傳直曰使於齊杜預曰私使人至齊屬其子按左傳又曰反役王聞之明非子胥自使也屬鏤劒名見越絶書墓上以梓左傳云樹吾墓檟檟可材也吳其亡乎梓檟相類因變文也抉吾眼置之吳東門抉烏穴反此國語文彼以抉為辟又云以手抉之王愠曰孤不使大夫得有見乃盛以鴟夷投之江也齊鮑氏弒悼公公名陽生左傳哀十年吳伐齊南鄙齊人殺悼公不言鮑氏又鮑氏以哀八年為悼公所殺今言鮑氏蓋其宗黨耳且此伐在艾陵戰之前年也今記於後亦為顛倒也召魯衛㑹橐臯哀十二年左傳曰公會吳于橐臯衛侯會吳于鄖此并言會衛橐臯者按左傳吳徴會于衛初衛殺吳行人懼謀於子羽子羽曰不如止也子木曰往也以本不欲赴會故魯以夏會衛及秋乃會太史公以其本召於橐臯故不言鄖廣陵縣東南有發繇口橐音他各反也注逡遒上七巡反下酒尤反趙鞅怒將伐吳乃長晉定公此依左傳文按左傳鞅呼司馬寅曰建鼓整列二臣死之長幼必可知也是趙鞅怒又曰司馬寅請姑視之反曰肉食者無墨今吳王有墨國其勝乎杜預曰墨氣色下也國為敵所勝又曰太子死乎且夷德輕不忍久請少待之乃先晉人是也徐賈所云據國語不與左傳合非也左氏魯襄公伐晉楚為會先書晉晉有信耳外傳即國語也書有二名也外吳者吳夷賤之不許同中國故言外也二十年越復吳哀十九年左傳曰越人侵楚以誤吳也杜預曰誤吳使不為備也無伐吳事於甬東國語曰甬句東越地㑹稽句章縣東海中州也按今鄮縣是也自剄死左傳曰乃縊越人以歸也注猶亭卑猶位按亭亭名卑猶位三字共為地名吳地記曰徐枕山一名卑猶山是注􅀈土路禾反小竹籠以盛土齊太公系家第二太公望吕尚者譙周曰姓姜名牙炎帝之裔伯夷之後掌四嶽有功封之於吕子孫從其封姓尚其後也按後文王得之渭濵云吾先君太公望子久矣故號太公望蓋牙是字尚是其名後武王號為師尚父也或封於申地理志在南陽宛縣申伯國也吕亦在宛縣之西也蓋嘗窮困年老矣譙周云吕望常屠牛於朝歌賣飲於孟津非彲徐廣音勑知反餘本亦作螭字伐崇密須按郡國志在東郡廩丘縣北今曰顧城密須姞姓在河南密縣東故密城是也與安定姫姓密國别也誓曰蒼兕蒼兕亦有本名作蒼雉按馬融曰蒼兕主舟楫官名又王充曰蒼兕者水獸九頭今誓衆令急濟故言蒼兕以懼之然此文上下並今文泰誓也羣公奉明水周本紀毛叔鄭奉明水也衛康叔布采席周本記衛康叔布兹兹是席故此亦云綵席也犁明至國犁音里奚反犁猶比也一云犁猶遲也南至穆陵北至無棣舊說穆陵在會稽非也按今淮南有故穆陵門是楚之境無棣在遼西孤竹服䖍以為太公受封境界所至不然也蓋言其征伐所至之域也祭公慈母系本作庮公慈母譙周亦曰祭公慈也哀公不辰系本作不臣譙周亦作不辰宋忠曰哀公荒淫田游國史作還詩以刺之也其黨率營丘人宋忠曰其黨周馬繻人將胡公於貝水殺之而出自立是為獻公成公脫系本及譙周皆作說魯人以為讓讓猶責也八年伐紀按春秋莊四年紀侯大去其國左傳云違齊難是也戍葵丘杜預曰臨淄西有地名葵丘又桓三十五年㑹諸侯於葵丘當魯僖公九年杜預云陳留外黃縣有葵丘不同者蓋葵丘有兩處杜意以戍葵丘當不逺出齊境故引臨淄縣西之葵丘若三十五年㑹諸侯於葵丘杜氏又以不合在本國故引外黃東葵丘為注所以不同爾遂獵沛丘左傳作貝丘也遊雍林亦有本作雍廩賈逵曰渠丘大夫左傳云雍廩殺無知杜預曰雍廩齊大夫此云遊雍林雍林人嘗有怨無知遂襲殺之蓋以雍林為名其地有人殺無知賈言渠丘大夫者渠丘邑名雍林為渠丘大夫也笙瀆賈逵云魯地勾竇又按鄒誕生本作莘瀆笙聲相近莘如字瀆音豆論語作溝瀆蓋後代聲轉而字異故諸文不同爾也設輕重魚鹽之利按管子有理人輕重之法七篇輕重謂錢也又有捕魚煮鹽法也二年伐滅郯徐廣曰一作談據春秋魯莊十年齊師滅談是也杜預曰談國在濟南平陵縣西南然此郯乃東海郯縣不當作談字也城楚丘賈逵曰楚丘衛城地杜預曰在濟陰武成縣南即今之衛南縣方城以為城按地理志葉縣南有長城號曰方城則杜預韋昭說為得而服氏云在漢南未知有何慿據離枝孤竹離枝音零支又令祗又如字離枝孤竹皆古國名秦以離枝為縣故地理志遼西令支縣有孤竹城爾雅曰孤竹北戶西王母曰下謂之西荒也徐姬按系本徐嬴姓禮婦人稱國及姓今言此徐姬者然姬是衆妾之總故漢祿秋令云姬妾數百婦人亦總稱姬姬亦未必盡是姓也生無詭左傳作無虧也雍巫有寵賈逵曰以雍巫為易牙未知何據按管子有棠巫恐與雍巫是一人也丙戎左傳曰邴作邴歜也庸職左傳曰作閻職此言庸職不同者傳所云閻姓職名也此言庸職庸非姓蓋謂受顧織之妻史意不同字則異耳魯大夫如晉成二年左傳魯臧宣叔衛孫桓子如晉皆主於㕁克是合靡笄下靡如字靡笄山名在濟南與代地磨笄山不同也令齊東畝隴畝東行則齊車馬東向行馬也欲尊王晉景公王劭按張衡曰禮諸侯朝天子執玉既授而反之若諸侯自相朝則不授玉齊頃公戰敗朝晉而授玉是欲尊晉侯為王太史公探其㫖而言今按此文不云授玉王氏之說復何所依聊記異耳中行獻子荀偃祖林父也為中行後改姓中行氏也上太行入孟門孟門山在朝歌東北太行山在河內溫縣西陪臣爭趣左傳作扜趣此為爭趣者是太史公變左氏之文言陪臣但爭趣投有淫者耳更不知他命也崔杼毋歸毋音無也犁且即餘反即犁彌也芮姬生子荼左傳曰鬻姒之子荼嬖則荼毋姓姒此芮姫不同也譙周依左氏作鬻姒鄒誕生本作芮姁音五句反也公子夀一作嘉駒黔三人奔衛公子駔左傳作鉏陽生二人奔魯凡五公子也伐魯取歡闡二邑名歡在今博城縣西南杜預曰闡在東平剛縣北監止有寵監左傳作闞音苦濫反闞在東平須昌縣東南也御鞅言簡公鞅名也為僕御之官故曰御鞅亦田氏之族按系本陳桓子無字産子亹亹産子獻獻産鞅也四乘如公服䖍曰成子兄弟八人二人共乘一車故四乘按系本東僖子乞産成子常簡子齒宣子其夷穆子安禀立子尚醫兹子芒盈惠子得凡七人杜預又取昭子莊以充八人之數按系本昭子將來是桓子之子成子之叔父又不名莊强相證會言四乘有八人耳今按田完系家云田常兄弟四人如公宫與此事同今此唯稱四乘不言人數知四乘謂兄弟四人乘車而入非二人共車也然其昆弟三人不見者蓋時或不在不同入公宫不可强以四乘為八人添叔父為兄弟之數服杜殊失也徐州音舒其字從人左氏作舒舒陳氏邑說文作䣄䣄在莘縣公驁系本及譙周皆作敬蓋誤也齊安平以東安平齊邑按地理志涿郡有安平縣也田㑹及廩丘田㑹齊大夫廩邑東郡有廩丘縣也魯周公系家第三周公周地名在岐山之陽本太王所居後以為周公之菜邑故曰周公即今之扶風雍東北故周城是也諡曰周文公見國語旦為子孝鄒誕本孝作敬也負子之責尚書曰負為丕今此為負者謂三王負於上天之責故我當代之鄭𤣥亦曰丕讀曰負在强葆强葆即襁褓古字少假借用也異母同穎尚書曰異畝此母義通鄒誕本同嘉天子之命徐廣云一作魯魯字誤也今書序作旅史記嘉天子命於文亦得何須作嘉旅不敢訓周公按尚書作誚讓也此作訓字誤耳義無所通徐氏合定其本何須云一作誚也自周至豐周鎬京也豐文王所作邑後武王都鎬於豐立文王廟按豐在鄠縣東臨豐水東去鎬二十五里也周公奔楚經典無文其事或别有所出而譙周云秦既燔書時人欲言金縢之事失其本末乃云成王少時病周公禱河欲代王死藏祝策于府成王用事人讒周公周公奔楚成王發府見策乃迎周公又與䝉恬傳同事或然也其祖甲孔安國以為湯孫大甲馬融鄭𤣥以為武丁子帝甲按紀年太甲唯得十二年此云祖甲享國三十三年知祖甲是帝甲明矣周公卒秋未穫據尚書武王崩後有此雷風異今此言周公卒後更有暴風之變始開金縢之書當不然也蓋由史遷不見古文尚書故說乖誤子伯禽是為魯公周公元子就封於魯次子留相王室代為周公其餘食小國者六人蔣凡邢茅胙祭也平易近民言為政簡易者民必附近之近謂親近也作肹誓尚書作費徐廣云一作鮮一作獮按尚書大傳見作鮮誓鮮誓即肹誓古今字異義亦變也鮮獮也言於肹地誓衆自行獮田之禮以取鮮獸而祭故字或作鮮或作獮孔安國云費魯東郊地名即魯卿季氏之費邑地也考公酋酋系本作就鄒誕本作道煬公熙一作怡考公弟幽公宰系本名圉弟沸是為魏公系本沸作弗音沸魏作微且古書多用魏字作微則太史公意亦不殊也厲公擢系本作翟音持角反也真公濞真音槇本亦多作慎公按衛亦有真侯可通也濞系本作摯或作鼻匹位反鄒誕本慎公嚊惠公弗湟系本作弗皇年表作弗生長庶子息隱公也系本隱公名息姑為息娶宋女惠公奪而妻之左傳宋武公生仲子仲子手中有為魯夫人文故歸魯生桓公今此云惠公奪息而自妻又經傳不言惠公無道左傳文見分明不知太史公何據而為此說譙周亦深不信然生子允徐廣且作軌系本亦作軌也子開立是為涽公系本名啓方今作開避漢景帝諱春秋作閔公也以尸與之本亦作死字也見孟女即左傳云孟任黨氏二女孟長也任字也非姓耳釐公元年涽公弟名申成季相之魯國理魯人為僖公作魯頌也以汶陽鄪封季友賈逵云魯二邑鄪或作費同祕音按費在汶水之北則汶陽非邑賈言二邑非也按地理志東海費縣班固云魯季氏邑蓋尚書費誓即其地髙梁晉地在平陽縣西北齊女為哀姜此哀非諡蓋以哭而過市國人哀之謂之哀姜故生稱哀與上桓夫人别也生子倭人唯反一作俀音同魯諱之謂不書其葬唯言公如晉是諱以相三君宣公成公襄公注三家各征其一征謂起徒役也武子為三軍故一卿主一軍之征賦也太子卒左傳曰毁敬歸之子野立三月卒也入魯問禮齊系家亦然左傳無其事齊歸之子稠系本作稠又徐廣云一作袑音紹也穆叔魯大夫叔孫豹也宣伯喬如之弟也臧昭伯弟會系本臧會臧頃伯也宣叔許之孫與昭伯賜為從父昆弟也叔孫昭子名婼即穆叔子子家駒魯大夫仲孫氏之族名駒諡懿伯也郈昭伯按系本昭伯名惡魯孝公之後稱厚氏也髙齕子將粟系本子將上有貨字即梁丘據也齕音紇齊臣也左傳子將作子猶東門遂系本作述鄒誕本作秫又系本遂産子家歸父及昭子子嬰也遇孟武伯於街有本作衛者非也左傳於孟氏之衢子將立是為哀公系本將作蔣也子顯立是為穆公系本顯作不衍平公叔系本作旅子屯立作論反子匽立匽音偃也文公賈系本作湣公鄒誕本亦同仍云系家或作文公徐州在魯東按說文䣄邾之下邑在魯東又郡國志曰魯國薛縣六國時曰徐州又紀年云梁惠王三十一年下邳遷于薛故名徐州則徐與䣄並音舒遷于下邑下邑謂國外之小邑或有本作卞邑然魯有卞邑所以惑也頃公卒于柯按春秋齊代魯柯而盟杜預云柯齊邑今濟北東柯也齗齗如也齗音魚斤反讀如論語誾誾如也言魯遒雖微而洙泗之間尚誾誾如也鄒誕生亦音銀又作斷斷如尚書則斷斷是專一之義徐廣又引地理志音五艱反云齗齗是鬬爭之貌故繁欽遂行賦云涉洙泗而飲馬兮恥少長之齗齗是也按下文云至于揖讓之禮則從矣魯尚有揖讓之風如論語音誾為得史記索隱卷十
