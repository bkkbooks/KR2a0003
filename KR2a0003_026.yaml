body:
  text: 史記索隱卷二十六唐司馬貞撰司馬相如列傳第五十七擊劎吕氏春秋劎伎云持短入長倐忽縱横之術也魏文典論云余好擊劎善以短乗長是也名犬子孟康云愛而字之也旣學按秦密云文翁遣相如受七經騎常侍張揖曰秩六百石常侍從格猛獸莊忌夫子徐廣曰郭璞皆云名忌字夫子按鄒陽傳云枚先生嚴夫子此則夫子是美稱時人以為號漢書作嚴忌者按忌本姓莊避明帝諱改姓嚴也往舎都亭按臨邛郭下之亭也鼓一再行按樂府長歌行短歌行行者曲也此言鼔一再行謂一兩曲琴心挑之張揖云挑嬈也以琴中嬈之嬈音徒了反挑音奴了反其詩曰鳯兮鳯兮歸故鄉遊遨四海求其皇有一艷女在此堂室邇人遐毒我腸何由交接為鴛鴦也亡奔相如郭璞云婚不以禮為亡也家居徒四壁立按孔文祥云徒空也家空無資儲但有四壁而已云就此中以安立也弟如臨邛文潁云弟且也郭璞云弟語辭如徃也空借音假借與積同音過詫上音戈下音勑亞反誇詫是也脚麟韋昭云謂持其一脚也司馬彪云脚掎也說文云掎偏引一脚也割鮮染輪李竒云鮮生肉也染濡也切生肉濡鹽而食之染或為淬與下文膊割輪染意同也葢特郭璞云特獨也雲夢褚詮音亡棟反又音莫風反裴駰云孫叔敖激沮水作此澤張揖云楚藪也在南郡華容縣郭璞曰江夏安陸有雲夢城南郡枝江亦有雲夢城華容縣又有巴丘湖俗云即古雲夢澤也則張揖在華容者指巴湖也今安陸東見有雲夢城雲夢縣而枝江亦有者葢縣名逺取此澤故有城也注漢書音義按漢書注此卷多不題注者姓名解者云是張揖亦兼有餘人也赭堊張揖云赭赤土出少室山堊白堊本草云一名白墡也白坿張揖曰白石英也出魯陽山蘇林音附郭璞音符也琨珸司馬彪云石之次玉者按河圗云流州多積石名昆吾石鍊之成鐵以作劎光明照如水精按字或作昆吾蕙圃司馬彪云蕙香草也本草云薰草一名蕙廣志云蕙草緑葉紫莖魏武帝以此燒香今東下田有此草莖葉似麻其華正紫也衡張揖云衡杜衡生下田山按山海經云天帝之山有草葉如葵臭如蘪蕪可以走馬博物志一名土杏云其根一似細辛葉似葵故藥對亦為似細辛是也蘭張揖云秋蘭芷若張揖云若杜若芷白芷也本草云一名茝埤蒼云齊曰茝晉曰虈囂字林曰茝音充在反虈音火嬌反本草又曰杜若一名杜衡今杜若葉似薑而有文理莖葉皆有長毛古今名號不同故其所呼别也射干廣雅云鳥蓬射干本草名鳥扇芎藭司馬彪云芎藭似藁本郭璞云今歴陽呼為江離淮南子云夫亂人者若芎藭之與藁本江離吳録曰臨海縣開水中生江離正青似亂髪即離騷所云者是也廣志為赤葉紅華則與張勃所說又别按今芎藭苗曰江離緑葉白華者又不同麋蕪孟康云麋蕪蘄延也似虵床而香樊光曰藁本一名麋蕪根名蘄延又藥對以為麋蕪一名江離芎藭苖也則芎藭藁本江離麋蕪竝相似非是一物也諸柘張揖云諸柘甘柘也搏且上音竝卜反下音子余反漢書作巴蕉也郭璞云搏且蘘荷屬未知孰是也按衍壇曼司馬彪云按衍窳下壇曼平博也衍音戈戰反也葴析音針斯二音孟康曰葴馬藍也郭璞曰葴酸漿江東名鳥葴析漢書作斯孟康云斯禾似燕麥埤蒼又云生水中華可食廣志云涼州地生析草皆如中國燕麥是也其痺溼痺音婢痺下也藏莨郭璞云狼尾似茅蒹葭音兼加孟康云蒹葭似蘆也郭璞云蒹蔽也似藋而細小高數尺江東人呼為兼蒿又云葭蘆也似葦而細小江東人呼為烏燕薍音五患反蔽音敵東薔按續漢書云東薔似蓬草實如葵子十一月熟廣志云子色青黑河西語云貸我東薔償我曰梁也彫胡按謂菰米菰蘆郭璞云菰蔣也蘆葦也注菴閭蒿郭璞云子可療病也注軒于蕕草郭璞云生水中今揚州有也注朱楊赤楊郭璞云赤莖栁生水邊爾雅云檉河栁是也騰遠孟康云騰遠鳥名非也司馬彪云騰逺虵也郭璞云騰虵龍屬能興雲霧射干張揖云射干似狐能緣木蟃蜒郭璞云蟃蜒大獸長百尋貙犴張揖云貙似狸而大犴胡地野犬似狐而小黑喙應劭音顔韋昭一音岸鄒誕生音苦姦反協音是干将之雄㦸應劭曰干将吳善冶者姓如淳曰干将鉄所出晉灼曰闔閭鑄干将劎應劭說是方言云㦸中尖刺者所謂雄㦸也周處風土記云㦸為五兵雄也注胡中有􅟉音巨按周禮冶氏為戈胡三之注云胡其子也又禮圗謂㦸支曲下為胡也烏號之雕弓黄帝上仙羣臣舉弓抱之而號見封禪書及郊祀志文韓詩外傳云弓工之妻曰此弓大山南烏號之柘按淮南子云烏號柘桑其材堅勁馬棲其上将飛枝勁復起號呼其上伐取其材為弓因曰烏號古史考風俗通皆因此說也右夏服之箭按夏羿善射者又服箭室之名故云夏服又夏后氏有良弓名繁弱其矢亦良即繁弱箭服是也陽子驂乗服䖍云陽子仙人陵陽子也張揖云陽子伯樂也孫陽字伯樂秦繆公臣善御者也纖阿為御服䖍云纖阿為月御或曰美女姣好貌又樂産曰纖阿山名有女子處其岩月歴岩度躍入月中因名月御也按節未舒郭璞曰言頓轡也司馬彪云按轡徐行得節故曰按節馬足未展故曰未之舒也亦曰未得也䡺騊駼上音衛䡺車軸頭也謂車軸衝殺之騊駼野馬乗遺風吕氏春秋云遺風之乗古今注云秦始皇馬名射遊騏韋昭云如馬一角爾雅云嶲無角曰騏非麒麟之騏注嶲音携弭節司馬彪云弭猶低也或云節今之所言杖節信也容與郭璞曰言自得徼􅓈受詘司馬彪云􅓈倦也遮其倦者􅓈音劇詘音屈說文云􅓈勞也燕人謂勞􅓈徼音古堯反襞積褰縐小顔云襞積今之裙襵古謂之素積蘇林曰褰縐縮蹙之是也注簡齰叉革反注縐裁在代反注􅲖曲字林音邱亦反鬱橈谿谷孟康曰其縐中文理茀鬱􅲖曲有似於谿谷也衯衯裶裶郭璞云衣長貌揚袘戍削張晏曰揚舉也袘衣袖也戍削裁制貌也獠於蕙圃爾雅云宵獦曰獠郭璞曰獠獦也又音遼也盤㹪勃猝韋昭曰盤㹪匍匐上下也猝音素忽反射鵕䴊司馬彪云鵕䴊山鷄也許慎云鷩鳥也郭璞曰似鳯有光彩音浚宜李彤云鵕䴊神鳥飛光竟天也連鴐鵝爾雅云舒雁鵝也郭璞曰野鵝也東陼巨海蘇林音渚陼小洲曰渚謂東有大海之渚也觀於成山張揖云觀闕也於山上築宫闕郭璞云言在山下逰觀音館也勃澥按齊都賦云海傍曰渤斷水曰澥也青丘郭璞云山名出九尾狐也噏呷孟康曰噏呷衣起張也韋昭云呷音呼甲也萃蔡孟康云萃蔡衣聲也郭璞曰萃蔡猶璀璨也蔕芥張揖曰刺鯁也郭璞云言不覺有也先生指子虚也見客如淳曰見賔客禮待故也李善曰言見先生是賓客之也王辭而不復郭璞曰復答也听然說文云听笑貌終始灞滻出入涇渭張揖云灞滻二水盡於苑中不出故云終始也涇渭二水從苑外来又出苑去也涇水出安定涇陽縣开頭山東至陽陵入渭渭水出隴西首陽縣鳥䑕同穴山東至華隂入河豐鎬張揖云豊水出鄠縣南山豊谷北入渭鎬在昆明池北郭璞云鎬水豐水下流也潦潏應劭云潦流也潏涌出聲也張揖云又有潏水出南山姚氏云潦或作澇也澇水出鄠縣北注渭潏水出杜陵今名沇水自南山皇子陂西北流注昆明池入渭按此下文八川分流則從涇渭灞滻豐鎬潦潏為八晉灼曰從丹水下則有九從灞以下則七按今潏既是水名除丹紫三川自涇渭以下適足八川是經營乎其内也又潘岳關中記曰涇渭灞滻豊鎬潦潏上林賦所謂八川分疏椒丘之闕服䖍云丘名楚詞曰馳椒丘且焉止息也按兩山俱起象雙闕如淳云丘多椒也堆埼郭璞曰堆沙堆埼曲岸頭也洶湧澎湃司馬彪云洶湧跳起貌澎湃相戾也湧或作容澎或作滂滭浡滵汨司馬彪云滭沸盛貌滵汨去疾也湢測泌瀄司馬彪云湢測迫也泌瀄相楔也郭璞云逼側筆櫛四音潎洌蘇林曰流輕疾也滂濞沆溉溉亦作瀣司馬彪云滂濞水流聲也沆漑徐流郭璞云鼓怒鬱鯁之貌也穹崇雲橈服䖍云水旋還作泉也郭璞云水隴起囘窳也蜿灗膠戻司馬彪云蜿灗展轉也膠戾邪屈也音婉善交利四音也隃波趨浥司馬彪云隃波後陵前也趨浥輸于深泉也浥音焉浹反莅莅下瀨司馬彪云莅莅水聲也音利滯沛郭璞云水洒散貌滯音丑制反瀺灂上音土湛反下音土卓反說文云水小聲也潏淈湁潗郭璞云皆水徼轉細涌貌潏淈音决骨湁音勑力反潗音緝廣雅云淈淈決流也周成雜字云湁潗水沸之貌也汨㴔漂疾晉灼曰華給反郭璞云詳立反㴔急轉貌也翯乎滈滈上翯音鶴下滈音鎬詩曰白烏翯翯郭璞云水白光貌翯音皛滈音吴也赤螭文頴曰龍子曰螭張揖云雌龍也明月珠子的皪江靡應劭曰靡邊也明月珠子生於江中其光耀乃照于江邊張揖曰靡涯也郭璞曰的皪照也鵠鴇音保郭璞云鴇似雁無後指毛詩鳥獸疏云鴇似雁而虎文也䴉目郭璞云未詳小顔云荆郢間有水鳥大如鷺而短尾其色紅白深目旁毛長而旋此其旋目乎䴉音旋煩鶩鷛渠郭璞云煩鶩鴨屬鷛渠一名章渠也葴鴜張揖云葴鴜似魚虎而蒼黑鄒誕本作鴟䳄也汎滛泛濫郭璞云皆鳥任風波自縱漂貌汎音馮泛音芳劎反廣雅云汎汎汜浮也掩薄張揖云掩覆也草叢生曰薄也菁藻郭璞曰菁水草藻藂也吕氏春秋曰太湖之菁左傳云繁蘊藻蘊即藂嶊崣崛﨑郭璞云皆崇屈窳折貌嶊音作罪反崣音委崛音掘﨑音倚振溪張揖云振拔也水注川曰溪注溪曰谷郭璞曰振猶灑也􅢋呀豁閜司馬彪云􅢋呀大貌閜空虚也陂池貏豸郭璞曰陂池旁頽貌陂音皮貏音衣被之被沇溶淫鬻郭璞云㳺激淖衍貌夷陸司馬彪曰平地槀本按桐君藥録云苗似芎藭也茈薑張晏云子薑也按四民月令云生薑謂之茈薑音紫葴橙張揖云葴橙闕郭璞云橙柚也姚氏以為此前後皆草非橙也小顔云葴寒漿也橙當為符符鬼目也按今讀者亦呼為登謂金登草也若蓀張揖云蓀香草姚氏曰蓀草似昌蒲而無脊也生溪澗中蓀音孫鮮支黄礫張揖云皆草也未詳司馬彪云鮮支支子或云鮮支亦香草也小顔云黄礫黄屑木恐非也蔣芧青薠蒋菰也郭璞芧音佇又云三稜芧薠音煩日出東沼張揖云日朝出苑之東池暮入于苑之西陂中也􅥠旄獏犛郭璞云􅥠􅥠牛領有肉堆音容按今之犂牛也張揖云旄旄牛状如牛而四節生毛獏白豹也似熊痺脚銳頭骨無髓食銅鐵音陌犛音狸又音茅或以為猫牛犛牛黑色出西南徼外毛可為拂是也窮竒象犀張揖云窮竒狀如牛而蝟毛其音如嘷狗食人郭璞云象大獸長鼻牙長一丈犀頭似豬痺脚一角在頭也麒麟張揖曰雄曰麒雌曰麟其狀麋身牛尾狼蹄一角郭璞云麒似麟而無角毛詩疏云麟黄色角端有肉京房傳云有五采腹下黄色也角􅗧張揖云音端角􅗧似牛郭璞云似猪角在鼻上毛詩疏云可以為弓李陵曾以此弓遺蘇武華榱壁璫韋昭曰裁金為壁以當榱頭司馬彪曰以壁為瓦當夷嵏築堂服䖍云平此山以為堂如淳云嵏山名也累臺增成張揖云重累而成之故曰增成禮云為壇三成也巖穾洞房郭璞曰言在巖穾底為室潜通臺上穾音一弔反釋名以為穾幽也楚辭云冬有穾厦夏屋寒王逸以為複室也靈圉張揖云衆仙號淮南子云騎飛龍從淳圉許愼曰淳圉仙人也偓佺韋昭曰古仙人姓偓列仙傳云槐里採藥父也食松形體生毛數寸方眼能行追走馬也南榮應劭云屋檐兩頭如翼也故鄭𤣥云榮屋翼也七誘云飛榮似鳥舒翼是也暴偃卧也盤石裖厓如淳曰裖音振盛多也李竒曰裖整也整頓池外之厓音之忍反也磼礏埤蒼云高貌也上士刼反下魚揖反又字林音磼才匝反礏五匝反旁唐郭璞云旁唐言盤薄赤瑕駮犖說文云瑕玉之小赤色張揖曰赤玉也司馬彪曰駮犖采㸃也音洛角反盧橘夏熟應劭曰伊尹書果之美者箕山之東青鳥之所冇盧橘夏熟晉灼曰此雖賦上林博引異方珍竒不係於一也按廣州記云盧橘皮厚大小如廿酢多九月結實正赤明年二月更青黑夏熟吳錄云建安有橘冬月樹上覆裹明年夏色變青黑其味甚甘美盧即黑是也橪柿張揖曰橪橪支香草也韋昭曰橪音汝蕭反郭璞云橪支木也橪音烟徐廣曰橪棗也而善反說文曰橪酸小棗也淮南子云伐橪棗以為矜音勤也楟奈厚朴張揖云楟奈山棃也司馬彪曰上黨謂之楟㮈齊都賦云楟奈㮈熟也厚朴藥名梬棗上音弋并反梬棗似柿也楊梅張揖云其大小似榖子而有核其味酢出江南荆陽異物志其實外肉着核熟時正赤味廿酸櫻桃張揖云一名含桃吕氏春秋為鸎鳥所含故口含桃爾雅云為荆桃也答遝離支郭璞云答遝似李出蜀晉灼曰離支大如雞子皮麄剥去皮肌如雞子中黄其味甘多酢少廣異志云樹髙五六丈如桂樹緑葉冬夏青茂有華朱色離字或作荔音力致反貤丘陵郭璞曰貤延也華楓檘櫨張籍曰華皮可以為索古今字林云櫨合樺之木楓木厚葉弱支善揺郭璞云似白楊葉圎而岐有脂而香出楗為舎人曰楓為樹葉弱莖大風則鳴故曰楓爾雅云一名攝檘枰即平仲木也櫨今黄櫨木也一云玉精食其子得仙也留落胥邪晉灼云留落未詳郭璞曰落檴也中作器素胥邪似并閭司馬彪云胥邪樹高十尋葉在其末異物志實大如瓠繫在顛若挂物實外有皮中有核如胡桃核裏有膚厚半寸如豬膏裏有汁斗餘清如水味美於蜜仁頻并閭孟康曰頻椶也張揖云并閭皮可為索姚氏云擯一名椶即仁頻也林邑記云樹葉似甘蕉頻音賔攙檀攙音讒檀别名也皇覽云孔子墓後有攙檀樹也女貞荆州記云宜都有喬木叢生名為女貞葉冬不落崔錯癹骩郭璞云蟠戾相摎楚訓云林木癹音跋骩音委阬衡閜砢郭璞云掲孽傾敧貌落英幡纚張晏云飛揚貌纚音所綺反猗旎從風張揖云猗旎阿那也瀏莅芔歙郭璞云皆林木鼓動之聲瀏音畱莅如字又音栗也柴池茈虒張揖曰柴池參差也茈傂不齊也柴音差茈音惻氏反𤣥猨素雌蜼玃飛蠝張揖曰蜼似獮猴卬鼻而長尾玃似獮猴而大飛蠝飛鼠也其状如兎而鼠首以其䫇飛郭璞口蠝飛鼠也毛紫赤色飛且生一名飛生雌音遺蠝音誄𤣥猨猨之雄者色也素雌猨之雌者色也玃音钁蜼似猴尾端為兩岐天雨便以尾室鼻兩孔郭璞云玃色蒼黑能攫摶人故云玃也蛭蜩蠼蝚司馬彪云山海經云不咸之山有飛蛭四翼蜩蟬也蠼蝚獼猴也郭璞云蛭蜩未聞如淳曰蛭音質顧氏云蠼音塗卓反山海經云鼻塗山下有獸似鹿馬足人手四角名為蠼蠼猱即此也字作玃郭璞云玃非也上已有蛭玃此不應重見又神異經云西方深山有獸毛色如猴能縁高木其名曰蜩字林蠼音狄蛭音質蛭蜩二獸名獑胡豰蛫張揖曰獑胡似獼猴頭上有髦腰以後黒郭璞曰豰似鼯而大腰以後黄一名黄腰食獼猴豰白狐子也蛫未聞姚氏按山海經即山有獸状如龜白身赤首其名曰蛫又說文云獑胡黑身白腰如帶手有長白毛似握柘也踔稀間踔懸蹄也孫叔奉轡鄭氏云大僕公孫賀衛公驂乗大将軍衛青也按大駕出太僕御大将軍驂乗也扈從横行出乎四校之中晉灼曰扈大也張揖曰跋扈縱横不按肉簿也文頴曰凡五校今言四者一校隨天子乗輿也鼓嚴簿張揖曰鼔嚴鼔也簿卥簿也謂擊嚴鼔於卥簿中也江河為阹泰山為櫓郭璞曰因山谷遮禽獸為阹櫓望樓也蒙鶡蘇孟康曰鶡尾也蘇析羽也張揖曰鶡似雉鬬死不却按蒙謂覆覆而取之鶡以蘇為竒故特言之以成文耳鶡音曷决疑注云鳥尾為蘇也絝白虎張揖曰著白虎文絝郭璞曰絝謂絆絡也被斑文文頴曰著斑文之衣輿服志云虎賁騎被虎文單衣單衣即此斑文也跨壄馬按壄音野跨乗之也椎蜚亷弄解豸郭璞曰飛亷龍雀也鳥身鹿頭象在平樂館椎音直追反張揖曰解豸似鹿而一角人君刑罰中則生於朝主觸不直者言今可得而弄也解音蟹豸音大妳反又音文介反格蝦蛤鋋猛氏孟康曰蝦蛤猛氏皆獸名晉灼曰蝦蛤闕郭璞曰今蜀中有獸状如熊而小毛淺有光澤名猛氏說文云鋋小矛也音蟬解脰陷腦張揖云脰頸也陷音苦念反亦依字讀也浸潭促節浸潭猶漸苒也漢書作浸淫或作乗輿按節也潭音尋揜焦明張揖曰焦明似鳯西方鳥樂叶圖徵曰焦明似鳯皇宋衷曰水鳥消揺乎襄羊郭璞曰襄羊猶仿羊聽葛天氏之歌張揖曰葛天氏三王時君號也吕氏春秋云其樂三人持牛尾投足以歌八闋一曰載人二曰𤣥烏三曰遂草木四曰奮五穀五曰敬天常六曰建帝功七曰依地徳八曰總禽獸之極巴俞宋蔡淮南于遮郭璞曰巴西閬中有俞水獠人居其上好舞初高祖募取以平三秦後使樂人習之因名巴俞舞也張揖曰禮樂記曰宋音燕女溺志蔡人謳員三人楚詞云吳謡蔡謳淮南鼔員四人于遮曲是其意也文成顛歌郭璞云未聞文穎曰文成遼西縣名其縣人善歌顛益州顛縣其人能作西南夷歌顛即滇也激楚結風文頴曰激衝激急風也結風囘風囘亦急風也楚地風氣既目漂疾然歌樂者猶復依激結之急風以為節其樂促迅哀切也靡曼美色張揖曰靡細曼澤也韓子曼服皓齒也麗靡爛漫於前郭璞云言恣其觀也列女傳曰桀造爛漫之樂青琴宓妃伏儼曰青琴古神女也如淳曰宓妃伏羲女溺死洛水遂為洛水之神宓音伏姣冶閑都郭璞云姣好也都雅也詩云姣人嫽兮方言云自而東河濟之間凡好或謂之姣音絞說文曰􅈺雅也或作閑小雅曰都盛也絶殊離俗郭璞云俗無雙柔橈嬛嬛郭璞曰柔橈嬛嬛皆骨體耎弱長艷貌也廣雅云嬛嬛容也張揖曰嬛嬛猶婉婉也嫵媚􅏽弱埤蒼云嫵媚悅也通俗文云頰輔謂之嫵媚郭璞云纎弱弱貌埤蒼曰嫵弱謂容體纎細柔弱也曳獨繭之褕袣張揖云褕䄡褕也袣袖也郭璞曰獨蘭一蘭絲也埤蒼云袣衣長貌也眇閻易以恤削郭璞曰閻易衣長貌恤削言如刻畫作也皓齒燦爛宜笑的皪郭璞曰鮮明貌也楚詞曰美人皓齒以姱又曰娥眉笑以的皪皪音礫也長眉連娟微睇緜藐郭璞曰連娟眉曲細也緜藐逺視貌也娟音一全反睇大計反藐音邈色授魂與心愉於側張揖曰彼色來授我我魂徃與接也愉音踰徃也愉悅也二義竝通也載雲罕張揖云罕畢也文穎曰即天畢星名前有九旒雲罕之車按說者以雲罕為旌旗非也且按中朝卥簿圗云雲罕駕駟不兼言九旒罕車與九旒車别揜羣雅揜捕也張揖曰詩小雅材七十四人大雅之材三十一人故曰羣雅也言雲罕載之於車以捕羣雅之士悲伐檀張揖曰其詩刺賢者不遇明主也樂樂胥毛詩云君子樂胥受天之祐言王者樂得賢材之人使之在位故天與之福禄也胥音先吕反喟然興道漢書作芔音許貴反功羡於五帝司馬彪云羡溢也音怡戰反抏士卒上音反官反愀然郭璞云變色貌音作酉反故刪取其要歸正道而論之大顔云不取其夸奢靡麗之論唯取終篇歸於正道耳小顔云刪要非謂削除其詞而說者謂此賦已經史學刊剟失之也唐䝉使略通張揖曰䝉故鄱陽令今為郎中使行略取之夜郎僰中文頴曰皆西夷後以為夜郎屬䍧牱僰屬犍為音步北反巴蜀按巴蜀二郡名右弔番禺文頴曰畨郡理也弔至也東伐閩越後至番禺故言右至也按姚氏弔讀如字小顔云兩國相伐漢發兵救之令弔番禺故遣太子入朝弔非至也徃賔之賈逵云賓伏也乃發軍興制張揖曰發三軍之衆也興制謂起軍法制也按唐䝉為使而用軍興法制也注烽如覆米䉛字林云䉛漉米藪也音一六反又纂要云䉛浙箕也此注是孟康說熢燧韋昭曰熢束草置之長木之端如挈皋見敵則燒舉之燧者積薪有難則焚之熢主晝燧主夜攝弓上音奴頰反析圭如淳曰析中分也白藏天子青在諸侯也東第列甲第在帝城東故云東第也重煩百姓重猶難也亟下縣道上音紀力反亟急也以巨萬計按巨萬猶萬萬也按數有大小二法張揖曰算法萬萬為億是大數也鬻子曰十萬為億是小數也漢用事者按即公孫𢎞也邛笮之君長文頴曰卭者今為邛都縣笮者今為定笮縣皆屬越嶲郡請吏比南夷謂請置漢吏與南夷為比例也愈於南夷張揖曰愈差也又云愈猶勝也晉灼曰南夷謂犍為䍧牱也西夷謂越嶲益州中郎将張揖曰移四百石五嵗遷補大縣令壺充國按漢書公卿表太初元年為鴻臚卿也縣令負弩矢先驅按亭吏二人弩矢合是亭長負之今縣令自負矢則亭長當負弩也且負弩亦守宰無定或隨輕重耳按霍去病出擊匈奴河東太守郊迎負弩又魏公子救趙擊秦秦軍解去平原君負䪍矢迎公子於界上蜀以為寵華陽國志云蜀大城北十里有升仙橋以送客觀也相如初入長安題其門云不乗赤車駟馬不過汝下也使女尚司馬長卿小顔云尚猶配也本或作當也斯榆鄭氏音臾張揖云斯俞國也按今斯讀如字益部耆舊傳謂之斯臾華陽國志邛都縣有四縣斯臾一也益斥張揖曰斥廣也沬若水張揖曰沬水出蜀廣平徼外與青衣水合也若水出旄牛徼外至僰道入江華陽國志漢嘉縣有沫水音妺又音未為徼張揖曰徼塞也以木柵水為蠻夷界橋孫水通邛韋昭曰為孫水作橋也按華陽國志云相如卒開僰道通南夷開越嶲郡韓說開益州唐䝉開䍧牱斬筰王首置䍧牱郡也業已建之按業者本也誼本由相如立此事也湛恩韋昭云上音沈而攘攘却也汝羊反舉苞滿服䖍云夷種也滿字或作蒲也結軼下音轍漢書作軌張揖云結屈也羈縻按羈馬絡頭也縻牛韁也漢官儀馬云羈牛云縻言制四夷如牛馬之受羈縻也惡聞若說張揖曰惡聞若曹之言也包愷音一故反又音烏烏者安也固常之所異也按常人見之以為異黎人懼焉張揖曰非常之事其本難知衆人懼也漉沉澹菑漉音鹿菑音災漢書作澌沉澹灾解者云澌作灑灑分也音所綺反澹安沉深也音徒蹔反豈唯人哉按謂非獨人勤禹亦親其勞也躬奏胝無胈張揖曰奏作戚躬體也戚腠理也韋昭曰胈其中小毛也胝音丁私反荘子云禹腓無胈脛不生毛李頤云胈白肉也音蒲末反注厭睡上音烏簟反下音竹垂反委璅握􅐅孔文詳云委璅細碎握􅐅局促也參天貳地按天子比徳於地是貳地也與已并天為三是參天也故禮曰天子與天地參是也浸淫按浸淫猶漸浸盭夫為之垂涕張揖口很戻之夫也字或作戾盭古戾字二方之君謂西夷卭僰南夷䍧牱夜郎也疏逖不閉逖逺言其疏逺者不被閉絶也曶爽三蒼云曶爽早朝也曶音昧按字林又音忽禔福說文云禔安也市支反合在於此張揖云在於憂勤佚樂之中也上減五下登三李竒曰五帝之徳漢比為減三王之徳漢出其上故云減五登三也虞息志林云漢徳欲減五帝之一以漢盈之然以漢為五帝之數自然是登於三王之上也今或作減或作咸是韋昭之說也敞罔靡徙按敞罔失容也靡徙失正也烏獲張揖曰秦武王力士舉龍文鼎者也慶忌張揖曰吳王僚之子猝然廣雅云猝暴也音倉兀反駭不存之地謂所不慮而猛獸駭發也逄蒙孟子云逄蒙學射於羿盡羿之道也銜橜之變張揖曰銜馬勒銜也橜騑馬口長銜也周遷輿服志云鈎逆上者為橜橜在銜中以鐵為之大如雞子鹽鐵論云無銜橜而禦捍馬橜音巨月反坐不垂堂張揖云畏簷瓦墮中人樂産云垂邊也恐墮墜之也登陂陁陂音普何反陁音徒何反坌入上音步寸反曲江之隑州按隑音祈隑即碕謂曲岸頭也張揖曰隑長也苑中有曲江之象中有長州又有宫閣路謂之曲江在杜陵西北五里又三輔舊事云樂遊原在北是也谾谾音苦江反晉灼曰音籠古豅字蕭該云谾或作豅長大皃也谽􅀈呼含呼加二反汩淢噏上音干筆反淢音域疾兒也噏音許及反漢書作靸靸輕舉意也為孝文園令百官志云陵園令六百石掌按行掃除也列仙之傳居山澤按傳者謂相傳以列仙居山澤間音持全反小顔及劉氏竝作儒儒柔也術士之稱非形容甚臞韋昭曰臞瘠也舍人云臞瘦也文子云堯癯瘦音巨俱反世有大人張揖云喻天子向秀云聖人在位謂之大人張華云相如作逺遊之體以大人賦之也悲世俗迫隘如淳曰武帝云誠得如黄帝去妻子如脱屣是悲世俗迫隘也棹指橋以偃蹇棹音徒弔反指音居桀反橋音矯張揖曰指矯隨風指靡偃蹇高貌應劭云旌旗屈撓之貌靡屈虹而為綢綢音籌或音韜屈虹斷虹也紅杳眇以泫涽蘇林曰注泫音炫涽音麵晉灼曰紅赤色貌杳眇深逺泫涽混合也紅或作虹也据以驕驁張揖曰据直項也驕驁縱恣也据音據驕音居召反驁音五到反躩以連卷韋昭曰龍之形貌也躩音起碧反連卷音輦卷也沛艾赳螑孟康曰赳螑申頸低頭張揖曰赳螑之牙跳也赳音居幼反螑音許救反仡以佁儗張揖曰仡舉頭也佁儗不前也仡音勑吏反儗音魚吏反也驤以孱顔服䖍曰馬仰頭其口開正孱顔也韋昭曰顔音吾板反詩云兩服上驤注云驤馬是也跮踱輵磍張揖曰跮踱疾行皃輵磍前却也跮音褚栗反踱音褚畧反輵音烏葛反磍音曷蜩蟉偃蹇蜩音徒弔反蟉音勑弔反張揖曰偃蹇却距也廣雅云偃蹇夭矯之貌怵㚟梁倚張揖曰怵㚟奔走梁倚相著韋昭曰㚟音笞略相如傳云倏㚟逺去㚟視也糾蓼叫奡踏以艐路蓼音了奡音五到反小顔云叫奡高舉兒踏音徒答反朡音届三倉云踏著地孫炎云朡古界字也狂趡張揖云趡走貌篾蒙張揖曰篾䝉飛揚也厮征伯僑應劭曰厮役也張揖曰王子喬也漢書郊祀志作征伯僑此當别人恐非王子喬也綷雲葢音祖内反如淳曰綷合也合五綵雲為葢也紛湛湛音徒感反膠輵廣雅云膠輵驅馳也衝蓯上昌勇反下息冗反皬然皬音鶴也嬐浸潯漢書嬐作僸僸仰也音襟嬐音魚錦反使所忠徃張揖曰使者姓名見食貨志五三六經胡廣云五五帝也三三王也六六纓也按六經詩書禮樂易春秋也歴選文頴口選數之也率邇者踵武按率循也邇近也言循覽近代之事則繼跡可知也紛綸葳蕤胡廣曰紛亂也綸没也葳㽔委頓也張揖云亂皃七十有二君韓詩外傳及封禪書皆然爰周郅隆爰於及也郅大也崇盛也應劭曰郅至也樊光云郅可見之大也徐及皇甫之説皆非也以言文王改制及周而大盛也大行越成按行道也越於也以言道徳大行於是而成之也逢源泉張揖曰逢遇也喻其徳盛若遇泉源之流也又作峰讀曰烽胡廣曰自此已下論漢家之徳也䆃一莖六蕙鄭𤣥云䆃擇也説文云嘉禾一名䆃字林云禾一莖六蕙謂之䆃也獲周餘珎按謂得周鼎也招翠黄乗龍服䖍云龍翠色又云即乘黄也乗四龍也周書云乘黄似狐背上有兩角也躍魚隕杭杭舟也胡廣云武王渡河白魚入于王舟俯取以燎隕墜之於舟中也進讓之道何其爽與爽猶差也言周未可封而封漢可封而不封為進讓之道皆差之也不特創見文頴曰不獨一物造次見之胡廣云符瑞衆多應期相繼而至也設壇塲望幸葢按謂本或作望華葢華葢星名在紫微大帝之上今言望華葢太帝耳且言設壇塲望幸者望聖帝之臨幸也義亦兩通而孟康服䖍云注本皆云望幸下有華字而虞摯流别集則唯云望幸當是也於義易通直以後人見華下有葢字又幸字似華字因疑惑遂安華字使之誤也葢號以况榮按文頴曰葢合也言考合前代之君揆其榮而相比况而為號也大顔云葢語辭也言葢欲紀功立號受天之况賜榮名也於義為愜然其文云葢詞義典質又上與幸字連文致令有華葢之謬也將以薦成按漢書作慶義亦通也挈三神之驩按徐氏云挈猶垂非也應劭作紀李竒韋昭作闕意亦不逺三神韋昭以為上帝太山梁父如淳謂地祇天神山岳也天為質闇孟康曰言天道質昧以符瑞見意不可辭讓也梁父靡幾也按幾音兾亦各竝時而榮咸濟代而屈自言古封禪之帝王是各竝時而榮貴咸有濟代之勲而屈者謂言抑屈摠不封禪使説者尚何稱述於後代也故上文云七十二君者哉不為進越文頴曰越踰也不為茍進踰禮也攄之無窮廣雅云攄張舒也茂實胡廣曰飛揚英華之聲騰馳茂威之實也用此按謂用此封禪滲漉按説文云滲漉水下流之貌也汜布濩之胡廣曰汜普也言雨澤非偏於我普遍布散無所不濩之也侯不邁哉李竒云侯何也言居何不行封禪之事也按邁訓行也如淳云侯維也般般之獸按般般文彩之貌也音班胡廣曰謂騶虞也旼旼音旻虞氏以興文頴曰舜百獸率舞則騶虞亦在其中者已濯濯之麟詩人云麀鹿濯濯注云濯濯嬉遊貌也宛宛黄龍胡廣曰屈伸也正陽顯見文頴曰陽明也謂南面受朝也云受命所乘如淳云書傳所載揆其此類以為漢土徳黄龍為之應見之於成紀故云受命所乘也春秋推見至隱李竒曰隱猶微也言其義彰而文㣲若隱公見弑而經不書諱之韋昭曰推見事至於隱諱謂若晉文召天子經言狩河陽之屬易本隱之以顯韋昭曰易本隂陽之㣲妙出為人事乃更昭著也虞喜志林曰春秋以人事通天道是推見以至隱也易以天道接人事是本隱以之顯也王公大人文頴曰大雅先言大人王公之德後乃衆庶小已得失文頴曰小雅之人材志狹小先道已之憂苦其末流及上政之得失也故禮緯云小雅譏已得失及之於上也淮南衡山列傳第五十八父世縣也按漢書曰母家縣按謂父祖代居真定也袖鐵椎椎辟陽侯按漢書作褏金椎椎之按魏公子無忌使朱亥袖四十斤鐵椎槌之也所不當得按謂有罪之人不得關内侯及二千石大夫但張揖曰大夫姓非也按上云男子但此云大夫但及士伍開章則知大夫是官也簡忌簡姓也音姦嚴助傳則作間忌亦同音姦謾吏曰上音慢慢誑也不知安在按實葬肥陵誑云不知處肥陵地名在肥水之上也嚴道邛郵按嚴道蜀郡之縣也縣有蠻夷曰嚴道道有邛萊山有郵置故曰嚴道邛郵也子母從居按樂産云妾媵之有子者從去也他可按謂他事可其制也乃公勇乃汝也汝公淮南王自謂也獨斬丞相御史按劉氏云袁盎此言亦大過也徙淮南王喜故城陽景王之子也陰結賓客淮南要略云安養士數千高才者八人蘇非李尚左吳陳由伍被毛周雷被晉昌號曰八公也為中詗鄧展曰詗捕也徐廣曰伺候探察之名孟康曰詗音偵西方人以反間為偵劉氏及包愷竝音丑政反服䖍云偵候也靁被巧按巧言善用劎也一再辭讓樂産云初一讓至二讓後遂不讓故云一再讓而誤中即訊太子按樂産云即就也訊問也就淮南按之不逮詣河南也中尉宏按百官表姓殷也廢格眀詔崔浩云詔書募擊匈奴而雍遏應募者漢律所謂廢格按如淳注梁孝王傳云致閣不行也音各也道長安來如淳曰道猶言路由長安來姚承云道或作從壽春荘芷漢書作嚴正也輿地圖按志林云輿地圖漢家所畫非出逺古也且吳何知反按知猶解鐖鑿劉氏音上吾裏反下自洛反鐖鄒音機也注大鎌謂之剴鎌音亷剴音五哀反若燋音即消反法冠崔浩云一名獬廌冠按蔡邕云楚王冠也秦滅楚以其君冠賜御史者也一日發兵崔浩云一日猶一朝卒然無定時也下雉之城雉音徐爾反按縣名在江夏會肄丞相者按肄習也音異江都人救赫下音赫漢書作枚劉向别録云易家有救氐注也白嬴音盈人姓名也中尉安按漢書表司馬安也大行息按漢書表李息也史記索隱卷二十六
