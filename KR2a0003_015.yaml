body:
  text: 史記索隠卷十五唐司馬貞撰荆燕系家第二十一諸劉不知何屬按注引漢書云賈髙祖從父兄則班固或别有所見也定塞地賈将兵定塞地塞即桃林之塞共尉共敖之子立劉賈為荆王王淮東按表云劉賈都呉又漢書以東陽郡封賈東陽即臨淮故云淮東也富陵地理志縣名屬臨淮劉澤諸劉逺屬也按注引漢書云髙祖從祖昆弟又楚漢春秋田子春説張卿云劉澤宗家也按言宗家似疎逺矣然則班固言從祖昆弟當别有所見矣為營陵侯地理志縣名在北海以畫于營陵侯畫一音計畫之畫又音圖畫之畫兩家義竝通也一切功臣按此一切猶一例同時也非如他一切訓權時也雅故本推轂按雅訓素也謂吕氏素心奉推髙祖取天下若人推之推音昌誰反猶推轂欲前進塗然也此略同臣瓚之意也尚觖望觖音決又音企與齊王合謀西按漢書齊王傳云使祝午結琅琊王至齊因留琅琊王不得反國澤乃説求入闗齊乃送之與此文不同者劉氏以為燕齊兩史各言其主立功之迹太史公聞疑傳疑遂各記之則所謂實録跳駈他彫反脱獨去也又音條謂疾去也肥如令郢人按如淳意以肥如亦臣名令郢人以告定國也小顔以為定國欲有所誅煞餘臣而肥如知令郢人乃告定國也然按地理志肥如在遼西也權激吕氏按謂田子春欲王劉澤先使張卿説封吕産乃恐以大臣觖望澤卒得王故為權激諸吕也事發相重按謂先發吕氏令重我亦得其功是事發相重也偉哉偉者盛也葢盛其能激發也齊悼恵王系家第二十二能齊言者謂其語音及名物異於楚魏一云此時人多流亡故使齊言者皆還齊王亢禮如家人謂齊王是兄不為君臣禮而乃亢敵如家人兄弟之禮故太后怒酈音厯侯注作鄜二字竝音孚鄜縣名在左馮翊酈縣南陽吕台音胎吕后兄子也章封朱虚侯地理志縣名屬琅琊興居東牟侯地理志縣名屬東萊顧而父知田耳若生顧猶念也而及若皆訓女舅父駟鈞按舅謂舅父猶姨稱姨母相召平按廣陵人召平與東陵侯召平及此召平皆似别人也功臣表平子奴以父功封黎侯也齊王不敢離兵按服䖍云不敢離其兵而到琅琊也分齊為四謂濟南琅琊城陽并齊為四也春秋富按小顔云言年㓜也比之於財方未匱竭故謂之富也豈暇先言大人此葢舊俗之言謂救火之急不暇先啟家長也亦猶國家有難不暇待詔命也妄庸人耳按妄庸謂凡妄庸劣之人也乃罷魏勃罷謂不罪而放遣之以為物姚氏云物怪物凡為七王将閭為齊王志為濟北王賢葘川王章城陽王卭膠西王辟光濟南王雄渠膠東王卭五剛反使路中大夫按路姓為中大夫官史失其名故言姓及官顧氏按路氏譜中大夫名卭也平陽侯按表是簡侯曹奇也欲重寵直寵反謂欲世寵貴於王宫也紀翁主按如淳云諸王女云翁主稱其母姓故謂之紀翁主事漢太后謂王太后武帝母也市租千金市租謂所賣之物出税日得千金言齊人衆而且富也乃為輕重之短謂偃挾齊不娶女之恨因言齊之短為輕重之辭謂言臨葘富及呉楚孝王時事是共王八年徙王淮南按當孝文帝之十二年也濟北王志以安都侯地理志安都闕濟南王辟光以勒侯封勒漢書作扐竝音力地理志縣名屬平原也葘川王賢以武城侯地理志縣名屬平原膠東王雄渠以白石侯封地理志縣名屬金城蕭相國系家第二十三蕭相國何按春秋緯蕭何感昴精而生典獄制律以文無害按裴注已列數家今更引二説應劭云雖為文吏而不刻害也韋昭云雖有文理不傷害為沛主吏掾漢書云為主吏吏功曹也又云何為沛掾是何為功曹掾也䕶髙祖説文云䕶救視也奉錢三何獨以五奉音扶用反謂資俸之如字讀謂奉送之也錢三百謂他人三百何獨五百也劉氏云時錢有重者一當百有送錢三者與從事常辯之按何與御史從事常辯明言稱職也故張晏曰何與共事修辯明何素有方略是也何乃給泗水卒租忽反吏按何為泗水郡卒吏如淳按律郡卒吏書佐各十人事第一按謂課最居第一也何嘗為丞督事謂髙祖為沛令何為丞常監督庶事也爭走音奏奏者趨向之轉漕上轉字劉氏音張戀反漕水運也封為酇侯顧氏云南鄉郡名也太康地理志云魏武帝建安中分南陽立南鄉酇晉武帝又曰順陽郡也已橈女教反鄂君按功臣表鄂君即鄂千秋封安平侯贏奉錢二謂人皆三何獨五所以為贏二也音盈夫相國乃利民謂相國取人田宅以為利故云乃利人也所以令相國自謝之亡收稾苗子還種田人留稾入官李斯之分過按上文李斯歸惡自予是分過曹相國系家第二十四平陽侯曹參地理志平陽縣屬河東又按春秋緯及博物志竝云參字敬伯中涓古𤣥反将擊胡陵方與地理志二縣皆屬山陽郡攻秦監公軍按注公者監之名然本紀泗川監名平則平是名公為相尊之稱也豐反為魏時雍齒守豐為魏反沛公取碭狐父地理志碭屬梁國狐父地名在梁碭之間徐氏引伍被云呉濞敗於狐父是呉與梁相拒而敗處祁善置按司馬彪郡國志穀熟有祁亭劉氏音遲又如字善置置名漢謂驛為置攻下邑西至虞地理志下邑虞皆屬梁國攻爰戚蘇林云縣名屬山陽注宣帝時有爰戚侯按功臣表爰戚侯趙成及亢父地理志縣名屬東平北救阿按阿即東阿也時章邯圍田榮於東阿也遷為戚公謂遷參為戚令號曰建成君地理志建成縣屬沛郡於成武南地理志成武縣屬山陽趙賁音奔成陽南地理志縣名在濟陰成地名周武王封弟季載於成其後邑遷於成之陽故曰成陽曲遇丘禹反牛凶反從攻陽武下轘轅緱氏地理志陽武緱氏二縣屬河南轘轅道名在緱氏南戰陽城郭東徐廣云陽城在南陽應劭云山陽今潁陽潁陽是南陽之縣初攻下辯故道地理志二縣名皆屬武都辯音皮莧反雍斄地理志二縣名屬右扶風斄音胎攘鄉髙櫟櫟音厯按文潁云皆地名也然盡在右扶風今其地闕也取咸陽更名曰新城按漢書髙帝元年咸陽名新城武帝改曰渭城注東郡白馬有圍津顧氏按水經注曰馬津有韋鄉韋津韋城亦稱圍古今字變尉從才用反天柱侯反於衍氏天柱侯不知其誰封衍氏魏邑按在廬江潛縣鄔孫遫音速鄔東地理志鄔太原縣名音烏古反攻著漯吐答反陰平原鬲盧地理志著縣屬濟南盧縣屬泰山漯陰平原鬲三縣屬平原上假密漢書亦作假密按下定齊七十縣則上假密非髙密亦是齊地今闕蘄竹邑相蕭留地理志蘄竹邑相蕭四縣屬沛韋昭云留今屬彭城則漢初亦屬沛也參子窋音張律反豈少朕與按少者不足之詞故胡亥亦云丞相豈少我哉葢帝以丞相豈不是嫌少於我哉小顔以為我年少非也然無言我告若也謂恵帝語窋無得言我告汝令諫汝父當自云是已意也與窋胡治乎按胡何也言語參何為治窋也覯若書一漢書作講故文潁云講一作較按訓直又訓明言法明直若畫一也覯音講亦作覯小顔云講和也畫一言其法整齊也窋諡静侯子奇代侯諡簡子時代侯尚平陽公主諡夷子襄代侯尚衞長公主子宗代侯諡恭留侯系家第二十五留侯韋昭云留今屬彭城按良求封留以始見髙祖於留故也張良者漢書云字子房按王符皇甫謐竝以良為韓之公族姬姓也秦索賊急乃改姓名而韓先有張去疾及張譴恐非良之先代其先韓人良既歴代相韓故知其先韓人顧氏按後漢書云張良出於城父城父縣屬潁川也悼恵王韓系家及系本竝作桓恵王五世相韓謂大父及父相韓五王故云五代東見倉海君姚察以武帝時東夷穢君降為倉海郡或因以名葢得其近也與客狙按應劭云狙伺也一曰狙伏伺也音七豫反謂狙之伺物必伏而候之故今云狙候是也博浪沙中服䖍云地在陽武南按今浚儀西北四十里有博浪城中副車按漢官儀天子屬車三十六乘屬車即副車而奉車郎御而從後嘗間從容嘗訓經也間閒字也從容閒暇也從容謂從任其容止不矜莊也下邳邳被眉反地理志下邳縣屬東海又云邳在薛後徙此有上邳故此曰下邳圯上李奇云下邳人謂橋為圯音怡文潁曰沂水上橋也應劭云沂水之上也姚察見史記本有土旁作者乃引今會稽東湖大橋名為靈圯圯亦音夷理或然也直墮其履崔浩云直猶故也亦恐不然直言正也謂至良所正墮履欲歐烏后反良業為取業猶本先也謂良心先已為取故遂跪而履之殆天授殆訓近也旗幟音其試二音因其解謂卒将離心而懈怠毒藥苦於口利於病按此語見孔子家語鯫生吕静云鯫魚也謂小魚也音比垢反臣瓚按楚漢春秋鯫生姓解表商容閭按崔浩云表者標榜其里門也商容紂時賢人也韓詩外傳曰商容執羽籥馮於馬徒欲以化紂而不能遂去伏於大行山武王欲以為三公固辭不受偃革為軒蘇林云革者兵車也軒者朱軒皮軒也謂廢兵車而用乘車也説文云軒曲周屏車桃林按晉灼云在𢎞農南閿鄉谷中應劭十二州記𢎞農有桃丘聚古桃林也山海經云夸父之山北有桃林廣三百里也楚唯毋强六國立者復撓而從之按荀悦漢紀説此事云獨可使楚無强若强則六國屈撓而從之又韋昭云今無强楚者言六國立必復屈撓從之是二説意同也豎儒幾敗而公事髙祖罵酈生為豎儒謂此儒生豎子耳幾音祈幾者殆近也而公髙祖自謂也漢書作乃公乃亦汝也什方侯地理志縣名屬廣漢什音十即日駕西都闗中按周禮三曰詢國遷乃為大事髙祖即日西遷者葢謂其日即定計耳非即日乃行胡苑崔浩云苑馬牧外接胡地馬生於胡故云苑之利所謂金城千里天府之國按此言謂者皆是依慿古語言秦有四塞之國如金城也故淮南子云雖有金城非粟不守蘇秦説恵王云秦地勢形便所謂天府是所慿也有四人四人四皓也謂東園公綺里季夏黄公甪里先生按陳留志云園公姓庾字宣明居園中因以為號夏黄公姓崔名廣字少通齊人隠居夏里修道故號曰夏黄公甪里先生河内軹人太伯之後姓周名術字元道京師號曰霸上先生一曰甪里先生又孔安國祕記作禄里此皆王劭據崔氏周氏世譜及陶元亮四人目而為此説母愛子抱此語出韓子故等夷如淳云等夷言等輩曲郵音尤按司馬彪漢書郡國志長安有曲郵聚今在新豐西俗謂之郵頭漢書舊儀云五里一郵郵人居間相去二里半按郵乃今之侯也注其矢曰矰馬融注周禮云矰者繳繫短矢謂之矰伊説云矰一絃可以仰髙射數闋音曲穴反謂曲終也説文曰闋事也三寸舌春秋緯云舌在口長三寸象斗玉衡赤松子列仙傳神農時雨師也能入火自燒崑崙山上隨風雨上下也辟穀賓亦反然言有物按物謂精怪及藥物也所見父老與書按樂緯云風后黄帝師又化為老子以書授張良亦異説魁梧蘇林云梧音忤蕭該云今讀為吾非也小顔云言其可驚悟失之子羽子羽澹臺滅明字也仲尼弟子傳云狀貌甚惡又韓子云子羽有君子之容而行不稱其貌與史記文相反史記索隠卷十五
