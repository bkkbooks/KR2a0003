body:
  text: 史記索隠卷九唐司馬貞撰天官書第五按天文有五官官者星官也星厯有尊卑若人之官曹列位故曰天官中宫姚氏按春秋元命包云宫之為言宣也宫氣立精為神垣又文耀鉤曰中宫大帝其精北極星含元出氣流精生一也天極星按爾雅北極謂之北辰又春秋合誠圖云北辰其星五在紫㣲中楊泉物理論云北極天之中陽氣之北極也極南為太陽極北為太陰日月五星行太陰則無光行太陽則能照故為昏明寒暑之限極也其一明者太一常居按春秋合誠圖云紫㣲大帝室太一之精也後句四星句音鉤勾曲也末大星正妃按援神契云辰極横后妃四星從端大妃光明又按星經以後句四星名為四輔其句陳六星為六宫亦主六軍與此不同也皆曰紫宫控元命包曰紫之言此也宫之言中也言天神運動陰陽開閉皆在此中也宋均又以為十二軍中外位各定總為之紫宫也直斗口劉氏云如字直當也又音值也隋斗端兑隋音易果反劉氏云斗一作北按漢書天文志斗見北端作耑兑作鋭鋭謂星形尖鋭也曰陰徳或曰天一按文耀鉤曰陰徳為天下剛柔宋均以為陰行徳者道常也天槍楚庚反天棓音皮韋昭音剖又詩緯曰槍三星棓五星在斗杓左右主槍人棓人石氏星讚云槍棓八星備非常也絶漢抵營室曰閣道絶度也扺屬也又按樂汁圖云閣道北斗輔石氏云閣道六星神所乗也北斗七星按春秋運斗樞云第一魁第二旋第三璣第四權第五衡第六開陽第七搖光第一至第四為魁第五至第七為標合而為斗文耀鉤云斗者天之口舌玉衡屬杓魁為琁璣整長厯云北斗七星星間相去九千里其二陰星不見者相去八千里也旋璣玉衡按尚書旋作璿馬融云璿美玉也機渾天儀可轉旋故曰機衡其中横筩以璿為機以玉為衡葢貴天象也鄭𤣥注大傳云渾儀中筩為旋璣外規為玉衡也以齊七政按尚書大傳云七政謂春秋冬夏天文地理人道所以為政也人道政而萬事順成又馬融注尚書云七政者北斗七星各有所主第一曰正日第二曰主月法第三曰命火謂熒惑也第四曰煞土謂填星也第五曰伐水謂辰星也第六曰危木謂嵗星也第七曰剽金謂太白也日月五星各異故曰七政也衡殷南斗按晉灼云殷中也宋灼云殷當也用昏建中者杓説文云杓斗柄音疋遙反即招搖夜半建者衡孟康曰假令杓昏建寅衡夜半亦建寅也斗為帝車運于中央姚氏按宋均曰言是大帝乗車巡狩故無所不紀也曰文昌宫文耀鈎曰文昌宫為天府孝經援神契云文者精所聚昌者揚天紀輔拂竝居以成天象故曰文昌一曰上將春秋元命包曰上將建包曰上威武次將正左右貴相理文緒司禄賞功進士司命主老幼司災主災咎也在魁中貴人牢樂汁圖云天理理貴人牢宋均曰以理牢獄也魁下六星兩兩相比曰三台按漢書東方朔願陳泰階六符孟康曰泰階三台也台星凡六星六符六星之符驗也應劭引黄帝泰階六符經曰泰階者天子之三階上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庻人三階平則陰陽和風雨時不平則稼穡不成冬雷夏霜天行暴令好興甲兵修宫榭廣苑囿則上階為之坼也注更河三星按詩記厯樞云更河中招搖為胡兵宋均云招搖星在更河内又樂汁圖云更河天矛宋均以為更河名天矛則更河是星名也句圜十五星句音鈎圜音員其形如連環即貫索星也曰賤人之牢按詩記厯樞云賤人牢一曰天獄又樂汁圖云連營賤人牢宋均以為連營貫索也東宫蒼龍按文耀鈎云東宫蒼帝其精為龍也房心按爾雅云大辰房心尾也李巡曰大辰蒼龍宿體最明也心為明堂春秋説題辭云房心為明堂天王布政之宫尚書運期授曰房四表之道宋均云四星間有三道日月五星所從出入也大星天王前後星子屬鴻範五行傳曰心之大星天王也前星太子後星庻子房為天府曰天駟爾雅云天駟房詩記厯樞云房為天馬主車駕宋均云房既近心為明堂又别為天府及天駟也房有兩星曰衿一音其炎反元命包云鈎衿兩星以閑防神府闓舒為主鈎距以備非常也左角李右角將李即理理法官也故元命包云左角理物以起右角將帥而動又石氏云左角為天田右角為天門也大角天王帝廷按援神契云大角為坐候宋均云坐帝坐也曰攝提按元命包云攝提之為言提擕也言提斗擕角以接於下也亢為疏廟元命包曰亢四星為廟廷又文耀鈎為疏廟宋均以為疏外也廟或為朝也氐為天根爾雅云天根氐也孫炎以為角亢下繫於氐若木之有根也主疫宋均云疫病也三月榆莢落故主疾疫也然此時物雖生而日宿在奎行毒氣故有疫也尾為九子宋均云屬後宫場故得兼子子必九者取尾有九星也元命包云尾九星箕四星為後宫之場也箕為敖客宋均云敖調弄也箕以簸揚調弄象也箕又受物有去去來來客之象也曰口舌詩云維南有箕載翕其舌又詩緯云箕為天口主出氣是箕有舌象讒言詩曰哆兮侈兮成是南箕謂有敖客行謁請之也火犯守角按韋昭曰火熒惑也南宫朱鳥權衡按文耀鉤云南宫赤帝其精為朱鳥孟康曰軒轅為權太㣲為衡也衡太㣲三光之廷宋均曰太㣲天帝南宫也三光日月五星也十二星蕃臣春秋合誠圖曰太㣲主法式陳星十二以備武急也内五星五帝坐詩含神霧云五精星坐其東蒼帝坐神名靈威仰精為青龍之類是也蔚然曰郎位徐廣云一云鳥哀按漢書作鳥哀則鳥哀蔚然皆星之貌状其星為郎位傍一大星將位按宋均云為羣郎之将帥是也月五星順入軌道韋昭云謂循軌道不邪逆也順入從西入之也司其出所守天子所誅也宋均云司察日月五星所守列宿若請官屬不去十日者於是天子命使誅討之也其逆入不軌道宋均云逆入從東入不軌道不由康衢而入者也以其所犯命之者亦謂隨所犯之位天子命誅其人也金火尤甚按火主銷物而金為兵故尤急然則木水土為小變也有隋星五宋均云南北為隋又他果反隋為垂下曰少㣲士大夫春秋合誠圖云少㣲處士位又天官占云少㣲一名處士星也權軒轅軒轅黄龍體援神契曰軒轅十二星后宫所居石氏星讃以軒轅龍體主后妃也如衡占宋均云責在后黨嬉讒賊興招此祥按亦當天子命誅也東井為水事元命包云東井八星主水衡也兩河天闕間為闗梁宋均云兩河六星知逆邪言闗梁之限知邪偽也徳成衡觀成潢傷成鉞按徳成衡衡則能平物故有徳公平者先成形於衡觀成潢為帝車舍言王者遊觀亦先成形於潢也傷成鉞者傷敗也言王者敗徳亦先成形於鉞以言有敗亂則有鉞誅之然按文耀鉤則云徳成潢敗成鉞其意異也又此下文禍成井誅成質皆是東井下義總列於此也栁為鳥注按漢書天文志注作喙爾雅云鳥喙謂之栁孫炎云喙朱鳥之口栁其星聚也以注為栁星故主草木七星頸為員宫主急事按宋均云頸朱鳥頸也員宫喉也物在喉嚨終不久留故主急事也張素為厨素嗉也爾雅云鳥張嗉郭璞云嗉鳥受食之處也軫為車主風宋均云軫四星居中又有二星為左右轄車之象也軫與巽同位為風車動行疾似之也五星入軫中兵大起宋均云五星主行使使動兵車亦動也西宫文耀鉤云西宫白帝其精白虎咸池曰天五潢五潢五帝車舍按元命包云咸池主五穀其星五者各有所職咸池言穀生於水含秀舍實主秋垂故一名五帝車舍以車載穀而販也火入旱金兵水水謂火金水入五潢則各致此災也按宋均云不言木土者木土徳星於此不為害故也畢曰旱車爾雅云濁謂之畢孫炎以為掩兔之畢或呼為濁因名星云昴畢間為天街元命包云畢為天階爾雅云大梁昴孫炎元昴畢之間日月五星出入要道若津梁也主葆旅事姚氏按宋均云葆守也旅猶軍旅也言佐參伐以斬除凶也北宫𤣥武文耀鉤云北宫黑帝其精𤣥武虚危爾雅云𤣥枵虚也又云北陸虚也解者以陸為道孫炎曰陸中也北方之宿中也危為葢屋宋均云危上一星髙旁兩星隋下似乎葢屋也虚為哭泣事姚氏按荆州占以為其宿二星南星主哭泣虚中六星不欲明明則有大喪也營室元命包云營室十星埏陶精類始立紀綱包物為室又爾雅云營室謂之定郭璞云定正也天下作宫室皆以營室中為正也曰離宫閣道按荆州占云閣道王良旗也有六星漢中四星曰天駟按元命包云漢中四星曰騎一曰天駟也旁一星曰王良春秋合誠圖云王良主天馬也八星絶漢曰天潢元命包曰潢主河渠所以度神通四方宋均云天潢天津也津湊也故主計度也匏𤓰按荆州占云匏𤓰一名天雞在河鼓東匏𤓰明嵗則大熟也其北河鼓爾雅云河鼓謂之牽牛孫炎云河鼓之旗十二星在牽牛北或名河鼓為牽牛也務女爾雅云須女謂之務女是也一作婺其北織女織女天孫也按荆州占云織女一名天女天子女也嵗星姚氏按天官占云嵗星一曰應星一曰經星一曰紀星物理論云嵗行一次謂之嵗星則十二嵗而星一周天也其所在五星皆從而聚按漢髙帝元年五星皆聚于東井是也據天文志其年嵗星在東井故四星從而聚之也嬴縮按天文志曰凡五星早出為嬴嬴為客晩出為縮縮為主人五星嬴縮必有天應見杓也其趨舍音聚謂促攝提格嵗太嵗在寅嵗星正月晨出東方按爾雅嵗在寅為攝提格李巡云言萬物承陽起故曰攝提格格起也曰監徳嵗星正月晨見東方之名已下皆出石氏星經文乃六星在斗牽牛失次見杓也漢書天文志則載甘氏及太初星厯所在之宿不同也單閼嵗在夘也嵗星二月晨出東方之名爾雅云夘為單閼李巡云陽氣推萬物而起故曰單閼單盡也閼止也曰降入即嵗星三月晨見東方之名其餘竝准此執徐嵗爾雅辰為執徐李巡云伏蟄之物皆敦舒而出故曰執徐執蟄徐舒也大荒駱嵗爾雅云在己為大荒駱姚氏云言萬物皆熾盛而大出霍然落落故曰荒駱也曰跰踵天文志作路􅶒字詁云􅶒今作踵也敦䍧嵗爾雅云在午為敦䍧孫炎云敦盛牂壯也言萬物盛壯韋昭云敦音頓也曰開明天文志作啟明叶洽嵗爾雅云在未為叶洽李巡云陽氣欲化萬物故曰協和洽合也涒􅀈嵗爾雅云在中為涒􅀈李巡云涒􅀈物吐秀傾垂之貌也涒音他昆反􅀈音他丹反作鄂嵗爾雅在酉為作鄂李巡云作咢皆物芒枝起之貌咢音愕今按下文云作鄂有芒則李巡解亦近得天文志云作詻音五格反與史記及爾雅竝異也閹茂嵗爾雅云在戍曰閹茂孫炎云萬物皆蔽冒故曰閹蔽茂冐也天文志作掩茂也曰天雎劉氏音吁唯反也大淵獻嵗爾雅云在亥為大淵獻孫炎云淵深也大獻萬物於深謂葢藏之於外耳曰大章徐廣云一作大皇按天文志亦作大皇也困敦嵗爾雅在子為困敦孫炎云困敦混沌也言萬物初萌混沌於黄泉之下也赤奮若嵗爾雅在丑為赤奮若李巡云言陽氣奮迅若順也曰天皓音昊漢志作昊黫然於閑反三月生天棓長四尺按天文志此皆甘氏星經文而志又兼載石氏此不取石氏名申夫甘氏名徳察剛氣以處徐廣云剛一作罰按姚氏引爾雅熒惑謂之執法天官占之熒惑方伯象司察妖孽則此文察罰氣為是熒惑春秋緯文耀鈎云赤帝熛怒之神為熒惑焉位在南方禮失則罰出晉灼云常以十月入太㣲受制而出行列宿司世道出入無常居之殃還至雖大當小按還音旋旋疾也若熒惑反道居其舍所致殃禍速至則雖大反小久而至當小反大按久謂行遲也如此禍小反大言久腊毒也其南為丈夫按宋均云熒惑守輿鬼南為丈夫受其咎北則女子受其凶也當其行宋均云太白宿主軍來衝拒也厯斗之會以定鎮星之位晉灼曰常以甲辰之元始建斗嵗鎮一宿二十八嵗而周天廣雅曰鎮星一名地侯文耀鉤云鎮黄帝含樞紐之精其體旋璣中宿之分也日牝牡晉灼曰嵗陽也太白陰也故曰牝牡也火與水合曰焠按謂火與水俱從鎮星合也土為憂主孽卿按文耀鉤云水土合則成爐冶爐冶成則火興火興則土之子淬金成消爍消爍則土無子輔父無子輔父則益妖孽故子憂七寸之内必按韋昭云必有禍也察日行以處位按太白晨出東方曰啟明故察日行以處太白之位也太白韓詩云太白晨出東方為啟明昏見西方為長庚又孫炎注爾雅以為晨出東方髙三丈命曰明晨昏見西方髙三舍命曰太白其紀上元按上元是古厯之名言用上元紀厯法則攝提嵗而太白與營室晨出東方至角而入與營室夕出西方凡出入東西各五為八嵗二百三十日復與營室晨出東方大率嵗一周天也經天天下革政孟康曰謂出東入西出西入東也太白陰星出東當伏東出西當伏西過午為經天又晉灼曰日陽也日出則星没太白晝見午上為經天是謂需又作耎音奴亂反居實有得也按實謂星所合居之宿虚謂嬴縮也察日辰之會按下文正四時及星辰之㑹是也以治辰星之位按皇甫謐辰星一名毚星或曰鉤星元命包曰北方辰星水生物布其紀故辰星理四時宋均曰辰星正四時之位得與北辰同名也蚤為月蝕按宋均云辰星與月同精月為大臣先期而出是躁也失則當誅故月蝕見祥晚為彗星按宋均云辰星陰也彗亦陰陰謀未成故晚出也出東方為格謂辰星出西方辰水也太白出東方太白金也水生金母子不相從故上有軍不戰今母子各出一方故為格格謂言不和同故野有兵不戰然也正旗出按旗葢太白芒角似旌旗兔過太白按廣雅云辰星謂之兔星則辰星之别名兔或作毚也間可椷劒椷音函函容也言中間可容一劒則函字本有咸音故字從咸劍古作劒也七命曰小正謂星凡有七名命者名也小正一也辰星二也天免三也安周星四也細爽五也能星六也鈎星七也月行中道按中道房室星之中間也房有四星若人之房三間有四表然故曰房南為陽間北為陰間則中道房星之中間也故房是日月五星之行道然黄道亦經房心若月行得中道故陰陽和平若行陰間多陰事陽間則人主驕恣若歴陰星陽星之南北太陰太陽之道即有大小若兵及大旱若喪也外北三尺陰星按謂陰間外北三尺曰陰星又北三尺曰太陰道則下陽星及太陽亦在陽間之南各三尺也太陰大水兵也太陰太陽皆道也月行近之故有水旱兵喪也角間天門十月為四月謂月行入角與天門若十月犯之當為來年四月成災十一月則主五月也犯四輔輔臣誅按謂月犯房星也四輔房四星也房以輔心故曰四輔月蝕始日五月者六六月者五始日謂倉始起之日也依此文計惟有一百二十一月與元數甚為懸校既無太初厯術不可得推而定今以漢志統厯法計則六月者七五月者一又六月者一五月者一凡一百三十五月而復始耳或術家各異或傳冩錯謬故此不同無以明知也列星其宿地憂謂月蝕列星二十八宿當其分地有憂憂謂兵及喪也昭明星按春秋合誠圖云赤帝之精象如太白七芒釋名為筆星氣有一枝末鋭似筆亦曰筆星也五殘星孟康云星表有青氣暈有毛填星之精也漢者亦金之散按水生金散氣即水氣河圖括地象曰河精為天漢也炎火星豔音也格澤星一音鶴鐸又音格宅格胡客反天精韋昭云精謂清朗漢書作牲亦作腥郭璞云注三蒼云腥雨止無雲也天蛪五結反亦作蜆音同月離于畢按韋昭云離歴相遇者音偶漢書作禺杼雲姚氏按兵書云營上雲氣如織勿與戰也杓雲劉氏音時酌反説文音丁了反許慎注淮南云杓引也若霧音如字一音䝉一音亡遘反爾雅云天氣下地不應曰霧言䝉昧不明之意也穹閭鄒云一作弓閭天文志作弓字音穹葢謂以氊為閭崇穹然又宋均云穹獸名亦異説也逢俉化言俉音五故反逢俉謂相逢而驚也亦作迕音同化當為訛字之誤耳四時之卒始謂立春日是去年四時之終卒今年之始也戎叔為韋昭云戎叔大豆也為成也又郭璞注爾雅亦云戎叔胡豆孟康同也小雨趣兵音促謂風從西北來則戎菽成而又有小雨則國兵趣起也比數雨比音鼻律反數音疎矩反謂以次數日以侯一嵗之雨以知豐穰也五家按謂五紀嵗月日星辰厯數各有一家顓學習之故曰五家也必貴三五三五謂三十嵗一小變五十嵗一大變故曰雖有明天子必視熒惑之所在此據春秋緯文耀鈎故言故曰平城之圍漢髙祖之七年月暈參畢七重按天文志其占者畢昴間天街也街北胡也街南中國也昴為匈奴參為趙畢為邊兵是嵗髙祖自將兵擊匈奴至平城為冒頓所圍七日乃解則天象有若符契七重主七日也星茀音佩即孛星也于河戒按天文志武帝元封之中星孛于河戒其占曰南戒為趙門北戒為胡門朝鮮北胡之域也其河戒即南河北河也犖犖力角反犖犖大事分明也必通三五按三謂三辰五謂五星蒼帝行徳天門為之開按謂王者行春令布徳澤被天下應靈威仰之帝而天門為之開以發徳化也天門即左右角間也赤帝行徳天牢為之空亦謂王者行徳以應火精之帝謂舉大禮封諸侯之地則是赤帝行徳夏陽主舒散故天牢謂之空則人主當赦宥也天行徳按天謂北極紫㣲宫也言王者當天心則北辰有光耀是行徳也北辰光耀則天子更立年也一曰二曰按謂星家之異説太史公兼記之耳三能三衡者天廷也上云南宫朱鳥權衡衡太㣲三光之庭則三衡者即太㣲也其謂之三者為日月五星也然斗第六第五星亦名衡又參三星亦名衡然竝不為天廷也封禪書第六中岳嵩髙按獨不言至者葢以天子子所都也二龍去之如淳按國語二龍漦于夏庭是也巫咸之興自此始按尚書巫咸殷臣名伊陟贊告巫咸今此云巫咸之興自此始則以巫咸為巫覡然楚詞亦以巫咸主神葢太史公以巫咸是殷臣以巫接神事大戊使禳桑穀之災所以伊陟贊巫咸故云巫覡之興自此始也而震死謂武乙射天後獵於河渭而震死也辟雍泮宫按服䖍云天子水匝為辟雍諸侯水不匝至半為泮宫禮統又云半有水半有宫是也駵駒赤馬黒鬣曰駵也羝羊詩傳云羝牡羊汧渭間按地理志汧水出汧縣西北入渭皇甫謐云文公徙都汧者也鄜衍鄜地名後為縣屬馮翊衍者鄭衆注周禮云下平曰衍又李奇三輔記云三輔謂山陵間為衍也縉紳者姚氏云縉紳作搢鄭衆注周禮云縉讀為薦謂薦之於紳帶之間今按鄭意以縉為薦則薦亦是進進而置於神帶之間故史記亦多作薦字也獲若石云蘇林云質如石似肺則若雄雞按列異傳云陳倉人得異物以獻之道遇二童子云此名為媦在地下食死人腦媦乃言云彼童子名陳寳得雄者王雌者霸乃逐童子化為雉秦穆公大獵果獲其雌為立祠祭有光雷電之聲雄止南陽有赤光長十餘丈來入陳倉祠中所以代俗謂之寳夫人祠抑有由也注葉君按葉縣名在南陽葉君即雄雉之神故時與寳夫人神合也用三百牢於鄜畤按秦本紀徳公元年以牲三百祠鄜畤今按百當為白秦君西祀少昊時牲尚白秦諸侯也雖奢侈郊本特牲不可用三百牢以祭天葢字誤耳作伏祠按服䖍云周時無伏磔犬以禦災秦始作之漢舊儀云伏者萬鬼行日故閉不干求也故東觀漢記和帝初令伏閉晝日是也又厯忌釋日伏者何金氣伏藏之名四時代謝皆以相生而春木代水水生木也夏木代火火生木也冬水代金金生水也至秋則以金代火金畏於火故至庚日必伏庚者金日也磔狗禦蠱菑按左傳云皿蟲為蠱梟磔之鬼亦為蠱故月令云大儺旁磔注云磔禳也厲鬼為蠱将出害人旁磔於四方之門故此亦磔狗邑四門也風俗通云煞犬磔禳也管仲曰按今管子書其封禪篇亡禪云云晉灼云山在䝉陰縣故城東北下有云云亭也炎帝鄧展云神農後子孫亦稱炎帝而登封者律厯志黄帝與炎帝戰於阪泉豈黄帝與神農身戰乎皇甫謐云炎帝傳位八代也禪亭亭應劭云在鉅平北十餘里服䖍云在牟陰非也㑹稽春秋外傳國語之書齊語也辟耳音壁賈逵云山險也登熊耳按荆州記耒陽益陽二縣東北有熊耳東西各一峯狀如熊耳因以為名齊桓公竝登之或云𢎞農熊耳下云望江漢知非兵兵車之㑹三按左傳三謂魯莊十三年會北杳平宋亂僖四年侵蔡遂伐楚六年伐鄭圍新城是也乗車之㑹六據左氏傳云謂莊十四年會于鄄十五年又會鄄十六年盟于幽僖五年會首止八年盟于洮九年會葵丘也鄗上黍韋昭云設以不可得之物鄗音臛應劭云光武改髙邑曰鄗姚氏云鄗縣屬常山一云鄗上山名注名曰鰈音荅郭璞云如牛脾細鱗紫黑色只一眼兩片合乃得行今江東呼為王餘今亦曰版魚注名曰鶼鶼按山海經云崇吾之山有鳥狀如鳬一翼一目相得乃飛名云蠻郭璞注爾雅亦作鶼鶼三置晉君按謂恵公懐公文公也呉陽上畤呉陽地名葢在岳之南又上云雍旁有故呉陽武畤今葢因武畤又作上下畤以祭黄帝炎帝周太史儋音丁甘反孟康云即老子也韋昭按年表儋在孔子後百餘年非老耼也五百嵗當復合按大顔厯評諸家而云周平王封襄公為諸侯至昭王五十二年西周君獻邑凡五百一十六年為合亦舉全數合十七年伯王出自昭王滅周之後至始皇元年誅嫪毐正一十七年孟康云謂周封秦為别秦并周為合此襄公為霸始皇為王也注人先祠山下按漢書儀云祭人先於隴西縣人先山山上皆有土人山下有畤埒如菜畦畤中各有一土封故云畤三蒼云畤埒也宋太丘社亡應劭云亡淪入地也按亡社主亡也爾雅云左陵太丘郭璞云宋有太丘黄帝地螾見出吕氏春秋音引周有赤烏之符中候及吕氏春秋皆云有火自天止于王屋流為烏云五室以數之也騶嶧山鄒縣之嶧山鄒縣本邾國魯穆公改作鄒從征記北巖有秦始皇所勒銘蒲車謂蒲襄車輪惡傷草木葅稭上音租下音戛周禮祭祀供茅葅説文云葅茅藉也稭禾槀去其皮祭天以此天齊淵顧氏按解道彪齊記云臨菑城南有天齊五泉竝出有異於常言如天之齊腹也曰天主謂主祠天下下者小顔云以下下謂最下也注一云之下上畤此之一云與漢書郊祀志文同也東陸監鄉監音闞韋昭云縣名屬東平皇覽云蚩尤冢在東郡夀張縣門鄉城中祠三山小顔以為下所謂三神山顧氏按地理志東萊曲成有參山山即此三山也非海中三神山也注東萊不夜不夜縣名屬東萊按解道彪齊記云不夜城葢古有日夜出見於境故萊子立城以不夜為名注斗入海謂斗絶曲入海也四時主祠琅邪按山海經云琅邪臺在勃海間按是山如臺地理志琅邪縣有四時祠也齊威宣謂威王宣王也宋毋忌按樂産引老子戒經云月中仙人宋無忌白澤圖云火之精曰宋無忌葢其人火仙也正伯僑樂産按馬相如云正伯僑古仙人顧氏按裴秀冀州記云緱山仙人廟者昔有王喬犍為武陽人為栢人令於此得仙非王子喬也充尚無别所見羨門髙按秦始皇使盧生求羨門子髙是也最後皆燕人按最後猶言甚後也服䖍説止有四人是也小顔云自宋無忌至最後凡五人劉伯莊亦同此説非也主運按主運是鄒子書篇名也莫不甘心焉謂心甘羡也以風為解顧野王云皆自解説遇風不至也刻勒立書旁小顔云今諸山皆有始皇所刻石文胡亥重刻其文具存也此所謂無其徳用事按即此封禪書序云葢有無其應而用事者矣此當有所據太史公再引以為説殽以東按殽即崤山杜預云𢎞農澠池縣西南即今之崤山是也亦音豪相山地理志在長沙曰濟曰淮按風俗通云濟廟在臨邑淮廟在平氏也為嵗于偽反秋涸凍按字林涸竭也下各反小顔云涸讀與沍同沍凝也下故反春則解秋則凝冬塞先代反與賽同賽今報神福也薄山者襄山也應劭云在潼闗北十餘里穆天子傳云自河首襄山酈元水經云薄山統目與襄山不殊在今芮城北與中條山相連是薄襄一山也岐山地理志在美陽縣西北也呉岳徐廣云在汧鴻冢黄帝臣大鴻塟雍鴻冢葢因大鴻塟為名也瀆山蜀之汶山按地理志蜀郡湔氏道崏山在西郭璞注云山在汶陽郡廣陽縣一名瀆山也河祠臨晉韋昭云馮翊縣地理志臨晉有河水祠沔祠漢中水經云沔水出武都沮縣注云東南注漢謂漢水故祠之漢中樂産云漢女漢神也湫淵上子小反又子由反即龍之所處也江水祠蜀按風俗通江出崏山崏山廟在江都地理志江都有江水祠葢漢初祠之於源後祠之於委也又廣雅云江神謂之奇湘江記云帝女也卒為江神華陽國志云蜀守李冰於彭門闕立江神祠三所漢書儀云祭四瀆用三正牲沈圭有車馬紺葢也四大冢按謂四山為大冢也又爾雅云山頂曰冢葢亦因鴻冢而為號也灃澇十三洲記灃水出鄠縣南也長水按百官表有長水校尉沈約宋書云營近長水因以為名水經云長水出白鹿源今之荆溪水是也鳴澤按服䖍云鳴澤澤名在涿郡道縣也雍有日月參辰按漢書舊儀云祭參辰皇於地陽谷口夾道在右為壇也九臣十四臣竝不見其名數所出故昔賢不論之也諸布按爾雅祭星曰布或諸布是祭星之處諸逑亦未詳逑漢書作遂西亦有數十祠西即隴西之西縣秦之先舊都故有祠湖地理志湖縣屬京兆有周天子祠二所灃滈有昭明按樂産引河圖云熒惑星散為昭明天子辟池樂産云未聞顧氏以為壁池即滈池所謂華陰平舒道逢使者持壁以遺滈池君故曰壁池今謂天子辟池即周天子辟雍之地故周文王都鄷武王都滈既立靈臺則亦有辟雍耳張衡亦以辟池為雍於社亳徐廣云京兆杜縣有亳亭則杜字誤合作於杜亳且據文列於下皆是地邑則杜是縣按秦寧公與亳王戰亳王奔戎遂滅湯社皇甫謐亦云周桓王時自有亳土號湯非殷也而臣瓚以亳為成湯之邑故云在濟陰非也按謂杜亳二邑有三社主之祠也夀星祠夀星葢南極老人星也見則天下理安故祠之以祈福夀杜主故周右將軍按地理志杜陵故杜伯國有杜主祠四墨子云周宣王煞杜伯不以罪後宣王田於圃見杜伯執弓矢射宣王伏弢而死也最小鬼之神謂其鬼雖小而有神靈雍四畤雍有五畤而言四者顧氏以為兼下文上帝為五非也按四畤據秦舊而言也木禺一音寓寄也寄龍形於木寓鳥馬亦然一音偶亦謂偶其形於水也龍欒車謂車有鈴鈴乃有欒和之節故取名也通權火權如字解如張晏一音爟周禮有司爟爟火官非也房中堂上按禮樂志有安世房中歌皆謂祭時室中堂上歌先祖功徳也東宫雲中廣雅曰東君也王逸注楚詞雲中雲也東君雲中亦見歸藏易也社主即上文三社主也巫保族纍二神名纍力追反巫先謂古巫之先有靈者葢巫咸之類也司命按周禮以槱燎祠司命鄭衆云司命文昌四星也施糜鄭氏云主施麋粥之神祠九天按孝武本紀云立九天廟於甘泉三輔故事云胡巫事九天於神明臺淮南子云中央曰鈎天東方曰蒼天東北閔天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天也河決金堤其符謂河決乃水徳之符應也刺六經小顔云刺謂采取之也劉向七録云文帝所造書有本制服制篇刺音七錫反長門徐云在霸陵也日再中晉灼云淮南云魯陽公與韓構戰酣日暮援戈麾之日為却三舍豈其然乎三嵗一郊按漢書舊儀云元年祭天二年祭地三年祭五畤三嵗一遍皇帝自行也深澤侯按表深澤侯趙將夕孫夷侯胡紹封武安侯按是田蚡也柏寢按韓子云齊景公與晏子遊於少海登柏寢之臺而望其國食巨棗按包愷云巨或作臣天神貴者太一樂叶徴圖曰天宫紫㣲北極天一太一宋均云天一太一北極神之别名春秋佐助期曰紫宫天皇曜魄寳之所理也石氏云天一太一各一星在紫宫門外立承事天皇大帝開八通鬼道按司馬彪續漢書祭祀志云壇有八陛通道以為門又三輔黄圖云上帝壇八觚神道八通廣三十步解祠謂祠祭以解殃咎求福祥太一澤山君地長此則人上書言古天子祭太一太一天神也澤山本紀作臯山君臯山君地長謂祭地於臯山同用太牢故云用牛葢是異代之法也武夷顧氏按地理志云建安有武夷山溪有仙人塟處即漢書所謂武夷君是時既用越巫勇之疑即此神今按其祀用乾魚不饗牲牢或如顧説也白金按樂産云謂龍馬龜各以勝曰按樂産云謂畫青車以甲乙畫赤車丙丁畫𤣥車壬癸畫白車庚辛畫黄車戊巳将有水事則乗黄車故下云駕車辟惡鬼是也鼎湖按三輔黄圖鼎湖宫名在藍田韋昭云地名近宜春按湖本屬京兆後分屬𢎞農恐非鼎湖之處也康王后康王名寄也不相中按三蒼云中得也食馬肝死耳按論衡云氣熱而毒盛故食走馬肝煞人故儒林傳云食肉無食馬肝是也我何愛乎上語欒大言子誠能修文成方我更何所愛惜乎謂不恡金寳及禄位也棊自相擊顧氏按萬畢術云取雞血雜磨針鐵杵和礠石棊頭置局上即自相抵也得四印謂五利将軍天士将軍地士将軍大通将軍謂四也衛長公主按衞子夫之子曰衛太子女曰衞長公主是衞后長女故曰長公主非如帝姉曰長公主之例當利公主按地理志東萊有當利縣佩六印更加樂通侯及天道將軍印為六印泰帝按孔文祥云秦帝太昊也神靈之封居七千韋昭云黄帝時萬國其以修神靈得封者七千國或為七十國樂産云以舜為神明之後封媯滿於陳之𩔖是也顧氏按國語仲尼云山川之守足以紀綱天下者其守為神汪茫氏之君守封禺之山也乃斷斬非鬼神者謂有非毁鬼神之人乃斷理而誅斬之胡􅏋説文曰胡牛垂頷也釋名云胡在咽下垂者即所謂龍胡也祭月以羊彘特按樂産云祭日以太牢月以少牢特不用牝也小顔云牛羊若彘止一牲故云特也贊饗按顧氏云饗祀祠也漢舊儀云贊饗一人秩六百石也盡多不讐按鄭徳云相應為讐謂其言語不相應無驗也子侯暴病死新論云武帝出璽印石財有兆朕子侯則没印帝畏惡故殺之風俗通亦云然顧𦙍按武帝集帝與子侯家語云道士皆言子侯得仙不足悲此説是也填星樂産包愷竝作旗星旗星即徳星符瑞圖云旗星之極芒艷如旗本亦作旗也作益延夀觀小顔以為作夀益延夀二館按漢武故事云作延夀觀髙三十丈作通天莖臺按漢書竝無莖字疑衍也五寛舒之祠官按郊祀志云祠官寛舒議祠后土為五壇故謂之五寛舒祠官也河渠書第七禹抑鴻水抑音憶然抑者遏也洪水滔天故禹遏之不令害人也漢書溝洫注作堙堙抑皆塞之也乗毳字亦作毳同音昌芮反注以撮子芮反又子絶反與蕝音同也乃厮二渠厮漢書作釃史記舊本亦作洒字從水按韋昭云疏決為釃字音疏跬反厮即分其流泄其怒是也二渠其一即漯川其二王莽時遂空也東南為鴻溝按楚漢中分之界文潁曰即今官渡水也葢為二渠一南經武陽為官渡水一東經大梁城即河溝今之汴河是也三江五湖三江按地理志北江從㑹稽毘陵縣北東入海中江從丹陽蕪湖縣東北至會稽陽羨縣東入海南江從會稽呉縣南東入海故禹貢有北江中江也五湖者郭璞江賦具區兆滆彭蠡青草洞庭是也又云太湖周五百里故曰五湖辟沫水辟音避沫音末按説文云沫水出蜀西南徼外與青衣合東南入江自中山小顔云中音仲即今之九嵕山之東仲山是也西邸瓠口按邸至也瓠口即谷口乃郊祀志所謂寒門谷口是也與池陽相近故曰田於何所池陽谷口是也亦秦之利也溝洫志鄭國曰臣為韓延數嵗之命為東秦建萬代之功是也溉澤鹵溉古代反澤一作舄音昔又竝音尺本或作斥則如字讀之鄃居河北音輸韋昭云清河縣也河壖韋昭音而縁反河邊地又音人兖反水工徐伯表舊説徐伯表水工姓名也小顔以為表者巡行穿渠之處而表記之若今豎標表是也番係上音婆又音潘按詩小雅云番惟司徒畨氏也下音系也從山東西按謂從山東運漕而西入闗也人茭牧其中按茭乾草也謂收茭及牧畜於中令少府以為稍入其田既薄越人徙居者習水利故與而稍少其税入之於少府也自徴音懲縣名也在馮翊小顔云即今之澄城也商顔下顔音崖又如字商顔山名也以為楗其免反楗者樹於水中稍下竹及土石也延道㢮兮離常流言河之決由其源道延長弛溢故使其道皆離常流故晉灼云言河道皆㢮壊搴長茭搴音已免反茭音交竹􅓗絙也茭一作茇音廢鄒氏又音紼也闗中輔渠按溝洫志兒寛為左内史奏請穿六輔渠謂之輔渠亦曰六渠也平準書第八大司農屬官有平凖令丞署以均天下郡國轉販貴則賣之賤則買之貴賤相權輸歸于京都故命曰平準自天子不能具鈞駟按天子駕駟馬其色宜齊同今言國家貧天子不能具鈞色之駟馬漢書作醇駟醇與純同一色也或作騂非也秦錢重難用顧氏按古今注云秦錢半兩徑一寸二分重十二銖更令民鑄錢食貨志云鑄筴錢按古今注云榆筴錢重三銖錢譜云文為漢興也黄金一斤按如淳云時以錢為貨黄金一斤直萬錢非也又臣瓉注云秦以一溢為一金漢以一斤為一金是其義也稽市物踊騰糶李奇云稽貯滯韋昭云稽留待也稽市當如李韋二釋音晉灼及馬融訓稽為計及考於義為疎如淳云踊騰低昂也低昂者乍賤乍貴也今按漢書糶字作躍者謂物踊貴而價起有如物之騰躍而起也然糶者出賣之名故食貨志云大熟則上糶三而舍一是也經費按經訓常也言封君已下皆以湯沐邑為私奉故不領入天子之常税為一年之費給中都官按中都猶都内也皆天子之倉府以給中都官者即令太倉以穡官儲也即山鑄錢按即訓就就山鑄錢故下文云銅山是也一解即山山名也益苑馬以廣用謂増益苑囿造廏而養馬以廣用則馬是軍國之用募人輸粟爵至大庶長按漢書食貨志云文帝用晁錯言令人入粟邊六百石爵上造稍増至四千石為五大夫萬二千石為大庶長各以多少為差注倉氏庾氏按出食貨志以武斷於鄉曲謂鄉曲豪富無官位而以威勢主斷曲直故曰武斷也抏弊按三蒼音五官反鄒氏又五亂反按抏者耗也消耗之名言百姓貧弊故行巧抵之法也邛僰應劭云臨邛屬僰僰屬犍為彭呉人姓名滅朝鮮彭呉始開其道而滅之也吏發興誅之謂發軍興以誅之也轉漕按説文云漕水轉穀也一云車運曰轉水運曰漕也留墆無所食墆音迭謂貯也韋昭音滯謂積也又按古今字詁墆今滯字則墆與滯同按謂富人貯滯積穀則貧者無所食也級十七萬凡直三十餘萬金大顔云一金萬錢也計十一級級十七萬合百八十七萬金而此云三十餘萬金其數必有誤者顧氏按解云初一級十七萬自此己上每級加二萬至十七級合成三十七萬也官首者試補吏先除官首武功爵第五也位稍髙故得試為吏先除用也千夫如五大夫千夫武功爵第七五大夫二十爵第九也言千夫爵秩比於五大夫二十爵第九故楊僕以千夫為吏是也爵得至樂卿按此言武功置爵唯得至於樂卿也臣瓚所引茂陵書葢後人記其爵失次耳今注稱十爵至十八庶長為樂卿十九至二十為樂公乃以舊世爵釋武功爵葢亦臆説非也大顔亦以為然廢格沮誹格音閣亦如字沮音緒誹音非按謂廢格天子之命而不行及沮敗誹謗之者皆被窮治故云廢格沮誹之獄用矣注蹛停一曰貯蕭該按字林云貯塵也音佇此謂居積停滯塵久也或作貯子貢發貯鬻財是也廢居劉氏云廢出賣居停蓄也是出賣於居者為廢故徐仙氏云有所廢有所畜是也居邑服䖍云居穀於邑中是也封君皆低首仰給按服䖍云仰給於商賈是也而劉伯莊以為封君及大商皆低首營私以自給不佐天子非也赤金説文云銅赤金也注云丹陽銅者神異經云西方金山有丹陽銅也天用莫如龍易云行天莫如龍也地用莫如馬易云行地莫如馬也人用莫如龜禮曰諸侯以龜為寳也其文龍顧氏按錢譜其文為龍隠起肉好皆圜文作雲霞之象名白選蘇林曰選音選擇之選包愷及劉氏音息戀反尚書大傳云夏后氏不殺不刑死罪罰二千饌馬融云饌六兩音漢書作撰音同直三千晉灼按黄圖直三千二百以重差小方之錢譜肉好皆方隠起謂以八兩差為三品此重六兩下小隋重四兩也云以重差小者謂半兩為重故差小重六兩而其形方也其文馬錢譜肉好皆方隠起馬形肉好之下又是連珠文也復小隋之湯果反爾雅注隋者狹長也謂長而方去四角也其文龜錢譜肉圓好方為隠起龜甲文東郭咸陽東郭姓咸陽名也按風俗通東郭牙齊大夫咸陽其後也析秋毫按言百物毫芒至秋皆美細今言𢎞羊等三人言利事纎悉能分析其秋毫也故吏皆適伐棘謂故吏先免者皆適令伐棘上林不謂無馬者韋説非也作昆明池按黄圖云昆明池周四十里以習水戰乂荀悦云昆明子居滇河中故習水戰以伐之也屬少府韋昭云天子私所給賜經用也公用屬大司農也子牢盆按蘇林云牢價直也今代人言雇手牢盆晉灼云蘇説是樂産云牢乃盆名其説異竒民包愷音羈諸侯也非農工之儔故言奇也擅筦音管上音善富羨弋戰反羨饒也與衍同義沮事之議沮止也僅等言山海之藏宜屬大農奇人欲擅利必有沮止之議此不可聼許也釱左趾按三蒼云釱踏脚鉗也字林徒計反張斐漢晉律序云状如跟衣著足足下重六斤以代臏至魏武改以代刖也異時異時猶前時也算軺車説文云軺小車也傅子云漢代賤乗軺今則貴之言算軺車者有軺車使出税一算二算也賈人緍錢緍音旻緍者絲繩以貫錢者千錢出二十算也稽諸物稽者停也留也即上文所謂廢居居邑是也自占按郭璞云占自隠度也謂各自隠度其財物多少為文簿送之官也若不盡皆没入於官音之贍反占不悉悉盡也具也若通家財不周悉盡者罸戍邊一嵗籍名田謂賈人有市籍不許以名占田也没入田僮若賈人更占田則没其田及僕僮皆入之於官大抵無慮抵音氐抵歸也劉氏云大抵猶大畧也按大抵無慮者謂言大畧歸於鑄錢更無他事從慮人多姦鑄錢按多姦巧雜以鈆錫也鍾官赤側鍾官掌鑄赤側之錢韋昭云側邊也故晉灼云以赤銅為郭今錢見有赤側者張湯死民不思樂産云諸所廢興附上困下皆自湯故人不思之也楊可告緍姓楊名可也如淳云告緍者令於楊可告占緍之不盡者也少反者反音番反謂反使從輕也按劉徳為京兆尹毎行縣多所平反是也分曹如淳云曹輩也謂分曹輩而為使也官布多布謂泉布越欲與漢用舩逐乃大修昆明葢始穿昆明池欲與滇王戰今乃吏大修之将與南越吕嘉戰逐故作樓船於是楊僕有将軍之號又下云因南方樓船卒二十餘萬人撃南越也列觀環之按昆明池有豫章館豫章地名以言将出軍於豫章故也比没入田比昔所以入之田也度四萬石樂産云度猶運也自糴乃足按謂天子所給廩食者多故官自糴乃足也所忠人姓名服䖍云掌故官取書於司馬相如者封禪書公孫卿因所忠言實鼎是也唯姚察獨以為所患非也齊人晉灼云被教整齊人也命曰株送徒李奇曰先至者為魁株應劭云株根本也送當作選選引也按應李二音是先至之人令之相引似若得其株本則枝葉自窮故曰株送徒又文潁曰凡鬭雞勝者為株傳云陽溝之雞三嵗為株今鬭雞走馬者用之因其鬭雞本勝時名故云株送徒也築令居令音零姚氏音連韋昭云金城縣列侯以百數劉氏言其多以百而數故坐酧金失侯者一百六人器苦惡苦音苦楛反言苦其器惡而買賣也言器苦窳不好凡病之器云苦窳音庾語見本紀苦如字讀亦通也地比給初郡比音鼻謂南陽漢中已徃之郡各以其地比近給初郡初郡即西南夷初所置之郡卒奉扶用反包氏同不償其僦服䖍云雇載云僦言所輸物不足償其雇載之費也僦音子就反他郡各輸急處謂他郡能入粟輸其所在急要之處也坐市列謂吏坐市肆行列之中金馬三品即下或黄或赤白黄黄金也白白銀也赤赤銅也竝見食貨志或錢或布或刀或龜貝按錢本名泉言貨之流如泉也故周有泉府之官及景王乃鑄大錢布者言貨流布故周禮有二夫之布食貨志貨布首長八分足支八分刀者錢也食貨志有契刀錯刀形如刀長二寸直五千以其形如刀故曰刀以其利於人也又古者貨貝寳龜食貨志有十朋五貝皆用為貨其各有多少元龜直十貝故直二千一百六十已下各有差也史記索隠卷九
