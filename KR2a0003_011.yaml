body:
  text: 史記索隱卷十一唐司馬貞撰燕召公系家第四召公召者畿內菜地奭始食於召故曰召公或說者以為文王受命取岐周故墟周召地分爵二公故詩有周召二南言皆在岐山之陽故言南後王封之北燕在今幽州薊縣故城是也亦以元子就封而次子留周室代為召公至宣王時召康公虎其後也九世至惠侯竝國史先失也夫自惠侯已下皆無名亦不言屬唯昭王父子有名蓋在戰國時旁見他說耳鄭侯立按諡法無鄭鄭或是名宣侯譙周曰系本謂燕自宣侯已下皆父子相傳無及故系家桓侯已下竝不言屬以其難明故也按今系本無燕代系宋忠依太史公書以補其闕尋徐廣作音尚引系本蓋近始散佚耳莊公十六年與宋衛共伐周譙周云據左氏燕與衛伐周惠王乃是南燕姞姓系家以為南燕伯故著史考云北燕是姞姓耳今按左氏莊十九年衛師伐周二十年齊伐山戎傳云執燕仲父三十年齊伐山戎傳曰謀伐戎以其病燕故也據傳文及此記元是北燕不疑杜君妄說仲父是南燕伯是北燕之大夫且燕衛俱是姬姓故有代周納王之事若是姞姓燕與衛伐周則鄭何以獨伐燕而不伐衛乎惠侯燕四十二代有二惠侯二僖侯二宣侯三桓侯二文侯蓋國史微失本諡故重耳桓公十六年譙周云系家襄伯生宣伯無桓公今檢史記竝有桓公立十六年又宋忠據此史補系家亦有桓公是允南所見本異則是燕有三桓公也惠公懼奔齊春秋昭三年北燕伯款奔齊至六年又云齊伐北燕一與此文合左傳無納款之文而云將納簡公晏子曰燕君不入矣齊遂受賂而還與此乖而又以款為簡公簡公去惠公已五代則與春秋經傳不相協未可强言也寵姬宋宋其名也或作宗劉氏云其父兄為執政故諸大夫共滅之簡公十二年卒獻公立王劭按紀年簡公後次孝公無獻公然紀年之書多是僞謬聊記異耳孝公十二年韓趙滅智伯按紀年智伯滅在成公二年成公立十六年按紀年成公名載涽公三十一年卒三晉列為諸侯按紀年作文公二十四年卒簡公立十三年而三晉命邑為諸侯與此不同僖公三十年卒紇年作簡公四十五年卒妄也按上簡公生獻公是敗齊于林營林營地名一云林地名於林地立營故曰林營文公十九年系本已上文公為閔公則涽與閔同而上惠公之父乂諡文公十年燕君為王君即易王也言君初以十年即稱王也上言易王者易諡也後追書諡耳蘇代為齊使於燕按戰國䇿曰子之使蘇代侍質子於齊齊使代報燕是也鹿毛夀按徐廣一作厝毛故春秋後語亦作厝毛夀又韓子作潘夀子之大重大重謂尊貴也禹薦益已按以已配益則益已是伯益而經傳無其文未知所由以啓人為吏人猶臣也謂以啓臣為益吏而吏無非天子人者此人亦訓臣也而效之子之按鄭𤣥效成也以印呈與子之顧為臣顧猶反也言噲反為子之臣也有本作願者非恫恐恫音通痛也恐懼也此文武之時不可失也謂如武王成文王之業伐紂之時然此語與孟子不同也王令章子按孟子云章子齊人將五都之兵五都即齊也按臨淄是五都之一也北地之衆北地即齊之北邊也二年而燕人共立太子平按上文太子平謀攻子之而年表又云君噲及太子相子之皆死紀年又云子之殺公子平今此又云立太子平是為燕昭王則年表紀年為謬也而趙系家云武靈王聞燕亂召公子職於韓立以為燕王使樂池送之裴駰亦以此系家無趙送公子職之事當是遙立職而送之事竟不就則昭王名平非職明矣進退參詳是年表既誤而紀年因之而妄說耳唯獨聊莒即墨按餘篇及戰國策竝無聊惠王七年卒按趙系家惠文王二十八年燕相成安君公孫操弒其王樂資以為即惠王也徐廣按年表是年燕武成王元年武成即惠王子則惠王為成安君弒明矣此不言者燕逺諱不告或大史公之說疏也今王喜今王猶今上也有作令者非也按諡無令也栗腹攻鄗鄒氏音火各反一音昊卿秦攻代戰國策曰亷頗以二十萬遇栗腹於鄗樂乘以五萬遇爰秦於代燕人大敗不同也將渠人名姓也一云上卿秦及此將渠者卿將皆官也秦渠名也國史變文而書遂失姓也戰國策云爰秦爰是姓也卿是其官耳五而伐一謂以五人而伐一人以處和謂欲令人處之使和也龐暖音況逺反督亢地圖徐廣云涿有督亢亭地理志屬廣陽然督亢之田在燕東甚良沃欲獻秦故畫其圖而獻焉內措齊晉措交雜也又作錯劉氏云爭陌反管蔡系家第五封叔武於成按春秋隱五年衛師入郕杜預曰東平剛父縣有郕鄉即此成又地理志廩丘縣南有成故城應劭云武王封弟季載於成是古之成邑應仲逺誤云季載封耳封叔處於霍春秋閔元年晉滅霍地理志河東彘縣霍太山在東北是霍叔之所封康叔封孔安國曰康畿內國名地闕叔字也封叔名冉季載冉國也載名也季字也冉或作那按國語曰冉季鄭姬賈逵曰文王子聃季之國也莊十八年楚武王克權遷於那處杜云那處楚地南郡編縣有那口城聃與那皆音奴甘反皆有馴行如字音巡馴善也康叔為周司寇冉季為司空事見定四年左傳為魯卿士按尚書云蔡仲克庸祇德周公以為卿士叔卒乃命諸王封之蔡元無仕魯之文又伯禽居魯乃是七年致政之後此言乃說居攝政之初未知史遷何慿而有斯言也餘五叔皆就封管叔蔡叔成叔曹叔霍叔嫁其弟弟女弟即蕩舟之姬司徒招或作昭或作韶竝時遙反平侯宋忠曰平侯徙下蔡今系家無者近脫耳昭侯遷于州來州來在淮南下蔡縣誅賊利利賊名也後陳滅三十三年魯哀十七年滅陳其楚滅蔡又在滅陳之後三十三年即在春秋之後曹叔振鐸系家按上文叔振鐸其後為曹有系家言則曹亦合題系家今附管蔡之末而出者蓋以曹微小而少事迹因附管蔡之末不别題篇且又管雖無後仍是曹之兄故題管而略曹也惠伯兕立按注引孫檢未詳何代或云齊人亦恐其人不注史記今以王儉七志阮季緒七録竝無又不知是裴駰所録否宣公疆立按左傳宣公名盧弟負芻立三年晉虜成公按左傳晉厲公執負芻歸于京師晉立宣公弟子臧子臧曰聖達節次守節下失節為君非吾節也遂奔宋曹人請晉晉謂子臧曰反國吾歸而君子臧反晉於是歸負芻莊公夕姑上音亦即射姑也同音亦聲公野隱公通按譙周云春秋無其事今檢系本及春秋悼伯卒弟路立諡靜公實無聲公蓋是彼文自疏無離曹禍離即罹罹被也乃背晉干宋干謂犯也言曹因棄晉而犯宋遂致滅也注以小加大加陵也小即曹也大謂晉及宋也太史公曰已下檢諸本或無此論陳把系家第六商均為封國按商均所封虞即今之梁國虞城是也夏后之時或失或續按夏代猶封虞思虞遂是也遏父為周陶正遏父遂之後陶正官名生滿媯滿封之陳左傳曰武王以元女太姬配虞胡公而封之陳以備三恪正月甲戌巳丑桓公鮑卒陳亂故再赴其日桓公弟他殺五父及太子免是為厲公譙周曰春秋傳謂他即五父與此違者此以他為厲公太子免弟躍為利公而左傳以厲公名躍他立未踰年無諡故蔡人殺陳他又莊二十二年傳云陳厲公蔡出也故蔡人殺五父而立之則他與五父俱為蔡人所殺其事不異是一人明矣史記既以他為厲公遂以躍為利公尋厲利聲相近遂誤以他為厲公五父為别人是大史公錯耳班固又以厲公躍為桓公弟又誤而重一言謂申叔時之語少姬生偃按昭八年經云陳侯之弟招殺陳世子偃師左傳陳哀公元妃鄭姬生悼太子偃師今此云兩姬又分偃師為二人亦恐此非殺陳使者即司徒招也一作苕也自幕至于瞽瞍按賈逵以幕為虞思非也左傳言自幕至瞽瞍知幕在瞽瞍之前必非虞思明矣舜重之以明德重音持用反按杜預以為舜有明德乃至遂有國義亦然也且又云自幕至瞽瞍無違命既云舜重之以明德是言舜有明德為天子也又云殷封遂代守之亦舜德也至於遂杜預以遂為殷封舜後之邑也按系本云陳舜後宋忠云虞思之後箕伯直柄中衰殷湯封遂於陳以祀舜空籍五歲矣惠公探取哀公死楚陳滅之後年為元年故今空籍五嵗矣一云籍借也謂借失國之後年為五年取胡沈系本云胡歸姓沈姬姓沈國在汝南平輿胡亦在汝南子越為涽公按左傳涽公名周是史官記不同孔子在陳按孔子以魯定公十四年適陳當陳涽公之六年上文說是此十三年孔子仍在陳凡經八年何其久也把東樓公杞國名也東樓公號諡也不名者史先失耳宋忠曰把今陳留雍丘縣故地理志云雍丘縣故把國周武王封禹後為東樓公是也蓋周封把而居雍丘至春秋時杞已遷東國故左氏隱四年傳云莒人伐把取牟婁牟婁曹東邑也僖十四年傳云把遷緣陵地理志北海有營陵淳于公之縣臣瓚云即春秋緣陵淳于公所都之邑又州國名杞後改國曰州而稱淳于公故春秋桓五年經云州公如曹傳公淳于公如曹然杞後代又稱子者以微小又僻居東夷故襄二十九年經稱把子來盟傳曰書曰子賤之是也謀娶公娶音子㬰反注一作諜音牒子德公立系本及譙周竝作惠公又云惠公生成公及桓公是此系家脫成公一代故云弟桓公姑容立非也且成公又見春秋經傳故左傳莊二十五年云把成公娶魯女有婚姻之好至僖二十二年卒始赴而書左傳云成公也未同盟故不書名是把有成公必當如譙周所說孝公丐音蓋丐名平公鬱一作郁釐譙周云名郁來蓋鬱郁釐來並聲相近遂不同耳哀公閼路閼音遏哀公殺兄涽公而立諡哀譙周云諡懿也或封蓼六本或作英六皆通然蓼六皆咎繇之後也據系本二國皆偃姓故春秋文五年左傳云楚人滅六臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸杜預曰蓼與六皆咎繇後地理志云六安故國臯陶後偃姓為楚所滅又僖十七年齊人徐人伐英氏杜預又曰英六皆臯陶後國名是有英蓼實未能詳或者英後改號曰蓼也伯翳之後為秦秦祖伯翳解者以翳益則一人今言十一人叙伯翳而又别言垂益則是二人也且按舜本紀叙十人無翳而有彭祖彭祖亦墳典不載未知太史公意如何只恐誤然據秦本紀叙翳之功云佐舜馴調鳥獸與舜典命益作虞若豫上下草木鳥獸不同則為一人必矣今未詳其所由也五人之後皆至帝王舜禹身為帝王其稷契及翳則後代為帝王也滕薛騶滕不知本封蓋軒轅氏子有滕姓是其祖也後周封文王子錯叔繡於滕故宋忠云今沛國公丘是滕國也薛奚仲之後任姓蓋夏殷所封故春秋有滕侯薛侯邾曹姓之國陸終氏之子會人之後邾國今魯鄒縣是也然三國微小春秋時亦預盟蓋史缺無可叙列也江黃胡沈按系本江黃二國竝嬴姓又地理志江國在汝南安陽縣衛康叔系家第七衛康叔康畿內國名宋忠曰康叔從康徙封衛衛即殷墟定昌之地畿內之康不知所在欲攻成周成周洛陽其時周公相成王營洛邑猶居西周鎬京管蔡欲搆難先攻成周於是周公東居洛邑伐管蔡武庚未集集猶和也居河淇故商墟宋忠曰今定昌也康叔卒子康伯立系本康伯名髠宋忠曰即王孫牟也事周康王為大夫按左傳所稱王孫牟父是也牟髠聲相近故不同耳譙周古史考無康伯而云子牟伯立蓋以不宜父子俱諡康故因其名曰子牟伯也康伯立系本作摯伯貞伯立系伯作箕伯頃侯厚賂周按康誥稱命爾侯于東土又云孟侯朕其弟小子封則康叔初封為侯也此子康伯即稱伯者謂方伯之伯非至子即降爵為伯也故孔安國曰孟長也五侯之長謂方伯州牧也故五代孫祖恆為方伯耳至頃侯德衰不監諸侯乃從本爵而稱侯非是至子即削爵及頃侯賂夷王而稱侯也恭伯入釐侯羡音延延墓道又音以戰反恭伯名餘也武公和殺恭伯代立此說蓋非也按季札美康叔武公之德又國語稱武公年九十五矣猶針戒於國恭恪于朝倚几有誦至于沒身謂之睿聖又詩著衛世子恭伯早卒不云被殺若武公殺兄而立豈可以為訓而刑之國史乎蓋太史公探雜說而為此記耳齊女子之子之謂養之為子也齊女即莊姜也詩碩人篇美之是也陳女戴媯也子桓公完為州吁所煞戴媯歸陳詩燕燕于飛之篇是於濮賈逵曰濮陳地按濮水首受河又受汴汴亦受河東北至離派分為二俱東北至巨野入濟則濮在曹衛之間賈言陳地非也若據地理志陳留封丘縣濮水受沛當言陳留水也輕賦平罪輕賦稅平斷刑也平或作卒卒謂士卒也字連下讀亦一家之義成公出奔奔楚遂出奔陳按左傳衛侯聞楚師敗懼出奔遂適陳是私於周王鴆按私謂賂之也衛君瑕出奔元咺所立成公入而殺之故僖三十年經云衛殺其大夫元咺及公子瑕此言奔非也齊邴歜弒其君邴􅧬與左氏同而齊系家作邴戎者蓋邴􅧬掌御戎車故號邴戎邴音􅹔歜亦作􅧬其君莊公也二子怒如宿左傳作戚此亦音戚也定公弟秋左傳作剽古今人表作焱蓋音相亂字易改耳音方遙反又匹妙反見戎州左傳曰戎州人攻之是也隱二年公會戎于潛杜預云陳留濟陽縣東南有戎城濟陽與衛相近故莊公登臺望見戎州又七年云戎伐凡伯于楚丘是戎近衛莊公出奔按左傳莊公本由晉趙氏納之立而背晉晉伐衛衛人出莊公立公子般師晉師退莊公復入般師出奔初公登城見戎州已氏之妻髮好髠之以為夫人髢又欲剪戎州兼逐石圃故石圃攻莊公莊公懼踰北牆折股入已氏已氏殺之今系家不言莊公復入及死已氏直云出奔亦其疏也又左傳云衛復立般師齊伐衛立公子起執般師明年衛石圃逐其君起起奔齊出公輒復歸是左氏詳而系家略也衛石専曼逐其君起左傳作石圃此作磚音圃又音徒和反磚或作専諸本或無曼字出公輒立二十一年按出公初立十三年亡在外四年復入九年卒是立二十一年自即位至卒凡經二十四年而卒悼公黔立五年按紀年云四年卒于越系本名䖍敬公弗立系本弗作費子昭公糾立系本云敬公生撓公舟非也公子適音的按系本適作䖍䖍悼公也聲公訓訓亦作馴同休運反系本作聖公馳成侯遬音速系本作不逝按上穆公已名遬不可成侯更名則系本是成侯十一年公孫鞅入秦按秦本紀云孝公元年鞅入秦又按年表成侯與秦孝公同年然則十一年當為元年字誤耳子嗣君立按樂資據紀年以嗣君即孝襄侯也魏東地魏都大梁濮陽黎陽竝是魏之東地故立郡名東郡也元君十四年更徙衛野王按年表元君十一年秦置東郡十三年衛徙野王與此不同也宋微子系家第八微子開者按尚書微子之命篇云命微子啓代殷後今此名開者避漢景帝諱殷帝乙之首子而帝紂之庶兄也按尚書亦以為殷王元子而是紂之兄按吕氏春秋云生微子時母猶為妾及為妃而生紂故微子為紂同母庶兄滅􅢿國􅢿音耆耆即黎也鄒誕本云􅧰音黎孔安國云黎在上黨東北即今之黎亭是也殷其典喪尚書典作淪篆字變易其義亦殊徐廣曰典國典也喪音息浪反我其發出往往尚書作狂蓋亦今文尚書意異耳陋淫尚書作攘竊劉氏云陋淫猶輕穢也箕子者紂親戚箕國子爵也司馬彪曰箕子名胥餘馬融王肅以箕子為紂之諸父服䖍杜預以為紂之庶兄杜預云梁國蒙縣有箕子冢象箸持略反按下云為象箸必為玉杯杯箸事相近周禮六樽有犧象壺泰箸箸地無足是也劉氏音直慮反則杯箸亦食用之物亦竝通肉袒面縛肉袒者袒而露肉也面縛者縛手於背而而向前也劉氏云面即背也義亦稍迂內友內當為燮燮和也沈漸尚書作沈潛此作漸字其義當依馬注曰涕音亦尚書作圛孔安國云氣駱驛亦連續今此文作涕是涕泣亦相連之狀也曰霧音䝉然䝉與霧亦通注一曰洟曰被徐廣所見本涕作洟䝉作濛義通而字變曰舒依字讀按下有曰急注未齓未齓未毁齒也音楚吝反朝鮮潮仙二音地因水為名也近婦人婦人之性多涕泣漸漸兮漸漸麥芒之狀音子亷反又依字讀油油者禾黍之苗光悅貌微仲衍按家語微子弟仲思名衍一名泄嗣微子為宋公雖遷爵易位而班級不過其故故以舊官為稱故二微雖為宋公猶微至子稽乃稱宋公宋公稽譙周云未諡故名公子鮒祀徐云一本作祀譙周亦作魴祀據左氏即涽公庶子也弒煬公欲立太子弗父何何讓不受宋地霣星如雨與雨階也按僖十六年左傳霣石于宋五霣星也六鶂退飛過宋都是當襄公之時訪內史叔興曰君將得諸侯而不終也然莊七年傳又云恆星不見夜中星霣如雨與雨偕也且與雨偕下自在别年不與霣石退鶂之事同此史以霣石為霣星遂連恆星不見之時與雨偕為文故與左傳小不同也鹿上之盟杜預云汝陰有鹿原縣按汝陰鹿原其地在楚僖二十一年宋人楚人齊人盟于鹿上是也然襄公始求諸侯於楚楚才許之計未合至汝陰鹿上據今濟陰乘氏縣北有鹿城蓋此地也取鄭二姬謂鄭大夫芈氏姜氏之女既是鄭氏故云二姬是年重耳過襄公以傷泓按春秋戰于泓在僖二十三年重耳過宋及襄公卒在二十四年今此文以重耳過與傷泓共嵗故云是年又重耳過與襄公卒共是一嵗則不合更云十四年是進退俱不合於左氏蓋太史公之疏耳昭公四年敗緣斯長丘徐廣曰魯系家云宋武公之代獲緣斯於長丘今云此時未詳者春秋文公十一年魯敗翟于鹹獲長狄緣斯於長丘齊系家惠公二年長翟來王子城父攻煞之此竝取左傳之說載於諸國系家今考其年嵗亦頗相協而魯系家云武公此云昭公蓋此昭當為武然前代雖已有武公此杵臼當亦諡武也若將不然豈下五系公子特為君又合諡昭乎景公昭公父糾左傳名周公子特昭公也左傳作德殺太子而自立按左傳景公無子取元公庶曾孫德及啓畜于公宫及景公卒先立啓後立德是為昭公與此說乖未知太史公據何而為此說景公頭曼音萬公子褍秦音端悼公購由立悼公昭公子也昭公立四十七年表云四十九年購音古侯反悼公八年卒按紀年為十八年子辟公辟兵立按紀年云作桓侯璧兵則璧兵諡桓也又莊子云桓侯行未出城門其前驅呼辟䝉人止之後為狂也司馬彪云呼辟使人避道䝉人以桓侯名辟而前驅呼辟故為狂也子剔成立王劭按紀年云宋易城盱廢其君辟而自立也君偃自立為王戰國策吕氏春秋以偃諡曰康王也桀宋晉太康地記言其似桀也春秋譏宋之亂自宣公廢太子而立弟國以不寧者十代按春秋公羊有此說左氏則無譏焉大夫正考父美之故追道契湯髙宗殷所以興作商頌按裴駰引韓詩商頌章句亦美襄公非也今按毛詩商頌序云正考父於周之太師得商頌十二篇以那為首國語亦同此說今五篇存皆是商家祭祀樂章非考父追作也又考父佐戴武宣則在襄公前且百許嵗安得述而美之斯謬說耳傷中國闕禮義褒之也襄公臨大事不忘大禮而君子或以為多且傷中國之亂闕禮義之史遂不嘉宋襄之盛德故太史公褒而述之故云褒之也史記索隱卷十一
