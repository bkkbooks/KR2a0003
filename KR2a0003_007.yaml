body:
  text: 史記索隱卷七唐司馬貞撰建元以來侯者年表第八荆荼是徴荼音舒徴音澄翕侯趙信元朔二年以胸奴相國降侯後降單于翕音吸按漢表在內黃也持裝漢表作轅侯樂音嶽胸奴都尉降侯漢表在南陽也親陽侯月氏胸奴相降侯表在舞陽也若陽侯猛胸奴相降侯表在平氏也長平烈侯衛青以車騎將軍再擊胸奴侯地理志縣名在汝南平陵侯蘇建表在武當岸頭侯張次公表在皮氏平津侯公孫𢎞表在髙城子度山陽太守失侯涉安侯於單音丹以單于太子降侯昌武侯趙安稽似胸奴王降侯表在武陽襄城侯無龍漢表作襄武侯乘龍不同也按韓嬰亦封襄城侯地理志襄城在潁川襄武在隴西也南奅侯公孫賀徐廣曰匹孝反劉氏普教反張揖奅空也纂文云奅虛大也茂陵中書云南大侯此本字也衛青傳作峁説文以為從穴音栁宥反從本音延孝反合騎侯公孫敖表在髙城也安樂侯李蔡以丞相有罪自殺安樂表在昌地理志昌縣在琅邪也龍額侯韓説以橫海將軍後封按道侯免子增復封漢表以龍額按道為二人封非也地理志縣名屬平原劉氏音額崔浩音洛又云今河間有龍額村與弓髙相近韋昭云按道屬齊也隨成侯趙不虞表在千乘石纍纍音壘險阻地名漢表作舋音門以聞非實坐謾謂上聞天子狀不實為謾而國除謾音木干反從平侯公孫戎奴表在樂昌邑涉軹侯李朔漢表軹在西安無涉字地理志西安在齊郡涉軹猶從驃然皆當時意也故上文有涉安侯宜春侯衛伉志縣名屬汝南豫章亦有之隂安侯衛不疑志縣名屬魏郡發干侯衛登志縣名屬東郡已上三人皆大將軍衛青子博望侯張騫志縣名屬南陽冠軍侯霍去病縣名屬南陽衆利侯郝賢衆利表在陽城姑莫後以封伊即軒也郝音呼惡反又音釋潦表在舞陽悼侯趙王暖訾暖音況逺反訾即移反宜冠侯髙不識冠音官表在昌也輝渠鄉名案表在魯陽輝上下並音徽忠侯僕多漢表作僕朋此云僕多與衛青傳同從驃侯趙破奴以從驃騎得封故曰從驃後封從野侯下麾侯呼毒尼表在猗氏麾音撝漯隂魏侯蘇表在平原魏諡蘇名諡法克捷行軍曰魏也輝渠韋昭云僕多所封則作輝渠應庀所封則作渾渠二者皆鄉名在魯陽今並作輝誤也案漢表及傳亦作輝孔文祥云同是元狩中封則一邑分封二人也其義為得悼侯扁訾漢表作悼侯應庀庀讀必二反扁必顯反訾子移反河綦康侯烏犂表在濟南郡漢書作禽犂常樂肥侯稠雕表在濟南漢書衛青傳作雕離符離侯路博德縣名屬沛郡將重會期將重將字上屬重者再也會期言再赴期將去聲重平聲壯侯復陸支表在東平衆利質侯伊即軒表志闕軒居言反樓剸王剸音専手自劍合功侯手自劍謂手刺其王而合戰封湘成侯敞屠洛表在陽城義陽侯衛山表在平氏散侯董荼吾表在陽城劉氏荼音大姑反蓋誤耳今以其人名余吾余吾胸奴小名也臧馬康侯延表在朱虛周子南君表在長社樂通侯欒大韋昭云在臨淮髙平瞭侯次公音遼表在舞陽述陽侯建德表在下邳龍亢侯廣德晉灼云龍闕左傳齊侯圍龍龍魯邑蕭該云廣德所封止是龍有亢者誤也蟉居虬反成安侯延年表在郊志在陳留昆侯渠復纍表在巨鹿樂彥纍力委反顔師古音力追反騏侯駒幾志屬河東表在北屈梁期侯任破胡志屬魏郡牧丘恪侯石慶表在平原瞭侯畢取表在下邳初以封次公又封畢取將梁侯楊僕表志闕安道揭陽令定表在南陽隨桃侯趙光表在南陽湘成侯監居翁表在堵陽監官也居姓翁字海常莊侯蘇𢎞表在琅琊北石侯吳陽漢表作外石在濟南下酈侯左將軍黃同漢表作鄜西南夷傳甌駱將左黃同則左是姓恐誤漢表云將黃同則左將是官不疑繚嫈侯劉福繚音繚繞之繚嫈按字林音乙耕反西南夷傳音聊嫈蘌兒莊侯轅終古韋昭云在吳越界今為鄉也開陵侯建成表在臨淮臨蔡侯孫都表在河內東成侯居服表在九江無錫侯多軍表在會稽涉多侯嘉表在南陽平州侯硤表在梁父荻苴侯韓隂音狄蛆表在渤海澅侯參表在齊澅音獲水名在齊又音平卦反騠兹侯稽滑姑騠音啼表在琅琊若苴王苴子餘反浩侯王恢表志闕瓡囁侯扜者縣名案表在河東志亦同即狐字扜音烏亦音汙幾侯張䧄音機表在河東韋昭云䧄姑洛反涅陽侯子最表在濟志屬南陽右太史公本表當塗魏不害表在九江潦陽江德潦音遼表在清河富民田千秋表在蘄右孝武封國名安陽上官桀表在蕩陰志屬汝南桑樂上官安表在千乘富平張安世志屬平原義陽傅介子表在平氏商利王山表在徐郡建平杜延年表在濟陽弋陽任宫志屬汝南宜城燕倉表在濟隂宜春王欣志屬汝南安平楊敞表在汝南志屬涿郡右孝昭封國名陽平蔡義志屬東郡扶陽韋賢志屬沛郡表在蕭平陵范明友表在武當營平趙充國表在濟南陽成田延年表在濟隂非也且濟隂有成陽縣耳而潁川汝南又各有陽成縣城字從土在陽之下今此似誤不可分别也平丘王遷志屬陳留表在肥城家在衛一作衙音牙地理志衙縣在馮翊樂成霍山表在平氏志屬南陽冠軍霍雲志屬南陽平恩許廣漢志屬魏郡昌水田廣明表在於陵髙平魏相志屬臨淮博望許中翁志屬南陽平臺史子叔志屬常山樂陵史子長志屬臨淮平原亦有樂陵博成張章表在臨淮都成金安志屬潁川平通楊惲表在博陽髙昌董忠志屬千乘爰戚趙成漢表作趙長平樂昌王稚君表在汝南卭成王奉光表在濟隂安逺鄭吉表在慎博陽邴吉表在南頓建成黃霸表在沛西平于定國表在臨淮右孝宣時封陽平表在東郡建元已來王子侯者年表第九兹侯明表志闕安成侯蒼表在豫章宜春侯成表志闕句容哀侯黨表在會稽句陵侯福表志闕杏山侯成表志闕浮丘侯不審表在沛廣戚節侯擇表志闕魯共王子丹陽哀侯敢表在蕪湖盱台侯象之表志闕象之表作蒙之湖孰頃侯胥表在丹陽胥表作胥行秩陽終侯漣表作秣陵漣表名纏雎陵侯定國表作淮陵龍丘侯代表在琅琊張梁哀侯仁表志闕已上皆江都易王子劇原侯錯表志闕壤夷侯髙表志闕平望夷侯賞表志闕臨原敬侯始昌表作臨衆葛魁節侯寬表志闕或鄉名益都侯胡表志皆闕平酌戴侯疆漢表作平的志屬北海劇魁夷侯墨志屬北海夀梁侯守表在夀樂平度侯衍志屬東萊宜成康侯偃表在平原臨朐哀侯奴表在東海已上皆災川懿王子雷侯稀表在東海東莞侯吉志在琅琊辟節侯壯表在東陽皆城陽共王子尉文節侯丙表在南郡封斯共侯胡陽志屬常山榆丘侯夀福表志皆闕襄饞侯建韋昭云廣平縣饞音仕咸反又仕儉反邯會侯仁志屬魏郡朝侯義凡侯不言郡縣表志皆闕東城侯遺志屬九江隂城侯蒼表志闕已上皆趙敬肅王子廣望侯安志屬涿郡將梁侯朝平志在涿郡新館侯未央表在涿郡新處侯嘉表在涿郡陘城侯貞表在涿志屬中山已上皆中山靖王子蒲領侯嘉表在東海西熊侯明表志皆闕棗強侯晏志屬清河畢梁侯嬰表在魏郡已上皆廣川惠王子房光侯殷表在魏郡距陽侯白表志皆闕蔞安侯邈蔞音刀俱反漢表蔞節侯無安字節諡也阿武湣侯豫表志皆闕參户侯勉志屬渤海州鄉節侯禁志屬涿郡成平侯禮表在南皮廣侯順表在渤海蓋胥侯讓漢志在泰山表在魏郡已上皆河間獻王子陪安侯不害表在魏郡榮簡侯騫漢表在營關在茌平周堅侯何表志皆闕安陽侯桀表在平原五㯫侯雘丘表在泰山舊作􅀈音劬劉氏音烏霍反富侯襲表志皆闕倍繆侯明表在平原叢侯信叢音緅漢表作前在平原今平原無前縣此例非一蓋鄉名也平侯遂志屬河南羽侯成志屬平原胡母侯楚表在泰山自陪安侯不害已下十一人是濟北王子而漢表自安陽侯已下是濟北武王子同是元朔三年十月封恐因此誤也離石侯綰表在上黨志屬西河邵侯慎表在山陽昌利侯嘉志屬齊郡藺侯喜志屬西河臨河侯賢志屬朔方隰成侯忠志屬西河土軍侯郢客志屬西河臯狼侯遷表在臨淮千章侯遇表在平原已上皆代共王子博陽康侯就志屬汝南寧陽節侯恢表在濟南瑕丘節侯貞志屬山陽公丘夷侯順志屬沛郡郁狼侯騎韋昭云屬魯志不載狼音盧黨反又音郎西昌侯敬已上皆魯共王子陘城漢表作陸地侯義中山靖王子按漢表陸地為得靖王子貞已封陘二人不合重封邯平侯順趙敬肅王子四人以異年封故别見於此表在廣平也武始侯昌後立為趙王表在魏象氏節侯賀韋昭云巨鹿縣易一作鄗安侯平已上皆趙敬肅王子志屬涿郡表在鄗也洛陵侯章長沙定王子六人攸輿侯則按今長沙有攸縣攸本名攸輿表在南陽今無之也荼陵侯欣表在桂陽志屬長沙建城侯拾表在豫章安衆康侯丹志屬南陽山拊音趺葉康侯嘉葉音攝縣名屬南陽已上皆長沙定王子也利鄉侯嬰城陽共王子十人也有利侯釘表志闕東平侯慶表志闕運平侯欣表在東海山州侯齒表志闕海常侯劉福表在琅邪鈞丘侯憲漢表作騶丘敬侯寬也南城侯貞表志闕廣陵虒侯表徐廣曰一作廣陽晉灼曰虒音斯莊原侯臯已上皆城陽共王子漢表作杜原臨樂敦侯光中山靖王子四人韋昭曰縣名屬渤海敦諡法善行不怠曰敦東野戴侯章表志闕髙平侯嘉表在平原廣川侯頗已上皆中山靖王子千鍾侯搖漢表作重侯簷河間獻王子一人表在平原地理志有重丘也披陽敬侯燕齊孝王子九人蕭該音皮劉氏音皮彼反志屬千乘也定敫侯越定地名敫諡也説文云敫讀如躍稻夷侯定志屬琅邪山侯國表在渤海繁安夷侯忠表志闕栁康侯陽表志闕雲夷侯信志屬琅邪牟平共侯泄音薛志屬東萊柴原侯代已上皆齊孝王子志屬泰山也柏陽漢表作暢侯終古趙敬肅王子二人表在中山鄗漢表作敲安侯延年音霍已上二人趙敬肅王子志屬常山桑丘節侯洋漢表名將夜中山靖王子九人表在深澤也髙丘哀侯破胡表志闕栁宿夷侯蓋表在涿郡戎丘侯讓表志闕樊輿節侯條表志闕曲成侯萬嵗表在涿郡安郭侯博表志闕安險侯應志屬中山安遙侯恢已上皆中山靖王子夫夷敬侯義長沙定王十五人舂陵節侯買志屬南陽都梁敬侯遂志屬零陵洮陽靖侯狗彘志屬零陵洮音滔又音道漢表名將泉陵節侯賢已上長沙定王子志屬零陵終弋侯廣買衡山王賜子一人表在汝南麥侯昌城陽項王子十九人漢表二十人有挾僖侯霸疑此表脫在琅邪巨合侯發表在平原昌侯羌志屬琅邪費侯萬音祕又扶謂反表在琅邪也雩康侯澤志屬琅邪音呼加二音石洛侯敢表在琅邪扶浸漢表挾術侯昆吾表在琅邪浸音浸挍侯霸漢表名雲挍音效志闕説者或以為琅邪被縣恐不然也朸侯讓朸音勒朸縣名屬平原父城侯光徐廣云一作六城志在遼西表在東海彭侯疆表在東海庸侯談漢表名餘在琅邪翟侯夀表在東海鱣侯應表在襄賁賁音肥襄賁縣名報侯息報縣名志屬北海漢作瓡節諡也韋昭以瓡為諸縶反顔師古云即瓠字也然此作報徐廣又云作瓠也虛墟音栒也水侯禹志屬琅邪東淮侯類表在北海䘩音荀侯賢表在東海按志䘩在扶風與栒别也淯音育也侯不疑已上十九人皆城陽頃王子表在東海按淯水在南陽南陽有淯陽縣疑表非也陸侯何災川靖王子表在夀光廣饒康侯國志屬齊郡瓶音萍也敬侯成韋昭云古瓶邑音蒲經反志屬琅邪也俞閭侯無害已上災川靖王子也甘井侯元廣川繆王子二人表在巨鹿也襄陵侯聖已上廣川繆王子表在巨鹿也志屬河東臯虞侯建膠東王子三人志屬琅邪魏其暢侯昌志屬琅邪祝兹侯延已上膠東王子按志松兹在廬江亦作祝兹表在琅邪劉氏云諸侯封名史漢表多有不同不敢輒改今亦略檢表志同異以備多識也漢興以來將相名臣年表第十漢髙皇帝元年以漢王還定雍明年立太子盈大事記謂誅代封建薨叛相位置立丞相太尉三公也將位命將興師御史大夫亞相也都關中咸陽也東函谷南嶢武西散關北蕭關在四關之中故曰關中用劉敬張良計都之也破楚垓下音陔堤名也在洨縣也踐皇帝位定陶在濟隂沇水之陽命咸陽曰長安髙帝六年按上盧綰及帝已封長安侯者蓋當時别有長安君也張倉為計相計相主天下書計及計吏郃陽侯郃隂合在馮翊劉仲封也太上皇名執嘉一名瑞酇侯音嵯此在沛郡後代酇音贊在南陽也御史大夫汾隂侯周昌汾隂縣屬河東江邑食侯趙堯御史大夫江邑漢志闕蜀湔氐反湔音煎氐音柢蜀郡縣名也辟陽侯曹窋竹律反代王武景帝子後封梁遷嚴道死雍嚴道在蜀郡雍在扶風滕公卒汝隂侯夏侯嬰也為滕令故曰滕公芷陽鄉為霸陵芷音止又音昌改反地理志有芷陽縣名霸陵者以霸水為名也復作音伏句注並如字句又音鉤復土將軍復音伏屬國桿戶幹反亦作悍徐廣曰姓徐一名厲即祝兹侯修侯周亞夫修音條勃海有修市縣一作修御史大夫趙綰代衛綰御史大夫青翟姓莊李沮音子如反廟壖垣而戀反壖垣外垣短牆也因杅將軍音于因杅地名公孫敖也御史大夫式卜式也御史大夫寬兒寬也御史大夫卿王卿也御史大夫周杜周也太初元年改厯以正月為嵗首始用夏正也大始元年裴駰以為自天漢已後後人所續即禇先生所補也後史所記又無異呼故今不討論也武帝建元元年年之有號始自武帝凡十一號六建光六元光六元朔六元狩元鼎六和四太初六天漢四元封六後元一大始四四征凡五十年史記索隱卷七
