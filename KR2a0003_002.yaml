body:
  text: 史記索隱卷二唐司馬貞撰秦本紀第五女修女修顓頊之裔女吞乙子而生大業其父不著而秦趙以母族而祖顓頊非生人之義也按左傳郯國少昊之後而嬴姓蓋其族也則秦趙宜祖少昊氏大費扶味反一音祕尋費後以為氏則扶味反為得此則秦趙之祖嬴姓之先一名伯翳尚書為之伯益系本漢書謂之伯益是也尋檢史記上下諸文伯翳與伯益是一人不疑而陳把系家即敘伯翳與伯益為二未知太史公疑而未決邪而亦誤謬耳皂斿斿音旒謂賜以皂色旌斾之旒旒色與玄玉色副言其天功成也然其事亦當有所出將大出出猶生也言爾後嗣繁昌將大生出子孫也故左傳亦云晉公子姬出也鳥俗氏若木以仲衍鳥身人言故為鳥俗氏俗一作洛若木以王父字為費氏也費昌殷紂時費仲即昌之後也孟戲中衍舊解以孟戲仲衍是一人今以孟仲分字當是二人名也石北方石下無字則不成文意亦無所見必是史記本脫皇甫謐尚得其説徐雖引之而竟不云是脫何字専質之甚也處父蜚廉别號賜爾石棺言處父至忠國滅君死而不忘臣節故天賜石棺以光華其族事蓋非實譙周深所不信溫驪溫音盜徐廣亦作盜鄒誕生本作駣音陶劉氏音義云盜驪騧驪也騧淺黃色八駿既因色為名騧驪為得之也騄耳按穆王傳曰赤驥盜驪白義渠黃驊騮騟􅀈騄耳山子西畤襄公始列為諸侯自以居西畤西畤縣名故作西畤祠白帝畤止也言神靈之所依止也亦音市謂為壇以祭天也鄜畤音敷亦縣名於鄜地作畤故曰鄜畤故封禪書曰秦文公夢黃蛇自天而下屬之地止於鄜衍史敦以為神故立畤也陳寶按漢書郊祀志云文公獲若石云于陳倉北阪城祠之其神來若雄雉其聲殷殷云野雞夜鳴以一牢祠之號曰陳寶又臣瓚云陳倉縣有寶夫人祠嵗與葉君神會祭于此者也蘇林云質如石似肝云語辭也蕩社西戎之君號曰亳王蓋成陽之胤其邑曰蕩社徐廣云一作湯杜言湯邑在杜縣之界故曰湯杜也髙渠眯春秋魯桓公十七年左傳作髙渠彌也晉滅霍魏耿春秋魯閔公元年左傳云晉滅耿滅魏滅霍此不言魏史闕文耳又傳曰賜畢萬魏賜趙夙耿杜預曰霍在河東永安縣耿今河東皮氏縣耿鄉曲沃晉穆侯少子成師居曲沃號曲沃桓叔至武公稱滅晉侯緍始為晉君也梁伯芮伯梁嬴姓芮姬姓梁國在馮翊夏陽芮國在馮翊臨晉繆公秦自宣公已上皆史失其名今按系本古史考得繆公名任好共公名豭十代至靈公又並失名景公景公已下名又錯亂始皇本紀作哀公哀公始皇本紀作㻫公懷公厲共公子也靈公生獻公也獻公名師隰簡公昭之弟而懷公子簡公懷公弟靈公季父也始皇本紀云靈公生簡公誤也又紀年云簡公九年卒次敬公立十二年卒乃立惠公孝公名渠梁開阡陌風俗通曰南北曰阡東西曰陌河東以東西為阡南北為陌初為賦譙周云初為軍賦也雁門紀年云與魏戰岸門此云雁門恐聲誤也又下云敗韓岸門蓋一地也尋秦與韓魏戰不當逺至雁門也惠文君名駟齊魏為王齊威王魏惠王犀首官名若虎牙之類姓公孫名衍魏人也伐蜀蜀西南夷舊有君長故昌意娶蜀氏山女也其後有杜宇自立為王號曰望帝蜀王本紀曰張儀伐蜀蜀王開戰不勝為儀所滅之也公子通封於蜀華陽國志曰赧王元年秦惠王封子通國為蜀侯以陳莊為相徐廣所云亦據國志而言之武王名蕩昭襄王名則一名稷蜀侯輝反輝音暉華陽國志云秦封王子輝為蜀侯蜀侯祭歸胙於王後母疾之加毒以進王大怒使司馬錯賜輝劍此輝不同也涇陽君名市暴鳶韓將姓名魏公子徑韓公子長為諸侯别封之邑比之諸侯猶商君趙長安君然公子悝悝號髙陵君初封於彭昭襄王弟也以垣為蒲坂為當為易蓋字訛也尉斯離尉秦官斯離其姓名芒卯芒卯魏將譙周云孟卯也孝文王名柱五十三而立立一年卒葬夀陵莊襄王名子楚三十二而立立三年卒葬陽陵紀作四年始皇帝十三而立立三十七年崩葬酈山二世皇帝十二年立紀云二十一立三年葬宜春秦自襄公至二世凡六百二十七嵗此實本紀而注别舉之以非本文耳秦始皇本紀第六莊襄王莊襄王者孝文王之中子昭襄王之孫也名子楚按戰國策本名子異後為華陽夫人嗣夫人楚人因改名子楚也吕不韋姬按不韋傳云不韋陽翟大賈也其姬邯鄲豪家女善歌舞有娠而獻於子楚名為政姓趙氏系本作政又生於趙故曰趙政一曰秦與趙同祖以趙城為榮故姓趙氏蒙驁王齮麃公蒙驁齊人蒙武之父蒙恬之祖王齮即昭王二十九年代大夫陵伐趙者麃公蓋麃邑公史失其姓名畼音暢魏之邑名燕虛長平二邑名春秋桓十二年會于虛又戰國策曰拔燕酸棗虛桃人桃人亦魏邑虛地今闕蓋與諸縣相近按今東郡燕縣東三十里有故桃城則亦非逺夏太后莊襄王所生母臨洮臨洮在隴西將軍壁死卒屯留蒲鶮反戮其尸髙誘云屯留上黨之縣名謂成蟜為將軍而反秦兵擊之而蟜壁於屯留而死屯留蒲鶮一邑之反卒雖死猶皆戮其尸鶮古鸖字河魚大上謂河水溢魚大上平地亦言遭水害也即漢書五行志劉向所謂豕蟲之孽明年嫪毐誅魚隂類小人象輕車重馬東就食言河魚大上秦人皆輕車重馬並就食於東言往河旁食魚也一云河魚大上為災人遂東就食皆輕車重馬而去嫪毐嫪姓毐字按漢書嫪氏出邯鄲王劭云賈侍中説秦始皇帝母豫嫪毐淫坐誅故世人罵淫曰嫪毐也昌平君昌平君楚之公子立以為相後徙於郢項燕立為荆王史失其名昌文君亦不知也楊端和攻衍氏端和秦將衍氏魏邑什推二人言王翦為將諸軍中皆歸斗食以下無功佐史什中唯推擇二人令從軍耳不韋死竊葬按不韋飲鴆死其賔客數千人竊共葬於洛陽北芒山籍其門謂籍沒其一門皆為徒𨽻後並視此為常故也趙王趙王遷其王請降魏王假荆王荆王負芻也楚稱荆者以避莊襄王諱故易之也得齊王建六國皆滅也十七年得韓王安十九年得趙王遷二十二年魏王假降二十三年虜荆王負芻二十五年得燕王喜二十六年得齊王建綰劫綰姓王劫姓馬天皇地皇泰皇按天皇地皇之下即云泰皇當人皇也而封禪書云昔者太帝使素女鼓瑟而悲蓋三皇已前稱泰皇一云泰皇太昊也始皇推終始五德之傳音張戀反傳次也謂五行之德始終相次也漢書郊祀志曰齊人鄒子之徒論著終始五德之運始皇采用水德封禪書曰秦文公獲黑龍以為水瑞秦始皇帝因自謂為水德也六尺為步管子司馬法皆云六尺為步譙周以為步以人足非獨秦制又按禮記王制曰古者八尺為步今以周尺六尺四寸為步步之尺數亦不同合五德之數水主隂隂刑殺故急法刻削以合五德之數者也金人十二按二十六年有長人見於臨洮故銷兵器鑄而象之謝承後漢書銅人翁仲翁仲其名也三輔舊事銅人十二各重二十四萬斤漢代在長樂宫門前董卓壞其十鑄為錢餘二猶在石季龍徙之鄴苻堅又徙長安而銷之也極廟為宫廟象天極故曰極廟天官書曰中宫曰天極是也刻所立石其詞每三句為韻凡十二韻下之罘碣石會稽三銘皆然琅邪臺山海經琅邪臺在渤海間蓋海畔有山形如臺在琅邪故曰琅邪臺立石刻頌二句為韻摶心揖志搏古専字左傳云如琴瑟之摶一揖音集北過大夏協韻音户下無不臣者音渚澤及牛馬音姥倫侯爵卑於列侯無封邑者倫類也亦列侯之意隗林隗姓林名有本作狀者非顔之推云隋開皇初京師穿地得鑄稱權有銘云始皇時量器丞相隗狀王綰二人列名其作狀貌之字令校寫親所按驗王劭亦云然斯逺古之證也堯女列女傳亦以湘君為堯女按楚詞九歌有湘君湘夫人夫人是堯女則湘君當是舜今此文以湘君為堯女是總而言之登之罘刻石三句為韻凡十二韻承順聖意協韻音憶視聽不怠怠協旗疑韻音銅綦反故國語范蠡曰得時不怠時不再來亦以怠與臺為韻道上黨入道猶從也嘉平廣雅曰夏曰清祀殷曰嘉平周曰大蠟亦曰臘秦更曰嘉平蓋應歌謠之詞而改從殷號也茅盈內紀道書茅濛字初成今此云茅濛初成者為神仙之道其意失也蓋由裴氏所引不明或後人增益濛字遂令七言之詞有衍爾陸梁謂南方之人其性陸梁故曰陸梁取髙闕陶山北假中髙闕山名北假地名近五原徙謫實之初縣徙有罪而謫之以實初縣即上自榆中屬隂山以為三十四縣是也故漢七科謫亦因於秦阿房此以其形名宫也言其宫四阿旁廣也故云下可建五丈之旗也阿房後為宫名象天絶漢謂為復道渡渭屬咸陽象天文閣道絶漢抵營室也常考天官書曰天極紫宫後十七星絶漢抵營室曰閣道滈池君按服虔云水神是也江神以璧遺滈池之神告始皇之將終也且秦水德王故其君將亡水神先自相告也望于南海而刻石三句為韻凡二十四韻德惠修長修亦長也重文耳王劭按張徽所録會稽南山秦始皇碑文修作收追首髙明今檢會稽刻石文首字作道雅符人情也內飾詐謀刻石文謀作詐夫為寄豭豭牡豬也言夫淫他室若寄豭之豬也豭音加遐反江乘地理志丹陽有江乘縣年二十一十三而立以罪過連逮少近官三郎逮訓及也謂連及俱被捕故云連逮少小也近近侍之臣三郎謂中郎外郎散郎固不聞聲一作固聞聲言天子常處禁中臣下屬望才有兆朕聞其聲耳不見其形也采椽不刮采木名栝音刮土塯如字一音鏤不作簋土形飯器以瓦為之雖監門之養不觳于此謂監門之卒養即卒也有厮養卒觳音學謂盡也又古學反從長謂合關東為從長也望屋而食言其兵蠶食天下不裏糧而行橫行天下謂輕前敵不部伍旅進也舞陽侯曰橫行胸奴中是也豪俊相立謂武臣田儋魏豹之屬要市於外此評失也章邯之降由趙髙用事不信任軍將一則恐誅二則楚兵既盛王離見虜遂以兵降耳非三軍要市於外以求封明矣要平聲安土息民賈誼書安作案五序賈誼書五作王席卷按春秋緯曰諸侯氷散席卷也商君商君衛公孫鞅仕秦為佐庶長遂為秦制法孝公致霸封之於商號商君連衡戰國策曰蘇秦亦為秦連衡髙誘曰合關東從道之秦故曰連衡也約從離衡言孟嘗等四君皆為其國共相約結為從以離散秦之橫六國六國者韓魏趙燕齊楚是也與秦為七國亦謂之七雄又六國與宋衛中山為九國共三國蓋微又前亡寧越徐尚蘇秦杜赫寧越趙人徐尚未詳蘇秦東周洛陽人吕氏春秋杜赫以安天下説周昭文君髙誘曰杜赫周人也齊明周最陳軫昭滑樓緩翟景蘇厲樂毅戰國策齊明東周臣後仕秦楚及韓周最周之公子亦仕秦陳軫夏人亦仕秦昭滑楚人樓緩魏文侯弟所謂樓子也蘇厲秦之弟仕齊樂毅本齊臣入燕燕昭王以客禮待之以為亞卿翟景未詳也吳起孫臏帶他兒良王廖田忌廉頗趙奢吳起衛人事魏文侯為將孫臏孫武之後也春秋曰王廖貴先兒良貴後二人皆天下之豪士田忌齊將也廉頗趙將也趙奢亦趙之將執捶拊賈本論作稿朴斬華為城斬亦作踐賈本論又崔浩云踐登也陳利兵而誰何崔浩云何或為呵漢書儀宿衛郎官分五夜誰呵呵夜行者誰也何呵字同金城金城言其實且堅也韓子曰雖有金城湯池漢書張良亦曰關中所謂金城千里天府之國南面稱帝按賈誼過秦論以孝公已下為上篇秦兼并諸侯山東三十餘郡為下篇鄒誕生云太史公刪賈誼過秦論著此論富其義而省其辭褚先生增續既已混殽而世俗小智不唯刪省之旨合寫本論於此不同也今頗不可分别寒者利裋褐趙岐曰褐以毛毳織之若馬衣或以褐編衣也裋一首豎為褐布豎裁為勞役之衣短而且狹故謂之短褐亦曰豎褐襄公立享國十二年初為西畤葬西垂此已下重序列秦之先君立年及葬處皆當據秦紀為説與正史小有不同今取異説取列於後襄公秦仲孫莊公子救周周始命為諸侯初為西畤祠白帝立十三年葬西土生文公文公立居西垂宫五十年死葬西垂在鄜畤又作陳寶祠生靜公靜公不享國而死生憲公憲公享國十二年居西新邑死葬衙憲公滅蕩社居新邑葬衙本紀憲公徙居平陽葬西山生武公德公出子出子享國六年居西陵一云居西陂葬衙本紀不云庶長弗忌威纍參父三人率賊賊出子鄙衍葬衙武公立武公享國二十年居平陽封宫葬宣陽聚東南紀云葬平陽初以人從死三庶長伏其罪德公立德公享國二年居雍大鄭宫生宣公成公繆公葬陽初伏以御蠱二年初伏本紀此已下居葬絶不言也宣公享國十二年居陽宫葬陽四年作密畤初志閏月成公享國四年居雍之宫葬陽齊伐山戎孤竹繆公享國三十九年天子致霸葬雍繆公學著人著音寧又音貯著即寧也門屏之間曰寧謂學於寧門之人故詩云俟我於著乎而是也生康公康公享國十二年居雍髙寢葬竘社生共公共公享國五年居雍髙寢葬康公南生桓公桓公享國二十七年居雍太寢葬義里丘北生景公一作僖公系本云名后伯車景公享國四十年居雍髙寢葬丘里南生畢公畢公享國三十六年葬車里北生夷公夷公不享國死葬左宫生惠公惠公享國十年葬車里康景生悼公悼公享國十五年葬僖公西城雍生刺龔公一作厲共公刺龔公享國三十四年葬入里生躁公又作䟃公懷公其十年彗星見躁公享國十四年居受寢葬悼公南其元年彗星見懷公從晉來享國四年葬櫟圉氏生靈公諸臣圍懷公懷公自殺肅靈公昭子子也紀年及系本無肅字立十年表同紀十二年居涇陽享國十年葬悼公西生簡公簡公從晉來享國十五年葬僖公西按本紀簡公名悼子即刺龔公之子懷公弟也且紀及系本皆以為然今此文云靈公謬也立十六年葬僖公西生惠公其七年百姓初帶劍惠公享國十三年葬陵圉王劭按紀年云簡公後次敬公敬公立十三年乃至惠公辭即難慿時參異説生出公出公享國二年系本謂少主出公自殺葬雍獻公享國二十三年系本稱元獻公立二十二年表同紀二十四年葬囂圉生孝公孝公享國二十四年本紀十二年葬弟圉生惠文王其十三年始都咸陽惠文王享國二十七年十九而立葬公陵生悼武王悼武王享國四年葬永陵系本作武烈王十九年而立立三年本紀四年昭襄王享國五十六年葬茝陽十九年而立葬芷陵也生孝文王孝文王享國一年葬夀陵生莊襄王莊襄王享國三年葬茝陽生始皇帝吕不韋相獻公立七年初行為市十年為戶籍相伍孝公立十六年時桃李冬華惠文王生十九年而立立二年初行錢有新生嬰兒曰秦且王悼武王生十九年而立立三年渭水赤三日昭襄王生十九年而立立四年初為田開阡陌孝文王生五十三年而立莊襄王生三十二年而立立二年取太原地莊襄王元年大赦修先王功臣施德厚骨肉布惠於民東周與諸侯謀秦秦使相國不韋誅之盡入其國秦不絶其祀以陽人地賜周君奉其祭祀始皇享國三十七年葬酈邑生二世皇帝始皇生十三年而立二世皇帝享國三年葬宜春趙髙為丞相安武侯二世生十二年而立右秦襄公至二世六百一十嵗孝明皇帝十七年十月十五日乙丑曰此己下是漢孝明帝訪班固評賈馬贊中論秦二世亡天下之得失後人因取其説附之此末周厯已移仁不代母秦直其位周厯已移周亡也仁不代母謂周得木德木生火周為漢母也言厯運之道仁恩之情子不代母而王謂火不代木言漢不合即代周也秦值其閏位得在木之間也此論者之辭也吕政殘虐然以諸侯十三吕政者始皇名政是吕不韋幸姬有娠獻莊襄王而生始皇故云吕政并兼天下極情縱欲養育宗親三十七年兵無所不加制作政令施於後王蓋得聖人之威河神授圖據狼狐蹈參伐佐政驅除距之稱始皇始皇既歿胡亥極愚酈山未畢復作阿房以遂前策云凡所為貴有天下者肆意極欲大臣至欲罷先君所為誅斯去疾任用趙髙痛哉言乎人頭畜鳴不威不伐惡不篤不虛亡距之不得留殘虐以促期雖居形便之國猶不得存子嬰度次得嗣冠玉冠佩華紱車黃屋從百司謁七廟小人乘非位莫不恍忽失守偷安日日獨能長念却慮父子作權近取於户牖之間竟誅猾臣為君討賊髙死之後賔婚未得盡相勞餐未及下咽酒未及濡脣楚兵已屠關中真人翔霸上素車嬰組奉其符璽以歸帝者鄭伯茅旌鸞刀嚴王退舍河決不可復壅魚爛不可復全宋均曰言如魚之爛從內而出賈誼司馬遷曰向使嬰有庸主之才僅得中佐山東雖亂秦之地可全而有宗廟之祀未當絶也秦之積衰天下土崩瓦解雖有周旦之材無所復陳其巧而以責一日之孤誤哉俗傳秦始皇起罪惡胡亥極得其理矣復責小子云秦地可全所謂不通時變者也紀季以酅春秋不名吾讀秦紀至於子嬰車裂趙髙未嘗不健其決憐其志嬰死生之義備矣史記索隱卷二
