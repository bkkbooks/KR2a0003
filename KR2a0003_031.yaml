body:
  text: 讀史家多尚索隠宋諸儒尤推小司馬史記與小顔氏漢書如日月並炤故淳􅳹咸湻間官本頗多廣漢張介仲削去褚少孫續補諸篇以索隠為附庸尊正史也趙山甫病非全書取所削者别刋一帙澄江耿直之又病其未便流覽以少孫所續循其卷第而附入之雖桐川郡有三刻惟耿本最精余家幸藏桐川本有二擬從張本恐流俗染人之深難免山甫之嫌擬従耿本恐列三皇本紀為冠大非太史公象潤餘而成嵗之數遂訂裴駰集解而重新焉每讀至舛逸同異處如宰我未嘗従田横之類輒不能忘情于小司馬幸又遇一索隠单行本子凡三十卷自序綴于二十八卷之尾後二卷為贊述為三皇本紀迺北宋秘省大字刋本晉亟正其譌謬重脱附于裴駰集解之後真讀史第一快事也倘有問張守節正義者有王震澤先生行本在古虞毛晉識按汴本釋文演注與桐川郡諸刻微有不同如鄭徳作鄭𤣥劉氏作劉兆姓氏易曉其訛如詩含神霧援引書目豈得作時含神霧但樂彥通本作樂産未知何據高祖本紀中人乃以嫗為不誠欲笞之諸本皆然漢書作欲苦之茲本獨作欲告之此類頗多不敢妄改至如世家世本俱作系家系本避李唐諱也後人輒為改易小司馬能無遺憾耶晉又識史記索隠後序
