body:
  text: 史記索隱卷二十三唐司馬貞撰張丞相列傳第三十六陽武人按縣名屬陳留柱下方書周秦皆有柱下史謂御史也所掌及侍立恆在殿柱之下史謂御史故老子為周柱下史今蒼在秦代亦居斯職方書者如淳以為方技謂小事書之於方也或曰主四方文書也姚氏以為下云明習天下圖書計籍主郡上計則方為四方文書是也伏質小顏云質椹也為主計謂改計相之名更名主計也此蓋權時立號也為職志官名也職主也志旗也謂掌旗幟之官也音昌志反東廂韋昭曰殿東堂也小顔云正寢之東西室皆號曰箱言似箱篋之形幾廢上音祈不知所出謂不知其計所出也極知其左遷按諸侯王表云左官之律韋昭以為左猶下也禁不得下仕於諸王也然按地道尊右右貴左賤故謂貶秩為左遷他皆此類也注諡悼按漢書列傳及表咸言周昌諡悼韋昭云或諡惠非也漢書又曰傳子至孫意有罪國除景帝復封昌孫左車為安陽侯有罪國除若百工按晉灼說以為若預及之辭為得也注文帝二年皆徐氏據漢書為說而誤云二年裴駰又引任安書證為得其實子康侯代按漢書云傳子至孫毅有罪國除今此云康代八年子類代侯則毅即類也與漢書略同也材官蹶張孟康曰主張強弩又如淳曰材官之多力能踏强弩張之故曰蹶張蹶音其月反漢令有蹶張士百人是也隊率所類反壖垣如淳音畏懦之懦乃喚反韋昭音而緣反又音軟故他官居其中漢書作冗官謂散官也娖娖側角反小顔云持整之貌漢書作􅐅􅐅音初角反注一作斷一作􅐅上斷音都亂反義如尚書斷斷猗無他技一作􅐅則漢書文也韋丞相自車千秋以下皆褚先生等所記然丞相傳都自省略漢書則備繁君繁姓也音婆太史公曰深惟按此論匡衡已來事則後人所述也而亦稱太史公其序述淺陋一何誣也酈生陸賈列傳第三十七髙陽人按髙陽屬陳留圉縣髙陽鄉名也故耆舊傳云食其高陽鄉人落魄按鄭氏云魄音薄應邵云志行衰惡之貌也握齱應劭曰齱音若促鄒氏音粗角反韋昭云握齱小節也好苛禮按苛亦作荷賈逵云苛煩也小顔云苛細也適食其里中子適音釋服䖍蘇林皆云沛公騎士適是食其里中人也按言適近作騎士莫為我先按先謂先容言無人為我作介紹也溲溺上所由反下乃弔反亦如字溲即溺也踞牀洗按樂彥云邉牀曰踞豎儒按豎者僮僕之稱沛公輕之以比奴豎故曰豎儒也王者以人為天按此語出管子工女謂女工工巧也漢書作紅音功適卒上音直革反按通俗文云罰罪云謫即所謂謫戍又音陟革反卒租忽反漢反却自奪便以言不取敖倉是漢却自奪其利便方船按方船謂並舟也戰國策方船積粟循江而下也刓而不能授上音五官反按郭象注莊子云杬團無圭角漢書作玩言玩惜不忍授人也破北魏謂魏豹也豹在河北故也亦謂西魏以大梁在河南故也子疥音界更後封武遂三世地理志武遂屬河間按漢書作武陽子遂衍文也陸賈楚人按陳留風俗傳云陸氏春秋時陸渾國之後晉侯伐之故陸渾子奔楚賈其後又陸氏譜云齊宣公支子逹食采於陸達生發發生臯適楚賈孫也尉他趙他為南越尉故曰尉他他音駝魋結上直追反下音計謂為髻一撮似椎而結之故字從結按其魋結二字依字讀之亦得謂夷人本被髮左袵今化同其風俗但魋其髮而結之真定趙地也本名東恆屬常山抗衡按崔浩云抗對也衡車扼上橫木也抗衡言兩衡相對拒言不相避下蹶然蘇林音厥禮記子夏蹶然而起埤蒼云蹶起也何渠劉氏音詎漢書作遽字小顔以為有何迫促不如漢也橐中裝音托按如淳云以為明珠之屬也又按詩傳曰大曰橐小曰囊埤蒼云有底曰囊無底曰橐謂以寶物以入囊橐也卒滅趙氏按韋昭云秦伯益後以趙同出非亷至造父有功於穆王封之趙城由此一姓趙氏率不過上音律下音戈數見不鮮上朔現二音謂時時來見汝也不鮮言必令鮮美作食莫令見不鮮之物也漢書作數擊鮮如淳云新殺曰鮮無久慁公為慁患也公賈自謂也言汝諸子無久厭患公也深念深念深思之也食三萬户按陳平傳食户五千以曲逆秦時有三萬户恐復業至此故稱梁父侯史失名如淳注漢書云遂布臣非也臣瓚曰布不用梁父侯計遂反耳其說是也發喪按劉氏云謂欲葬時須啓其殯宮故云發喪也義不知君按崔浩云建以母在義不以身許人也百金往稅按說文稅贈終服也音式芮反亦音遂閎籍按佞幸傳云髙祖時有籍儒孝惠時有閎儒今總言閎籍儒誤也諸吕至深按如淳說以為宜誅非也小顔云辟陽侯與諸吕相知至深重得其理也召其子為太中大夫按下文所謂與太史公善者傅靳蒯成列傳第三十八起橫陽按橫陽邑名在韓韓公子成初封橫陽君張良立為韓王也共德君謂號耳非地邑共音恭食邑雕隂按孟康徐廣云縣名屬上郡待懷按服䖍云待髙祖於懷縣小顔按地理志屬河內今懷州也屬淮隂張晏云信時為相國云淮隂者終言之也殘博博太山縣也顔祕監云屬曹參以殘破博縣也為代丞相將屯如淳云漢初諸王官屬如漢朝故代有丞相按孔文祥云邉郡有屯兵寬為代相國兼領屯兵後因置將屯將軍也靳歙音翕然之翕也邢說軍邢姓說名音悅菑南上音災今之考城屬濟隂也趙將賁郝軍漢書作趙賁軍按此在河北非曹參樊噲之所擊也東至繒按地理志繒屬東海江陵王按孔文祥云敖子共尉也蘄竹二邑名上音機竹即竹邑狶丞相敞破之小顔云侯敞事國人過律按劉氏云役使也謂使人違律數多矣蒯成侯緤者姓周名緤緤音辥蒯者鄉名按三倉云蒯鄉在城父漢書作䣙字從崩從邑今書本並作蒯音管蒯之蒯蘇音苦催反晉灼按功臣表屬長沙崔浩音苦壞反楚漢春秋作憑成侯則陪憑聲相近或得其實也注緤子應為鄲侯蘇林音多屬陳留地理志云沛郡有多縣按此文云子居表云子應不同也操心音倉髙反劉敬叔孫通列傳第三十九劉敬本姓婁漢書作婁敬高祖曰婁即劉也因姓劉耳脫挽輅挽者牽也音晚輅者鹿車前橫木二人前挽一人後推之音胡格反鮮衣上音仙鮮衣美服也附離按謂使離者相附也義見莊子天府按戰國䇿蘇秦說惠王曰大王之國地勢形便此所謂天府髙誘注云府聚也扼其亢扼音厄亢音胡朗反一音胡剛反蘇林以為亢頸大脉俗字謂胡脉即日駕西按謂即日西都之計定也奉春君按張晏云春為嵗之始以其首謀都關中故號奉春君羸瘠上力為反下音稷瘠瘦也漢書作胔音漬胔肉也恐非沮吾軍沮才叙反詩傳曰沮止也壞也擊敬廣武地理志縣名屬雁門河南白羊樓煩王按張晏白羊國名二者並在河南按在朔方之河南舊竝胸奴地秦亦謂新秦中也徙所言十餘萬口按小顔云今高陵櫟陽諸田華隂好畤諸景及三輔諸屈諸懷尚多皆此時所徙叔孫通者辥人按楚漢春秋云名何辥縣名屬魯國也衣一襲按國語云一稱賈逵按禮記袍必有表單衣必有裳謂之一稱杜預云衣單復具云稱也楚製按孔文祥云短衣便事非儒者衣服高帝楚人故從其俗裁製大猾按類集云猾狡也音滑搴旗上音起焉反又已勉反按方言云南方取物云搴許慎云搴取也注阰之按王逸云阰山名又按埤蒼云在楚地綿蕞徐音子外反如淳云剪茅樹地為纂位尊卑之次蘇林音纂韋昭云引繩為綿立表為蕞音兹會反注茅蕝按賈逵云束茅以表位為蕝又纂文云蕝今之纂字包愷音即悅反又音纂習肄肄亦習也音異朝十月儀按小顔云漢以十月為正故行朝嵗之禮史家追書十月也按諸書云十月為嵗首不言以十月為正月古今注亦云羣臣始朝十月也傳言趨按小顔云傳聲教入者皆令趨趨疾行為敬也九賔臚傳漢書云設九賔臚句傳蘇林云上傳語告下云臚下傳語上云句臚猶行者矣韋昭云大行人掌賔客之禮今謂之鴻臚也九賔則周禮九儀也謂公侯伯子男孤卿大夫士也漢依此以為臚傳也以次傳令上也向秀注莊子云從上語下曰臚音閭句音九注反輦出房按輿服志云殷周以輦載軍器職載芻豢至秦始去輪而輿為尊也報職傳警上職音􅀈亦音試傳警漢儀云帝輦動則左右侍帷幄者稱警是也置法酒按文頴作酒法令也姚氏云進酒有禮也古人飲酒不過三爵君臣百拜終日宴不為之亂也攻苦食啖按孔文祥云與帝共攻冒苦難俱食淡也按說文云淡薄味也音唐敢反願先誅楚漢春秋蕭何云臣三諌不從請以身當之撫劒將自殺上離席云吾定計不易太子間往數蹕韋昭云蹕止人行也按長樂未央宫東西相去稍逺間往謂非時也中間往來清道煩於人也過舉按謂舉動有過也傳云君不舉不書櫻桃按吕氏春秋仲春羞以含桃先薦寢廟髙誘云進含桃也鶯鳥所含故曰含桃今之朱櫻即是也若詘音屈委蛇蛇音移季布欒布列傳第四十任俠上而禁反下音協如淳曰相與信為任同是非為俠權行州里力折公侯者其說為近注俠俜下音普丁反其義難喻廣柳車按服䖍臣瓚所據云東郡謂廣轍車為廣柳車及茂陵書稱每縣廣柳車數百乘則凡大車任載者通名廣柳車然則柳為車通名鄧展所說柳皆棺飾載以喪車欲人不知也事義相協最為通允故禮曰設柳翣為使人勿惡也鄭𤣥注周禮云柳聚也諸飾所聚也則是喪車稱柳後人通謂車為柳也乘軺車按謂輕車一馬車也使酒難近使音如字近音其靳反使酒謂因酒縱性謂之使酒即酗酒也無功竊寵季布言已無功能竊承恩寵得待罪河東其詞典省而文也數招權顧金錢義如孟康文穎所說辜較姑角二音袁絲盎字絲中司馬漢書作中尉之司馬竊籍其名籍音子亦反布母弟丁公按謂布之舅也為家人時謂居家之人無官職趣亨上音促下音普盲反謂疾命赴鑊也提趣上音啼下音趨趣湯上音娶徐廣云一作走走趣向之也身履軍按徐氏云一作覆按下云搴旗則覆軍為是勝於屢之與履袁盎鼂錯列傳第四十一袁盎音如周禮盎音烏浪反主在與在按如淳云人主在時與共理在時之事也亡與亡如淳云不以人主亡而不行其政令按如說為得上益莊莊嚴也賁育賁孟賁育夏育也尸子云孟賁水行不避蛟龍陸行不避兕虎戰國策曰夏育叱呼駭三軍身死庸夫髙誘曰育為申繻所殺賁音奔也常侍騎按漢書儀云持節夾乘輿車騎從者云常侍騎不垂堂按張揖云恐簷瓦墮中人或云臨堂邊垂恐墮墜也不騎衡張晏云木衡馬也如淳云騎音於歧反衡樓殿邊欄楯也韋昭云衡車衡也騎音倚謂跨之按如淳之說為長也注欄楯按纂要云宫殿四面欄縱者云檻橫者云楯也治之有絶按謂有絶吳反心也辟吾親按張晏云辟隱也言自隱辟親不使遇禍也刀决張按帳軍幕也决之以出也不以親為解按謂不以親為辭也今此云解者亦謂不以親在而自解其後語塞按鄒氏云塞當作露非也按以盎言不宜立弟之義其後立梁王之語塞絶也棓生文穎云棓音陪韋昭云棓姓也鼂錯上音朝下音厝一如字讀按朝氏出南陽今西鄂朝氏謂子朝之後也軹張恢生所軹縣人張恢先生所學申商之法掌故服䖍云百石卒吏漢舊儀云太常博士弟子試射策中甲科補郎中乙科補掌故也注術岸髙按韋昭云本無術字或云術道路也曰峭七笑反峭峻也壖垣上音乃戀反謂墻外之短垣也又音而緣反噤口上音其錦反又音其禁反張釋之馮唐列傳第四十二堵陽韋昭音赭又音如字地名屬南陽訾音子移反字苑云資積財也卑之無甚髙按卑下也欲令且卑下其志無甚高談論但令依時事無說古逺也上林尉漢書表上林有八丞十二尉百官志尉秩三百石諜諜音牒漢書作喋喋口多言徒文具按謂空具其文而無其實也北臨厠劉氏音初吏反按李竒曰霸陵北頭厠近霸水蘇林曰厠邉側也包愷音側義亦兩通也此走音奏按走猶向也猗瑟上音於綺按謂歌聲合於瑟聲相依倚也紵絮上張吕反下息慮反斫陳絮漆其間斫音側略反絮音女居反按斫陳絮以漆著其間也錮南山按張晏錮鑄也帝北向故北山回顧向南故云南山今按大顔云北山青石肌理密堪為碑槨至今猶然故秦本紀作阿房或作酈山石槨是也故帝欲北山之石為槨取其精牢釋之答言但使薄葬冢中無可貪雖無石槨有何憂焉若使厚殉冢中有物雖并錮南山猶為人所發掘也言南山者取其髙厚之意張晏殊失其旨也出中渭橋張晏臣瓉之說皆非也按今渭橋有三所一所在城西北咸陽路曰西渭橋一所在東北髙陵道曰東渭橋其中渭橋在古城之北也公共也小顔云公謂不私也廷尉當是按崔浩云當謂處其罪也按百官志云廷尉平刑罰奏當所應郡國讞疑罪皆處當以報之也以法奏之按法者依律以斷也一抔音步侯反按禮運云汙尊而抔飲鄭氏云抔手抔之字從手字本或作杯言一勺一杯兩音並通又音普回反坯者磚之未燒之名也注一壞土張晏云不欲指言故以取土譬者蓋不欲言盜開長陵及說傷迫近先帝故也釋之恐謂帝為太子時與梁王入朝不下司馬門釋之曾劾故恐也結襪上音如字又音計取容當世謂性公直不能曲屈見容於當世故至免官不仕也為中郎署長按謂為郎署之長也輦過下音戈謂文帝乘輦曽過郎署何自為郎按崔浩云自從也帝訪唐何從為郎又小顔云年老矣乃自為郎怪之也為官卒將按國語闔閭卒百人為徹行行頭皆官將徐廣云一云官士將也注百人為徹行將帥按國語百人為徹行行頭皆官師賈逵云百人為一隊也官師隊大夫也唐曰主臣按樂彥云人臣進對前稱主臣猶上書前云昧死按志林云馮唐面折萬乘何言不懼主臣為驚怖其言益著也又魏武謂陳琳云卿為本初檄何乃言及上祖琳謝云主臣益明主臣是驚怖也解已見前志也朝那上音朝早也下音乃何反縣名屬安定也都尉卭按都尉姓孫名卭注撅音其月反軍市之租按謂軍中立市市有稅稅即租也選車按六韜書有選車之法彀騎萬三千如淳云彀音構彀騎張弓之騎也百金之士晉灼云百金取其貴重也服䖍曰良士直百金也劉氏云其功可賞百金者事見管子及爾雅東胡按崔浩云烏丸之先也國在胸奴之東故云東胡也淡林上丁甘反一本作檐檻趙幾霸幾音祈其母倡也按列女傳云邯鄲之倡郭開按開是趙之寵臣戰國策云秦多與開金使為反間顔聚音以喻反漢書作最本齊將也私養錢按漢書市肆租稅之入為新私奉養如淳云廪假錢也云官所别廪給也五日一椎牛椎音直追反擊也尺籍伍符按尺籍者謂書其斬首之功於一尺之版伍符者命軍人伍伍相保不容奸詐注故行不行按謂故命人行而身不自行奪勞二嵗也故與雇同莫府按莫訓大也又崔浩云古者出征無常處以幕為府舍故云莫府莫當為幕古字少耳不相應音乙陵反按謂數不同也萬石張叔列傳第四十三馴行音巡戚里小顔云此上有姻戚者皆居之故名其里為戚里長安記戚里在城內譙讓上才笑反譙讓責讓為便坐上于僞反下便音婢綿反蓋謂為之不處正室别坐他處故曰便坐坐音如字便坐非正坐處也故王者所居有便殿便房義亦然也音婢見反亦通也雖燕燕謂閒燕之時燕安也入子舍按劉氏謂小房內非正室也小顔以為諸子之舍若今諸房也中裙厠牏按親謂父也中裙近身衣也蘇林曰牏音投又音豆孟康曰厠行清牏行清中受糞函也言建又自洗蕩厠竇竇者洗除檅汙之穴也又晉灼云今世謂反開小袖衫為侯牏此最厠近身之衣而徐廣云牏短板以築築厠墻也未知其義何從恐非也陵里按小顔陵里里名在茂陵非長安之戚里也注趙同坐酎金按漢書而知也無名數四十萬按小顔云無名數若今之無户籍歸難乎音乃彈反言欲歸於何人建陵侯地理志縣名在代戲車按應劭云能左右超乘按今亦有弄車之戲注櫟機轊櫟音歷謂超踰之也轊音衛謂車轂頭不噍呵誰何二音誰何猶借訪也一作譙呵譙責讓也言不嗔責綰也施易上音移下音亦無他腸小顔云心腸之內無他惡也誅栗卿栗姬之兄弟蘇林云栗太子之舅也如職所奏以言但守職分而已不别有所奏議也塞侯直不疑按塞國名今桃林之塞也直姓也不疑名也與雋不疑同字妄意不疑謂妄疑其盜取將也善盜嫂按小顔云盜謂私之仁為人隂重不泄常衣弊補衣溺袴按其解二各有理服䖍云周仁性質重不泄人之隂謀也小顔云隂密也為性密重不泄人言也霍去病少言不泄亦類也其人又常衣弊補衣及溺袴故為不潔清之服是以得幸入卧內也又張晏云隂重不泄隂下溼故溺袴是以得比宦者出入後宫也仁有子孫者先未得此疾病所生也二者未知誰得其實也期為不潔清謂心中常期不潔之服則期是故之意也小顔亦同祕戲謂後宫中戲劇所宜祕也張歐音烏後反漢書作歐孟康音驅也安丘侯說音悅治刑名言按劉向别録云申子學號曰刑名家者循名以責實其尊君卑臣崇上抑下合於六經也說者云刑名家即太史公所說六家之一也塞侯功微而周文處讇按直不疑以吳楚反時為二千石將景帝封之功微也周文處讇者為郎中令也隂重得幸出入卧內也田叔列傳第四十四田叔按下文字少卿陘城人音刑按縣名也屬中山樂巨公本燕人樂毅之後蟲出按謂死而蟲出也左傳齊桓公死未葬蟲流於户外是也搏二十音博㬥坐上音步卜反將車將車猶御車也因占著名數言卜占而自占著家口名數隸於武功猶今附籍然也占音之豔反無豪易髙也易音以豉反言邑小無豪易得高名也為詳耶詳音羊謂詐受節不發兵不傅會太子也不傅事可也傅音附謂不附會也鮮好者上音仙謂太子請其鮮好之兵甲也史記索隱卷二十三
