body:
  text: 史記索隱卷二十一唐司馬貞撰吕不韋列傳第二十五陽翟音狄俗又音宅地理志縣名屬潁川按戰國策以不韋為濮陽人又記其事迹亦多與此傳不同班固雖云太史公採戰國策然為此傳當别有所聞見故不全依彼説或者劉向定戰國策時以己異聞改彼書遂令不與史記合也大賈音古鄭玄注周禮云行曰商處曰賈賣貴王劭賣音作育按育賣義同今依義安國君名柱後立是為孝文王也名子楚即莊襄王也戰國策曰本名異人後趙還不韋使以楚服見王后悅之曰吾楚人也而子字之乃變其名曰子楚也質舊音致今讀依此穀梁傳曰交質不及二伯左傳曰信不由中質無益也孽孫韓信傳亦曰韓信襄王孽孫張晏曰孺子曰孽何休注公羊孽賤子也以非嫡正故曰孽車乘進用按下文云五百金為進用宜依小顔讀為賮才刃反進者財也古字假借之也與坐深語謂既解不韋所言之意遂與密謀深語之也毋幾得與長子毋音無幾音冀望也左傳曰日月以幾戰國策曰子傒承國之業高誘注云子傒秦太子異人之異母之兄弟也舉立以為適而子之以此為一句子謂養之為子也然欲分立以為適作上句而子之夫在則尊重作下句並通也間從容上音間句容音七恭反並通也絶好善舞言其姿容絶美而又善舞釣奇釣者以取魚喻也奇即上云此奇貨可居也至大期徐廣云十二月也譙周云十月生此過二月故云大期蓋當然也既云自匿有娠則生政固當踰常期也所母華陽君劉氏本作所生母生衍字也今檢諸本並無生字丞相下文尊為相國按百官表曰皆秦官金印紫綬丞天子助理萬幾秦置左右高帝置一後更名相國哀帝更名大司徒食河南雒陽戰國策曰食藍田十二縣而秦本紀莊襄王元年置三川郡地理志高祖更名河南此秦代而曰河南者史記後作據漢郡而言之耳魏有信陵按王劭云孟嘗平原死稍在前信陵將五國兵攻秦河外正當在莊襄王不韋己為相又春申與不韋並時各相向十餘年不得言死之久矣八覽六論十二紀八覽者有始孝行慎大先識審分審應離俗時君也六論者開春慎行貴直不茍以順士容也十二紀者記十二月也其書有孟春等紀二十餘萬言二十六卷也咸陽地理志右扶風渭城縣故咸陽髙帝更名新城景帝更名渭城按咸訓皆其地在渭水之北北陂之南水北曰陽山南亦曰陽皆在二者之陽也葬芷陽芷音止地理志京兆霸陵縣云故芷陽按在長安東杜東杜原之東後百年旁當有萬家邑按宣帝元康元年起杜陵漢舊儀武昭宣三邑陵皆三萬戶計去此一百六十餘年也注窶人子劉氏其矩反今俗本多作屢字蓋相承錯耳不近詞義今按説苑作窶子言輕諸侍中以為窮窶家之子也遷太后雍按説苑云遷太后棫陽宫地理志説雍縣有棫陽宫秦昭王所起沒其家家謂家産資物並沒入官人口則遷之蜀也諡為帝太后王劭云秦不用諡法此蓋號耳其義亦當然也始皇稱皇帝之後故其母號為帝太后豈謂纍列生時之行乎嫪毐貴封號文信侯按文信侯不韋封也嫪毐封長信侯上文已言不韋封訖此贊中言嫪毐得寵貴由不韋耳今此合作長信侯也斬之好畤地理志扶風有好畤縣也刺客列傳第二十六曹沫亡葛反左傳穀梁並作曹劌然則昧宜音沫劌聲相近而字異耳此作曹沫事約公羊為説然彼無其名直云曹子而已且左傳魯莊十年戰于長勺用曹劌謀敗齊而無劫桓公之事十三年嬰盟于柯公羊始論曹子榖梁此年惟云曹劌之盟信齊侯也又具不記行事之時遂匕首匕音比劉向云短劍也鹽鐵論以為長尺八寸其頭類匕故云匕首也曰子將何欲公羊傳曰管子進曰君何求何休云桓公卒不應管仲進為言之也欲倍之倍音佩也專諸專字亦作剸音同左傳作鱄設諸常邑人地理志臨淮有常邑縣內志言其將有內難弒君之志且對外専生文吳世家曰知光有他志餘祭祭音則界反夷昧亡葛反公羊作餘末九年楚平王卒春秋二十六年楚子居卒是也吳世家云十二年此云九年並誤據左傳合在僚之十一年也蓋餘屬庸屬音燭二子僚之弟也左傳作掩餘屬庸掩蓋義同屬燭字相亂耳圍楚之潛事在魯昭二十七年地理志廬江有潛縣天柱山在南音潛杜預左傳注云潛楚邑在廬江六縣西南也母老子弱左傳直注云王可殺也母老子弱是無若我何則是専設諸度僚可殺言其少援救故云無奈我何太史公採其意且據上文因復加與兩弟將兵外困之辭而服虔杜預見左氏下文云我爾身死以其子為卿遂強解是無四月丙子注僚之十二年夏也吳系家以為十三年非也左氏經傳唯言夏四月公羊榖梁無傳經更與左氏吳系家同此傳稱丙子當有所據不知出何書伏甲士左傳曰伏甲謂甲士也下文云出其伏甲以攻王長鈹音披兵器也劉逵吳都賦注鈹兩刃小刀詳為上音陽下如字左傳曰光偽足疾此云詳詳則偽也或讀此為字音偽非也豈詳偽重言耶匕首刺七賜反豫讓晉人按此傳所説皆約戰國策文事范氏及中行氏按左傳范氏謂昭子吉射也自士會食邑於范後因以邑為氏中行文子荀寅也自荀林父將中行後因以官為氏智伯按智伯襄子荀瑤也襄子林父荀首之後范中行智伯事已具趙系家最怨智伯初則醉以酒後又率韓魏水灌晉陽城不沒者三版故怨之也漆其頭為飲器按大宛傳曰胸奴破月氐王以其頭為飲器裴氏注彼引韋昭云飲器椑榼也晉灼曰飲器虎子也皆非椑所以盛酒耳非用飲者晉氏以為褻器者以韓子吕氏春秋並云襄子漆智頭為溲杅故云卒醳上足律反下音釋字亦作釋漆身為癘癘音賴賴惡癘疾病也凡漆有毒近之多患瘡腫若賴病然故豫讓以漆塗身令其若癩耳然厲賴聲相近古多假厲為賴今之癩字從疒故楚有賴鄉亦作厲字戰國策説此亦作厲字吞炭為啞啞烏啞反謂瘖病戰國策云漆身為厲滅髮去眉以變其容為乞食人其妻曰狀貌不似吾夫何其音之甚相類也讓遂吞炭以變其音也乃為所欲謂因得殺襄子顧不易耶顧反也耶不定之辭反不易邪言其易也吾所為者劉氏云謂令為癘啞也所以為此者言寧為厲而自刑不可求事襄子而行殺則恐傷人臣之義而近賊非忠也三躍而擊之戰國策曰衣盡血襄子回車之輪未周而亡此不言衣出血者太史公恐涉怪妄故略之耳軹深井里人地理志河內有軹縣深井軹縣之里名也嚴仲子高誘曰嚴遂字仲子事韓哀侯按聶政殺俠纍在列侯三年後次文侯後次哀凡三代哀侯六年為韓嚴所殺今言仲子事哀侯恐非其實且太史公聞疑傳疑事難的據欲使兩存故表傳各異韓相俠纍上古夾反下力追反按戰國策俠纍名傀也有郤戰國策云韓傀相韓嚴遂重於君二人相害嚴遂拔趙以救解是有郤之由也自暢徐氏云一作賜按戰國策作觴近為得也甘毳鄭氏音脆二義相通也降志辱身言其心志與身本應高潔今乃卑下其志屈辱其身論語孔子謂栁下惠降志辱身矣未敢許人禮記曰父母存不許友以死韓衛間不甚逺髙誘曰韓都潁川陽翟衛都東郡濮陽故曰間不逺也不能無生得戰國策作無生情言所將人多或生異情故語泄此云生得言將多人往殺俠纍後又被生擒而事泄亦兩俱通也刺殺俠纍戰國策曰政直入上階刺韓傀傀走而抱哀侯聶政刺之兼中哀侯注戰國策有東孟之會按高誘曰東孟地名也為讎徐注云一作難戰國策譙周亦同自皮面決眼皮面謂刃割其皮面欲令人不識決眼謂出其眼睛戰國策作抉眼此決亦通音烏穴反政姊榮榮其姊名也戰國策無榮字乃於邑劉氏云煩寃愁苦察舉吾弟按察謂觀察有志行乃舉之劉氏云察猶選之也重自刑重音持用反重猶復也為人報讎死乃以妾故復自刑其身令人不識以絶從從音蹤古字少假借無旁足而徐氏為從坐非也劉氏亦音足松反無恙爾雅云恙憂也楚辭云還及君之無恙風俗通云恙病也凡人相見及通書皆云無恙又易傳云上古之時草居露宿恙齧蟲也善食人心故俗相勞云無恙恙非病也濡忍濡潤也人性濕潤則能含忍故云濡忍也若勇躁則必輕死也不重暴骸之難重難並如字重猶惜也言不惜暴骸之為難也其後二百二十餘年徐氏據六國年表聶政去荆軻一百七十年則為此傳率略而言二百餘年亦當時不能細也荆軻按贊論稱公孫季功董生為余道之此傳雖約戰國策而亦别記異聞衛人謂慶卿軻先齊人齊有慶氏則或本姓慶春秋慶封其後改姓賀此下亦至衛而改姓荆荆慶聲近隨在國而異其號耳卿者時人尊重之號猶如相尊美亦稱子然蓋聶上古臘反蓋姓聶名目攝之攝猶整也謂不稱已意用怒因視以攝整之也魯句踐魯姓句踐名也與越王同或有意義俗本踐作賤非擊築築似琴有絃用竹擊之取以為名高漸離漸音如字王義之音哉廉反鞠武上音麴又如字人姓名也欲批白結反批謂觸擊之寒心凡人寒甚則心戰恐懼亦戰今以懼譬寒言可為心戰禍必不振矣振救也言禍及天下不可救之北購戰國策作講講和也今讀購與為燕媾同媾亦合也漢史媾講兩字常雜今欲北與連和陳軫傳亦曰西購於秦也蔽席蔽音匹結反蔽猶拂也不棄其孤也按無父稱孤時燕王尚在而丹稱孤者或記者失辭或諸侯嫡子時亦僭稱孤也又劉向云丹燕王喜之太子窺以重利窺示也言以利誘之秦王貪絶句恣荆軻所欲燕丹子曰軻與太子遊東宫池軻拾瓦投鼁太子捧金丸進之又共乘千里馬軻曰千里馬肝美即殺馬進肝太子與樊將軍置酒於華陽臺出美人能鼓琴軻曰好手也斷以玉盤盛之軻曰太子遇軻甚厚是也注方城縣有督亢亭地理志廣陽國有薊縣司馬彪郡國志曰方城有督亢亭揕其胸徐氏音丁鴆反揕謂以劍刺其胸也又云一作抗抗苦浪反言抗推也其義非扼捥上烏革反下烏亂反勇者奮厲必先以左手扼右捥也捥古腕字切齒腐心切齒齒相磨切也爾雅曰治骨曰切腐音輔亦爛也猶今人事不可忍云腐爛然皆奮怒之音也徐夫人徐姓夫人名謂男子也焠之焠染也總潰反謂以毒藥染劍鍔也忤視忤者逆也五故反不敢逆視言人畏之甚也地圖柙戶甲反柙亦函也操其室室謂鞘也諸郎中若人宿衛之官夏無且且即餘反王負劍王劭曰古者帶劍上長拔之不出室欲王推之於背令前短易拔故云王負劍又燕丹子稱琴聲曰鹿盧之劍可負而拔之是也以擲秦王擲與擲同古字耳音持益反衍水水名在遼東庸保欒布傳曰賣庸於齊為酒家人漢書作酒家保按謂庸作於酒家言可保信故云庸保鶡冠子曰伊尹保酒宋子徐注云縣名屬巨鹿者據地理志而知也從者謂主人家之左右也家丈人劉氏云謂主人翁也又韋昭云古者名男子為丈夫尊婦嫗為丈人故漢書宣元六王傳所云丈人謂淮陽憲王外王母即張博母也故古詩曰三日斷五匹丈人故言遲久畏約約謂貧賤儉約既為庸保常畏人故云畏約所以論語云不可以久處約乃矐海各反一音角説者云以馬屎燻令失明鉛置按劉氏云鉛為挺著築中令重以擊人築撲普卜反撲擊也不講於刺劍按不講謂不論習之天雨粟馬生角燕丹子曰丹求歸秦王曰鳥頭白馬生角乃許耳丹乃仰天歎烏頭即白馬亦生角風俗通及論衡皆有此説仍云廏門木烏生肉足較然較明也李斯列傳第二十七楚上蔡人地理志汝南上蔡縣云古蔡國武王弟叔度所封至十八代至平侯徙新蔡二蔡皆屬汝南後二代至昭侯徙下蔡屬沛六國時為楚地故曰楚上蔡鄉小史劉氏云掌鄉文書遊者主事言萬乘爭雄之時遊説者可以立功成名當得典主事務也劉氏云遊歷諸侯當覓強主以事之於文紆回非此禽鹿視肉禽鹿猶禽獸也言禽獸但知視肉而食之莊子及蘇子曰人而不學譬之視肉而食此揚子法言曰人而不學如禽何異言不能遊説取榮貴既如禽獸徒有人面而強能行耳非世非者譏也所謂處士橫議也胥人去其幾也胥人猶胥吏小人也去猶失也幾者動之微以言君子見幾而作不俟終日小人不識動微之會故每失時也劉氏云解幾為強非也而遂忍之言因諸侯有瑕舋則忍心而翦除故我將説秦以并天下竈上騷除騷音掃言秦欲并天下若炊婦掃除竈上之不淨不足為難一切逐客一切猶一例言盡逐故也言切者譬若利刀之割一運斤無不斷者解漢書為權時義亦未得也得百里奚於宛秦本紀云晉獻公以百里奚為秦穆夫人媵於秦奚亡走宛楚鄙人執之是也迎蹇叔於宋秦紀又曰百里奚謂穆公曰臣不如臣友蹇叔蹇叔賢而代莫知穆公厚幣迎之以為上大夫今云於宋未詳所出來丕豹公孫支於晉丕豹自晉奔秦左氏傳有明文公孫支所謂子桑也是秦大夫而云自晉來亦未見所出并國二十秦本紀穆公用由余謀伐戎王益國十二開地千里遂霸西戎此都言五子之功故云并國二十或易為十二誤也惠王用張儀拔三川并巴蜀按惠王從之果滅蜀儀死後武王欲通車三川令甘茂伐宜陽今並云張儀為相雖錯滅蜀茂通三川皆歸功於相又三川是儀先伐故也包九夷制鄢郢九夷即屬楚之夷也地理志南郡江陵縣云故楚郢都又宜城縣云故鄢也蠶食高誘注淮南子云蠶食盡無餘也大阿之劍越絶書曰楚王召歐冶子干將作鐵劍三故一曰干將二曰莫邪三曰大阿也注纎離蒲梢皆馬名徐氏據孫卿子而為説駃騠決提二音周書曰正北以駃騠為獻廣雅曰馬屬也郭景純注上林賦生三日而超其母也充下陳下陳猶後列也晏子曰有二女願得入身於下陳也宛珠之簪傅璣之珥宛音於阮反傅音附宛謂以珠宛轉而裝其簪傳璣者以璣傳著於珥珥者瑱也璣是珠之不圓者或云宛珠隨珠也隨在漢水之南宛亦近漢故云宛傅璣者女飾也言女傅之珥以璣為之並非秦所有物也隨俗雅好謂間雅變化而能通俗也擊甕叩缶説文云甕汲缶也於貢反缶瓦器也秦人鼓之以節樂缶音甫有反太山不讓土壤管子曰山不辭土石故能成其高文子曰聖人不讓負薪之言以廣其名以資敵國資猶給也藉寇兵而齎盜糧藉音積夜反齎音子奚反説文曰齎持遺也齎或為資義亦通以重陛下重音逐用反重者再也别白黑劉氏云前時國異政家殊俗人造語莫辨其真今乃分别白黑也定一尊謂始皇并六國定天下海內共尊立一帝故云所稅駕也稅駕猶解駕言休息也李斯言已今日富貴已極然未知向後吉凶止泊在何處能薄而材譾音義云宰殄反劉氏將淺反則譾亦淺義古人語自有重輕所以文字有異而庶幾斯言忠臣之節本不避死言已今日亦庶幾盡忠不避死水搖者萬物作水搖者謂冰泮而水動也是春時而萬物皆生也斯其猶人哉言我今日猶是人人道守順豈能為逆謀故下云安足與謀矺死矺音宅與磔同古今字異耳磔謂裂其支體而殺之粢糲粢音資糲音郎葛反粢者稷也糲者粗粟飯也采椽采木名即今之櫟木不觳於是觳音學爾雅云觳盡也監門下人飯猶不盡此若徐氏云一作轂轂推也則字宜作較鄒氏音角恣雎上資二反下呼季反恣睢猶放縱也謂肆情恣縱也格虜格強扞也虜奴𨽻也言嚴整之家本無格扞奴僕也布帛尋常庸人弗釋八尺曰尋倍尋曰常以言其少也庸人弗釋尋常者謂庸人見則取之而不釋以其罪輕故下云罰不必加則庸人弗釋尋常是也鑠金百溢爾雅鑠美也言百溢之美金在於地雖有盜跖之行亦不取者為其財多而罪重也故下云搏必隨手刑盜跖不搏也盜跖弗搏搏猶攫也取也凡鳥翼擊物曰搏足取曰攫故人取物亦謂之搏峭塹峭峻也高也七笑反塹音漸以言峭峻則難登故樓季難五尺之限平塹則易陟故跛牂牧太山也則舍舍猶廢也止也言為人主不能行聖人督責之術則已廢止何為勤身苦心為天下所役何哉可不哀邪言非也拂世磨俗上音扶弗反磨音莫何反拂世蓋言與弋情乖戾磨俗言磨礪於俗使從己阿房旁音一如字少我且固我謂以我幼故輕我也云固我者一云以我為短少且固陋於我韓玘亦作起並音怡韓大夫弒其君悼公然韓無悼公或鄭之嗣君為韓安相也按表韓玘事昭侯昭侯已下四代至王安其説非始皇弟子嬰劉氏云弟字誤當為孫子嬰二世兄子蒙恬列傳第二十八恬嘗書獄文學謂恬嘗學獄法遂作獄官典文學蒙驁音敖又鄒氏音五到反生隱宫劉氏云蓋其父犯宫刑妻子沒為官奴婢妻後野合所生子皆承趙姓並宫之故云兄弟生隱宫謂隱宫者宦之謂也北走音奏然走猶向也鄒氏音趣趣亦向義於字則乖而俞弗立俞即踰也音臾謂知太子賢而踰久不立是不忠也曲宫曲姓宫名臣少宦順幸沒世蒙毅言已少事始皇順意因蒙幸至始皇沒世可謂知上意是以籍於諸侯言其惡聲狼籍布於諸國而劉氏曰諸侯皆記其惡於吏籍非也必參而伍參謂三卿五即五大夫欲參伍更議故曰過可振而諫可覺此故曰者必先志有此言蒙恬引之以成説也今不知出何書耳振者救也然語亦倒以言前人受諫可覺則其過乃可救史記索隱卷二十一
