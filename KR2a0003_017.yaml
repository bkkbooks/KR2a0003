body:
  text: 史記索隠卷十七唐司馬貞撰伯夷列傳第一列傳者謂叙列人臣事跡令可傳於後世故曰列傳詩書雖缺按孔子系家稱古詩三千餘篇孔子刪三百五篇為詩今亡五篇又書緯稱孔子求得黄帝𤣥孫帝魁之書迄秦穆公凡三千三百三十篇乃刪以一百篇為尚書十八篇為中候今百篇之内見亡四十二篇是詩書又有缺亡也然虞夏之文可知也按尚書有堯典舜典大禹謨備言虞夏禪讓之事故云虞夏之文可知也天下重器言天位者是王者之重器故莊子云天下大器是也則大器亦重器也説曰堯讓天下按説者謂諸子雜記也然堯讓於許由及夏時卞隨務光等殷湯讓之天下竝不受而逃事具莊周讓王篇太史公曰余登箕山葢楊惲東方朔見其文稱余而加太史公曰也余以所聞由務光謂太史公所聞莊周所説許由務光等義至髙謂堯讓天下於許由由遂逃箕山冼耳於潁水卞隨自投於桐水務光負石自沉於廬水是義至髙也文辭不少概見何哉按槪是梗槪概謂略也葢以見由光義至高而詩書之文辭遂不少梗概載見何以如此哉是太史公疑説者之言或非實也余悲伯夷之意謂悲其兄弟相讓又義不食周粟而餓死睹軼詩可異焉上睹音覩軮音逸謂見逸詩之文即下采薇之詩是也不編入三百篇故云逸詩也可異焉者按論語云求仁得仁又何怨乎今其詩云我安適歸矣于嗟徂兮命之衰矣是怨詞故云可異焉其傳曰伯夷叔齊孤竹君之二子按其傳葢韓詩外傳及吕氏春秋也其傳云孤竹君是殷湯三月丙寅日所封相傳至夷齊之父名初字子朝伯夷名允字公信叔齊名致字公逹解者云夷齊諡也伯仲又其少長之字按地理志孤竹城在遼西令支縣應劭云伯夷之國也其君姓墨胎氏者也盍徃歸焉劉氏云盍者疑辭葢謂其年老歸就西伯采薇薇蕨也爾雅云蕨鱉也登彼西山按西山即首陽山也以暴易暴兮謂以武王之暴臣易殷紂之暴主而不自知其非矣神農虞夏忽焉沒兮言羲農虞夏敦樸禪讓之道超忽久矣終沒矣今逄此君臣爭奪故我安適歸矣于嗟徂兮命之衰矣于嗟嗟嘆之辭也徂者徃也死也言今餓死亦是運命衰薄不遇大道之時至幽憂而餓死由此觀之怨耶非耶太史公言已觀此詩之情夷齊之行似是有所怨耶又疑其云非是怨耶可謂善人者耶抑非也又叙論云若夷齊之行如此可謂善人者耶又非善人者耶亦疑也糟糠不厭厭者飫也謂不厭不飽也糟糠貧者之所飡也故曰糟糠之妻是也然顔子簞食瓢飲亦未見糟糠之文也盜蹠日殺不辜蹠及注作跖竝音之石反按盜蹠栁下惠之弟亦見莊子為篇名肝人之肉劉氏云謂取人肉為生肝非也按莊子云跖方休卒太山之陽膾人肝而餔之暴戾恣雎暴戾謂兇暴而惡戾也鄒誕恣音資睢音于餘反劉氏恣音如字雎音休季反恣睢謂恣行為睢盱惡也注直𢎞農直音如字直者當也亦音值者非也潼鄉潼音同按潼水名因為鄉今之潼津闗是亦為縣也是遵何徳哉言盜蹠無道横行天下竟以夀終是其人又遵行何徳而致此哉尤大彰較者也按較明也言伯夷有徳而餓死盜蹠暴戾而夀終是賢不遇而惡道長尤大著明之證也犯忌諱而身逸樂謂若魯桓楚靈晉獻齊襄之比皆是或擇地而蹈之謂不仕暗君不飲盜泉裹足髙山之頂竄跡滄海之濱是也時然後言按論語夫子時然後言行不由徑按論語澹臺滅明之行也非公正不發憤而遇災禍者謂人臣之節非公正之事不感激發憤或出忠言或致身命而卒遇禍災者不可勝數謂龍逄比干屈平伍胥之屬是也余甚惑焉豈所謂天道非耶是耶太史公惑於不軌逸樂公正而遇災害為天道之非而又是耶深惑之也蓋天道𤣥逺聰聽暫遺或窮通數會不由行事所以行善未必福行惡未必禍故先逹皆猶昧之也舉世混濁清士乃見老子曰國家昏亂始有忠臣是舉代混濁則士之清潔者乃彰見故上文嵗寒然後知松栢之後彫先為此言張本也豈以其重若彼其輕若此哉按謂伯夷讓徳之重若彼而采薇餓死之輕若此故又一解云操行不軌富厚累代是見重若彼公正發憤而遇禍災是其輕若此也君子疾沒世而名不稱焉自此已下雖論伯夷得夫子而名彰顔回附驥尾而行著葢亦欲微見已之著撰不已亦是疾沒世而名不稱焉故引賈子貪夫徇財烈士徇名是也又引同明相照同類相求雲従龍風從虎者言總各以類相求故太史公言亦是操行廉直而不用於代卒陷非罪與伯夷相類故寄此而發論也賈子曰賈子賈誼也誼作鵩鳥賦云然故太史公引之而稱賈子也夸者死權言貪權勢以矜夸者至死不休故云死權也衆庶馮生馮者恃也音凭言衆庶之情葢恃矜其生也鄒誕本作每生毎者冒也即冒貪之義同明相照已下竝易繫辭文也聖人作而萬物覩按文引此句者謂聖人起而居位則萬物之情皆得覩見故以今日又得著書言世情之輕重也附驥之尾按蒼蝇附驥尾而致千里以譬顔回因孔子而名彰也管晏列傳第二潁上人按潁水名按地理志潁水出陽城志有潁陽臨潁縣今亦有潁上縣嘗欺鮑叔按吕氏春秋管仲與鮑叔同賈南陽及分財而管仲嘗欺鮑叔多自取鮑叔知其有母而貧不以為貪也子孫世禄於齊十餘世按世本云莊仲産敬仲夷吾夷吾産武子鳴鳴産桓子啓方啓方産成子豫豫産莊子盧盧産悼子其夷夷産襄子武武産景子能渉渉産帶凡九代也故其稱曰是夷吾著書所稱管子者其書有此言故畧舉其要貴輕重輕重謂錢也今管子有輕重篇桓實怒少姬按謂怒蕩舟之姬而未絶蔡人嫁之是也曹沬音昧亦音末左傳作曹劌故曰知與之為取老子曰將欲取之必固與之是知此為政之所寳也晏平仲名嬰平諡仲字父桓子名弱也事齊靈公莊公景公按世家及系本靈公名環莊公名光景公名杵臼也信於知己信讀曰申古周禮皆然也申於知己謂以彼知我而我志獲伸牧民山高乘馬輕重九府皆管氏所著書篇名也按九府葢錢之府藏其書論鑄錢之輕重故云輕重九府餘如别録之説也及晏子春秋按嬰所著書名晏子春秋今其書有七十篇故下云其書世多有也伏莊公尸按左傳崔杼殺莊公晏嬰入枕莊公股而哭之成禮而岀崔杼欲殺之是也余雖為之執鞭所忻慕焉此太史公之所羨慕仰企平仲之行假令晏生在世己雖與為之僕𨽻執鞭亦所忻慕是其好善之至也賢哉良史可以示人臣之炯戒也老子韓非列傳第三二人教迹全乖不宜同傳先賢已有成説今則不可依循宜令老子尹喜莊周同為傳其韓非可居商君傳末楚苦縣按地理志苦縣屬陳國者誤也苦縣本屬陳春秋時楚滅陳而苦又屬楚故云楚苦縣至髙帝十一年立淮陽國陳縣苦縣皆屬焉裴氏所引不明見苦縣在陳縣下因云苦屬陳今撿地理志苦實屬淮陽郡苦音怙名耳字聃按許慎云聃耳曼也故名耳字聃有本字伯陽非正也然老子號伯陽父此傳不稱也姓李氏按葛𤣥曰李氏女所生因母姓也又云生而指李樹因為姓焉守藏室史按藏室史周藏書室之史也又張蒼傳老子為柱下史葢即藏室之柱下因以為官名將問禮於老子大戴記亦云然且君子得其人則駕不得其人則蓬累而行劉氏云蓬累猶扶持也累音六水反説者云頭戴物兩手扶之而行謂之蓬累也按蓬者葢也累者隨也以言若得明君則駕車服冕不遭時則自覆葢相攜隨而去耳良賈深藏若虚君子盛徳容貌若愚良賈謂善貨賣之人賈音古深藏謂隠其寳貨不令人見故云若虚而君子之人身有盛徳其容貌謙退有若愚魯之人然嵇康高士傳亦載此語文則小異云良賈深藏外形若虚君子盛徳容貌若不足也去至闗李尤函谷闗銘云尹喜要老子留作二篇而崔浩以尹喜又為散關令是也始秦與周合五百嵗而離按周秦二本紀竝云始周與秦國合而别别五百載又合合七十嵗而霸王者出然與此傳離合反正尋其意義亦竝不相違也注列仙傳是劉向所記也注物色而迹之按謂視其氣物有異色而尋迹之又按列仙傳老子西遊闗令尹喜望其紫氣浮闕而老子果乗青牛而過葢老子百六十有餘嵗此前古好事者據外傳以老子生年至孔子時故百六十嵗或言二百餘嵗者即以周太史儋為老子故二百餘嵗也李耳無為自化清淨自正此太史公因行事於當篇之末結以此言亦是贊也按老子曰我無為而民自化我好靜而民自正此是昔人所評老聃之徳故太史於此引以記之宗子注音鑄𤣥孫假音古雅反絀儒學按絀音黜黜退而俊之莊子者䝉人地理志䝉縣屬梁國劉向别録云宋之䝉人也大抵率寓言也大抵猶言大略也其書十餘萬言率皆立主客使之相對語故云偶言又音寓寓寄也故别録云作人姓名使相與言是寄辭於其人故莊子有寓言篇胠篋上音袪胠篋猶言開篋也胠亦音去篋去劫反詆訿孔子詆訐也詆音邸訿音紫謂詆毁孔子也畏累虚亢桑子按莊子畏虚篇名也即老聃弟子畏累鄒氏音畏於鬼反累音壘劉氏音上烏罪反下路罪反郭象云今東萊也亢音庚亢桑子㠪劭本作庚桑司馬彪云庚桑楚人姓名也洸洋音汪羊二音又音晃養亦有本作瀁字孤豚孤者小也特也願為小豚不可得也無汙我汙音烏故反汙瀆音烏讀二音汙凟潢汗之小渠瀆也子亟去音棘亟猶急也申不害者京人申子名不害按别録云今河南京縣是也學術按術即刑名之法術也無侵韓者㠪劭按紀年云韓昭侯之世兵寇屢交異乎此言矣注中書六篇按今人間有上下二篇又有中書六篇其篇中之言皆含上下二篇是書已備過於太史公所記韓非著書三十餘篇號曰韓子也其大歸本於黄老按劉氏云黄老之法不尚繁華清簡無為君臣自正韓非之論詆駁浮淫法制無私而名實相稱故曰歸於黄老斯未為得其本旨今按韓子書有解老喻老二篇是大抵亦崇黄老之學耳數以書諫韓王韓王安也所養非所用言非疾時君以禄養其臣者乃皆安禄養交之臣非勇悍忠鯁及折衝禦侮之人也所用非所養又言人主今臨事任用竝非常所禄賞之士故難可盡其死力悲廉直不容於邪枉之臣又悲姦邪諂諛之臣不容廉直之士作孤憤五蠧内外儲説林説難此皆所著書篇名也孤憤憤孤直不容於時也五蠧蠧政之事有五也内外儲按韓子有内儲外儲篇内儲言明君執術以制臣下制之在己故曰内也外儲言明君觀聽臣下之言行以斷其實賞罰在彼故曰外也儲畜二事所謂明君也説林説難者廣説諸事其多若林故曰説林也今韓子有説林上下二篇難者説前人行事與已不同而詰難之故其書有説難篇説難曰説音税難音奴干反言遊説之道為難故曰説難其書詞甚高故特載之然此篇亦與韓子微異煩省小大不同劉伯莊亦申其意粗釋其微文幽旨有劉説也又非吾敢横失能盡之難也按韓子横失作横佚劉氏云吾之所言無横無失陳辭發䇿能盡説情此雖是難尚非難也在知所説之心可以吾意當之劉氏云開説之難正在於此也按所説之心者謂人君之心也言以人臣疎末射尊重之意貴賤隔絶旨趣難知自非高識莫近幾會故曰説之難也乃須審明人主之意必以我説合其情故云吾説當也所説出於為名高者按謂所説之主中心本出欲立髙名者也故劉氏云稽古羲黄祖述堯舜是也而説之以厚利謂人主欲立高名説臣乃陳厚利是其見下節也既不㑹高情故遇卑賤必被逺斥矣所説出於厚利者也亦謂所説之君出意本規厚利而説臣乃陳名高之節則是説者無心逺於我之事情必不見收用也故劉氏云若秦孝公志干強國而商鞅説以帝王故怒而不用所説實為厚利按韓子實字作隂而顯為名髙按顯者陽也謂其君實為厚利而佯作欲為名髙之節也説之以厚利則隂用其言而顯棄其身謂若下文云鄭武公隂欲伐胡而闗其思極論深計雖知説當終遭戮是也周澤未渥按謂人臣事上其道未合至周之恩未沾渥於下而輒吐誠極言其説有功則其徳亦亡亡無也韓子作則見忘然見忘勝於徳亡也又若説不行而有敗則疑如是者身危是恩意未深輒評時政不為所信更致嫌疑若下文所云鄰父以牆壞有盜却為見疑即其類也乃自以為也謂人主明有所出事乃自為功而説者與知是則以為間故身危也強之以其所必不為劉氏云若項羽必欲衣錦東歸而説者強述闗中違旨忤情自招誅滅也止之以其所不能已者身危劉氏云若漢景帝决廢栗太子而周亞夫強欲止之竟不從其言後遂下獄是也則以為粥權按韓非子粥權作賣重謂薦細微之人言堪大用則疑其挾詐而賣我之權也徑省其辭則不知而屈之按謂人主意在文華而説者但徑捷省略其辭則以説者為無知而見屈辱也汎濫博文則多而久之按謂人主志在簡要而説者務於浮辭汎濫博渉文華則君上嫌其多迂誕文而無當者也知飾所説之則敬按所説謂所説之主也飾其敬者説士當知人主之所敬而時以言辭文飾之而滅其醜醜謂人主若有所避諱而醜之遊談者當㓕其事端而不言無以其敵怒之按謂人主自勇其斷説士無已意而攻間之是以卑下之謀自敵於上以致譴怒也無以其難概之按概猶格也劉氏云秦昭王决欲攻趙白起苦説其難遂已之心拒格君上故致杜郵之僇也有與同失者則明飾其無失也按上文言人主規事譽人與某人同事同行今説者之詞不得傷於同事同行之人仍可文飾其類也又若人主與同失者而説者則可以明飾其無失也大忠無所拂辭拂音佛言大忠在匡君於善君初不從則且退止待君之悦而又幾諫即不拂牾於君也悟言無所擊排謂大忠説諫之辭本欲歸於安人興化而無别有所撃射排擯按韓子作撃摩也知盡之難也謂人臣盡知事上之道難也按徐廣曰知一作得難一作辭今按韓子作得盡之辭也得曠日彌久謂君臣道合曠日已久是誠著於君也周澤既渥謂君之渥澤周浹於臣魚水相須鹽梅相和也則非能仕之所設按韓子作非能士之所恥也則幾矣按幾庶也謂庶幾於善諫説也申子卑卑劉氏云卑卑自勉勵之意也極慘礉上七感反下胡革反按謂用法慘急而鞠礉深刻也司馬穰苴列傳第四晉伐阿甄按阿甄皆齊邑晉太康地記曰阿即東阿也地理志云甄城縣屬齊河也乃薦田穰苴按穰苴名田氏之族為大司馬故曰司馬穰苴以為將軍謂命之為將以將軍也將者音即匠反遂以將軍為官名故吳子曰十萬之師無將軍則亂六國時有其官旦日日中按旦日謂明日日中時期會於軍門也立表下漏按立表謂立木為表以視日景下漏謂下漏水知刻數也援枹上音袁下音孚仆表决漏仆音赴按仆者卧其表也决漏謂决去壺中漏水以賈失期過日中故也乃斬其僕車之左駙馬之左驂按謂斬其使者之僕及車之左駙駙當作軵竝音附謂車循外立木丞重較之材又斬其馬之左驂以御者在左故也田乞田豹田乞田僖子也豹亦僖子之族常曾孫田和因自立為齊威王按此文誤也當云田和自立至其孫因為齊威王故世家云田和自立號太公其孫因齊號為威王亦少褒矣按謂司馬法説行兵揖讓有三代之法而齊區區小國又當戰國之時故云亦少褒矣孫子吳起列傳第五隊長上音徒對反下音竹兩反趣使使上音促趣謂急也下音色吏反注越絶按越絶書云是子貢所著恐非也其書多記吳越亡後土地多是後人所録也孫臏與龎涓上臏音類忍反下龎音皮江反涓古𤣥反君弟重射弟但也重射謂好射也及臨質按質猶對也將欲對射之時也一云質謂棚非也夫解雜亂紛糺者按謂事之雜亂紛糺撃挐也不控捲按謂解雜亂紛糺者當善以手解之不可控捲而撃之捲即拳也劉氏云控綜捲縮非也救鬭者不搏撠博㦸二音按謂救鬬者當善撝解之無以手助相摶撠則其怒益熾矣按撠以手㦸刺人批亢𢷬虚批音白結反亢苦浪反按批者相排批也音白滅反亢者敵人相拒也擣者撃也衝也虚者空也按謂前人相亢必須批之彼兵若虚則衝擣之欲令撃梁之虚也此當是古語故孫子以言之也形格勢禁謂若避其相亢撃擣彼虚則是事形相格而勢自禁則彼自為解兵也是我一舉解趙之圍謂齊今引兵據大梁之衝是其方虚之時是一舉釋趙而斃魏蹶上將蹷即音巨月反劉氏蹶猶斃也與齊戰於桂陵後十三嵗王劭紀年云梁惠王十七年齊田忌敗梁於桂陵至二十七年十二月齊田朌敗梁於馬陵計相去無十三嵗遂成豎子之名豎子謂孫臏李克曰起貪而好色按王劭云此李克云吳起貪下文云魏文侯知起廉盡能得士心又公叔之僕稱起為人節廉豈前貪而後廉何言之相反也今按李克言起貪者起本家累千金破産求仕非貪也葢言貪者是貪榮名耳故母死不赴殺妻將魯是也或者起未委質於魏猶有貪迹及其見用則盡廉能亦何異乎陳平之為人也為吮之鄒氏音戈軟反又才軟反左孟門劉氏按紂都朝歌今孟山在其西今言左則東邊别有孟門相田文按吕氏春秋作商文公叔為相韓之公族并中悼王楚系家悼王名疑也太子立肅王臧也伍子胥列傳第六伍舉按舉直諫見左氏楚世家太傅費無忌按左傳作費無極守城父本陳邑楚伐陳而有之地理志潁川有城父縣奮陽城父司馬之姓名也忍訽鄒氏云一作詬罵也音逅劉氏音火候反伍胥貫弓劉氏音貫為彎又音古患反貫謂滿張弓華氏之亂左氏宋大夫華登欲殺元公事魯昭公二十一年也昭闗其闗在江西乃吳楚之境也注張勃曰按張勃晉人吳鴻臚嚴之子也作吳録裴氏注引之是也注溧陽縣音栗溧水名也鍾離居巢二邑楚縣也按鍾離縣在六安古鍾離子之國系本謂之終犂嬴姓之國居巢國也桀奔南巢其國葢逺尚書序巢伯來朝葢因居之於淮南楚地也專諸左傳謂之専設諸郄宛伯州犁按州犁伯宗子也郄宛州犁子伯噽郄宛子喜音噽伯氏别姓郄二公子將兵公子燭庸及葢餘也取六與潛六古國也臯陶之後所封潛縣有天柱山公子囊瓦按左氏楚公子貞字子襄其孫名瓦字子常此言公子又兼稱囊瓦葢誤於豫章杜預云昔豫章在江北葢分後徙之於江南也夫概古賚反子常敗走奔鄭公孫瓦也走鄖奏雲二音走向也鄖國名至郢郢楚都也音以正反又一音以井反日草途逺故倒行而逆施之按倒音丁老反施音如字子胥言志在復讐常恐且死不遂本心今幸而報豈論理乎譬如人行前途尚逺而日勢已草其在顛倒疾行逆理施事何得責吾順理乎六月敗吳兵於稷按左傳作稷丘杜預云稷丘地名在郊外取番音普寒反又音婆葢鄱陽也徙于鄀音若鄀楚地今闕病創音瘡夫湫音椒又如字大夫種劉氏云大夫姓種名非也按今吳南有文種埭則種姓文為大夫官也專復皮逼反而抉吾眼烏穴反抉亦决也橐臯音拓臯二音杜預云地名在淮南逡遒縣東南白公厲劎人問曰按左氏人即子西之子平也白公弟王孫燕子綦左傳作子期也吳王太子左傳太子名友昭夫人之宫昭王夫人即惠王母越女也如高府杜預云楚之别府也石乞從者屈固按徐廣云一作惠王從者屈固葢此本為得而左傳云石乞尹門圉公陽穴宫負王以如昭夫人之宫則公陽是王從者矣窘於江上音隶殞反史記索隠卷十七
