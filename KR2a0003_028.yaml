body:
  text: 史記索隱卷二十八唐司馬貞撰日者列傳第六十七按名卜筮曰日者以墨所以卜筮占候時日通名日者故也太卜之起按周禮有太卜之官此云由漢興者謂漢自文帝卜大横之後其卜官更興盛焉司馬季主按云楚人而太史公不序其系盖楚相司馬子期之後羊姓也季主見列仙傳卜數中按卜數猶術數也音所具反劉氏云數筮也亦通筮必易用大衍之數者也獵纓正衿獵猶攬也謂攬其冠纓而正其衣衿謂變而自飾也兔坐免謂俯俛為敬行之汙烏故反誇嚴謂卜者自矜誇而莊嚴説禍以誑人也卑疵下音疵􅏽趨上音纎纎趨猶足恭也不能適音釋適猶調也利上奉下扶用反旋式正棊按式即栻也旋轉也栻之行上圓象天下方法地用之則轉天綱加地之辰故云旋栻棊者筮之狀正棊葢謂卜以作卦也後乃有之謂若卜之不祥則式不収也卜吉而後有故云有之勾踐放下方往反芒乎上音芒莫郎反悵然噤上音暢下音禁劉氏音其錦反糈下音所糈者卜求神之米也言卜之不中乃可見奪其糈米若為人主計不審則身無所之處者也務華絶根言宋忠賈誼皆務華而喪其身是絶其根本也龜策列傳第六十八龜䇿傳有録無書褚先生所補其叙事煩蕪可陋略無可取摓策定數按徐廣上音逢摓謂兩手執蓍分而扐之故云摓策注訽天音火候反悖背上音倍下音佩𢷬蓍上音逐留反按即稠也擣蓍即藂耆擣是古稠字也傳曰按此傳即太卜所得古占龜之説也蚗蠪伏之按蚗當為蛟蠪音龍注音決誤也臑骨上音乃髙反一音乃導反臑臂也石朱方按萬畢術中有石朱方方中説嘉林中故云傳曰白虵蟠杅林按林名白虵蟠杅林龜藏其中杅音烏謂白虵嘗蟠杅此林中也譺然音嶷言求龜者齋戒以待常嶷然也他髮上音徒我反按謂被髪也豫且下音子余反泉陽人網元龜者今昔汝漁今昔猶昨夜也以今日言之謂昨夜為今昔衛平宋元君之臣也不如誕謾一音竝如字又誕田爛反謾音漫也注一作訑音吐禾反拌􅑕拌音判判割也象箸而羮箸音持慮反則箸是筋為與羮連則或非箸樽也記曰羮之有菜者用挾挟音筯也其胻劭音衡即脚脛隂兢隂姓兢名殺周太子歴按殺周太子歴文在囚文王昌之上則近是季歴不被紂誅則其言近妄無容周更别有太子名歴也涫湯上音館涫沸也徵絲灼之按灼謂燔也燒絲以當薪務費人也元王向日而謝葢欲神之以謝天也天之質闇日者天之光眀著見者莫過也被鄭之桐徐氏云牛革桐為鼔三瓦而陳劉氏云陳猶居也注作棟音都貢反首仰音魚兩反足肣開音琴肣謂兆足斂也首俛音免兆首伏也斂之徼音叫謂徼繞不眀也祓龜上音廢又音佛拂洗之以水雞卯摩之而呪為祖祖法也言以為常法灼以荆若剛木土按古之灼龜取生荆枝及生埾木燒之斬斷以灼龜按土字合依劉氏説上當連下句粱卵焍黄粱米也卵雞子也焍灼龜木也音次第之第言燒荆枝更逓而灼故有焍名一音梯言灼之以漸如有階梯也黄者以黄絹裹梁卵以祓龜也必以黄者中之色主土而信故用雞也先以造灼鑽造音竈造謂燒荆之處荆若木王靈夫子尊神龜而為之作號諸靈數數所具反音近策或是策之别名此卜筮之書其字亦無可覈皆放此大論按褚先生所取太卜雜占卦體及命召之辭義蕪辭重沓殆無足採凡此六十七條别者也貸殖列傳第六十九論語云賜不受命而貨殖焉廣雅云殖立也孔安國尚書云殖生也生資貨財利輓近世塗人耳目上音晚古字通用眇論上音妙下如字榖纑上音谷又音雊穀木名皮可為紙纑山中紵可以為布音盧注紵屬音佇今山間野紵亦作苧柟梓南子二音金錫連下音蓮棊置言如置棊子徃徃有之大較音角大較猶大略也賤之徵貴徵者求也謂此處物賤求彼貴賣之道之符符謂合於道也山澤不辟下音闢辟開也通也莫之奪予音與言貧富自由無予奪齊冠帯衣履天下言齊既富饒能冠帶天下豐厚被於他邦故海岱之間斂袵而朝齊言趨利者也計然韋昭云范蠡師也蔡謨云蠡所著書名計然葢非也徐廣亦以為范蠡之師名妍所謂妍桑心計也范子曰計然者葵丘濮上人姓辛氏字文其先晋之公子南游越范蠡事之呉越春秋謂之計倪漢書古今人表計然列在第四則倪之與妍是一人聲相近而相亂耳時用知物按言知時所用之物嵗在金穰五行不説土者土穰也旱則資舟國語大夫種曰賈人旱資舟水資車以待也夫糶二十病農言米賤則農夫病也若米斗直九十則商賈病故云病末謂逐末即商賈也積著音張吕反毋息弊乆停息貨物則無利貴出如糞土賤取如珠玉夫物極貴必賤極賤必貴貴出如糞土者既極貴後恐其必賤故乗時出之如糞土賤取如珠玉者既極賤後恐其必貴故乗時取之如珠玉此所以為貨殖也元注恐錯乃乗扁舟音篇又音符殄反用䖍云特舟也國語云范蠡乗輕舟適齊為鴟夷子皮大顔曰若盛酒者鴟夷也用之則多所容納不用則可卷而懷之不忤於物也按韓子云鴟夷子皮事田成子成子去齊之燕子皮乃從之也葢范蠡也之陶服䖍云今定陶也與時逐韋昭云随時逐利也不責於人按謂擇人而與人不負之故云不責於人也廢著著音貯漢書亦作貯貯猶居也説文云貯積不厭糟糠饜飽也李克按漢書食貨志李悝為魏文侯作盡地力之教國以富强今此及漢書言克皆誤也劉向别錄則云李悝也與之食謂穀盬鹽起鹽音古按周禮鹽人云供苦鹽杜子春以為苦讀如盬鹽謂出鹽直用不煉也伊説云盬鹽河東大鹽散鹽東海煮水為鹽也烏氏倮漢書作臝按烏氏縣名氏音支名倮音踝也畜牧及衆謂畜牧及至衆多之時斥賣求奇繒物謂斥物賣之以求奇物也間獻遺戎王按間獻猶私獻也谷量上音欲什倍其當予之畜謂戎王償之牛羊十倍也當字漢書作償也寡婦清漢書巴寡婦清巴寡婦之邑清其名也家亦不訾按謂其多不可訾量地重言重耕稼也重為邪上言逐隴反重者難也畏言不敢為姦邪雍隙徐氏云隙間孔也隙者隴雍之間閒隙之地故云雍隙也而多賈音古櫟邑上音藥即櫟陽綰轂其口言褒斜道狹綰其道口有若車轂之凑故云綰轂也易所鮮上音亦下音尠言以所多易其所少楊平陽陳楊邑名平陽二邑在趙之西陳葢衍字以下有陽平陽陳椽此因衍也言二邑之人皆西賈於秦翟北賈於種代種代在邑之北也懻忮上音冀下音寘奇羡上音羈下音羊戰反奇羡謂奇有餘衍也羯羠不均上音巳紇反下音慈紀反徐廣云羠音兕皆健羊也其方人性若羊健悍而不均陳椽其間椽音逐緣反陳椽猶經營馳逐也温軹二縣名屬河内懁急上音絹注一作儇音翾推剽推即追反推殺人而剽掠之跕屣上音帖下所綺反踔遠劉氏上音卓一音勑教反亦遠騰皃也人雕悍言如雕性性之捷悍也北隣烏桓隣音臨者亦却背之義他竝類此也東綰穢貊按綰者綰統其要津則上云臨者謂却背之齪齪音側角反又音側斷反鄖關音雲果隋下音徒火反注蓏音郎果反呰窳上音紫下音庾茍且懶墮之謂應劭云呰弱也晉灼曰窳病也命曰素封謂無爵邑之入禄秩之耒則曰素封素空也千戸之邑戸率二百故千戸二十萬農工商賈亦嵗萬息二千故百萬之家亦二十萬牧馬二百蹄按馬有四足二百蹄有五十匹也漢書則云馬蹄噭千所記各異牛足角千按馬貴而牛賤以此為率則牛有百六十六頭有奇也千足羊澤中千足彘韋昭云二百五十頭水居千石魚陂音波漢書作皮音披千章之材漢書作千章之萩音秋服䖍云章方也如淳云言任方章者千牧謂章大材也樂産云萩梓木也可以為轅千畝之巵茜巵音支鮮支也茜言倩一名紅藍花染繒赤黄也進醵音渠略反醯醢千缻聞江反醬千檐下都甘反漢書作儋孟康曰儋石甖石甖受一石故云儋石一音都濫反船長千丈按積數長千丈木千章按將作大匠掌材曰章曹掾注洪洞洪胡孔反洞音動又竝如字也髤者千上音休謂漆也千謂千枚也馬蹄躈千徐廣音苦弔反馬八髎也音料埤倉云尻骨謂八髎一曰夜蹄小顔云躈口也蹄與口共千則為二百匹若顧𦙍則云上文馬二百蹄比二千乗之家不容亦二百則躈謂九竅通四蹄為十三而成一馬所謂生之徙十有三是也凡七十六匹馬按亦多於千戸侯比則不知其所答布注音吐合反大顔音吐盍反按以為麄厚之布與皮革同以石而秤非白疊布也吳錄云有九徳郡布名曰白疊廣志云疊毛織也漆千斗漢書作漆大斗按太斗大量也言滿量千斗即今之千桶也鹽跂千葢下音貽炎反説文云瓵瓦器受斗六合以解此葢非也按尚書大傳云文皮千合則數兩謂之合也三倉云稱盛鹽䜴器音他果反則葢或橢之異名耳鮐鮆説文云鮐海魚音胎鮆魚飲而不食食刀魚也爾雅云謂鮤魚也鮆音才爾反又音薺鯫千石鮑千鈞上音輒一音昨茍反鯫小魚也鮑音抱步飽反今之鯫魚也注鯫音輒膊魚也膊音鋪博反按破鮑不相離謂之膊兒漬云鮑聲類及韵集雖為此解而鯫生之字見與此同按鯫者小雜魚也棗栗千石者三之按三之者三千右也必三之者取類上文故也以棗栗賤故三之為三千石也狐鼦下音雕也羔羊千石謂秤皮重千石果菜千種千種者言其多也子貸金錢千貫按子謂利息也貸音土代反節駔會按節者節貴賤也駔舊音祖朗反今音驡駔者度牛馬市云駔儈者合市也音古外反淮南子云段干木晉國之大駔注云干木度市之魁也千畦韋昭云埒中畦猶隴也謂五十畝也劉熈注孟子云今俗以二十五畝為小畦五十畝為大畦王逸云畦猶區也竹千萬个釋名云竹曰箇木曰枚方言曰个枚也儀禮禮記字為个又功臣表揚僅入竹三萬箇箇个古今字也注卓一作淖並音斲一音閙淖亦因泥淖亦是姓故齊有淖齒漢有淖葢與卓氏同出或以同音淖也汶山下上音崏也運籌策漢書云運籌以賈滇僮千人漢書云及相如列傳竝云八百人也魋結之人上音椎髻謂通賈南越也富埒卓氏埓者隣畔言隣相次有游閒公子之賜與名謂通賜與於游閒公子得其名然其贏得過當愈於纖嗇謂孔氏以資給諸侯公子既已得賜與之名又蒙其所得之贏過於本資故云過當乃勝於細碎儉嗇之賈也纖細也方言云纖小也愈勝也曹邴氏邴音柄也刁間上音雕姓也間如字寧爵無刁按奴自相謂曰寧免去求官爵耶曰無刁無刁相止之辭也言不去止為刁氏作奴也師史師姓史名宣曲韋昭云地名髙祖功臣有宣曲侯上林賦云西馳宣曲常在京輔今闕其地田畜人爭取賤賈晉灼云爭取賤賈金玉也任氏獨取貴善謂買物必取貴而善者不爭賤價也塞之斥也孟康云邊塞主斥候之卒也又按斥開也相如傳云邊塞益斥是也橋姚橋姓姚名馬千匹言橋姚因斥塞而致此資風俗通云馬稱匹者俗説云相馬及君子與人相匹故云或説馬夜行目照前四丈故云一匹或説度馬縱横適得一匹又韓詩外傳云孔子與顔回登山望見一匹練前有藍視之果馬馬光景一匹長也齎貸子錢上音子稽反貸假也音吐得反與人物云齎周禮注齎所給與也千金貸吐代反其息什之謂出一得十倍秦揚以葢一州漢書作甲一州服䖍云富為州之中第一桓發漢書作稽發雍伯雍於恭反漢書作翁伯也洒削上音先禮反削刀者名洒削謂摩刀以水洒之又方言云劎削關東謂之削音肖削一依字讀也胃脯晉灼云太官常以十月作沸湯潯羊胃以末椒薑粉之訖暴使燥則謂之脯故易售而致富太史公自序傳南正重以司天火正黎以司地按張晏云南方陽也火水配也水為隂故命南方正重司天火正黎兼地職臣瓚以為重黎民是司天地之官司地者宜曰北正古文作北字非也揚雄譙周竝以為然按國語黎為火正以淳曜敦大光照四海又幽通賦云黎淳曜於髙辛則火正為是也故重黎氏序天地按重司天而黎司地是代序天地也據左氏重是少昊之子黎乃顓頊之二氏二正所出各别而史遷意欲合二氏為一故總云在周程伯休甫其後非也然後按彪之序及干寳皆云司馬氏黎之後是也今總稱伯休甫是重黎之後者凢言地即舉天稱黎則兼重自是相對之文其實二官亦通職然休甫則黎之後也亦是太史公欲以史為己任言先代天官所以兼稱重耳司馬氏代典周史按司馬夏官卿不掌國自是先代兼為據史衛宏云司馬氏周史佚之後不知何晉中軍隨㑹奔秦按左氏隨㑹自晉奔秦後乃奔魏自魏還晉故漢書云㑹奔秦魏也入少梁古梁國也秦滅之改為少梁後名夏陽在趙者按何法盛晉書及司馬氏系夲名凱以傳劎論服䖍云代善劍也按解所以稱傳也蘇林云傳作搏言手搏論而釋之所以知名也錯孫靳上音七合反下音紀舋反漢書靳作蘄賜死杜郵下音尤李竒曰地名在咸陽西按三秦記其地後改為李里者也葬於華池晉灼云在鄠縣非也按司馬遷碑在夏陽西北四里蒯聵𤣥孫卬按晉譙國司馬無忌作司馬氏系本云蒯瞶生昭豫昭豫生憲憲生卬爲武信君將按漢書武臣號武信君王卬於殷漢書云項羽封卬為殷王無澤漢書作毋擇竝音亦也卒皆葬髙門按蘇説非也按遷碑在夏陽西北去華池三里談為太史公按茂陵書談以太史公丞為太史令則公者遷所著書尊其父云公也然稱太史公皆遷稱述其父所作其實亦遷之詞而如淳引衛宏儀注稱位在丞相上謬矣按百官表又無其官且脩史之官國家别有著撰則今州縣所上圖書皆先上之而後人不曉誤在丞相上耳有省不省耳按六家同歸於正然所從之道殊塗學或有傳習省察或有不省者耳注一作大詳按漢書作大詳言我觀隂陽之術大詳而今此作祥於義為疎也不可偏循偏音遍偏循言難盡用也名家使人儉而善失真按名家流出於禮官古者名位不同禮亦異數孔子必也正名乎按名家知禮亦異數是儉也受命不受辭或失其眞也贍足萬物上音市艷反漢書作澹古今字異也絀聰眀如淳云不尚賢絶聖棄智也曰堂髙三尺按自此以下韓子之文故稱曰采椽不刮韋昭云采椽櫟欀也糲粱之食服䖍云糲麄米也三倉云粱好粟親親尊尊之恩絶按禮親親父為首尊尊君為首也故曰聖人不朽至因者君之綱此出鬼谷子遷引之以成其章故稱故曰也謂之窽窽音欵漢書作欵欵空也故申子云欵言無成是也聲者名也以言實不稱名則謂之空空有聲也誦古文按遷及事伏生是學誦古文尚書劉氏以為左傳國語系本等書是亦名古文窺九疑山海經云南方蒼梧之丘蒼梧之泉在營道南其山九谿皆相似故曰九疑張晏云九疑舜葬故窺之尋上探禹穴葢以先聖所葬處有古冊文故窺探之亦搜採遠矣禹穴越絶書云禹上茅山大會計更名曰會稽張勃呉錄云本名苗山一名覆釡禹會諸侯計功改曰會稽上有孔號曰禹穴也困鄱薛鄱本音番今音皮按田魯襃記云靈帝末有汝南陳子游為魯相子游太尉陳蕃子也國人韓而改焉若如其説則蕃改鄱鄱皮聲相近後漸訛耳然地理志魯國蕃縣應劭曰邾國也音皮注周南張晏云自陜已東皆周南之地也遷為太史令博物志太史令茂陵顯武里大夫司馬遷年二十八三年六月乙卯除六百石紬史記如淳云抽徹舊書故事而次述之徐廣音抽小顔紬謂綴集之也石室金匱之書按石室金匱皆國家藏書之處建於眀堂諸神受紀虞喜志林云改厯於眀堂班之於諸侯諸侯羣神之主故曰諸神受紀孟康云勾芒祝融之屬皆受瑞紀先人有言先人謂先代賢人也周公卒五百嵗而有孔子按孟子稱堯舜至湯五百餘嵗湯至文王五百餘嵗文王至孔子五百餘嵗按太史公略取於孟子而揚雄孫盛深所不然所謂多見不知量也以為淳氣育才豈有常數於五百之期何異瞬息是以上皇相次或有萬齡為間而唐堯舜禹比肩竝列降及周室聖賢盈朝孔子之沒千載莫嗣安在於千年五百乎其述作者葢記注之志耳豈聖人之倫哉何敢讓焉漢書作穰晉灼云此古讓字言己當述先人之業何敢自嫌值五百嵗而讓也上大夫壺遂按遂為詹事秩二千石故為上大夫也是非二百四十二年按是非謂褒貶諸侯之得失也子曰我欲載之空言按孔子之言見春秋緯太史公引之以成説也空言謂褒貶是非也空立此文而亂臣賊子懼也不如見之於行事之深切著眀也按孔子言我徒欲立空言設褒貶則不如附見於當時所因之事人臣有僭侈篡逆因就此筆削以褒貶深切著明而書之以為將來之誡者也善善惡惡公羊傳曰善善及其子孫惡惡止其身也春秋文成數萬其指數千按張晏曰春秋萬八千字此云文成數萬字誤也裴駰以遷述仲舒所論公羊經傳凡四萬四千故云數萬又非也小顔云史遷豈以公羊傳為春秋乎又春秋經一萬八千亦足稱萬非字之誤也皆失其本已按弑君亡國及奔走者皆是失仁義之道本耳已者語終之辭也隱約者按謂其義隱微而言約也述陶唐至於麟止服䖍云武帝至雍獲白麟而鑄金作麟足形故云麟止遷作史記止於此猶春秋終於獲麟然也史記以黄帝為首而云述陶唐者按五帝本紀賛云五帝尚矣然尚書載堯以來百家言黄帝其文不雅馴故述黄帝為本紀之首而以尚書雅正故稱起於陶唐作五帝本紀應劭云有木則紀有家𫝊則代有年則表有名則虞舜不台台音怡悦也或音昭非也悼豪之旅按豪則崤之異音旅師旅也鑄鐻下音巨鐻鐘也諸吕不台徐廣音胎非也按一音怡此賛木韵則怡懌為是大臣洞疑按洞是洞逹為義言所共疑也有司靡踵强弱之原云以世按踵謂繼也以字當作已世當作也竝誤耳云已也皆語助之辭也以述來古按來古即古來也言比樂書以述自古已來樂之興衰也非兵不强按此律書之賛而云非兵不强者則此律書即兵書也古者師出以律則凡出軍皆聴律聲故云聞聲效勝負望敵知吉凶也黄帝湯武以興黄帝有版泉之師湯武有鳴條收野之戰而克桀紂間不容翲忽按忽者總文之微也翲者輕也言律厯窮隂陽之妙其間不容絲忽也言翲恐衍字耳五家之文怫異怫音悖一音扶物反怫亦悖也言金木水火土五家之文各相悖異不同也維弊之行上弊音幣帛之幣錢也玩巧上五官反下若孝反申吕肖矣按徐廣注肖言􅕆􅕆猶衰微其音訓不可知從出也今按肖謂微弱而省少所謂申吕雖衰也繆權于幽按繆謂綢繆也音亡又反又謂太公綢繆為權謀於幽昧不眀著謂太公之隂謀也燕易之禪謂王噲禪其相子之後卒危亂也殺鮮放度按系家云管叔名鮮蔡叔名度霍叔名處也太任十子太任文王妃子十子伯邑考武王管蔡霍魯衛毛聃曺是也衛頃不寧衛頃公也剔成暴虐上音逷成蚖鱓元單二音能忍訽火候反訽辱也剻成上音裴其字言從崩邑又音浮葆守封禺上音保言東甌被越攻破之後保封禺之山今在武康縣也齊楚秦趙為日者各有俗按日者傳云無以知諸國之俗今褚先生惟記司馬季主之事也龜筴列傳三王不同龜四夷各異卜其書旣亡無以紀其異今禇少孫唯取太卜占龜之雜説詞甚煩蕪不能裁剪妄皆穿鑿此篇不才之甚也蓋公蓋姓也古合反司馬氏代主天官按此天官非周禮冢宰天官乃謂知天文星厯之事為天官且遷實黎之後而黎氏亦總稱重黎以重本司天故太史公代掌天官盖天官統太史之職言史是歴代之職恐非實事然衛宏以為司馬氏周史佚之後故太史談云予之先人周之太史葢或得其實也㒺羅天下放失舊聞按舊聞有遺失放逸者罔羅而考論之也年差不眀按竝時則年厯差殊亦略言難以眀辨故作表也兵權山川鬼神按兵權即律書也其云兵今律書亦略言兵也山川即河渠書也鬼神封禪書也故云山川鬼神而封禪之也扶義俶儻不令己失時己音紀言扶義倜儻之士能立功名於當代不後於時者也為太史公書按桓譚云遷所著書成以示東方朔朔皆署曰太史公則謂太史公是朔稱也亦恐其説未盡盖遷自尊其父著述稱之曰公或云遷外孫楊惲所稱事或當爾也拾遺補藝按漢書作補闕此云藝謂補六義之闕也厥協六經異傳遷言以所撰取協於六經異傳諸家之説耳謙不敢比經蓺也異傳者如子夏易傳毛公詩及韓嬰外傳伏生尚書大𫝊之流者也藏之名山副在京師言正本藏之書府副本留京師也穆天子傳云天子北征至於羣玉之山河平無險四徹中繩先王所謂策府郭璞云古帝王蔵策之府則此謂蔵之名山是也以俟後聖君子此語出公羊傳言夫子制春秋以俟後聖君子亦有樂乎此也凡百三十按漢書十篇有録無書張晏曰遷沒之後亡景紀武紀禮書樂書兵書將相表三王世家日者龜策傳𫝊靳等列傳也注元成間褚先生按景紀取班書補之武紀專取封禪書禮書取荀卿禮論樂取禮樂記兵書亡不補略述律而言兵遂分律述以次之三王系家空取其策文以輯此篇何率略且重非當也日者不能記諸國之同異而論司馬季主龜策直太史所得占龜兆雜説而無筆削之功何蕪鄙也夫太史公紀事上始軒轅下訖天漢雖博采古文及傳記諸子其間殘闕葢多或旁摉異聞以成其説然其人好竒而詞省故事覈而文微是以後之學者多所未究其班氏之書成於後漢彪既後遷而述所以條流更眀是兼采衆賢羣理畢備故其㫖富其詞文是以近代諸儒共行鑚仰其訓詁葢亦多門蔡謨集解之時已有二十四家之説所以於文無所滯於理無所遺而太史公之書既上序軒黄中述戰國或得之於名山壞壁或取之以舊俗風謡故其殘文斷句難究詳矣然古今為注解者音義亦希始後漢延篤乃有音義一卷又别有章隱五卷不記作者何人近代鮮有二家之本宋中散大夫徐廣作音義一十卷唯記諸家本異同於義少有解釋又中兵郎裴駰亦名家之子也作集解注本合為八十卷見行於代仍云亦有音義前代久已散亡南齊輕車錄事鄒誕生亦撰音義三卷音則尚奇義則罕説隋秘書監栁顧言尤善此史劉伯莊云其先人曾從彼公受業或音解隨而記錄凡三十卷隋季喪亂遂失此書伯莊以貞觀之初奉勑於𢎞文館講授遂采鄒徐二説兼記憶栁公音㫖遂作音義二十卷音乃周備義則更略惜哉古史微文遂由數賢秘寳故其學殆絶前朝吏部侍郎許子儒亦作注義不睹其書崇文館學士張嘉㑹獨善此書而無注義貞少從張學晚更硏尋初以殘闕處多兼鄙褚少孫誣繆因憤發而補史記遂兼注之然其功殆半乃自惟曰千載古史良難間然因退撰音義重作賛述葢欲以剖盤根之錯節遵北轅於司南也凡為三十卷號曰史記索隱云史記索隱卷二十八
