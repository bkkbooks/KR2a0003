body:
  text: 史記索隠卷六唐司馬貞撰漢興已來諸侯王年表第五應劭云雖名為王其寳如古之諸侯同姓五十五按漢書封國八百同姓五十餘顧氏據左傳魏子謂成鱄云武王克商光有天下兄弟之國十有五人異姓之國四十人是也非徳不純純善也亦云純一言周王非德不純一形勢弱也同姓為王者九國徐氏九國不數吳葢以荆絶乃封吳故也仍以淮陽為九今按下文所封列有十國者以長沙異姓故言九國也怵邪臣怵音誓怵訓習言習於邪臣之謀故爾雅云怵猶狃也狃亦訓習推恩分子弟按武帝用主武偃言而下推恩之令也或以適削地適音宅或作過形錯諸侯間錯音七各反錯謂交錯相銜故云犬牙相制言犬牙參差楚髙祖五年封韓信六年王弟交也齊四年封韓信六年封子肥荆六年封劉賈十一年賈為英布所殺其年立吳國封兄子濞也淮南四年封英布十一年反誅立子長燕五年封盧綰十一年亡入匈奴十二年立子建也趙四年封張耳其年薨明年子敖立八年廢為宣平侯九年立子如意也梁五年封彭越十一年反誅十二年立子恢代二年封韓王信五年降匈奴十一年立子恒也長沙五年吳芮薨六年子成王臣立髙后元年魯初置國立張偃常山哀王不疑元年薨立王義為帝又立軹侯朝為王吕肅王吕后元年薨立吕嘉淮陽懷王强恵帝子長沙共王古哀王子故軹侯音章是反王軹縣在河内後文帝封舅薄昭故洨侯音交洨水所出縣名在沛又音也吕通故東平侯東平縣屬梁國吕大故吕平侯縣名屬上谷也吕禄故胡陵侯縣名屬山陽也營陵侯燕王劉澤初封縣名屬北海也朱虚侯縣名屬琅琊東牟縣名屬東萊孝文二年封城陽封濟北王章興居辟疆趙幽王子音壁十六年分淮南為三國分齊為七國淮南三衡山王勃城陽王安廬江王賜也齊七城陽濟北濟南淄川膠東膠西齊趙分為六河間廣川中山常山清河趙廟壖垣壖音儒縁反壖垣廟境外之墟壖邊郃陽郃音下匝反代王劉仲後封也江都易王非按諡法云好更故舊為易也臨江王閼于閼音遏膠西子王端諡法云能優其徳曰子中山靖王勝都盧奴淮陽王都陳故垣邑侯頃王延上音傾城陽王子燕刺王旦諡法暴慢無親曰刺武帝子也康王昆侈按蕭該云諡法好樂怠政曰康漢書作糠昆侈名繆王齊廣川惠王子諡法名與實乖曰繆頃王授河間獻王曽孫頃王平常山憲王子頃王遺濟南王辟光之孫也戴王賀廣川惠王子也髙祖功臣侯者年表弟六漢興功臣受封百有餘人按下文髙祖功臣一百三十七人兼外戚及王子凡一百四十三人什二三言十分讒二三在耳小侯自倍倍其初封時户數也志古之道所以自鏡言居今之代志識古之道得以自鏡當代之存亡也亦當世得失之林也言觀今人臣所以得尊寵者必由忠厚被廢辱者亦由驕淫是言見在興廢亦當代得失之林也侯位次姚氏云蕭何第一曹參二張敖三周勃四樊噲五酈商六奚涓七夏侯嬰八灌嬰九傅寛十靳歙十一王陵十二陳武十三王吸十四薛歐十五周昌十六丁復十七蠱逢十八史記與漢書表同而楚漢春秋則不同者陸賈記事髙祖惠帝時漢書是後定功臣等列及陳平受吕后命而定或已改邑號故人名亦别且髙祖初定唯十八侯吕后令陳平終竟已下列侯第録如右凡一百四十三人也平陽懿侯曹參按漢書地埋志平陽縣屬河東懿諡也漢書音義曰曹參位第二而表在首蕭何位第一而表在十三者以封先後故也又按封參在六年十二月封何在六年正月髙祖十月因秦改元故十二月在正月前也漢表具記位次而亦依封前後錄也夷侯畤音止又音市按曹參系家作時今表或作畤按漢書衛青平西曹夀尚陽信公主即此人當是字訛信武肅侯靳歙按地理志無信武縣當是後廢故也靳姓也音紀覲反歙音攝又音吸也清陽漢表清河定侯王吸地理志青陽縣屬清河郡楚漢春秋作清陽侯王隆也侯彊其良反侯伉苦浪反汝隂文侯夏侯嬰汝隂縣屬汝南凡縣名皆據地理志不言者從省文也陽陵景侯傅寛陽陵縣屬馮翊楚漢春秋作隂陵廣嚴壯侯吕歐漢晉書地道記廣縣在東莞壯諡也下又云壯班馬二史並誤也歐烏侯反廣平敬侯辥歐廣平縣屬臨淮至孫澤改封平棘也博陽壯侯陳濞楚漢春秋名濆博陽縣在汝南縣孫始復封塞在桃林也曲逆獻侯陳平縣名屬中山章帝改曰蒲隂也堂邑安侯陳嬰縣名屬臨淮也定豫章浙江都浙自立為王壯息按漢表作定浙江都浙自立為王壯息侯𤣥孫融以公王子改封隆慮音林廬也周吕令武侯吕澤應劭云周吕國也按周及吕皆國名濟隂有吕都縣令武諡也一云令邑武諡也又改封令令縣名在滎陽出晉地道記子台封酈音厯一作鄜音敷建成康侯吕釋之縣名屬沛郡吕宣王吕公子也子祿初封胡陵侯後封趙王也留文成漢表文平侯張良韋昭云劉今在彭城按良傳諡文成也射陽頃侯劉纏項伯也射陽屬臨淮射一作貫酇文終侯蕭何縣名在沛音贊劉氏云以何子禄嗣無後除吕后封何夫人兒南陽酇恐非也少子延封筑陽侯音逐也曲周景侯酈商縣名屬廣平縣堅紹封絳武侯周勃縣名屬河東子亞夫為條侯小子堅為平曲侯也舞陽武侯樊噲縣名屬潁川子伉嗣吕須子潁隂懿侯灌嬰縣名屬潁川孫賢封汝侯汾陽悼侯周昌縣名屬河東初起以職志如淳云職志官名主幡旗孫左車封安陽侯梁鄒孝侯武儒漢表儒作虎梁鄒縣名屬濟南子最嬰齊及孫山祔音夫也成敬侯董渫縣名屬涿郡渫音息列反子赤封節氏侯蓼侯孔藂蓼縣名屬六安姚氏按孔子家語云子武生鮒子魚及子文文生最字子産説文以最為積聚字此作藂不同初以将軍都尉屬韓信即漢五年圍羽垓下淮隂侯将四十萬自當之孔将軍居左費将軍居右是也費将軍即費侯陳賀也侯臧嗣為太常按孔藂云臧歴位九卿為御史大夫辭曰臣經學乞為太常典禮臣家業與安國綱紀古訓武帝雖違其意遂拜太常典禮賜如三公臧子琳位至諸侯琳子璜夫侯爵此云臧國除當是後更封其子也費圉徐云一作豳侯陳賀費音祕一音扶未反縣名屬東海子最改封單侯也陽夏侯陳狶縣名屬淮陽狶音虚紀反隆慮哀漢表作克也侯周竈縣名屬河内音林閭隆避殤帝諱改也連敖徐廣以連敖為典客官也以長鈹都尉按以長鈹為官名説文云鈹者劍刀装也鈹音敷皮反漢表作鉟音丕也陽都敬侯丁復音伏漢志闕晉書地道記屬琅邪新陽漢表陽信也胡侯吕青縣名屬汝南也東武貞侯郭蒙縣名屬琅邪什邡肅侯雍齒縣名屬廣漢音十方汁又如字棘蒲剛侯陳武漢志闕也都昌莊侯朱軫漢志闕武彊莊侯不識漢志闕貰齊侯吕博國縣名屬鉅鹿貰音世一音時夜反諡法執心克莊曰齊侯倩青練反又七浄反也海陽齊信侯搖毋餘按毋餘東越之族也海陽亦南越縣地理志闕又侯昭攘漢表作昭襄也南安莊侯宣虎縣名屬犍為建安亦有此縣為亞将漢表作連将也肥如敬侯蔡寅縣名屬遼西應劭云肥子奔燕燕封於此封國也如徃也因以為縣也曲城圉侯蠱達蠱音如字曲城縣漢志闕表在涿郡楚漢春秋云夜侯蠱達葢改封也夜縣屬東萊又諡法威徳强武曰圉子恭侯捷封垣故位次曰夜侯垣亦誤不用赤側為賦按時用赤側錢而汝南獨不以為賦也河陽莊侯陳涓縣名屬河内淮隂侯韓信縣名屬臨淮下文信為典客漢表作粟客葢字誤按傳作治粟都尉或先為連敖典客芒侯耏跖縣名屬沛郡耏跖音而隻二音耏又音人才反字林以多須髮曰耏耏姓也左傳宋有耏班也南宫公主芒侯孫張侯申尚南宫公主景帝女初南宫侯張坐尚之有罪後張侯耏申尚之也故市侯閻澤赤縣名屬河南栁丘齊侯戎賜縣名屬勃海魏其莊侯周定縣名屬琅邪祈穀侯繒賀縣名屬太原諡法行見中外云穀平悼侯沛嘉縣名屬河南魯侯奚涓縣名屬魯國涓無子封中母侯疵也故城莊侯尹恢漢表作城父屬沛郡任侯張成縣名屬廣平漢表作張越棘丘侯襄漢志棘丘地闕襄名也史失姓及諡阿陵頃侯郭亭縣名屬涿郡也起單父塞路入漢一云塞疏一云以衆疏入漢按塞路字誤為疏小顔云主遮塞要路昌武靖信侯單甯單甯音善佞漢志昌武闕髙宛利侯丙倩縣名屬千乘倩七浄反宣曲齊侯丁義漢志闕子通復封發婁絳陽齊侯華無害漢志闕漢作終陵也東第敬侯劉釗漢志闕一作柔也斥丘懿侯唐厲縣名屬魏郡破籍武城初為武城侯後擊布改封斥丘臺定侯戴野按臨淄鄉有臺鄉縣安國武侯王陵縣名屬中山樂成節侯丁禮漢志闕辟陽幽侯審食其縣名屬信都安平敬侯諤千秋縣名屬涿郡蒯成尊侯周緤漢志闕晉書地道記屬北地按緤封池陽後定封蒯成音苦壞切小顔音普背反鄲康應侯緤少子紹封鄲按漢志屬沛郡如淳引闞駰州志音多侯中居音仲也北平文侯張蒼縣名屬中山為計相也髙胡侯陳夫乞漢志闕厭次侯元項漢表作爰類按厭次漢志闕晉書地道記屬平原後屬樂陵國也平臯煬侯劉他縣名屬河内木姓項賜劉氏復陽剛侯陳胥縣名屬南陽復音扶應劭云在桐柏山下復水之陽也陽河齊侯卞訢漢表作其石哀侯章改封埤山音卑也朝陽齊侯華寄縣名屬南陽棘音紀力反陽壯侯得臣縣名屬南陽湼陽壯侯吕勝縣名屬南陽按五侯斬項籍皆諡壯漢表以為莊皆避諱改作嚴誤也平棘懿侯執徐廣曰漢表作林摯平棘縣名屬常山也羮頡侯劉信髙祖兄子深澤齊侯趙将夜縣名屬中山漢表作将夕柏至靖侯許温漢表作許盎柏志漢志闕又云以駢鄰從姚氏憐鄰聲相近駢鄰猶比鄰也説衛者説税也税衛謂軍行初舍之時主為衛也中水壯侯吕馬童縣名屬涿郡應劭云易滱二水之中杜衍莊侯王翳縣名屬南陽漢表作王翥也赤泉莊侯楊嘉漢志闕孫無害復封臨汝栒項侯温疥縣名在扶風音荀故周文王封其子之邑河東亦有郇城也武原靖侯衛胠漢志武泉闕表胠作音脅又音怯磨簡侯程黑磨漢志闕表作歴歴縣在信都劉氏依字讀言天下地名多既無定證且依字是不決之詞地之與邑並無磨誤也槀祇侯陳錯漢表作錯音措三蒼云九江人名鐵曰錯漢志槀縣屬山陽也宋子惠侯許瘛音尺制反郭璞音胡計反亦作􅕆字林音巨月反漢志宋子縣名屬鉅鹿也猗氏敬侯陳遫縣名屬河東遫音速清簡侯空中同空一作窒窒中姓見風俗通清縣屬東郡彊簡侯留勝漢志彊闕彭簡侯秦同漢表屬東海郡吳房莊侯楊武縣名屬汝南甯莊侯魏選漢表甯陽屬濟南也昌圉侯盧卿縣名屬琅邪漢表姓玈玈即盧古玈弓字亦然也共莊侯盧罷師縣名屬河内子惠侯黨閼氏節侯馮解敢縣名屬安定漢表太尉作大與大與爵名音泰也安丘懿侯張説音悦安丘縣名屬北海也合陽侯劉仲仲名嘉髙祖弟初封代王合陽屬馮翊襄平侯紀通縣名屬臨淮龍敬侯陳署廬江有龍舒縣葢其地也繁莊侯瞻漢表作平嚴侯張瞻此作强瞻地理志有繁陽恐别有繁縣志闕陸量侯須母漢表作須無如淳據始皇紀所謂陸量地按今在江南也髙京侯周成漢志闕周苛子離侯鄧弱漢志闕又失此侯封及絶按楚漢春秋亦闕漢表成帝時光禄大夫滑堪曰旁占驗曰鄧弱以長沙将兵侯是所起也義陵侯吳程徐廣云一作義陽義陽在汝南宣平武侯張敖楚漢春秋南宫侯張耳此作宣平侯敖敖耳子陳平録第時耳薨孫廣封睢陽也東陽武侯張相如縣名屬臨淮開封閔侯陶舍縣名屬河南子夷侯青為丞相也沛侯劉濞縣名屬沛郡慎陽侯欒説漢表作樂説慎陽屬汝南如淳曰音慎若闞駰合作順陽續漢書作滇陽禾成孝侯公孫耳漢表耳作昔禾成漢志闕堂陽哀侯孫赤縣名屬鉅鹿祝