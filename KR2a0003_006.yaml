子俞侯欒布俞音輸縣名屬清河建平哀侯程嘉縣名屬沛郡平曲侯公孫昆漢書作渾也耶按漢表在髙城江陽康侯蘇嘉漢表作蘇息又云縣在東海也遽侯横按漢表鄉名在常山趙相建徳之子史失其姓新市侯王康縣名屬鉅鹿趙内史王慎子也商陵侯趙周漢表在臨淮楚相趙夷吾子也山陽侯張當居楚相張尚之子安陵侯子軍匈奴王降也垣侯賜縣名屬河東匈奴王降也遒侯李隆彊縣名屬涿郡音玆鳩反匈奴王降容成侯唯徐廬縣名屬涿郡匈奴王降也易侯僕黥縣名屬涿郡匈奴王降范陽靖侯代縣名屬涿郡匈奴王降也翕侯邯鄲漢表在内黄匈奴王降亞谷一作惡父也簡侯盧他父漢表在河内故燕王盧綰子隆盧音林閭侯􅶎縣名屬河内長公主嫖子也乗氏侯買縣名屬濟隂梁孝王子嗣為梁王也桓邑侯明梁孝王子葢靖侯王信漢表在勃海孝景后子塞侯直不疑御史大夫擊吳楚武安侯田蚡縣名屬魏郡孝景后同母弟周陽懿侯田勝縣名屬上郡孝景后同母弟右孝景時三十一史記索隠卷六
