body:
  text: 史記索隱正史類提要臣等謹案史記索隱三十卷唐司馬貞撰貞河內人開元中官朝散大夫𢎞文館學士初受史記於崇文館學士張嘉㑹病褚少孫補司馬遷書多傷踳駁又裴駰集解舊有音義年逺散佚諸家音義延篤章隱鄒誕生栁顧言等書亦失傳而劉伯莊許子儒等又多踈漏乃因裴駰集解撰為此書首注駰序一篇載其全文其注司馬遷書則如陸德明經典釋文之例惟標所注之字蓋經傳别行之古法凡二十八卷末二卷為述贊百三十篇及補史記條例欲降秦本紀項羽本紀為系家而吕后孝惠各為本紀補曺許邾吳芮吳漢淮南系家而降陳涉於列傳蕭何曺參張良周勃五宗三王各為一傳而附國僑羊舌肸於管晏附尹喜莊周於老子附韓非於商鞅附魯仲連於田單附宋玉於屈原附鄒陽於枚乘賈生又謂司馬相如汲鄭傳不宜在西南夷後大宛傳不合在游俠酷吏之間欲更其次第其言皆有條理至謂司馬遷述贊不安而别為之則未喻言外之㫖終以三皇本紀自為之注亦未合闕疑傳信之意也此書本於史記之外别行及明代刋刻監本合裴駰張守節及此書散入句下恣意刪削如髙祖本紀母媪母溫之辨有關考證者乃以其有異舊說除去不載又如燕世家啓攻益事貞注曰經傳無聞未知其由雖失於考據竹書案今本竹書不載此事此據晉書束晳傳所引亦當存其原文乃以為冗句亦刪汰之此類不一漏略殊甚然至今沿為定本與成矩所刋朱子周易本義人人明知其非而積重不可復返矣此本為北宋祕省大字刋本毛晉得而重刻者録而存之猶可以見司馬氏之舊而正明人之疏舛焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀史記集解序班固有言曰固撰漢書作司馬遷傳評其作史記所採之書兼論其得失故裴駰此序先引之為說也按固字孟堅扶風人後漢明帝時仕至中護軍祖稚廣川太守父彪徐令續太史公書也司馬遷據左氏國語仲尼作春秋經魯史左丘明作傳合三十篇故曰左氏傳國語亦丘明所撰上起周穆王下迄敬王其諸侯之事起魯莊公迄春秋末凡二十一篇采世本戰國策劉向云世本古史官明於古事者之所記也録黃帝已來帝王諸侯及卿大夫系諡名號凡十五篇也戰國策髙誘云六國時縱橫之說也一曰短長書亦曰國事劉向撰為三十三篇名曰戰國策按此是班固取其後名而書之非遷時已名戰國策也述楚漢春秋漢太中大夫楚人陸賈所撰紀項氏與漢髙祖初起及說惠文間事按其後事迄于天漢武帝年號言太史公所記迄至武帝天漢之年也其言秦漢詳矣至於采經托傳按字書托拾也音之赤反分散數家之事甚多疏略或有抵捂抵音丁禮反捂音吾故反抵者觸也捂亦針相抵觸之名按今屋梁上斜柱曰柱捂是也直觸橫觸皆曰抵針觸謂之捂下觸謂之抵抵捂言其參差也以下彼此二文同出一家而自相乖舛也亦其所涉獵者廣博貫穿經傳馳騁古今上下數千載間斯已勤矣又其是非頗謬於聖人聖人謂周公孔子也言周孔之教皆宗儒尚德今大史公乃先黃老崇勢利是謬於聖人也論大道則先黃老而後六經序游俠則退處士而進姦雄游俠謂輕死重氣如荆軻豫讓之輩也游從也行也俠挾也持也言能相從游行挾持之事又曰同是非曰俠也述貨殖則崇執利而羞貧賤此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辨而不華質而不俚俚音里劉德曰俚即鄙也崔浩云世有鄙俚之語則俚亦野也俗也不俚謂詞不鄙朴也其文直其事核不虛美不隱惡謂之實録駰以為固之所言世稱其當雖時有紕繆紕音匹之反紕猶錯也亦作悂字書云織者兩絲同齒曰悂繆亦與謬同實勒成一家總其大較較音角較猶略也則大較猶言大略也信命世之宏才也按孟子云五百年生一賢其間必有名世者趙岐曰名世次聖之才物來能名正一世者生於聖人之間也此言命者名也言賢人有名於世也宏才大才謂史遷也考校此書文句不同有多有少莫辨其實而世之惑者定彼從此是非相貿真僞舛錯故中散大夫東莞徐廣研核衆本為作音義具列異同兼述訓解粗有所發明而殊恨省略殊絶也左傳曰斬其木不殊言絶恨其所撰大省略也聊以愚管按東方朔云以管窺天以蠡測海皆喻小也然此語本出莊子文今云愚管者是駰謙言也愚陋管見所識不能逺大也增演徐氏采經傳百家并先儒之說豫是有益悉皆抄內刪其游辭取其要實或義在可疑則數家兼列漢書音義稱臣瓚者莫知氏姓案即傅瓚而劉孝標以為于瓚非也據何法盛晉書于瓚以穆帝時為大將軍誅死不言有注漢書之事又其注漢書有引祿秩令及茂陵書然彼二書亡于西晉非于所見也必知是傅瓚者按穆天子傳目録云傅瓚為校書郎與荀勗同校定穆天子傳即當西晉之朝在于之前尚見茂陵等書又稱臣者以其職典祕書故也瓚音殘岸反今直云瓚曰又都無姓名者但云漢書音義時見微意有所裨補譬嘒星之繼朝陽嘒微小貌也詩云嘒彼小星三五在東言衆無名微小之星各隨三心五噣出在東方亦能繼朝陽之光嘒音火慧反朝陽日也嘒星繼朝陽喻已淺薄而注史記也飛塵之集華嶽以徐為本號曰集解未詳則闕弗敢臆說人心不同聞見異辭班氏所謂疏略抵捂者依違不悉辨也裴氏言今或依違不復更辨明之也按周公世家序傳曰依之違之周公綏之也愧非胥臣之多聞晉大夫曰季名曰胥臣按國語稱晉文公使趙衰為卿辭曰欒枝貞慎先軫有謀胥臣多聞皆可以為輔又胥臣對文公黃帝二十五子及屯豫皆八等事是多聞也子産之博物鄭卿公孫僑字子産按左氏傳子産聘晉言晉侯之疾非實沈臺駘之祟乃說飲食哀樂及內官不及同姓則能生疾晉侯聞子産之言曰博物君子也妄言末學蕪穢舊史豈足以關諸畜德庶賢無所用心而已關預也畜德謂積德多學之人也裴氏謙言已今此集解豈足關預於積學多識之士乎正是冀望聖賢勝於飽食終日無所用心愈於論語不有博奕者乎之人耳
