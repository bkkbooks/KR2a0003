body:
  text: 史記索隠卷三唐司馬貞撰項羽本紀第七下相縣名屬臨淮案應劭云相水名出沛國沛國有相縣其水下流又置縣故名下相也字羽按下序傳籍字子羽也季父按崔浩云伯仲叔季兄弟之次故叔云叔父季云季父也項燕此云為王翦所殺與楚漢春秋同而始皇本紀云項燕自殺不同者葢項燕為王翦所圍逼而自殺故不同耳封於項地理志有項城縣屬汝南也櫟陽逮按逮訓及也謂有罪相連及為櫟陽縣所逮録也故漢史每制獄皆有逮捕也抵櫟陽按服䖍云抵歸也韋昭云抵至也劉伯莊云抵相慿託也故應劭云項梁曽坐事繫櫟陽獄從蘄獄掾曹咎取書與司馬欣抵歸已息也渡浙江韋昭云浙江在今錢塘浙音折獄之折晉灼音逝非也葢其流曲折莊子所謂淛河即其水也淛折聲相近也扛鼎説文云横闗對舉也韋昭云扛舉也音江起大澤中徐氏以為在沛郡即蘄縣大澤中先即制人按謂先舉兵能制得人後則為人所制故孫卿子曰制人之與為人制也其相去逺矣數十百人此不定數也自百已下或至八十九十故云數十百慴伏説文云讋失氣也音之涉反已下東陽下音如字按以兵威伏之曰下胡嫁反彼自歸伏曰下如字讀他皆放此東陽縣名屬廣陵也異軍倉頭特起晉灼曰殊異其軍為蒼頭謂著青帽如淳云特起猶言新起也按為蒼頭軍特起陳嬰母不許嬰稱王言天下方亂未知瞻烏之止注潘旌人按潘旌是邑聚之名後為縣屬臨淮也黥布蒲将軍按布姓英咎繇之後以罪被黥故改姓黥應相者之言韋昭云蒲姓也是英布與蒲将軍二人共以兵屬項梁也服䖍以為英布起蒲非也按布初在江湖居鄛人晉灼音勦絶之勦地理志居鄛縣廬江郡音巢是故巢國夏桀所奔荀悦漢紀云范増阜陵人也楚南公徐廣云楚人善言隂陽者見天文志也楚雖三戸臣瓚與蘇林解同謂楚人怨秦雖三戸猶足亡秦韋昭以為三户楚三大姓昭屈景也二説皆非也三户地名蠭午凡物交横為午言蠭之起交横屯聚也故劉向傳注云蠭午雜沓也又鄭𤣥曰一縱一横為午注與國黨與按髙誘注戰國策云與國同禍福之國也以市於齊按張晏云市貿易也韋昭云市利于齊也故劉氏亦云市猶要也留田假而不殺欲以要脅田榮也髙陵縣按晉灼云屬琅琊至安陽按傅寛傳云從攻安陽扛里則安陽與扛里俱在河南顔師古以為今相州安陽按此兵猶未渡河不應即至相州安陽今檢後魏書地形志云己氏有安陽城隋改己氏為楚丘今宋州楚丘西北四十里有安陽故城是也搏牛之蝱不可以破蟣蝨張晏云搏音博韋昭云蝱大在外蝨小在内故顔師古言以手擊牛可以殺其上蝱而不能破其内蝨喻方欲滅秦不可與章邯戰也鄒氏搏音附今案言搏牛之蝱本不擬破其上之蟣蝨以言志在大不在小也無鹽按地理志東平郡之縣在今鄆州之東也飲酒髙會韋昭曰皆召髙爵者故曰髙會服䖍云大會是也芋菽芋蹲䲭也菽豆也故臣瓚曰士本食蔬菜以菽半雜之則芋菽義亦通漢書作半菽徐廣曰芋一作半半五升也王劭曰半量器名容半升也而徇私私謂使其子相齊是徇其私情崔浩云徇營也司馬門按天子門有兵欄曰司馬門也馬服韋昭云趙奢子括也代號馬服崔浩云馬服趙官名言服武事榆中地服䖍云金城縣所治蘇林曰在上郡崔浩云䝉恬樹榆為塞也與諸侯為從此諸侯謂闗東諸侯也可以知然文頴曰闗東為從闗西為横髙誘曰闗東地形從長蘇秦相六國號為合從闗西地形横長張儀相秦壊闗東從使與秦合號曰連横鈇質公羊傳云加之鈇質休云要斬之罪崔浩云質斬椹也又郭注三蒼云質莝椹也候始成候軍候官名始成其名三户水經注云漳水東經三户峽為三户津也淇當為湛案晉八王故事云王浚伐鄴前至梁湛葢梁湛在鄴西四十里孟康云在鄴西三十里又闞駰十三州志云鄴北五十里梁期故縣也字有不同汙水汙音于郡國志鄴縣有汙城酈元云汙水出武安山東南經汙城北入漳洹水殷虚按釋例云洹水出汲郡林慮縣東北至長樂入清水是也汲冢古文云盤庚自奄遷于北冢曰殷虚南去鄴州三十里是殷虚南舊地名號北冢也函谷闗文穎曰在𢎞農縣衡山嶺今移在穀城顔師古云今桃林縣南有洪滔澗水即古之函闗按山形如函故稱函闗項伯名纏字伯後封射陽侯跽其紀反謂長跪啗音徒覽反凡以食餧人則去聲自食則上聲紀信漢書作紀通通紀成之子唉音虚其反皆歎恨發聲之辭沐猴而冠耳果然言獮猴不任久著冠帶以喻楚人性躁暴果然言果如人言也業已講解服䖍云解折伏也説文云講和解也漢書作媾解蘇林云媾和也是講之與媾俱訓和也業事也言雖有疑心然事已和解也都廢丘孟康曰縣名今槐里是也韋昭曰周時名犬丘懿王所都秦欲廢之故曰廢丘都髙奴按今鄜州有髙奴城六六縣古國臯陶之後都臨菑按髙紀及田儋傳云臨濟此言臨菑誤戲下戲音羲水名也言下者如許下洛下然也按上文云項羽入至戲西鴻門沛公還軍霸上是羽初停軍於戲水之下後雖引兵西屠咸陽燒宫室則亦還戲下今言諸侯罷戲下是各受封邑號令訖自戲下各就國何須假借文字以為旌麾之下乎顔師古劉伯莊之説皆非漢王部按漢書見作劫字注塞翟殷韓按徐廣韋昭皆數翟塞及殷韓等顔師古不數三秦謂常山河南韓魏殷顧𦙍意峈同乃以陳餘兵為五未知孰是鄙意按韓王鄭昌拒漢漢使韓信擊破之則韓兵不下而已破散也韓不在此數五諸侯者塞翟河南魏殷也靈壁東孟康曰故小縣在彭城南審食其食音異按酈審趙三人同名其音合並同以六國時衛有司馬食其並慕其名注一嵗力役三十倍于古者按姚氏云古者更卒不過一月踐更五月而休又顔云五當為三言一嵗之中三月居更三日戍邊總九十三日古者役人嵗不過三日此所謂一嵗力役三十倍于古也斯説得之漢王逃音徒凋反漢書作跳字髙俎俎亦人之類故夏侯湛新論為機機猶俎也比太公於牲肉故置之俎上姚察按左氏楚子登巢車以望晉軍杜預為車上櫓也故李氏云軍中巢櫓又引時人亦謂此為俎也汜水按今此水見名汜水音似張晏云在濟隂亦未全失按古濟水當此截河而南又東流溢為滎澤然水南曰隂此亦在濟之隂非彼濟隂郡耳臣瓚之説是垓下張揖三蒼注云垓堤名在沛郡烏江按晉初屬臨淮檥船檥字服應孟晉各以意解耳鄒誕本作漾船以尚反劉氏亦有此音中水按晉書地道記其中水縣屬河間杜衍按地理志縣在南陽按表作王翥也赤泉南陽有丹水縣疑赤泉後改按漢書表及後漢改憙音火志反吳防地理志縣名屬汝南故房子國湼陽地理志南陽縣名髙祖本紀第八姓劉氏按髙祖劉累之後别食邑於范士會之裔留秦不反更為劉氏劉氏隨魏徙大梁後居豐今言姓劉氏者是左傳天子建徳因生以賜姓胙之土命之氏諸侯以字為諡因以為族説者以為天子賜姓命氏諸侯命族族者氏之别名也然則因生賜姓若舜生姚墟以為姚姓封之於虞即號有虞氏是也若其後子孫更不得賜姓即遂以虞為姓云姓虞氏今此云姓劉氏亦其義也故姓者所以統繫百代使不别也氏者所以别子孫之所出又系本篇言姓則在上言氏則在下故五帝本紀云禹姓姒字契姓子氏棄姓姬氏是也字季按漢書名邦字季此單云字亦又可疑按漢髙祖長兄名伯次名仲不見别名則季亦是名也故項岱云髙祖小字季即位易名邦後因諱邦不諱季所以季布猶稱姓也沛小沛按漢改泗水為沛郡治相城故以沛為小沛也父曰太公皇甫謐云名執嘉王符云太上皇名燸與湍同音母媪韋昭云婦人長老之稱皇甫謐云媪葢姓王氏又據春秋握成圖以為執嘉妻含合始遊洛池生劉季詩含神霧亦云姓氏皆非正史所出葢無可取今近有人云母温氏貞時打得班固泗水亭長古石碑文其字分明作温字云母温氏貞時與賈膺復徐彦伯魏奉古等執對反覆深歎古人未聞聊記異見於何取實注地神曰媪按禮樂志云后土富媪張晏曰坤為母故稱媪是也見蛟龍於其上按詩含神霧云赤龍感女媪劉季興又廣雅云有鱗曰蛟龍隆準應劭曰隆髙也李斐云準鼻也始皇蜂目長凖葢鼻髙起龍顔應劭云顔顙也爾雅顔額也文穎曰髙祖感龍而生故其顔貌似龍長頸而髙鼻貰酒鄒誕貰音世與字林聲韻並同又音時夜反廣雅云貰賖也説文云貰貸也臨淮有貰陽縣漢書功臣表貰陽侯劉纏而此紀作射陽則貰亦射也讐數倍樂産云借讐為售葢古字少假借耳今亦依字讀葢髙祖大度既貰飲且讐其數倍價也折券周禮小司寇云聴稱責以傅别鄭司農云傅别券書也康成云傅别謂大字書於札中而别之也然則古用簡札書故可折至嵗終總棄不責也咸陽韋昭云秦所都武帝更名渭城應劭云今長安也按闗中記云孝公都咸陽今渭城是在渭北始皇都咸陽今城南大城是也名咸陽者山南曰陽水北亦曰陽其地在渭水之北又在九嵕諸山之南故曰咸陽單父人吕公韋昭云單父縣名屬山陽崔浩云史失其名但舉姓而言公又按漢書舊儀云吕公汝南新蔡人又相經云魏人吕公名文字叔平也主進鄭氏云主賦斂禮錢也顔師古曰進者會禮之財字本作賮聲轉為進宣帝數負進義與此同乃紿為謁韋昭云紿詐也劉氏云紿欺負也何休云紿疑也謂髙祖素狎易諸吏乃詐為謁謁謂以札書姓名若今之通刺而兼載錢數也告歸之田韋昭云告請歸乞假也音告語之告故戰國策曰商君告歸延篤以為告歸今之歸寧也劉伯莊劉師古並音古篤反非號嚳兩音也如嘷呼之嘷按東觀漢記田邑傳云邑年三十歴卿大夫號歸罷厭事少所嗜欲尋號與嘷同古者當有此語故服氏云如號呼之號音豪今以服䖍雖據田邑號歸亦恐未得然此告字當音誥誥號聲相近故後誥歸號歸遂變耳以竹皮為冠應劭云一名長冠側竹皮裹以縱前髙七寸廣三寸如板又蔡邕獨斷云長冠楚制也髙祖以竹皮為之謂之劉氏冠司馬彪輿服志亦以劉氏冠為雀尾冠也求盜應劭云舊亭卒名弩父陳楚謂之亭父或云亭部淮泗謂之求盜也夜徑舊音經按廣雅云徑斜過也字林云徑小道也音古定反言酒後放徒夜徑行澤中不敢由正路且從而求疾也當徑音逕鄭𤣥曰步道曰徑也拔劍斬虵漢舊儀云斬虵劍長七尺又髙祖云吾以布衣提三尺劍取天下二文不同者崔豹古今注髙祖為亭長理應提三尺劍耳及貴當别得七尺寶劍故舊儀因言之分為兩謂斬虵分為兩段也欲告之漢書作苦謂欲困苦辱之一本或作笞説文云笞擊也注畦畤按太康地理志云畤在櫟陽故城内其畤如畦故曰畦畤畦音戸圭反注秦自謂水按秦文公獲黑龍命為徳水是也按春秋合城圖云水神哭子褒敗宋均以髙祖斬白虵而神母哭則此母水精皆非也注至光武乃改謂改漢為火徳秦金徳與兩金及赤帝子之理合也髙祖覺包愷劉伯莊音古孝反自負晉灼云自恃斬虵事以厭一􅒒反又一冉反廣雅云厭鎮也秦二世應劭云始皇欲以一至萬示不相襲始者一故至子稱二世崔浩云二世始皇子胡亥又按善文稱隠士云趙髙為二世殺十七兄而立今王則二世是第十八子也起蘄蘄縣名屬沛音機又音旂掾主吏案漢書蕭曹傅參為獄掾何為主吏也劫衆説文云以力脅之云劫也數十百人漢書作數百人劉伯莊云言數十人或至百人則是百人已下也屠沛按范曄云尅城多所誅殺故云屠也壹敗塗地言一朝破敗使肝腦塗地注割盧山交按管子云葛盧之山發而出金今注引發作交及割皆誤也釁鼓應劭云釁祭也説文云釁血祭也司馬法曰血于鼙鼔者神戎器也顔師古曰凡殺牲以血祭者皆名為釁臣瓚以為皆無祭事非也又以釁為塗釁而應劭云釁呼為舋馬融注周禮灼龜之兆與玉之釁㙤相似㙤音火故反皆非也旗幟墨翟云幟帛長丈五廣半幅字詁云幟標也字林云熊旗五斿為與士卒為期於其下故曰旗也幟或作識或作志嵇康音試蕭該音熾胡陵鄧展曰縣名屬山陽章帝改曰胡陸方與鄭𤣥曰屬山陽也周章應劭云章字文陳人至戲文穎云在新豐東二十里戲亭北孟康云水名也又述征記云戲水自驪山馮公谷北流歴戲亭東入渭按今其水東為戲驛也而還為章邯所破而還邯音酣燕趙齊魏皆自立為王按髙紀二世二年八月武臣自立為趙王田儋自立為齊王韓廣自立為燕王魏咎自立為魏王也泗川監平如淳云秦并天下為三十六都置守尉監故此監平下有守壯則平壯皆名也走至戚晉灼曰東海縣也鄭徳包愷並如字讀李登音干笠反也左司馬得顔師古云得司馬之名非也今以後云左司馬曹無傷自此以下更不見替易處葢是司馬無傷得泗川守壯而殺之耳亢父舊音㓻劉伯莊包愷並同音苦浪反東陽甯君秦嘉臣瓚以為二人按下文直云東陽甯君又别言秦嘉明臣瓚之説為得顔師古以甯是姓君者時人號曰君耳在留韋昭云今彭城留縣也從陳别将謂章邯從陳别将兵向他處而遣司馬􅊂将領兵士北定楚地故如淳云􅊂章邯司馬也孔文祥亦曰邯别遣􅊂屠相又一説云從謂追逐之言章邯討逐陳别将而司馬􅊂别将兵北定楚亦通屠相韋昭云相沛縣至碭應劭云碭屬梁國蘇林音唐又音宕蕭西韋昭云蕭沛之縣名謂在蕭縣之西也拔之按范曄云得城為拔是也下邑韋昭云縣名屬梁國襄城韋昭云潁川縣盱台韋昭云臨淮縣音吁夷也東阿韋昭云東郡之縣名城陽按地理志屬濟隂濮陽韋昭云東郡之縣名定陶按地理志濟隂之縣也雍丘韋昭云故杞國今陳留之縣外黄韋昭云上陳留縣宋義荀悦漢紀云故楚令尹宋義當别有所出也趙歇蘇林音如字鄭徳音遏絶之遏徐廣音烏轄反今依字讀之也吕青按表青封信陽侯也闗中韋昭云函谷武闗也又三輔舊事云西以散闗為界東以函谷為界二闗之中謂之闗中奮韋昭云憤激也僄悍説文云僄疾也悍勇也方言云僄輕也劉音疋妙反也猾賊漢書作禍賊也成陽在濟隂韋昭云在潁川非也扛里服䖍云縣名如淳云秦軍所别屯地名也栗韋昭云縣名屬沛廣韋昭云在山陽開封韋昭云河南縣白馬韋昭云東郡縣曲遇徐廣云在中牟韋昭云志不載司馬彪郡國志中牟有曲遇聚也滎陽韋昭云故衛地河南縣也注緱氏東南按十三州志云河南緱氏縣以山為名一云轘轅凡九十二曲是險道也守齮音檥許慎以為側齧也黎明音犂黎猶比也謂比至天明也漢書作遲音值值待也謂待天明皆言早意也圍宛城按楚漢春秋曰上南攻宛匿旌旗人銜枚馬束舌雞未鳴圍宛城三匝也乗城李奇曰乗守也韋昭曰乗登也殷侯韋昭曰在河内丹水韋昭曰在河内襄侯王陵按王陵封安國侯是定天下為丞相時封耳此言襄侯當如臣瓚解葢初封江夏之襄也胡陽韋昭曰南陽縣析酈鄒誕音錫酈音厯蘇林如淳音擲折屬𢎞農酈屬南陽出地理志而左傳云折一名白羽顔師古云析今内鄉縣酈今菊潭縣武闗左傳云楚司馬起營所以臨上雒謂晉人曰将通於少習杜預以為商縣武闗也又太康地理志武闗當冠軍縣西嶢闗在武闗西也璽符節韋昭云天子印稱璽又獨以玉符發兵符也節使者所擁也説文云符信也漢制以竹長六七分而相合釋名云節為號令賞罰之節也又節毛上下相重取象竹節又漢官儀云子嬰上始皇璽因服御之代代傳受號曰漢傳國璽也或言誅秦王楚漢春秋曰樊噲請殺之枳道音只按漢宫殿疏云枳道亭東去霸城觀四里觀東去灞水百步蘇林云在長安東十三里也誹謗劉伯莊樂彦同音方未反棄市按禮云刑人於市與衆棄之故今律謂絞刑為棄市是也三章殺人傷人及盜抵罪韋昭云抵當也謂使各當其罪今桉秦法有三族之刑漢但約法三章耳殺人者死傷人及盜者使之抵罪餘並不論其辜以言省刑耳則抵訓為至殺人以外唯傷人及盜使至罪名耳或説沛公按楚漢春秋云解先生云遣守函谷無内項王而張良系家云鯫生説我則鯫生是小生即解生亞父范増也項羽得范増號曰亞父言尊之亞於父猶管仲謂仲父父並音甫也鴻門按姚察云在新豐古城東未至戲水道南有斷原南北洞門是也櫟陽因𦵏太上皇改曰萬年都六地理志云六縣屬六安國都邾太康地理志云楚滅邾遷其人於江南因名縣也當陽韋昭云南郡縣名入蝕中李奇音力孟康音食王劭按説文作􅀈器名也地形似器故名之音力也輒燒絶棧道按系家是用張良計也棧道閣道也音士諫反包愷音士板崔浩云險絶之處傍鑿山巖而施板梁也引兵圍廢丘按荀悦漢紀令樊噲圍之嶭歐按表歐以舍人從為将軍封廣平侯也王吸按表吸以中涓從為将軍封清陽侯陽夏韋昭云縣名屬淮陽後屬陳夏音更雅反漢王跳如淳曰跳走也晉灼桉劉澤傳跳驅至長安説文云徒調反通俗文云超通為跳滕公夏侯嬰為滕令故曰滕公也白馬津即黎陽津也南界東郡白馬縣燕郭西故南燕國也在東郡秦以為縣負約負音佩也卿子冠軍韋昭云宋義之號如淳曰卿者大夫之尊子男之爵冠軍人之首也尊宋義故加此號王諸将善地謂章邯等徙逐故主謂田市趙歇韓廣之屬乃捫足捫摸也中匈而捫足者葢以矢初中痛悶不知所在故爾或者中匈而捫足權以安士卒之心也行軍病甚按三輔故事曰楚漢相拒於京索間六年身被大創十二矢石通中過者有四也梟故塞王欣梟懸首於木也欣自剄於汜水上令梟之於櫟陽者以舊都故梟以示之也鴻溝應劭云在滎陽東南三十里葢引河東南入淮泗也張華云一渠東南流經浚儀是始皇所鑿引河灌大梁謂之洪溝一渠東經陽武南為官渡水經云中牟臺下臨淮水是為官渡水也楚歌應劭云今雞鳴歌也顔遊秦云楚歌猶吳謳也按髙祖令戚夫人楚舞自為楚歌楚之歌也心善家令言顔氏按荀悦云故雖天子必有尊也無父猶設三老况其存乎家令之言過矣晉劉寶云善其發悟己心因得尊崇父號也田肯漢紀及漢書作宵劉顯云相傳作肯也形勝韋昭云地形險固故能勝人也縣隔千里服䖍云謂函谷闗去長安千里為縣隔按文以河山險阻形勝其勢如隔千里也秦得百二蘇林曰百二百中之二二十萬人也虞喜云百二者得百之二言諸侯持㦸百萬秦地險固一倍於天下故云得百二馬言倍之也葢言秦兵當二百萬也齊得十二亦如之故為東西秦言勢相敵但立文相避故云十二言餘諸侯十萬齊地形號亦倍於他國當二十萬人也勃海崔浩云勃旁跌也旁跌出者横在濟北故齊都賦云海旁云勃也千里之外以言齊境濶不啻千里故云之外也為荆王乃王吳地在淮東也姚察按虞喜云總言吳别言荆者以山命國也今西南有荆山在陽羨界賈封吳地而號荆王指取此義太康地理志陽羨縣本名荆溪徙太原信初都陽翟也徙治長安按漢儀注髙祖六年更名咸陽曰長安三輔舊事渭城本咸陽也髙帝為新城七年屬長安也東闕北闕東闕名蒼龍北闕名𤣥武無西南二闕者葢蕭何以厭勝之法故不立也説文云闕門觀也髙三十丈秦家舊處皆在渭北立東闕北闕葢取其便也太上皇按蔡邕云不言帝非天子也又按本紀秦始皇追尊莊襄王為太上皇已有故事矣葢太上者無上也皇者徳大於帝欲尊其父故號曰太上皇也會缻上音鱠下音文偽反地名也漢書作缶音作保非也當城代之縣名也楚隠王系家作幽王名檡負芻之兄魏安釐王史闕名昭王之子王假之祖也齊緡王名地宣王子王建祖趙悼襄王名偃孝成王丹之子幽王遷之父也小人以僿鄭音先代反鄒本作薄音扶各反一作僿而徐廣云一作薄是本互不同也然此語本出子思子見今禮表記作薄故鄭𤣥注云文尊卑之差也薄茍習文法不悃誠也徐又音隠云僿音先志反僿塞聲相近故也葢僿猶薄之義也吕太后本紀第九吕太后諱雉字娥姁也戚姬如淳音怡非也茂陵書曰姬内官是矣然官號及婦人通稱姬者周之姓所以左傳稱伯姬叔姬以言天子之宗女貴於他姓故遂以姬為婦人美號故詩曰雖有姬姜不棄顦顇是也幾代上其紀反又音祈也吕台鄭氏鄒誕並音怡蘇林音胎大臣張良説孫通等留侯策令太子卑詞安車以迎四皓也令武令音齡異母母曰曹姬也永巷永巷别宫名有長巷故名之也掖庭按韋昭云以為在掖門内故謂之掖庭也泛音捧泛也注主孟啗我之比啗音徒濫反按主是謂里克安即優施之語事見國語孟者且也言且啗我物我教汝婦事夫之道比即夫人稱主之意耳比音必二反五年六年城就按漢宫闕疏四年築東而五年築北面漢舊儀城方六十三里經緯各十二里三輔舊事云城形似北斗也啑血鄒音使接反又云或作喢作丁牒反辟陽侯按韋昭云信都之縣名子山為襄城侯按下文更名義又改名𢎞農漢書襄城侯唯云名𢎞葢史省文耳按志襄城屬潁川軹侯按韋昭云河内有軹縣音紙也吕他音陁俞侯音輸贅其侯按表作臨淮也比殺三趙王比音如字比猶頻也趙隠王如意趙幽王友趙王恢是三趙王也猶與猶鄒音以獸反與音預又作豫崔浩云猶猿也卬鼻長尾性多疑又説文云猶獸名多疑故比之也按狐性亦多疑度水而聴水聲故云狐疑也今解者又引老子與兮若冬涉川猶兮若畏四鄰以為猶與是常語且猿狐聴而云若冬涉川則與是狐類不疑猶兮若畏四鄰則猶定是獸自不保同類故云畏四鄰也朱虚音墟琅琊縣也東牟韋昭云東萊縣隆慮音林盧二音避殤帝諱改也劉氏所立九王吳楚濟北淮南琅耶代常山王朝淮陽王武濟川王大是九也吕氏所立三王梁王産趙王禄燕王通也吕􅎐韋昭云吕后女弟樊噲妻封臨光侯今無處矣顔師古以為言見誅滅無處所也襄平侯通張晏云紀信子又晉灼云信被楚燒死不見有後按功臣表襄平侯紀通文成以将軍定三秦死事子侯則通非信子張説誤矣訟言誅之按韋昭云以訟為公徐廣又云一作公葢公為得然公言猶明言也又解者誦説也史記索隠卷三
