body:
  text: 史記索隱卷十六唐司馬貞撰陳丞相系家第二十六陽武戶牖鄉人徐廣云陽武屬魏而地理志屬河南郡蓋後陽武分屬梁國耳徐乂云戶牖今為東昏縣屬陳留與漢書地理志同按是秦時戶牖鄉屬陽武至漢以戶牖為東昏縣陳留郡也張負按負是婦人老宿之稱猶武負類也然此張負既稱富人或恐是丈夫爾負郭髙誘注戰國策云負背郭居也長者車轍一作軌按言長者所乘安車與載運之車軌轍或别里中社平為宰其里名庫上里知者據蔡雍陳留東昏庫上里社碑云惟斯庫里古陽武之牖鄉陳平由此社宰遂相髙祖也魏無知漢書張敞與朱邑書云陳平須魏倩而後進孟康云即無知也諸將盡歡歡譁也音歡又音喧漢書作皆怨更以惡草具戰國策云食馮暖以草具如淳云藁草粗惡之具也陛下弟出偽遊雲夢蘇林云弟且也小顔云但也南過曲逆章帝醜其名改云蒲隂也主臣蘇林與孟康同既古人所未了故並存兩解絳侯周勃系家第二十七其先卷人韋昭云屬河南地理志亦然然則後置滎陽郡而卷𨽻焉音丘玄反字林音丘權反勃以織薄曲為生謂勃本以織蠶薄為生業也韋昭云北方謂薄為曲許慎注淮南云曲葦薄也郭璞注方言云植懸曲柱也音直吏反常為人吹簫給喪事左傳歌虞殯猶今挽歌類也歌者或有簫管材官引強晉灼云申屠嘉為材官蹶張攻蒙虞二縣名地理志屬梁國擊章邯車騎殿孫撿説是東緡小顔音昏非也地理志山陽有東緡縣音旻然則戶牖之為東緡音昏是屬陳留者音昏屬山陽者音旻也攻齧桑徐氏云在梁彭城間阿下謂東阿之下也都關地理志縣屬山陽張地理志東郡夀梁縣光武改曰夀張至碭一嵗二月謂初起沛及還至碭得一嵗又更二月也虎賁令漢書云襄賁令賁音肥縣名屬東海徐廣又云句盾令所見本各别也擊趙賁軍尸北賁音肥人姓名也尸即尸鄉今偃師也謂尸縣之北威武或是封號未必縣名也攻槐里好畤最地理志二縣屬右扶風漆地理志漆縣在右扶風擊章平姚卬軍卬音五郎反平下將還下郿潁陽地理志郿屬右扶風潁陽屬左馮翊也廢丘地理志槐里周曰犬丘懿王都之秦更名廢丘髙祖三年更名槐里而此云槐里者槐里據後而書之又云廢丘者以章邯本都廢丘而亡亦據舊書之鍾離地理志縣名屬九江古鍾離子國燕王臧荼破之易下荼如字讀易水名因以為縣在涿郡謂破荼軍於易水之下言近水也馳道小顔以當髙祖所行之道或以馳道為秦之馳道故賈山傳云秦為馳道東窮燕齊也降下霍人蕭該云左傳以逼陽子歸納諸霍人杜預云晉邑也字或作霍硰石晉灼音赤座反乘馬絺絺名也乘音始證反雁門守圂圂守之名音胡困反守遫音速箕肆將勳劉氏肆音如字包愷音以四反漢書勳亦作博字並誤耳靈丘地理志縣名屬代郡御史大夫施屠渾都施名也屠滅之也地理志渾都縣屬上谷一云御史大夫姓屠名渾都沮陽按地理志沮陽縣屬上谷最從髙帝最都几也謂總舉其從髙祖攻戰克獲之數也其椎少文大顔云俗謂愚為鈍椎直追反今按椎如字讀之謂勃召説士東向而坐責之云趣為我語其質朴之性以斯推之其少文皆如此獄吏乃書牘背示之簿即牘也故魏志秦宓以簿擊頰則亦簡牘之類是也太后以冒絮提文帝服虔云綸絮也提音弟又音啼非也蕭該音底提者擲也蕭音為得恚者嗔也遭者逢也謂太后嗔乃逢冒絮因以提帝陌音蠻貊之貊方言云幪巾南楚之間云陌額也條侯地理志條縣屬渤海郡許負相之應劭云負河內溫人老嫗也姚氏按楚漢春秋高祖封為鳴雌亭侯是知婦人亦有封邑有從理入口從理橫理彀弓弩彀者張也軍中聞將軍令不聞天子之詔六韜云軍中之事不聞君命介胄之士不拜應劭云左傳晉郤克三肅使者而退杜預注肅若今撎鄭衆注周禮肅拜云但俯下手今時撎是改容式車軾者車前橫木若上有敬則俯身而憑之因自請上漢書亞夫至淮陽問鄧都尉為畫此計亞夫從之今此云自請者蓋此亦聞疑而傳疑漢史得其實是也願以梁委之謂以梁委之於吳使吳兵不得過也亦有作餧音亦通而使輕騎兵弓高侯等韓頽當也陬音子侯反丹徒地理志縣屬會稽人主各以時行耳謂人主各當其時而行事不必一一相法也顧得侯許慎注淮南子云顧反也封徐盧功臣表唯徐盧封容城侯注大臠臠音李轉反謂肉臠也尚席取櫡顧氏按輿服雜事云六尚尚席掌武帳帷幔也櫡音筯漢書作箸箸者食所用也留侯云借前筋以籌之禮曰羮之有菜者用挾挾亦箸之類故鄭玄云今人謂箸為挾是也此不足君所乎言不設箸者此蓋非我意於君有不足乎故如淳云非故不足君之食具偶失之耳蓋當然也所以帝視而笑也若本不為足當别有辭未必為之笑也孟康晉灼雖採古人之情亦未必能得其實顧氏亦同孟氏之説又引魏武賜荀或虛器各記異説也工官尚方工官即尚方之工所作物屬尚方故云工官尚方縣官縣官謂天子也所以謂國家為縣官者夏家王畿內縣即國都也王者官天下故曰官也汙汙音烏故反吾不用也孟康如淳已備兩解大顔以孟説為得而姚察又别一解云帝責此吏不得亞夫直辭以為不足任用故召亞夫别詣廷尉使責問坐酎金不善元鼎五年有罪國除徐廣曰諸列侯坐酎金失侯者皆在元鼎五年但此辭句如有顛倒罪紀云坐酎金不善復云元鼎五年有罪國除似重有故云顛倒而漢書云為太子太傅坐酎金免官後有罪國除其文又錯也按表坐免官至元鼎五年坐酎金又失侯所以二史記之各有不同也足已而不學亞夫自以已之智謀足而虛已不學古文所以不體權變而動有近忤守節不遜守節謂爭栗太子不封王信徐盧等不遜謂顧尚席取箸不對制獄是也梁孝王系家第二十八以勝為梁王漢書梁王名揖蓋是矣按景帝子中山靖王名勝是史記誤耳梁王自初王通歷已十一年矣謂自文帝二年初封代後徙淮陽又徙梁通數文帝二年至十二年徙梁為十一年也棘壁按左傳宣公二年宋華元戰于大棘杜預云在襄邑東南蓋即棘壁是也築東苑築謂建也白虎通云苑所以東者何蓋以東方生物故也三百餘里蓋言其奢非實辭或者梁國封域之方廣雎陽城七十里蘇林云廣其徑也太康地理記云城方十三里梁孝王築之鼓倡節杵而後下和之者稱睢陽曲今踵以為故所以樂家有睢陽曲蓋採其遺音也平臺如淳云在梁東北離宫所在者按今城東二十里臨新河有故臺地不甚高俗云平臺又一名修竹苑西京雜記云有落猿巖鳬洲雁渚連亘七十餘里是也千乘萬騎漢官儀曰天子法駕三十六乘大駕八十一乘皆備千乘萬騎而出也出言蹕入言警漢舊儀云皇帝輦動稱警出殿則傳蹕止人清道言出入者互文耳出亦有蹕奇邪計周禮有奇邪之人鄭玄云奇邪譎怪非常也奇音紀宜反邪音斜也且百巨萬如淳云巨亦大與大百萬同也韋昭云大百萬今萬萬關説袁盎云漢家法周道立子是有所關涉之説於帝也一云關者隔也引事而關隔其説不得行也義格張晏云格止也服虔云格謂格鬬不行蘇林音閣周成雜字攱閣也通俗又云高置立攱棚云攱閣字林音紀又音詭也意梁王謂意疑梁刺之良山漢書作梁山述征記云良山際清水今壽張縣南有良山服虔云是此山也有獻牛足出背上張晏云足當處下所以輔身也今出背上象孝王背朝以千上也背者隂也又在梁山明為梁也牛者田之畜衝在六月北方數六故六月六日薨也諡曰孝王述征記碭有梁孝王之家分梁為五國長子買梁共王子明濟川王子彭離濟東王子定山陽王子不識濟隂五王也平山襄漢書作讓罍樽應劭云詩云酌彼金罍罍者畫雲雷之象以金節之爭門措指措音迮側格反漢書王陵傳迫迮前隊皆作此字説文云迫笮也謂為門扇所笮犴反韋昭云犴音岸按類犴反人姓名也反字或作友桓邑侯地理志桓邑闕竇嬰之正言也竇嬰袁盎皆言如周家立子不合立弟封小弟以應縣此説與晉世家不同事與封叔虞同彼云封唐此云封應應亦成王之弟或别有所見故不同殷道親親周道尊尊殷人尚質親親謂親其弟而授之周人尚文尊尊謂尊祖之正體故立其子尊其祖也梁郎某子謂梁國之郎是孝王官屬某子史失其姓名也五宗世家第二十九景帝子十四人一武帝餘十三人為王漢書謂之景十三王此名五宗者十三人為王其母五人同母者為宗也閼于上音遏漢書無于字兒姁况羽反兒姁夫人名也王皇后之妹也注問以五䇿按漢書詔策問三十餘事被服造次小顔云被服言常居處其中也造次謂所向所行皆法於儒者獻王漢書云大行令奏諡法曰聰明睿智曰獻頃王授代立漢書云授諡頃音傾也壖垣服虔云宫外之餘地顧野王云牆外行馬內田音人椽反又音軟又音奴亂反壖牆外之短垣也行祖按祖者行神行而祭之故曰祖也風俗通云共工氏之子曰修好逺遊故祀為祖神又崔浩云黃帝之子纍祖好逺遊而死於道因以為行神也又聘禮云出祖釋軷祭脯酒而已按今祭禮以軷壤土為壇於道則用黃羝或用狗以其血釁左輪也江都易王非按諡法好更故舊曰易也美人淖姬鄭氏音淖蘇林音泥淖之淖女教反淖姓也齊有淖齒是又漢書云建占易王所愛淖姬等十人與姦服舍中膠西于王端按廣周書諡法云能優其德曰于皆去衛謂不置宿衛人究變究者窮也故郭璞云究謂窮盡也刻深謂刻割深無仁恩也持詭辨以中人謂詭誑之辨以中傷於人除二千石舍謂彭祖自為二千石掃除其舍以迎之為賈人𣙜會𣙜音角獨言𣙜酤謂獨酤也會音儈古外反謂為賈人專𣙜賣買之價儈以取利若今之知市矣韋昭則訓𣙜為平其注解為得國經租稅經者常也謂王家入多於國家常納之租稅也禨祥按埤倉云禨祅祥也列子云荆人鬼越人禨謂楚信鬼神而越信禨祥也行僥上下孟反下工弔反僥是郊外之路謂巡僥而伺察境界中山靖王勝按漢書建元三年濟川中山王等來朝聞樂而泣天子問其故王對以大臣內讒肺腑日疏其言甚雄壯詞切而理文天子加親親之好可謂漢之英藩矣子昆侈嗣漢書昆侈諡康王子頃王輔嗣至孫國除也程姬有所辟姚氏按釋名云天子諸侯羣妾以次進御有月事者止不御更不口説故以丹注面目的的為識令女史見之王察神女賦以為脫袿裳免簪筓施玄的結羽叉的即釋文所云也説文云姅女汙也漢律云見姅變不得侍祠姅音半廣川惠王子齊立漢書齊諡繆王諡法蔽人傷賢曰繆及幸臣所忠等按漢書言中尉奏彭祖子去嗣坐暴虐勃亂國除也作樓車鏃矢應劭曰左傳云登樓車以窺宋人謂看敵國營壘之虛實也李巡注爾雅金鏃以金為箭鏃字林音子木反長男棁鄒氏一音之悅反蘇林音奪許慎説解字林云他活反字從木也妬媢下音亡報反鄒氏本作媚郭璞注三倉云媢丈夫妬也又云妬女為媢大行騫按謂是張騫三王系家第三十臣去病霍去病也盛夏吉時按明堂月令云季夏月可以封諸侯立大官是也守尚書令丞非按奏狀有尚書令官位而史先闕其名耳丞非者尚書左右丞非其名也臣青翟莊青翟也臣湯張湯太常臣充蓋趙充也大行令臣息李息太子少傅臣安任安也天非為君生人左傳曰天生蒸民立君以司牧之是言生人為立君長司牧耳非天為君而生人也未教者謂皇子等並未習教義強君連城皇子未習教義而強使為諸侯王以君連城之人蕭文終蕭何諡文終也于酇按蕭何初封沛之酇音贊後其子續封南陽之酇音嵯平津公孫𢎞封平津侯平津高城之卿名尊建百有餘國謂武帝廣推恩之詔分王諸侯王子弟故有百餘國尊卑相踰謂諸侯王子已為列侯而今又家皇子為列侯是尊卑相踰越矣臣閎齊王也王夫人子臣旦燕王也漢書云李姬子臣胥廣陵王也撥亂世反諸正春秋公羊傳文爵位二等謂王與列侯支子封至諸侯王謂立膠東王子慶為六安王常山王子平為真定王子商為泗水王是也家皇子為列侯按時諸王稱國列侯稱家故云家皇子故為尊卑失序輿地圗謂地為輿者天地有覆載之德故謂天為蓋謂地為輿故地圖稱輿地圗疑自古有此名非始漢曰於戲小子閎此封齊王策文也又按武帝集此三王策皆武帝手製於戲音嗚呼戲或音羲青社蔡雍獨斷云皇子封為王受天子大社之土若封東方諸侯則割青土藉以白茅授之以立社謂之茅土齊在東方故云青社俾君子怠謂若不圖於義則君子怠懈無歸附心虐老獸心按胸奴傳曰國貴壯賤老壯者食肥美老食其餘是虐老也邊氓韋昭云氓民也三倉云邊人云氓三十有二君皆來降期奔師按漢書作三十二師降期作降旗而服虔云以三十二軍中之將下旗去之也如淳云即昆邪王偃旗鼓降時也若如此意則三十二君非軍將蓋戎狄酋帥時有三十二君來降也無菲德蘇林云菲廢也本亦作俷俷敗也孔文祥云菲薄也漢書作棐匪教士不得從徴韋昭云士非素教習不得從軍徴發故孔子曰不教民戰是謂棄之是也五湖之間按五湖者具區洮滆彭蠡青草洞庭是也或曰太湖五百里故曰五湖也無侗好軼侗音同褚先生解云無好軼樂馳騁弋獵無邇宵人邇近也宵人小人也鄒氏宵音謖謖亦小人也或作佞人維稽古禇先生解云維者度也稽者當也言當順古道也魏髙貴鄉公云稽同也古天也謂堯能動天曰蓬生麻中已下並見荀卿子無廢備言無之武備常備胸奴也非教士不得從徴褚先生非習禮義不得在其側也宗正與太中大夫公戶滿意宗正官名必以宗室有德者為之不知時何人公户姓滿意名為太中大夫是使二人又有侍御史二人皆往使治廣陵也曰我安得弟在者按昭帝鉤弋夫人所生武帝崩時才年十七八嵗耳胥旦早封在外實合有疑然武帝春秋高惑於內寵誅太子而立童孺能不使胥旦疑怨亦由權臣輔政貪立幼主之利遂得鈎弋子當陽斯實父德不宏遂令子道不順然犬各吠非主太中宗正人臣之職義亦當如此爾雅爾近也雅正也其書於正字義訓為近故云爾雅相承云周公作以教成王又云子夏作之以解詩書也內有異姓大夫按內云有異姓大夫以正骨肉蓋錯也內合言同姓宗正是也外合言異姓太中大夫是也白芷漸之滫中白芷香革也音止又音昌改反漸音子潛反漸漬也滫讀如禮滫溲之滫音思酒反史記索隱卷十六
