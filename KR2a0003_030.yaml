body:
  text: 史記索隱卷三十唐司馬貞撰七十列傳述贊伯夷列傳天道平分與善徒云賢而餓死盜且聚羣吉凶倚伏報施糾紛子罕言命得自前聞嗟彼素士不負青雲管晏列傳夷吾成霸平仲稱賢粟乃實廪豆不掩肩轉禍為福危言獲全孔賴左袵史欣執鞭成禮而去人望存焉老子韓非列傳伯陽立教清淨無為道尊東魯迹竄西垂莊蒙栩栩申害卑卑刑名有術説難極知悲彼周防終亡李斯司馬穰苴列傳燕侵河上齊師敗績嬰薦穰苴武能威敵斬賈以徇三軍驚惕我卒既強彼冦退壁法行司馬實賴宗戚孫子吳起列傳孫子兵法一十三篇美人既斬良將得焉其孫臏腳籌䇿龎涓吳起相魏西河稱賢慘礉事楚死後留權伍貟列傳讒人罔極交亂四國嗟彼伍氏被茲凶慝員獨忍詬志復寃毒霸吳起師伐楚遂北鞭尸雪恥抉眼棄德仲尼弟子列傳教興闕里道在陬鄉異能就列秀士升堂依仁遊藝合志同方將帥宫尹俎豆琳琅惜哉不霸空臣素王商君列傳衛鞅入秦景監是因王道不用霸術見親政必改革禮豈因循既欺魏將亦怨秦人如何作法逆旅不賓蘇秦列傳季子周人師事鬼谷揣摩既就隂符伏讀合從離衡佩印者六天王除道家人扶服賢哉代厲繼榮黨族張儀列傳儀未遭時頻被困辱及相秦惠先韓後蜀連衡齊魏傾危誑惑陳軫挾權犀首騁欲如何三晉繼有斯德樗里子甘茂列傳嚴君名疾厥號智囊既親且重稱兵外攘甘茂並相初佐魏章始推向夀乃攻宜陽甘羅妙嵗卒起張唐穰侯列傳穰侯智識應變無方內倚太后外輔昭王四登相位再列封疆推齊撓楚破魏圍梁一夫開説憂憤而亡白起王翦列傳白起王翦俱善用兵遞為秦將拔齊破荆趙任馬服長平遂坑楚陷李信霸上卒行賁離繼出三代無名孟子荀卿列傳六國之末戰勝相雄軻遊齊魏其説不通退而著述稱吾道窮蘭陵事楚鄒衍談空康莊雖列莫見收功孟嘗君列傳靖郭之子威王之孫既強其國實高其門好客喜士見重平原雞鳴狗盜魏子馮暖如何承睫薛縣徒存平原君虞卿列傳翩翩公子天下奇器笑姬從戮義士增氣兵解李同盟宅毛遂虞卿躡蹻受賞料事及困魏齊著書見意魏公子列傳信陵下士鄰國相傾以公子故不敢加兵頗知朱亥盡禮侯嬴遂却晉鄙終辭趙城毛薛見重萬古希聲春申君列傳黃歇辨智權略秦楚太子獲歸身作宰輔珠炫趙客邑開吳土烈王寡胤李園獻女無妄成災朱英徒語范雎蔡澤列傳應侯始困託戴而西説行計立貴平寵稽倚秦市趙卒報魏齊剛成辨智范雎招攜勢利傾奪一言成蹊樂毅列傳昌國忠讜人臣所無連兵五國濟西為墟燕王受間空聞報書義士慷慨明君軾閭間垂繼將芳規不渝廉頗藺相如列傳清飈凛凛壯氣熊熊各竭誠義遞為雌雄和璧聘返澠池好通負荆知懼屈節推工安邊定策頗牧之功田單列傳軍法以正實尚奇兵斷軸自免反間先行羣鳥或衆五牛揚旌卒破騎劫皆復齊城襄王嗣位乃封安平魯仲連鄒陽列傳魯連達士高才逺致釋難解紛辭祿肆志齊將挫辨燕軍沮氣鄒子過讒見詆獄吏慷慨獻説時王所器屈原賈生列傳屈平行正以事懷王瑾瑜比潔日月爭光忠而見放讒者益章賦騷見志懷沙自傷百年之後空悲弔湘吕不韋列傳不韋釣奇委質子楚華陽立嗣邯鄲獻女及封河南乃號仲父徙蜀懲謗懸金作語籌䇿既成富貴斯取刺客列傳曹沫盟柯返魯侵地專諸進炙定吳篡位彰弟哭市報主塗厠刎頸申寃操袖行事暴秦奪魄懦夫增氣李斯列傳鼠在所居人固擇地斯效智力功立名遂置酒咸陽人臣極位一夫誑惑變易神器國喪身誅本同末異蒙恬列傳蒙氏秦將內史忠賢長城首築萬里安邊趙高矯制扶蘇死焉絶地何罪勞人是愆呼天欲訴三代良然張耳陳餘列傳張耳陳餘天下豪俊忘年羈旅刎頸相信耳圍巨鹿餘兵不進張既望深陳乃去印勢利傾奪隙末成舋魏豹彭越列傳魏咎兄弟因時而王豹後屬楚其國遂亡仲起昌邑歸漢外黃往來聲援再續軍糧德之乃王葅醢何傷黥布列傳九江初筮當刑而王既免徒中聚盜江上再雄楚卒頻破秦將病為羽疑歸受漢杖賁赫見毁卒致無妄淮隂侯列傳君臣一體自古所難相國深薦策拜登壇沉沙決水拔幟傳飱與漢漢重歸楚楚安三分不議偽遊可歎韓信盧綰列傳韓襄遺孽始從漢中剖符南面徙邑北通頽當歸國龍額有功盧綰親愛羣臣莫同舊燕是王東胡計窮田儋列傳秦項之際天下交兵六國樹黨自置豪英田儋殞寇立市相榮楚封王假齊破酈生兄弟更王海塢傳聲樊酈滕灌列傳聖賢影響雲蒸龍變屠狗販繒攻城野戰扶義西上受封南面酈況賣交舞陽內援滕灌更王奕葉繁衍張丞相列傳張蒼主計天下作程孫臣始絀秦厯尚行御史亞相相國阿衡申屠面折周子廷爭其他娖娖無所發明酈生陸賈列傳廣野大度始冠側注踵門長揖深器重遇説齊歷下趣鼎何懼陸賈使越尉他懾怖相説國安書成王悟傅靳蒯成列傳陽陵信武結髮從漢動叶人謀功實天贊定齊破項我軍常冠蒯成委質夷險不亂主上稱忠人臣扼腕劉敬叔孫通列傳厦藉衆幹裘非一狐委輅獻説綿蕝陳書皇帝始貴車駕西都既安太子又和胸奴奉春稷嗣其功可圖季布欒布列傳季布季心有聲梁楚百金然諾十萬致距出守河東股肱是與欒公哭越犯楚見虜赴鼎非寃誠知所處袁盎朝錯列傳袁絲公直亦多附會攬轡見重却席繄賴朝錯建䇿屢陳利害尊主卑臣家危國泰悲彼二子名立身敗張釋之馮唐列傳張季未偶見識袁盎太子懼法嗇夫無狀驚馬罰金盜環悟上馮公白首昧哉論將因對李齊收功魏尚萬石張叔列傳萬石謹孝自家形國郎中數馬內史匍匐綰無他腸塞有隂德刑名張歐垂涕恤獄敏行訥言俱嗣芳躅田叔列傳田叔長者重義輕生張王既雪漢中是榮孟舍見廢抗説相眀按梁以禮相魯得情子仁坐事刺舉有聲扁鵲倉公列傳上池祕術長桑所傳始侯趙簡知夢鈞天言占虢嗣尸蹶起焉倉公贖罪陽慶推賢效驗多狀式具于篇吳王濞列傳吳楚輕悍王濞倍德富因採山舋成提局憍矜二志連結七國嬰命始監錯誅未塞天之悔禍卒取奔北魏其武安侯列傳竇嬰田蚡勢利相雄咸倚外戚或恃軍功灌夫自喜引重其中意氣杯酒睥睨兩宫事竟不直寃哉二公韓長孺列傳安國忠願初為梁將因事坐法免徒起相死灰更燃生虜失訪推賢見重賄金貽謗雪泣悟主臣節可亮李將軍列傳猿臂善射實負其能解鞍却敵圓陳摧鋒邊郡屢守大軍再從失道見斥數奇不封惜哉名將天下無雙衛將軍驃騎列傳君子豹變貴賤何常青本奴虜忽升戎行姊配皇極身尚平陽寵榮斯僭取亂彝章嫖姚繼踵再靜邊方平津侯主父列傳平津巨儒晚年始遇外示寬儉內懷嫉妒備寵榮爵身受肺腑主父推恩觀時設度生食五鼎死非時蠧胸奴列傳獫狁薰粥居于北邊既稱夏裔式憬周篇頗隨畜牧屢擾塵煙爰自冒頓尤聚控弦雖空帑藏未盡中權南越列傳中原鹿走羣雄莫制漢事西驅越權南裔陸賈騁説尉他去帝嫪后內朝吕嘉狼戾君臣不協卒從剿棄閩越列傳勾踐之裔是曰無諸既席漢寵實因秦餘騶駱為姓閩中是居王搖之立爰處東隅後嗣不道自相誅鋤朝鮮列傳衛滿燕人朝鮮是王王險置都路人作相石渠首差涉何誷上兆禍自斯狐疑二將山遂伏法紛紜無狀西南夷列傳西南外徼莊蹻首通漢因大夏乃命唐蒙勞寢靡莫異俗殊風夜郎最大邛莋稱雄及置郡縣萬代推功司馬相如列傳相如縱誕竊資卓氏其學無方其才足倚子虛過吒上林非侈四馬還邛百金獻伎惜哉封禪遺文卓爾淮南衡山王列傳淮南多橫舉事非正天子寬仁其過不更轞車致禍斗粟成詠王安好學女陵作詗兄弟不和傾國殞命循吏列傳奉職循理為政之先恤人體國良所述焉叔孫鄭産自昔稱賢拔葵一利赦父非愆李離伏劎為法而然汲鄭列傳河南矯制自古稱賢淮南卧理天子伏焉積薪興欲抗直愈堅鄭莊推士天下翕然交道勢利翟公愴旃儒林列傳孔氏之衰經書緒亂言諸六學始自炎漢著令立官四方扼腕曲臺壞壁書禮之冠傳易言詩雲蒸霧散興化致理鴻猷克贊酷吏列傳太上失德法令滋起破觚為圓禁暴不止姧偽斯熾慘酷爰始乳獸揚威蒼鷹側視舞文巧詆懷生何恃大宛列傳大宛之迹元因博望始究河源旋窺海上條支西入天馬內向蔥嶺無塵鹽池息浪曠哉絶域往往亭障遊俠列傳遊俠豪倨藉藉有聲權行州里力折公卿朱家脫季劇孟定傾急人之難免讐於更偉哉翁伯人貌榮名佞幸列傳傳稱令色詩刺巧言冠鸃入侍傅粉承恩黃頭賜蜀宦者同軒新聲都尉挾彈王孫泣魚竊駕著自前論滑稽列傳滑稽鴟夷如脂如韋敏捷之變學不失詞淳于索絶趙國興師楚優拒相寢丘獲祠偉哉金朔三章紀之日者列傳日者之名有自來矣吉凶占候著於墨子齊楚異法書亡罕紀後人斯繼季主獨美取免暴秦此焉終否龜䇿列傳三王異龜五帝殊卜或長或短若瓦若玉其記已亡其繇後續江使觸網見留宋國神能託夢不衛其足貨殖列傳貨殖之利工商是營廢居善積倚市邪贏白圭富國計然強兵保參朝請女築懷清素封千户卓鄭齊名太史公自序傳太史良才實纂先德周遊歷覽東南西北事核詞簡是稱實録報任投書申李下獄惜哉殘缺非才妄續補史記序太史公古之良史也家承二正之業人當五百之運兼以代為史官親掌圖籍慨春秋之絶筆傷舊典之闕文遂乃錯綜古今囊括記録本皇王之遺事採人臣之故實爰自黃帝迄于漢武歷載悠邈舊章罕補漁獵則窮於百氏筆削乃一多咸字成於一家父作子述其勤至矣然其敘勸褒貶頗稱折衷後之作者咸取則焉夫以首創者難為功因循者易為力自左氏之後未有體制而司馬公補立紀傳規模别為書表題目莫不本紀十二象嵗星之一周八書有八篇法天時之八節十表放剛柔十日三十系家比月有三旬七十列傳取懸車之暮齒百三十篇象閏餘而成嵗其間禮樂刑政君舉必書福善禍淫用垂炯戒事廣而文局詞質而理暢斯亦盡美矣而有未盡善者具如後論雖意出當時而義非經逺蓋先史之未備成後學之深疑借如本紀敘五帝而闕三皇系家載列國而有外戚邾許春秋次國略而不書張吳敵國藩王抑而不載並編録有闕竊所未安又列傳所著有管晏及老子韓非管晏乃齊之賢卿即如其例則吳之延陵鄭之子産晉之叔向衛之史魚盛德不忝何為蓋闕伯陽清虛為教韓子峻刻制法靜躁不同德刑斯舛今宜柱史共漆園同傳公子與商君並列可不善歟其中逺近乖張詞義踳駮或篇章倒錯或贊論粗疏蓋由遭逢非罪有所未暇故十篇有録無書是也然其網絡古今敘述懲勸異左氏之微婉有南史之典實所以揚雄班固等咸稱其良史之才蓋信乎其然也後褚少孫亦頗加補綴然猶未能周備貞業謝顓門人非博古而家傳是學頗事討論思欲續成先志潤色舊史輒黜陟階降改定篇目其有不備並採諸典籍以補闕遺其百三十篇之贊既非周悉並更申而述之附于衆篇之末雖曰狂簡必有可觀其所改更且條于後至如徐廣唯略出音訓兼記異同未能考核是非解釋文句其裴駰實亦後進名家博採羣書專取經傳訓釋以為集解然則時有冗長至於盤根錯節殘缺紕繆咸拱手而不言斯未可謂通其學也今輒採按今古仍以裴為本兼自愚管伸為之注號曰小司馬史記然前朝顔師古止注漢史今並謂之顔氏漢書貞雖位不逮顔公既補舊史兼下新意亦何讓焉三皇本紀第一太史公作史記古今君臣宜應上自開闢下迄當代以為一家之首尾今闕三皇而以五帝為首者正以大戴禮有五帝德篇又帝系皆敘自黃帝已下故因以五帝本紀為首其實三皇已還載籍罕備然君臣之始教化之先既論古史不合全闕近代皇甫謐作帝王代紀徐整作三五厯皆論三皇已來事斯亦近古之一證今並採而集之作三皇本紀雖復淺近聊補闕云秦本紀秦雖嬴政之祖本西戎附庸之君豈以諸侯之邦而與五帝三王同稱本紀斯必不可可降為秦系家項羽本紀項羽崛起爭雄一朝假號西楚竟未踐天子之位而身首别離斯亦不可稱本紀宜降為系家吕太后本紀吕太后本以女主臨朝自孝惠崩後立少帝而始稱制正附惠紀而論之不者或别為吕后本紀豈得全沒孝惠而稱吕后本紀今依班氏分為二紀焉曹叔振鐸系家右亦姬姓之國而文昭春秋之時頗稱強國其後數十代豈可附管蔡亡國之末而沒其篇今曹叔振鐸系家自為一篇許男邾子系家許文叔太嶽之胤二邾曹姓之君並通好諸侯同盟太國不宜令沒其事亦可敘其本末補許邾系家焉孔子系家右教化之主吾之師也為帝王之儀表示人倫之準的自子思已下代有哲人繼代象賢誠可仰同列國前史既定吾無間然陳涉系家右時因擾攘起自匹夫假託妖祥一朝稱楚歷年不永勳業蔑如繼之齊魯曾何等級可降為列傳張耳吳芮系家右勢侔楚漢位埒齊韓俱懷從沛之心咸享誓河之業爵在列侯之上家傳纍代之基長沙既曰令終趙王亦謂善始並可列同系家焉吳濞淮南系家右五宗之國俱享大邦雖復逆亂心取汙朝典豈可謂非青社之國哉然淮南猶有後不絶衡山亦其罪蓋輕比三卿之分晉方暴秦之滅周可不優乎安得黜其王國不止上同五宗三王列於系家其吳濞請與楚元王同為一篇淮南宜與齊悼惠王為一篇蕭相國曹相國留侯絳侯五宗三王右六篇請各為一篇列傳子産叔向列傳按有管晏列傳其國僑羊舌肸等亦古之賢大夫合著在管晏之下不宜散入循吏之篇老子韓非列傳右二人教迹全乖不宜同傳先賢已有成説今則不可依循宜令老子尹喜莊周同為傳其韓非可居商君傳末魯連鄒陽屈原賈生列傳魯連屈原當六國之時賈誼鄒陽在文景之日事迹雖復相類年代甚為乖絶其鄒陽不可上同魯連賈生亦不可下同屈平今抽魯連同田單為傳其屈原與宋玉等為一傳其鄒陽與枚乘賈生等同傳司馬相如汲鄭列傳右不宜在西夷之下大宛列傳右宜在朝鮮之下不合在酷吏遊俠之間斯蓋並司馬公之殘缺褚先生補之失也幸不深尤焉為述贊右述贊之體深所不安何者夫敘事美功合有首末懲惡勸善是稱褒貶觀太史公贊論之中或國有數君或士兼百行不能備論終始自可略申梗概遂乃頗取一事偏引一奇即為一篇之贊將為龜鑑誠所不取斯亦明月之珠不能無纇矣今並重為一百三十篇之贊云三皇本紀第二太皥庖犧氏風姓代燧人氏繼天而王母曰華胥履大人迹於雷澤而生庖犧於成紀蛇身人首按伏犧風姓出國語其華胥已下出帝王代紀然雷澤澤名即舜所漁之地在濟隂其成紀亦地名按天水有成紀縣有聖德仰則觀象於天俯則觀法於地旁觀鳥獸之文與地之宜近取諸身逺取諸物始畫八卦以通神明之德以類萬物之情造書契以代結繩之政於是始制嫁娶以儷皮為禮按譙周古史考伏犧制嫁娶以儷皮為禮也結網罟以教佃漁故曰宓犧氏按事出漢書厯志宓音伏養犧牲以庖犧有龍瑞以龍紀官號曰龍師作二十五絃之瑟木德王注春令故易稱帝出于震月令孟春其帝太皥是也按位在東方像日之明故稱太皥皥明也都於陳東封太山立一百一十一年崩按皇甫謐伏犧葬南郡或曰冢在山陽高平之西也其後裔當春秋時有任宿須句顓臾皆風姓之胤也女媧氏亦風姓蛇身人首有神聖之德代宓犧立號曰女希氏無革造唯作笙簧按禮明堂位及系本皆云女媧作笙簧故易不載不承五運一曰水媧亦木德王蓋宓犧之後已經數世金木輪環周而復始特舉女媧以其功高而充三皇故類木王也當其末年也諸侯有共工氏任智刑以強霸而不王以水承木乃與祝融戰不勝而怒乃頭觸不周山崩天柱折地維缺女媧乃鍊五色石以補天斷鼇足以立四極聚蘆灰以止滔水以濟冀州按其事出淮南子也於是地平天成不改舊物女媧氏沒神農氏作按三皇説者不同譙周以燧人為皇宋均以祝融為皇而鄭玄依春秋緯以女媧為皇承伏犧皇甫謐亦同今依之炎帝神農氏薑姓母曰女登有蟜氏之女為少典妃感神龍而生炎帝人身牛首長於薑水因以為姓按國語炎帝黃帝皆少典之子其母又皆有媧氏之女據諸子及古史考炎帝之後凡八代五百餘年軒轅氏代之豈炎帝黃帝同是昆弟而同母氏也皇甫謐以為少典氏有女媧氏諸侯國號然則薑姬二帝同出少典氏黃帝之母又是神農母氏之後代女所同是有媧氏之女也火德王故曰炎帝以火名官斫木為耜揉木為耒耒耨之用以教萬人始教耕故號神農氏於是作蠟祭以赭鞭鞭草木始嘗百草始有醫藥又作五絃之瑟教人日中為市交易而退各得其所遂重八卦為六十四爻初都陳後居曲阜按今淮南陽有神農井又左傳魯有大庭氏之庫是也立一百二十年崩葬長沙神農本起列山故左氏稱列山氏之子曰柱亦曰厲山氏禮曰厲山氏之有天下是也按鄭玄云厲山神農所起亦曰有列皇甫謐曰厲山今隨之厲卿也神農納奔水氏之女曰聽訞為妃生帝魋魋生帝承承生帝明明生帝直直生帝氂氂生帝哀哀生帝克克生帝榆􅘩凡八代五百三十年而軒轅氏興焉按神農之後凡八代事見帝王代記及古史考然古典亡矣況譙皇二代皆前氏傳前聞君子考按古書而為此説豈至今鑿空乎此紀亦據以為説其易稱神農氏沒即榆􅘩榆􅘩猶襲神農之號也其後有州甫甘許戲露齊紀怡向申吕皆薑姓之後胤並為諸侯或分掌四嶽當周室甫侯申伯為王賢相齊許列為諸侯霸於中國蓋聖人德澤廣大故其祚胤繁昌久長云一説三皇天皇地皇人皇為三皇既是開闢之初君臣之始圖緯所載不可全棄故兼序之天地初立有天皇氏十二頭淡泊無所施為而民俗自化木德王嵗起攝提兄弟十二人立各一萬八千嵗蓋天地初立神人首出行化故其年世長久也然言十二頭者非謂一人之身有十二頭蓋古質比之鳥獸頭數故也地皇十一頭火德王姓十一人興於熊耳龍門等山亦合萬八千嵗人皇九頭乘雲車駕六羽出吞口兄弟九人分長九州各立城邑凡一百五十世合四萬五千六百年天皇下皆出河圖及三五厯也自人皇已後有五龍氏五龍氏兄弟五人並乘龍上下故曰五龍氏也燧人氏按其君鑽燧出火教人熟食在伏犧氏前譙周以為三皇之首也大庭氏柏皇氏中央氏卷須氏栗陸氏驪連氏赫胥氏尊盧氏渾沌氏昊英氏有巢氏朱襄氏葛天氏隂康氏無懷氏斯蓋三皇已來有天地者之號按皇甫謐以為大庭已下一十五君皆襲庖犧之號事不經見難可依從然按古封太山者首有無懷氏乃在太昊之前豈得如謐所説但載籍不紀莫知姓王年代所都之處而韓詩以為自古封太山禪梁甫者萬有餘家仲尼觀之不能盡識管子亦曰古封太山七十二家夷吾所識十有五焉首有無懷氏然則無懷之前天皇已後年紀悠邈皇王何升而告但古書亡矣不可備悉豈得謂無帝王耶故春秋緯稱自開闢至於獲麟凡三百二十七萬六千嵗分為十紀凡世七萬六百年一曰九頭紀二曰五龍紀三曰攝提紀四曰合雒紀五曰連通紀六曰序命紀七曰循飛紀八曰因提紀九曰禪通紀十曰疏訖紀當黃帝時制九紀之間是以録於此補紀之也史記索隱卷三十
