body:
  text: 史記索隠卷四唐司馬貞撰孝文本紀第十新啑血漢書作喋音跕丁牒反漢書陳湯杜業皆言喋血無盟歃事廣雅云蹀履也謂履涉之宋昌東觀漢記宋楊傳宋義後有宋昌又會稽典録昌宋義孫也犬牙相制言封子弟境土交接有若犬之牙不正相當而相銜入也盤石之宗言其固如盤石此語見太公六韜也一節入北軍即紀通所矯帝之節大横庚庚按荀悦云大横龜兆横理也按庾庚猶更更言以諸侯更帝位也注庚其繇文荀悦云繇抽也所以抽出吉凶之情也杜預云繇兆辭也音胄也注五帝官天下按漢書葢寛饒云五帝官天下三王家天下官者以傳賢人家以傳子孫官猶公也謂不私也渭橋三輔故事咸陽宫在渭北興樂宫在渭南秦昭王通兩宫之間作渭橋長三百八十步又闗中記云石柱以北屬扶風石柱以南屬京兆也請間包愷音閒言欲向空閒處語顔師古云間猶容也猶言中間請容暇之頃當有所陳不欲即公論也代邸説文邸屬國舍隂安侯列侯頃王后按蘇林徐廣韋昭以為二人封號而樂産引如淳以頃王后别封隂安侯與漢祠令相會今以隂安是别人封爵非也頃王后是代王后文帝之伯母代王降為郃陽侯故云列侯頃王后韋昭曰隂侯屬魏郡也計宜者楚王交髙帝弟最尊言更請楚王計宜者故下云皆為宜也清宫按漢儀云皇帝起居索室清宫而後行法駕漢官儀云天子鹵簿有大駕法駕大駕公卿奉引大将軍參乗屬車八十一乗法駕公卿不在鹵簿中惟京兆尹執金吾長安令奉引侍中參乗屬車三十六乗也女子百户牛酒按封禪書云百户牛一頭酒十石樂産云婦人無夫或無子不霑爵故賜之也酺五日説文云酺王者布徳大飲酒也出錢為醵出食為酺又按趙武靈王滅中山酺五日是其所起也陽信侯韋昭云勃海縣嗛志按嗛者不滿之意也未有嗛志言天下皆志不滿也漢書作􅀈志安也謂天下何言何以謂於天下也其安之其發聲也安者徐也言徐徐且待也有天下者莫長焉用此道也言古之有天下者無長於立子故云莫長馬用此道者用殷周立子之道故安治千有餘嵗也更議不宜言不宜更别議也諸侯皆同姓謂帝之子為諸侯王皆同姓姓生也言皆同母生故立太子母也壯武韋昭云膠東縣清郭按表駟鈞封鄔侯不同者葢後徙封於鄔鄔屬鉅鹿郡樊侯韋昭云樊東平之縣􅍀然蘇林云寢視不安之貌葢近其意餘説皆疎音下板反見馬遺財足遺猶留也財古字與纔同言大僕見在之馬今留纔足充事而已也傳置按廣雅云置驛也續漢書云驛馬三十里一置故樂産亦云傳置一也言乗傳者以傳次受名乗置者以馬取匹傳音丁戀反如淳云律四馬髙足為傳置四馬中足為馳置下足為乗置一馬二馬為軺置如置急者乗一馬曰乗也誹謗之木按尸子云堯立誹謗之木誹音非亦音沸韋昭云慮政有闕失使書於此堯時然也後代因以為飾今宫外橋梁頭四植木是也注交午柱鄭𤣥注禮云一縱一横為午以木貫表柱四出即令之華表崔浩以為木貫表柱四出名桓陳楚俗桓聲近和又云和表則華與和又相訛耳相謾韋昭云謾相抵讕也説文云謾欺也謂初相約共行祝後相欺誑中道而止之也銅虎符漢儀銅虎符發兵長六寸竹使符出入徵發説文云分符而合之小顔云右留京師左與之古今注云金虎符銀錯書之張晏云銅取其同心也甘泉應劭云宫名在雲陽一名林光臣瓚云甘泉山名林光秦離宫名又顧氏按邢承西征賦注云甘泉水名今按葢因地有甘泉以名山則山水皆通也祁侯賀漢書音義祁音遲賀姓繒繒古國夏同姓也淮南王名安阜陵侯也衡山王名勃安陽侯也廬江王名賜周陽侯也淳于公名意為齊太倉令故謂之倉公也女緹縈緹音啼鄒氏音體非肉刑三韋昭云斷趾黥劓之屬崔浩漢律序云文帝除肉刑而宫不易張斐注云以淫亂人族序故不易也右賢左戚劉徳云先賢後親也祝釐音僖福也五徳五行之徳帝王相承傳易終而復始故云終始傳五徳事傳音轉也更為元年按秦本紀惠文王十四年更為元年又汲冢竹書魏惠王亦有後元當取法於此又按封禪書以新垣平候日再中故改元也四荒顧𦙍按爾雅孤竹北户西王母日下謂之四荒也結軼鄒氏音逸又音轍漢書作轍顧氏按司馬彪云結謂車轍回旋錯結之也元元戰國策云制海内子元元非兵不可髙誘注云元元善也又按姚察云古者謂人云善人也因善為元故云黎元其言元元者非一人也顧野王又云元元猶喁喁可憐愛貌未安其説聊記異也中大夫令勉裴駰按表景帝改衛尉為中大夫今則中大夫令是官號勉其名後此官改為光禄勲虞世南以此稱中大夫令是史家追書耳顔遊秦以令是姓勉是名為中大夫據風俗通令姓令尹子文之後也句注伏儼音俱包愷音鉤細栁桉三輔故事細栁在直城門外阿房宫西北維又匈奴傳云長安西細栁則如淳云在渭北非也倉庾郭璞注云庾倉無屋也注胡公胡公名廣後漢太尉作漢官解詁也賣爵崔浩云富人欲爵貧人欲錢故聴賣買也露臺顧氏按新豐南驪山上猶有臺之舊趾也注漢語作跣漢語是書名荀爽所作也已下謂柩已下於壙大紅劉徳云紅亦功也男功非一故以功力為字而女工惟在於絲故以糸工為字三十六日以日易月故也復土音伏謂穿壙出土下棺已而填之即以為墳故云復土復反還也音福内史卒按百官表云内史掌理京師之官也景帝更名京兆尹也霸陵霸是水名水經於山亦曰霸山即芷陽地也武徳文始五行之舞應劭云禮樂志文始舞本舜韶舞髙祖更名文始示不相襲五行舞本周武舞秦始皇更名五行舞按今言秦武德文始五行之舞者其樂總象武王樂言髙祖以武定天下也既示不相襲其作樂之始先奏文始以羽籥衣文繡居先次即奏五行五行武舞執干戚而衣有五行之色也孝景本紀第十一蕭何孫係漢書亦作係鄒誕本作徯又按漢書功臣表及蕭何傳皆云封何孫嘉疑其人有二名也二十而得傅音附荀悦云傅正卒也小顔云舊法三十三而傅今改也孝文太后崩薄太后也亦𦵏芷陽西曰少陵也廣川長沙王廣川王彭祖長沙王發皆景帝子遣就國也祋祤鄒誕生上音都會反下音羽又丁括反祤音詡燔雒陽雒陽漢書作淮陽災故徙王於魯也齊王将廬悼惠王之孫齊襄之子廬漢書作閭燕王嘉皆薨劉澤之子用傳出入傳音丁戀反如今之過所平陸侯禮韋昭云平陸西河縣禮即向之從曾祖王父也作陽陵景帝豫作夀陵也按趙系家趙肅侯十五年起夀陵後代遂因之也王太后為皇后系家太后槐里人父仲兄信封葢侯后故金氏妻女弟姁兒也周苛周昌之兄注故封其子韋昭云張尚子當居趙夷吾子周建徳子横王悍子棄也軍東都門按三輔黄圖云東出北第一門曰宣平門外曰東都門典客為大行韋昭云大行官名秦時云典客景帝初改云大行後更名大鴻臚武帝因而不改故漢書景紀有大鴻臚百官表又云武帝改名大鴻臚鴻聲也臚附皮以言其掌四夷賔客若皮臚之在外附於身也復有大行令諸侯薨大鴻臚奏諡列侯薨則大行奏誄按此大行令即鴻臚之屬官也注九儀按鄭𤣥曰命者五謂公侯伯子男爵者四孤卿大夫士是九也置左右内主天下之私財物曰少内少内屬大内也綰為丞相姓衛也令徒𨽻衣七緵布七緵葢今七升布言其麄故令衣之也止馬舂止人為馬舂粟為嵗不登故也月貫天廷中天廷即龍星右角也按石氏星傳曰龍在左角曰天田右角曰天廷封皇太后弟蚡蚡音扶粉反按外戚世家皇太后母臧氏初嬪王氏生子信而寡更嫁長陵田氏生蚡及勝也諸侯以弱主父偃上言今天子下推恩之令令諸侯各得分邑其子弟於是遂弱卒以安也孝武本紀第十二孝武皇帝裴駰云大史公自序云作今上本紀又其序事皆云今上今天子今或言孝武皇帝者悉後人所定也注武紀褚先生補作按褚先生補史記合集武帝事以編年今止取封禪書補之信其才之薄也又張晏云褚先生潁川人仕元成間韋稜云褚顗家傳褚少孫梁相褚大弟之孫宣帝代為博士寓居于沛事大儒王式號為先生續太史公書阮季緒亦以為然也景帝中子按景十三王傳廣川王已上皆是武帝兄是自河間王徳以至廣川凡有八人則武帝弟兄也薦紳上音搢搢挺也言挺笏於紳帶之間事出禮内則今作薦者古字假借耳漢書作縉紳臣瓚云縉赤白色非也立明堂城南城南長安城南門外也按闗中記云明堂在長安城門外杜門之西也蹏氏觀徐廣音蹄鄒誕音斯又音蹄觀名也先後宛若鄒誕音二字並去聲即今妯娌也孟康以兄弟妻相謂也韋昭云先謂姒後謂娣也宛音寃平原君按徐云武帝外祖母則是臧兒也祠竈如淳云祠竈可以致福按禮竈者老婦之祭盛於盆尊於瓶説文周禮以竈祠祝融淮南子炎帝作火官死為竈神司馬彪注莊子云浩竈神也如美女衣赤李江範音浩也武安侯服䖍云田蚡也韋昭云武安屬魏郡也安期生服䖍曰古之真人按列仙傳云安期生琅邪人賣藥東海邊時人皆言千嵗也齊為黄金齊音劑亳人薄誘忌亳山陽縣名姓謬名忌居亳故下稱薄忌此文則作薄字而謬又誤作誘矣天神貴者太一按樂汁微圖云紫微宫北極天一太一宋均以為天一太一北極之别名春秋緯紫宫天皇曜魄寶之所理也其佐曰五帝河圖云蒼帝神名靈威仰之屬也為皮幣按食貨志皮幣以白鹿皮方尺縁以繢以薦璧得以黄金一斤代之又漢律皮幣率鹿皮方尺直黄金一斤造白金按食貨志曰金三品各有差也一角獸若麃然音步交反韋昭曰體若麕而一角春秋所謂有麕而角何也楚人謂麋為麃又周書王會云麃者若鹿爾雅云麋大鹿也牛尾一角郭璞云漢武一角獸若麃謂之麟是也柏梁服䖍云用梁百頭按今字皆作柏三輔故事云臺髙二十丈用香柏為殿香聞十里銅柱承露三輔故事曰建章宫承露盤髙三十丈大七圍以銅為之上有仙人掌承露和玉屑飲之故張衡賦曰立修莖之仙掌承雲表之清露是也鼎湖按鼎湖縣名屬京兆後屬𢎞農昔黄帝採首陽山銅鑄鼎於湖曰鼎湖即今之湖城縣也韋昭云以為近宜春亦甚疎也游水發根顔師古以游水姓發根名葢或因水為姓服䖍亦曰發根人姓字或曰發樹根者也太史公韋昭云談司馬遷之父也説者以談為太史公失之矣史記多稱太史公遷外孫楊惲稱之也姚察按遷傳亦以談為太史公非惲所加又按虞喜志林云古者主天官皆上公自周至漢其職轉卑然朝會坐位猶居公上尊天之道其官屬仍以舊名尊而稱公公名當起於此故如淳云太史公位在丞相上天下郡國計書先上太史公副上丞相其義是也而桓譚新論以為太史公造書書成示東方朔朔為平定因署其下太史公者皆朔所加之者也脽丘音誰漢舊儀作葵丘者葢河人呼誰與葵同故耳侵尋於太山矣侵尋即浸淫也故晉灼云遂往之意也小顔云侵淫漸染之義葢尋淫聲相近假借用耳師古叔父遊秦亦解漢書故稱師古為小顔也樂成侯韋昭云河間縣按郊祀志樂成侯登而徐廣據表姓丁名義未詳羨門韋昭云仙人應劭云名子喬而大通焉韋昭云言大能通天意故封之樂通樂通在臨淮髙平縣也斥車馬孟康云斥不用之車馬是也掊視説文掊抱也音步溝切母欵識韋昭云欵刻也按識猶表識也中山此山在馮翊谷口縣西近九嵕山土人呼為中山河渠書韓使水工鄭國説秦鑿涇水自中山西即此山晏温如淳云三輔俗謂日出清濟為晏晏而溫故曰晏温許慎注淮南子云晏無雲也不虞不驁毛傳云虞譁也姚氏按何承天云虞當為吳音洪霸反又説文以吳一口大言也此作虞者與吳聲相近故假借也或者本文借此虞為歡娛字故也鬼臾區鄭氏云黄帝佐也李奇曰黄帝時諸侯本作申區者非藝文志作鬼容區者也所謂寒門者谷口也服䖍云黄帝所仙之處也小顔云谷中山之谷口漢時為縣今呼為冶谷去甘泉八十里盛夏凜然故曰寒門谷口也三垓垓重也言為三重壇也鄒氏云一作階言壇堦三重用事八神按韋昭八神謂天地隂陽日月星辰主四時主之屬今按郊祀志一曰天主祠天齊二曰地主祠太山梁父三曰兵主祠蚩尤四曰隂主祠三山五曰陽主祠之罘六曰月主祠之萊山七曰日主祠盛山八曰四時主祠琅邪也昔大帝神鼎一顔師古以太帝即太昊伏犧氏以在黄帝之前故也鬺烹言鼎以烹牲而響嘗也鬺字又作觴字音殤漢書郊祀志云鼎空足曰鬲以象三徳鬲音歴謂足中不實者名之也上雍以雍地形髙故云上龍垂胡􅐖顔師古云胡謂項下垂肉也􅐖其毛也故童謡曰何當為君鼓龍胡是也醴進音進漢書作進顔師古云具俎豆酒醴而進之一曰進謂雜物之具所以加禮也為餟食餟音竹芮反謂聯續而祭之漢志作古字通説文云餟祭酹祭月以羊彘特特一牲也言若牛若羊若彘止一特也奉瑄玉音宣璧大六寸也泰帝使素女亦謂太昊也射牛天子射牛示親祭也事見國語及箜篌瑟應劭云武帝始令樂人侯調作聲圴圴然命曰箜篌侯其姓也草封禪儀儀見應劭漢官儀也見星出如瓠按郊祀志云填星出如瓠故顔師古以徳姓即鎮星也今按此紀唯言徳星則徳星嵗星也嵗星所在有福故曰徳星也夀星仍出夀星南極老人星也見則天下理安故言之也信星昭見信星鎮星也信屬土曰鎮星則漢志為徳星也宿留音秀溜宿留遲待之意若依字讀則言宿而留亦是有所待並通也還至瓠子瓠子決河名蘇林曰在甄城南濮陽北廣百步深五丈自臨塞決河按河渠書武帝自臨塞決河将軍已下皆負薪也沉祠而去按沉白馬祭河決於是作瓠子歌見河渠書乃作通天臺漢書作通天臺於甘泉宫按漢書舊儀臺髙三十丈去長安二百里望見長安城也甘泉更置前殿姚氏按揚雄云甘泉本因秦離宫既奢泰武帝増通天臺迎風宫近則有洪崖儲胥逺則石闗封巒鳷鵲露寒棠黎等觀又有髙華温徳觀曽成宫白虎走狗天梯瑶臺仙人弩法相思觀芝生殿房中按生芝九莖於是作芝房歌公玉帶玉或作肅公玉姓帶名姚氏按風俗通齊湣王臣有公玉冉其後也音語録反三輔決録云杜陵有玉氏音肅説文以為從玉音畜牧之畜今讀公玉與決録音同然二姓單複有異單姓者肅後漢司徒玉况是其後也命曰崑崙玉帶明堂圖中為複道有樓從西南入名其道曰崑崙言其似崑崙山之五城十二樓故名之也泰元神筴按薦饗之辭言天授皇帝泰元神筴周而復始又按上黄帝得寶鼎神筴則太古上皇創厯之號故此云太元神筴周而復始也冀至殊庭焉冀漢書作幾幾近也冀望也亦通服䖍曰蓬萊出仙人殊庭者異也言入仙人異域也其東則鳳闕三輔黄圖云武帝營建章起鳳闕髙三十五丈闗中記一名别風言别四方之風西京賦曰閶闔之内别風嶕嶤是也三輔故事云北有圜闕髙二十丈上有銅鳳皇故曰鳳闕也其西則唐中如淳云詩云中唐有甓鄭𤣥曰唐堂庭也爾雅以廟中路謂之唐西京賦曰前開唐中彌望廣象是也龜魚之屬三輔故事云殿北海池北岸有石魚長二丈廣五尺西岸有石龜二枚各長六尺其南則玉堂漢武故事玉堂基與未央前殿等去地十二丈乃立神明臺漢宫闕疏云臺髙五十丈上有九宫常置九天道士百人也井幹樓闗中記宫北有井幹臺髙五十丈積木為樓言築累萬木轉相交架如井幹司馬彪注莊子云井幹井䦨也又崔譔云井以四邊為幹猶築牆之有楨幹又諸本多作幹一本作榦音説文云幹非橋木耦馬一音偶孟云寓寄龍形于木又姚氏云寓假也以言假木龍馬一駟非寄生龍馬形於木也赤星五寛舒之祠官赤星即上靈星祠也靈星龍左角其色赤故曰赤星五者太一也三一也冥羊也馬行也赤星也凡五並祠官寛舒領之凡六祠謂五者之外有正太一后土祠故六也史記索隠卷四
