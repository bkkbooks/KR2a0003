body:
  text: 史記索隠卷十四唐司馬貞撰孔子系家第十七古敎化之主吾之師也為帝王之儀表示人倫之準的自子思以下代有哲人繼世象賢誠可仰同列國前史既定吾無間然矣又孔子非有諸侯之位而亦稱系家者以是聖人為敎化之主又代有賢哲故稱系家焉昌平鄉陬邑陬是邑名昌平鄉號孔子居魯之鄒邑昌平鄉之闕里也防叔家語孔子宋㣲子之後宋襄公生弗父何以讓弟厲公弗父周周生世子勝勝生正考父考父生孔父嘉五世親盡别為公族姓孔父生子木金父金父生睪夷生防叔畏華氏之逼而奔魯故孔氏為魯人也野合而生孔子家語云梁紇娶魯之施氏生九女其妾生孟皮孟皮病足乃求婚于顔氏徴在從父命為婚其文甚明今此云野合者葢謂梁紇老而徴在少非當壯室初笄之禮故云野合謂不合禮儀故論語云野哉由也又先進於禮樂野人也皆言野者是不合禮耳襄公二十二年公羊傳襄公三十一年十有一月庚子孔子生今以為二十二年葢以周正十一月屬明年故誤也後序孔子卒云七十二嵗每少一嵗也圩頂扞音烏頂音鼎圩頂言頂上窳也故孔子頂如反宇反宇者若屋宇之反中低而四傍髙也叔梁紇死家語云生三嵗而梁紇死疑其父墓處謂孔子少孤不的知父墳處非謂不知其塋地徵在笄年適於梁紇無幾而老死是少寡葢以為嫌不從送𦵏故不知墳處遂不告耳非諱之也五父之衢謂孔子不知父墓乃且殯其母於五父之衢是其謹慎也要絰家語孔子之母喪既練而見不非之也今此謂孔子實要絰與饗為陽虎所絀亦近誣矣一作要經要經猶帶絰也故劉氏云嗜學之意是也孟釐子病昭公七年左傳云孟僖子病不能相禮乃講學之及其将死召大夫云云按謂病者不能禮為病非疾困之謂也至二十四年僖子卒賈逵云仲尼時年三十五矣是此文誤也南宫敬叔左傳及系本敬叔與懿子皆孟僖子之子不應更言魯人亦太史公之疎耳為季氏史有本作委吏按趙岐曰委吏主委積倉庫之吏適周莊子云孔子年五十一南見老聃葢系家亦依此為説而不究其㫖遂俱誤也何者孔子適周豈訪禮之時即在十七耶且孔子見老聃云甚矣道之難行也此非十七之人語也乃既仕之後言耳送人以財莊周財作軒為人子者毋以有已家語作無以有已為人子者為人臣者毋以有已家語作無以惡已為人臣者王肅云言聴則仕不用則去保身全行臣之節也起纍紲之中家語無此一句孟子以為不然之言也學之三月按論語子語魯太史樂非齊太史也又子在齊聞韶三月不知肉味無學之文今此合論語齊魯兩文而為此言恐失事實将欲以尼谿田封孔子此説出晏子及墨子其文微異大賢之息息者生也言上古大賢生則有禮樂至周室㣲而始缺有間也奉子以季氏劉氏奉音扶用反非也今奉音如字謂奉待孔子如魯季氏之職故下文云以季孟之間待之也土缶中若羊家語云桓子穿井于費得物如土缶其中有羊馬是也䕫㒺閬䕫音逵閬音兩家語作魍魎注䕫一足越人為之山繅繅音騷然山繅獨一足是山神名故謂之䕫䕫一兄獸状如人也注沐腫音木踵隳會稽會稽山名越之所都隳毁也呉伐越在魯哀元年釐姓釐音僖家語云姓漆葢誤系本無漆姓公山不狃狃音女久反鄒氏云一作蹂論語作弗櫌使人召孔子撿家語及孔氏之書竝無此言故桓譚亦以為誣也四方皆則之家語作西方王肅云魯國近東故西方諸侯皆取法則焉及齊平及與也平成也謂與齊和好故云平鼓噪家語作萊人以兵鼓噪劫定公祓音弗謂舞者所執故周禮譟有祓舞撥音伐謂大楯也歴階謂歴階級也故王肅云歴階登階不聚足熒惑謂經營而惑亂也家語作熒侮汶陽左傳鄆驩及龜陰之田則三田皆在汶陽也皆予之以歸家語作皆如歸舞康樂家語作容璣王肅云舞曲名也周道游謂請魯君為周徧道路游行因出觀齊之女樂屯地名濁鄒家孟子曰孔子於衛主顔讐由彌子之妻與子路之妻兄弟也今此云濁鄒是子路之妻兄所説不同六萬若六萬石似太多當是六萬斗亦與漢之秩禄不同一出一入謂以兵仗出入以脅夫子也由彼缺也謂昔所被攻缺破之處也匡人匡宋邑也家語云匡人簡子以甲士圍夫子然後得去家語子路彈劎而歌孔子和之曲三終匡人解圍而去今此取論語文王既没之文及從者臣寗武子然後得去葢夫子再厄匡人或設辭以解圍或彈劍而釋難今此合論語家語之文以為一事故彼此文交互耳吾鄉為弗見見之禮答焉上見如字下見音䝨徧反去聲言我不為相見之禮現而答之招摇市過之家語作遊過市或謂子貢曰家語姑布子卿謂子貢曰其顙似堯家語云河目而隆顙其顙似堯陳涽公家語國語皆作陳恵公非也按恵公以魯昭元年立定四年卒又按系家涽公十六年孔子適陳十三年亦在陳則此涽公為是寜鬭而死家語云我寜鬭死挺劎而合衆将與之戰蒲人懼是也西河此西河在衛地非魏之西河也中牟此河北之中牟葢在漢陽西師襄子家語師襄子曰雖以撃鼓為實能於琴葢師襄子魯人論語謂之撃磬襄是也幾然而長幾與注頎竝音祈家語無此四字望羊王肅云望羊望羊視也竇鳴犢舜蕐家語及聞趙簡子殺竇犨鳴犢及舜華國語云鳴鐸竇犨則竇犨字鳴犢聲轉字異或作鳴鐸慶華當作舜華諸説皆同蛟龍有角曰蛟龍龍能興雲致雨調和陰陽之氣陬操此陬鄉非魯之陬邑家語云作槃操也孔子遂行此魯哀二年也歸乎歸乎此系家再有歸與之辭者前辭出孟子此辭見論語葢止是一稱歸與二書各記之今前後再引亦失之也社地七百里古者二十五家為里里則各立社則書社者書其社之人名於籍葢以七百里書社之人封孔子也故下冉求云雖累千社而夫子不利是也徵百牢此哀七年時也百牢牢具一百也周禮上公九牢侯伯七牢子男五牢今吳徴百牢夷不識禮故也子貢對以周禮而後呉亡是懲也注去呉會繒已四年徐説去會四年是也按左傳及此文孔子是時在衞歸魯不見有在陳之文在陳當哀公之初葢年表誤爾凡十四嵗而反乎魯前文孔子以定公十四年去魯計至此十二年魯系家云定公十二年孔子去魯則首尾計十五年矣季康子問政論語季康子問政子曰政者正也又哀公問曰何為則民服子曰舉直錯諸枉則民服今此初論康子問政未合以孔子答哀公使民服葢太史公撮略論語為文而失事實恂恂有本作逡逡音七旬反辯辯論語作便便車子鉏商春秋傳及家語竝云車子鉏商而服䖍以子為姓非也今以車子為主車車士㣲者之人也人㣲故略其姓則子非姓也據魯親周言夫子修春秋以魯為主故云據魯親周葢孔子之時周雖㣲而親周王者以見天下之有宗主也孔子年七十三若孔子以魯襄二十一年生至哀十六年為七十三若襄二十二年生則孔子年七十二經傳生年不定致使孔子夀數不明失禮為昏失所為愆左傳及家語皆云失志為昏失禮為愆與此不同也雒離各離二音又音落藜藜是草名也毚檀上音讒毚檀檀樹之别種安貴五味安貴香名出西域五味藥草也相訣而去訣音決訣者别也子贑廬於冢上按家語無上字且禮云適墓不登隴豈合廬於冢上乎葢上者亦是邊側之義弟子内後世因廟藏孔子衣冠謂孔子所居之堂其弟子之中孔子没後後代因廟藏夫子平生衣冠琴書於夀堂中孔子生鯉按家語孔子年十九娶於宋之笄官氏之女一嵗而生伯魚伯魚之生魯昭公使人遺之鯉魚夫子榮君之賜因以名其子也余祇迴留之不能祇敬也言祇敬遲回不能去之有本亦作低回義亦通言六藝者折中於夫子離騷云明五帝以折中王帥叔云折中也正也宋均云折斷也中當也按言欲折斷其物而用之與度相中當故以言其折中也陳涉系家第十八按勝立數月而死無後亦稱系家者以其所遣王侯将相竟滅秦以其首事也陽城韋昭云屬潁川地理志云屬汝南不同者按郡縣之名隨代分割葢陽城舊屬汝南史遷云今為汝陰後又分𨽻潁川韋昭據以為説故其不同他皆倣此陽夏夏音賈韋昭云淮陽縣後屬陳傭耕廣雅云傭役也按謂役力而受雇直也鴻鵠之志哉尸子曰鴻鵠之􅑹羽翼未合而有四海之心是按鴻鵠是一鳥若鳯凰然非謂鴻鴈與黄鵠也鵠音户酷反發閭左閭左謂居閭里之左也秦時復除者居閭左今力役凡在閭左者盡發之也又云凡居以富强為右貧弱為左秦役戍多富者役盡兼取貧弱者也適戍漁陽適音直革反又音磔故漢書有七科適戍者屯兵而守也地理志漁陽縣名在漁陽郡也等死死國謂欲經營圖國假使不成而敗猶勝為戍卒而死也二世少子姚氏按隠士遺章邯書云李斯云二世廢十七兄而立今王則二世即是始皇第十八子未知其死也如淳云扶蘇自殺故人不知其死或以不知何坐而死故天下寃二世殺之其意亦得今宜依文而解直是扶蘇為二世所殺而百姓未知故欲詐自稱之也為天下唱漢書作倡倡謂先也説文云倡首也乃行卜行者先也一云行徃也卜之鬼乎裴注引蘇林臣瓚義亦當矣而李奇又云卜者戒曰所卜事雖成當死為鬼惡指斥言之而勝失其㫖反依鬼神起怪葢亦得本㫖也念鬼念者思也謂思念欲假鬼神事耳又間令服䖍云間音中間之間鄭氏云間謂竊令人行也孔文祥又云竊伺間隙不欲令衆知之也次所旁叢祠次師所次舍處也墨子云建國必擇木之修茂者以為叢位髙誘注戰國策云叢神祠也叢樹也夜篝火篝音溝漢書作搆郭璞云篝籠也将尉官也漢舊儀大縣二人其尉将屯九百人故云将尉也劎挺徐廣云挺奪也按奪即脱也説文云挺拔也按謂尉拔劍而廣因奪之故得殺尉藉第令無斬蘇林云藉第假借且令失期不斬則戍死者固十七八然第一音次第之第又小顔云第但也劉氏云藉音子夜反應劭讀如字云藉吏士之名藉也各以意言蘇説為近之也舉大名大名謂大稱名也攻蘄音機又音祈縣名屬沛縣蘄下下降也謂以兵臨而即降也符離韋昭云屬沛郡徇蘄李音云徇略也音辭峻反至陳地理志陳縣屬淮陽郡守令皆不在張晏云郡守及令皆不在非也按地理志云秦三十六郡竝無陳郡則陳止是縣言守令則守非官也與下守丞同也則皆字是衍字譙門中葢謂陳縣之城門一曰麗譙故曰譙門中非上譙縣之門也譙縣守已下訖故也張楚按李奇云欲張大楚國故稱張楚也至東城地理志屬九江三川守三川今洛陽也地有伊洛河故曰三川秦曰三川漢曰河南郡李由李斯子也房君蔡賜為上柱國房邑也爵之於房號曰房君蔡賜其姓名晉灼按張耳傳言相國房君者葢誤耳涉始號楚因楚有相國之官故以官蔡賜葢其時草創亦未置相國之官人奴産子生按漢書無生字小顔云猶今言家産奴也次曹陽晉灼云亭名也在𢎞農東十二里小顔云曹水之陽也其水出陜縣西南峴頭山北流入河魏武帝謂之好陽周文自剄越系家句踐使罪人三行屬劍於剄曰不敢逃刑乃自剄郭璞注三蒼以為剄刺也趣趙兵上音促促謂催促也亟入闗亟音棘亟急也寗陵君晉灼云今在梁國也按今梁國有寜陵縣是也字轉異耳少遺兵按遺謂留餘也陽城人鄧説地理志陽城縣屬潁川説音悦凡人名皆音悦将兵居郯音談東海之縣名非也按章邯軍此時未至東海此郯别是地名或恐剡當作郟郟是郟鄏之地或見下有東海郯故誤銍人伍徐地理志銍縣屬沛伍徐漢書作伍逢也取慮人地理志縣名屬臨淮音秋閭二音取又音子臾反臘月臣瓚云建丑之月也顔游秦云按史記表二世二年十月誅葛嬰十一月周文死十二月陳涉死是也宗稟荆楚記云臘節在十二月故因是謂之臘月也還至下城父按舊以陳王從汝陰還至城父縣因降之故云還至下城父又顧氏按郡國志山乗縣有下城父聚在城父縣東下讀如字其説為得之涓人音公𤣥反服䖍云給涓通也如今謁者倉頭軍韋昭云軍皆著青㡌以陳為楚為如字讀謂又以陳地為楚國秦左右校按即左右校尉軍也自辯數一音疎主反謂自辯説數與涉有故舊事驗也又音朔數謂自辯徃數與涉有故此數猶朋友數之數也夥頤涉之為王服䖍云楚人謂多為夥按又言頤者助聲之辭也謂涉為王宫殿帷帳庶物夥多驚而偉之故稱夥頤也沈沈者應劭曰以為沈沈宫室深邃貌故音長含反而劉伯莊以沈沈猶談談謂故人呼為沈沈者猶俗云謂談談漢是故人皆自引去顔氏引孔叢云陳勝為王妻之父兄徃焉勝以衆賔待之妻父怒云怙强而傲長者不能久焉不辭而去是其事類也輒自治之謂呉房朱武等以素所不善者即自驗問不徃下吏褚先生曰徐廣與裴駰據所見别本及班彪奏事皆云合作太史公今據此是褚先生述史記加此贊首地形險阻數句之言然後始稱賈生之言因即改太史公之目而自題已位號也已下義竝已見始皇之本紀訖仰闗仰字亦作卭竝音仰謂秦地形髙故竝仰向闗門而攻秦亦有作叩字非也九國之師九國者謂六國之外更有宋衛中山流血漂櫓説文云櫓大楯也執敲扑臣瓚云短曰敲長曰扑貫弓音烏蠻反又如字貫謂上弦也金人十二各重千石坐髙二丈號曰翁仲而誰呵音何亦何字猶今巡更問何誰仟伯之中謂在千人百人之長也音千百如淳云時皆屈在仟陌之中陌音貊鉏耰棘矜鉏耰謂鉏木也論語曰耰而不輟是也棘㦸也矜柄也音勤鄉時之士上音香亮反鄉時猶徃時也謂孟嘗信陵蘇秦陳軫之比也度長絜大絜音下結反謂如結束知其大小也抑八州謂秦强而抑八州使朝已也漢書作招八州亦通也仁心不施式豉反言秦虎狼之國其仁心不施及於天下故亡也外戚系家第十九外戚紀后妃也后族亦代有封爵故也漢書則編之列傳之中王隠則謂之為紀而在列傳之首也繼體守文按繼體謂非創業之主而是嫡子繼先帝之正體而立者也守文者猶法也謂非受命創制之君但守先帝法度為之主耳非獨内徳茂按謂非獨君徳於内茂盛而亦有賢后妃外戚之親以助教化塗山韋昭云塗山國名禹所娶在今九江應劭云九江當塗有禹墟大戴云禹娶塗山氏之女謂之僑僑産啟末喜國語桀伐有施有施人以妹喜女焉韋昭云有施氏女姓喜有娀韋昭云契母簡狄有娀國女音嵩妲已國語殷辛伐有蘇氏蘇氏以妲已女焉按有蘇國也已姓也妲字也包愷云妲音丁達反姜原系木云帝嚳上妃有邰氏之女曰姜原鄭𤣥箋詩云姜姓嫄名履大人跡而生后稷大任按毛詩大任文王之母故詩云摯仲氏任毛詩云摯國任姓之中女也襃姒國語曰幽王伐有襃襃人以襃姒女焉按襃是國名姒是其姓即龍漦之子襃人育而以女於幽王也然此文自夏之興至襃姒皆是魏如耳之母詞見國語及列女傳譏不親迎按公羊紀裂繻來逆女何以書譏也譏不親迎也陰陽之變萬物之統也以言若樂聲調能令四時和而陰陽變則能生萬物是陰陽即夫婦也夫婦道和而能化生萬物萬物人為之本故云萬物之統妃匹之愛妃音配又如字君不能得之於臣以言夫婦親愛之情雖君父之尊而不奪臣子所好愛使移其本意是不能得也故曰匹夫不可奪志是也或不能成子姓按鄭𤣥注記云姓者生也子姓謂衆孫也按即趙飛燕等是也或不能要終按謂有始不能要其終也以言雖有子姓而意不能要終如栗姬衛后等皆是也惡能上音烏惡猶於何也吕娥姁吕后字音況羽反按漢書吕后名雉戚夫人漢書云得定陶戚姬無恙爾雅云恙憂也一説古者野居露宿恙噬人蟲也故人相恤云得無恙乎孝恵皇后按皇甫謐云名嫣居北宫按宫在未央北故曰北宫魏媼媪音烏老反然媪是婦人之老者通號故趙太后自稱媪及王媪劉媪之屬是也死山陰因𦵏焉顧氏按冢墓記在會稽縣縣西北檝山上今猶有兆域檝音㽵洽反河南宫成臯臺按是河南宫之成臯臺漢書作成臯靈臺西征記云武牢城内有髙祖殿西南有武庫薄昭封為軹侯按地理志軹縣在河南恐地逺非其封也按長安東有軹道亭或當是所封也𦵏南陵按廟記云在霸陵南十里故謂南陵按今在長安東滻水東東原上名曰少陰在霸陵西南故曰東望吾子西望吾夫是也竇太后按皇甫謐云名猗房生女嫖音疋消反𦵏觀津按摯虞注決録云竇太后父少遭秦亂隠身漁釣墜泉而死景帝立太后遺使者填父所墜淵起大墳於觀津城南人間號曰竇氏青山也兄竇長君按決録云建字長君從其家之長安謂從逐其宜陽之主人家而皆徃長安也與我決於傳舍中決者别也傳音轉傳舍謂郵亭傳置之舍葢竇后初入宫時别其弟於傳舍之中也丐沐沐我丐音葢丐者乞也沐米潘也謂后乞潘為弟沐廣國為章武侯地理志縣名屬渤海彭祖為南皮侯地理志縣名屬渤海竇嬰為魏其侯地理志縣名屬瑯琊也公昆弟按公亦祖也謂皇后同祖之昆弟如竇嬰即皇后之兄子之比亦得家於長安故劉氏云公昆弟謂廣國等後景帝六嵗是當武帝建元六年此文是也而漢書作元光誤王太后按皇甫謐名娡音志槐里人按地理志右扶風本名廢丘與兩女即后及兒姁也欲奇兩女奇者異之也漢書作倚倚者依也王夫人生男即武帝也漢武故事云帝以乙酉年七月七日生於猗蘭殿兒姁況羽反生四男謂廣川王越膠東王寄清河王舜常山王憲也皆過栗姬過音戈謂踰之以故望之望猶責望謂恨之也心慊之音銜銜謂恨也曰子以母貴此皆公羊傳文皇后兄信為葢侯地理志葢縣屬太山大行奏事大行禮官行音衡封田蚡為武安侯地理志縣名屬魏郡勝為周陽侯地理志縣名屬上郡次林慮公主縣名屬河内本名隆慮避殤帝諱改名林慮慮音廬武帝祓蘇林音廢今亦音拂謂祓禊之遊水自潔故曰祓除凡生三女按謂諸邑石邑及衛長公主後封當利公主是一男名據即戾太子也皇后姓陳氏漢武故事云后名阿嬌即長公主嫖女也曾祖父嬰堂邑侯傳至父午尚長公主生后挾婦人媚道按漢書云女子楚服等坐為皇后呪詛大逆無道相連誅者三百人乃廢后居長門宫故司馬相如賦云陳皇后别在長門宫怨悶悲思奉黄金百斤為相如取酒乃為作頌以奏皇后復親幸作頌信有之也復親幸之恐非實也衛青封長平侯地理志縣名屬汝南冠軍侯子夫姉少兒之子去病封也地理志冠軍屬河陽王夫人生齊王閎中山李夫人生昌邑哀王膊他姬子二人漢書云李姬生廣陵王胥燕王旦也李夫人李延年之女弟漢書云帝悼之李少翁致其形為作賦此史記以為王夫人最寵武帝悼惜新論亦同史記為王夫人曰嚄烏百反葢驚怪之辭耳修成子仲金氏甥修成君之子也而名仲者又與大外祖王氏同字恐非也一曰陰安侯名不疑地理志縣名屬魏郡二曰發干侯名登地理志縣名屬東郡三曰宜春侯名伉地理志宜春縣名屬汝南邢夫人號娙娥服䖍云娙音近硎徐廣音五耕反鄒誕生音莖字林音五經反説文云娙長也好也許慎云秦晉之間謂好為娙又方言曰美貌謂之娥漢舊儀云娙娥秩比將軍御史大夫尹婕妤韋昭云媫承妤助也一云美好也聲類云幸也字亦從女漢舊儀云皇后為婕妤下輿禮比丞相也娙何秩比中二千石按崔浩云中猶滿也漢制九卿已上秩一嵗滿二千斛又漢官儀云中二千石俸月百八十斛容華秩比二千石按二千石是郡守之秩漢官儀云其俸月百二十斛又有真二千石者如淳云諸侯王相在郡守上秩真二千石漢律真二千石俸月二萬按是二萬斗也則二萬斗亦是二千石也崔浩云列卿已上秩石皆正二千石按此則是真二千石也其云中二千石亦不滿二千葢千八九百耳此崔氏之説今兼引而解之鉤弋夫人按夫人姓趙河間人漢書云武帝過河間望氣者言此有奇女天子乃使使召之女兩手皆拳上自披之手即時伸由是幸號曰拳夫人後居鉤弋宫號曰鉤弋夫人列仙傳云發手得一玉鉤故號焉漢武故事云宫在直城門南廟記云宫有千門萬戸不可記名也姓趙氏按漢書昭帝即位追尊太后父趙父為順成侯武帝年七十生昭帝按徐廣依漢書以武帝年七十崩崩時昭帝年八嵗此褚先生之記漢書云元始三年昭帝生誤也按元始當為太始死雲陽宫按三輔故事云𦵏甘泉宫南後昭帝起雲陵邑三千户漢武故事云既殯香聞十里上疑非常人發棺視之無尸衣履存焉楚元王系家第二十髙祖之同母少弟按漢書作同父言同父者以明異母也過巨嫂食漢書作丘應劭云丘姓也孟康云丘空也兄亡空有嫂也今此作巨巨大也謂長嫂也劉氏云巨一作丘櫟釡音歴謂以杓歴釡旁使為聲漢書作轑音勞羮頡侯爵號耳非縣邑名以其櫟釜故也都彭城漢書云楚王王薛郡東海彭城三十六郡也子夷王郢立漢書名郢客戍坐為薄太后服私奸漢書云私奸服舍中姚察云奸於服舍非必宫中又按集註服䖍云私奸中人葢以罪重故至削郡也注子延夀立十九年死按太史公唯記王純為國人告反國除葢延夀後更封至十九年又謀反誅死故不同也遂弟辟疆音壁强二音又音闢壃燒殺建徳建徳其相名史先失姓也無刑申公漢書申公名培王戊胥靡之趙任防與先生此及漢書雖不見趙不用防與公葢當時猶知事迹或别有所見故太史公明引以結其贊史記索隠卷十四
