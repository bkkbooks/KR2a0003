body:
  text: 史記索隱卷二十五唐司馬貞撰匈奴列傳第五十二曰淳維張晏曰淳維以殷時奔北邉又樂彦括地譜云夏桀無道湯放之鳴條三年而死其子獯粥妻桀之衆妾避居北野隨畜移徙中國謂之匈奴其言夏后苗裔或當然也故應劭風俗通曰殷時曰獯粥改曰匈奴又服䖍云堯時葷粥周曰獫狁秦曰匈奴韋昭漢曰匈奴葷粥其别名則淳維是其始祖盖與獯粥是一也橐他韋昭曰背肉似橐故云橐也包愷音託他或作駞驢驘按古今注云驢牡馬牝生驘駃騠説文云駃騠馬父驘于也廣異志音决蹄也發䝉記刳其母腹而生列女傳云生七日超其母騊駼按郭璞注爾雅云騊駼馬青色音淘塗又字林云野馬山海經云北海有獸其状如馬其名騊駼也驒奚韋昭驒音顛説文野馬屬徐廣云巨虚之類一云青驪驒文如鼉鄒誕本奚字作騱分地上音扶糞反少長上音式紹反下音陟兩反少長謂年稍長彎弓上音灣如字亦通也刀鋋音蟬按埤蒼云鋋小矛鐵矜按古今字説云􅚙通作矜注攣鞮氏上六縁反下丁啼反作周按謂始作周國也畎夷韋昭云春秋以為犬戎按畎音犬大顔云即昆夷山也山海經云黄帝生苗龍苗龍生融吾融吾生弄明弄明生白犬白犬有二牡是為犬戎説文赤狄本犬戎種故多從犬又山海經有人面獸身名曰犬夷賈逵云犬夷戎之别種也涇洛之北晉灼云洛水在馮翊懷德縣東南入渭又按水經云出上郡彫陰泰昌山過華陰入渭即漆沮水也山戎服䖍云盖今鮮卑汜邑蘇林音凡穎川襄城是按春秋地名云汜邑襄王所居故云襄城也居于陸渾按春秋左氏秦晉遷陸渾之戎于伊川杜預以為九姓之戎居陸渾在秦晉之間二國誘而徙之伊川遂從戎號今陸渾縣是也西河圁洛晋灼音囂三蒼作圜地理志云圜水出上郡白土縣西東流入河韋昭云圜常為圁續郡國志及太康地志竝作圁字也赤翟按左氏傳云晉師滅赤狄之潞氏杜氏以潞赤狄之别種也上黨潞縣又春秋地名云今曰赤渉胡白翟左氏晉師敗狄于箕卻􅆙獲白狄子杜氏以為白狄别種故西河郡有白部胡又國語云桓公西征攘白狄之地遂至于西河也有綿諸地理志天水有綿諸道狄䝠地理志天水狄道應劭以䝠戎邑音桓義渠韋昭云本西戎國有王秦滅之今在北地郡大荔按秦本紀厲恭公伐大荔取其王後更名臨晉故地理志臨晉故大荔國朐衍地理志縣名在北地徐廣音詡鄭氏音吁樓煩地理志縣名屬雁門應劭云故樓煩胡地林胡如淳云即儋林為李牧所滅也東胡服䖍云烏丸之先後為鮮卑在匈奴東故曰東胡按續漢書曰漢初匈奴冒頓滅其國餘類保烏桓山以為號俗隨水草居無常處以父之名字為姓父子男女悉髠頭為輕便注鮮卑按胡廣云鮮卑東胡别種又應奉云秦築長城徒役之士亾出塞外依鮮卑山因以為號句注服䖍云音拘韋昭云山名在應隂館胡貉按貉即濊也音亾格反宣太后服䖍云昭王之母也竝陰山徐廣云五原西安陽原縣北有陰山陰山在河南陽山北竝音傍白浪反至襄平韋昭云今遼東所理也三國邊匈奴按三國燕趙秦因河為塞按太康地記秦塞自五原北九百里謂之造陽東行終刺賁山南漢陽西也漢一作漁適戍上丁革反通直道蘇林云去長安八千里正南北相値道也九原韋昭云縣名屬五原也臨洮韋昭曰瀧西縣北假中應劭云在北地陽山北韋昭云北假地名又按漢書元紀云北假田官蘇林以為北方田官也主以田假與貧人故曰北假也頭曼音莫官反韋昭音瞞冒頓音墨又如字注單于廣大之貌按漢書單于姓攣鞮氏其國稱之曰橕犂孤塗單于而匈奴謂天為橕犂謂子為孤塗單于者廣大之貎也言其象天故曰橕犂孤塗單于也又𤣥晏春秋云士安讀漢書不詳此言有胡奴在側言之曰此胡所謂天子與古書所説符會也鳴鏑應劭云髐箭也韋昭云矢鏑飛則鳴甌脱服䖍云作土室以俟漢人又纂文曰區脱土穴也又云是地名故云生得甌脱王韋昭云界上屯守處也音一侯反脱音徒活反河南王如淳曰白羊王居河南閼氏舊音於連於曷反二音匈奴皇后號習鑿齒與燕王書云山下有紅藍花足下先知不北方人􅊥取其花染緋黄挼取其上英鮮者作烟肢婦人将用為顔色吾少時再三過見烟肢今日始視紅藍後當為足下致其種匈奴名妻作閼支言其可愛如烟肢也閼音煙想足下先亦不作此讀漢書也直上谷按姚氏云古字例以直為值值者當也谷蠡服䖍音鹿離蠡又音棃也骨都侯按後漢書云骨都侯異姓大臣呼衍氏須卜氏按後漢書云呼衍氏須卜氏常與單于婚姻須卜氏主獄訟也西接氐羌按風俗通云二氐本西南夷種地理志武都有白馬氐又魚豢魏略云漢置武都郡非其種人分竄山谷或號青氐或號白氐綦文云氐亦羊稱説文云羌西方牧羊人續漢書云羌三苗姜姓之别裔徙于三危今河間之西南羌是也單于庭按謂匈奴所都處為庭樂彦云單于無城郭不知何以國之穹廬前地若庭故云庭千長伯長什長按續漢書郡國志云里有魁人有什伍里魁王一里伯主百家什主十家伍長五家以相檢察故賈誼過秦以為俛起什百之中是也蘢城漢書作龍城亦作蘢字崔浩云西方胡皆事龍神故名大㑹處為龍城後漢書云匈奴俗歲有三龍祠祭天神蹛林服䖍云音帶匈奴秋社八月中皆會祭處鄭氏云地名也晉灼云李陵與蘇武書云相競趨蹛林則服䖍説是也又韋昭音多藍反姚氏按李收傳大破匈奴滅襜襤此字與韋昭音頗同然林襤聲相近或以林為襤也小者軋服䖍云刀割而也音烏八反鄧展云歴也如淳云撾抶也三蒼云軋輾也軋説文云輾轢也丁零按魏略云在康居北去匈奴庭接習水七十里又云匈奴北有渾窳國屈射國名射音奕又音石盡青駹音武江反按青駹馬色青驪馬説文云驪黑色騂馬按詩傳云赤黄曰騂傅矢音附為書遺高后按漢書云高后時冒頓􅎊驕乃使使遺高后書曰孤僨之君生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自娱願以所有易其所無高后怒欲擊之諸將曰按漢書季布諫高后乃止義盧侯難氏匈奴將名也氏音支呼揭音傑又音丘列反皆以為匈奴按謂皆入匈奴一國望薪之地服䖍云漢界上塞下地名今匈奴使至於此也係􅟔上音胡計反下音大胡反服繡袷綺衣按小顔云服者天子所服也以繡為表綺為裏以賜冒頓字林云袷衣無絮也音公洽反比余一按漢書作比疎一比音鼻小顔云辮髪之飾也以金為之廣雅云比櫛也蒼頡篇云靡者為比麄者為梳按蘇林説今亦謂之梳比或亦帶飾者也黃金飾具帶一按謂要中大帶黄金胥紕一按漢書作犀毗或無下一字此作胥者犀聲相近或誤張晏云洛帶瑞獸名也東胡好服之按戰國䇿云趙武靈王賜周紹貝帶黄金師比延篤云胡革帶鈎也則此帶鈎亦名師比則胥犀與師竝相近而説各異耳班固與竇固牋云賜犀比金頭帶是也赤綈按説文云綈厚繒也稽粥音雞育二音重駱音湩酪二音按三蒼云湩乳汁也字林云竹用反穆天子傳云牛馬之湩臣菟人所具雖詳不取漢書作陽此亦音羊室屋之極生力必屈以言棟宇室屋之作人盡極以營其生至於氣力屈竭也屈音其勿反喋喋而佔佔冠固何當鄧展曰喋音牒佔嘯耳語服䖍曰口舌喋喋如淳曰言汝漢人多居室中固自宜着冠且不足貴也小顔云喋喋利口也佔佔衣裳貎喋音昌涉反佔音占言當思念無為喋喋佔佔耳雖自謂着冠何所當益也北地都尉卭音五郎反徐廣云姓孫其後子單封為瓶侯音白丁反囘中宫服䖍云在北地武帝作宫始皇本紀三十七年登鷄頭山遏回中武帝元封四年通回中道出彭陽韋昭云安定縣候騎崔浩云候邏騎盧卿按表盧作玈古今字耳且居漢書作且渠匈奴官號雕渠難按樂彦云當戸且渠各自一官雕難為此官跂行喙息按跂音歧又音企言蟲豸之類或企踵而行或以喙而息皆得其安也蠕動按三蒼云蠕蠕動貌音軟淮南子云昆蟲蠕動釋逃虜人單于母言章尼按文帝云我今日竝釋放彼國逃亾虜遣之歸本國汝單于無得更以言詞訴於章尼等責其逃也翁壹按衛青傳唯稱聶壹顧氏云壹名也老故稱翁義或然也奸蘭出物上音干干蘭謂犯禁私出物也武州塞蘇林云在雁門也尉史如淳云律近塞郡皆置尉百里一人士史尉史各二人也當路塞蘇林云直當路塞耳什辟縣按孟康云縣斗辟西近胡也什音斗辟音僻造陽郡即斗辟縣是也伊穉斜穉音持利反斜音士嗟反斜鄒誕音直牙反葢穉斜胡人語近得其實太子於單音丹儌極而取之按儌要也謂要其疲極而取之祭天金人韋昭云作金人以為祭天主崔浩云胡祭以金人為主今浮圖金人是也又漢書音義稱金人祭天本在雲陽甘泉山下秦奪其地徙之於休屠王右地故休屠有祭天金人象祭天人也事恐不然按得休屠金人後置之於甘泉也過居延韋昭曰張掖縣祁連山按西京舊事云山在張掖酒泉二界上東西二百餘里南北百里有松栢五木美水草冬温夏涼宜畜牧匈奴失二山乃歌云亾我祁連山使我六畜不蕃息失我燕支山使我嫁婦無顔色祁連一名天山亦曰白山也新秦中如淳云長安以北朔方以南漢書食貨志云貧人充朔方以南新秦中也令居徐廣云在金城地理志云張掖令居縣姚氏令音連小顔云音零漢士物故按釋名云漢以来謂死為物故物就朽故也又魏壹訪議髙堂崇對曰聞之先師物無也故事也言無復所能於事者也浮苴井音子餘反臣瓚云去九原二千里見漢輿地圖匈河水臣瓚云河水名去令居千里浚稽山應劭云在武威縣北呴犁湖上音佝又音呼盧朐服䖍云匈奴地名張晏云山名且鞮上子餘反下音低涿涂山上音卓下音以奢反余吾水徐廣云一作斜音邪山海經云北鮮之山鮮水出焉北流注余吾定哀之際按韓國要禮云仲尼仕於定哀故其著春秋不切論當世而微其詞也而罔襃按罔者無也謂無其實而襃之是也忌諱當代故也患其儌一時權按徐音皎劉伯荘音叫皆非也按其字宜音僥儌者求也言求一時權寵而務讇其說音税以便偏指不參按謂説者謀匈奴皆患其直儌求一時權幸但務諂進其説以自便其偏指不㕘詳終始利害也彼已將率彼已者猶詩人譏詞云彼已之子是也將率則指樊噲衛霍等也且鞮侯已下按張晏云白狐鹿單于已下皆劉向褚先生所録班彪又撰而次之所以漢書匈奴傳有上下兩卷南越列傳第五十三尉他尉官也他名也姓趙他音徒河反又十三州記云大郡曰守小郡曰尉眞定人韋昭曰故郡名後更為縣在常山略定楊越按戰國䇿云吴起為楚収楊越桂林按地理志武帝更名鬱林象郡按本紀始皇三十三年略陸梁地以為南海鬱林象郡桂林地理志云武帝更名日南以謫音直革反任嚻五刀反龍川令地理志縣名屬南海也絶新道按蘇林云秦所通越道即被他書服䖍云嚻詐作詔書使為南海尉韋昭云被之以書音皮義反移檄告横浦按南康記云南野縣大庾嶺三十里至横浦在秦時闗其下謂為塞上陽山姚氏按地理志云掲陽有陽山縣今此縣上流百餘里有騎田嶺當是陽山闗涅谿鄒氏劉氏本竝作涅音年結反漢書作湟谿音皇又衛青傳云出桂陽下湟水是也而姚察云史記作涅今本作湟涅及湟不同良由隨聞則輒改故也水經云含滙縣南有滙浦闗未知孰是然鄒誕作涅漢書作湟葢近於古以其黨為假守按謂他所立其親黨為郡縣之職或假守隆慮侯竈韋昭云姓周隆慮縣名屬河内音林閭二音不能踰嶺按此嶺即陽山嶺西甌駱鄒氏云又有駱越姚氏按益州傳云交趾有駱田仰潮水上下人食其田名為駱人有駱王駱侯諸縣自名為駱将銅印青綬即今之令長也後蜀王子将兵討駱候自稱為安陽王冶封溪縣後南越王尉他攻破安陽王令二使典主交趾九眞二郡人尋此駱即甌駱也躶國音和寡反躶露形也遣兩將軍按王恢韓安國悦好語入見悦漢書作怵韋昭云誘怵好語樛氏女上紀虬反樛姓出邯鄲藏其先武帝璽李奇云去其僭號安國少季安國姓也少季名也蒼梧秦王有連按蒼梧越中王自名為秦王即下趙光是也故云有連連者連姻也趙與秦同姓故稱秦王介漢使者韋昭曰恃使者為介胄志林云介者因也欲因使者權誅呂嘉然二家之説皆通韋昭以介為恃介者間也以言間恃漢使者之權意即得云恃以介冑則非也虞喜以介為因亦有所由按介者賓主所由也鏦嘉韋昭云鏦撞也按字林七凶反又吴王濞傳鏦殺吴王與此同分弟兵就舍按謂分其兵也漢書作介介被也恃也郟壯士如淳云郟縣名在潁川術陽侯韋昭云漢所封按功臣表術陽屬下邳函封漢使節置塞上按南康記以為大庾名塞上也成安侯按功臣表成安屬郟廣德為龍亢侯按龍亢屬譙國漢書龍亢作龒侯服䖍音卭晉灼云古龍字下滙水劉氏云匯當作皇漢書云下湟水或本作洭先陷尋陜姚氏云尋陜在始興西三百里近連口也破石門按廣州記在畨禺縣北三十里昔吕嘉拒漢積石鎮江名曰石門又俗云石門水名曰貪泉飲之則令人變故吴隱之至石門酌水餘乃為之歌云也犁旦城中皆降鄒氏云犁一作比音必至反然犁即比義又解犁黑也天未明尚黒時也漢書史記亦作遲明遲音稚遲待也亦犁之義也臨蔡侯按表屬河内揭陽令定地理志揭陽縣屬南海揭音桀韋昭音其逝反劉氏音求例反定者令之名也按漢功臣表云定揭令意又别也蒼梧王趙光按漢書云光聞漢兵至降封為隨桃侯揭陽令史定為安道侯越将畢取為膫侯桂林監居翁為湘城侯韋昭云湘城屬堵陽隨桃安道膫三者皆屬南陽膫音遼也諭甌駱屬漢按漢書甌駱三十餘萬口降漢注九眞儋耳朱崖徐廣皆據漢書為説東越列傳第五十四閩越按説文云閩東越虵種也故字從蟲閩音旻姓騶氏徐廣云一作駱是上云歐駱不姓騶閩中郡徐廣云今建安候官是按為閩州按下文都東冶韋昭以為在候官搖為東海王都東甌韋昭曰今永寧姚氏云甌水名永嘉記水出永寧山行三十餘里去郡城五里入江昔有東甌王都城有亭積石為道今猶在也注東甌王廣武侯徐廣云據年表而為説不戰而耘耘音云耘除也漢書作隕音于粉反即鏦劉氏又音窗鏦撞也繇君丑繇音搖邑號也丑名屯豫章梅嶺按徐廣云在會稽非也今按豫章三十里有梅嶺在洪崖山足當古驛道今此文云豫章梅嶺知非會稽也入白沙武林徐廣云在豫章界按今豫章北二百里接鄱陽界地名白沙有水入湖名曰白沙坈東南八十里有武陽亭亭東南三十里地名武林此白沙武林今當閩越入京道出句章鄭氏音勾會稽縣也出若邪按姚氏云地名今闕東成侯韋昭曰在九江建成侯敖為開陵侯徐廣云敖東越臣韋昭云開陵屬臨淮繚嫈侯服䖍云音榮縣名劉伯荘云繚音遼下紆營反城陽王子也東越將多軍李竒云多軍名韋昭云多姓軍名也朝鮮列傳第五十五按朝音潮直驕反鮮音仙以有汕水故名也汕一音訕王滿者按漢書滿燕人姓衛擊破朝鮮而自王之始全燕時按始全燕時謂六國燕方全盛之時嘗略屬真番朝鮮如淳云燕嘗略二國以屬己也應劭云𤣥莬本直番國注有番汗徐氏據地理志而知也番音潘又音盤汗音寒浿水為界浿音旁沛反上下鄣按地理志樂浪有雲鄣都王險韋昭云古邑名徐廣曰吕黎有險瀆縣應劭注地理志遼東險瀆縣朝鮮王舊都臣瓚云險城在樂浪郡浿水之東也臨屯東夷小國後以為郡譙諭説文云譙讓也喻曉也譙音才笑反為名美有殺将之美名御殺何即送何之御也相路人應劭云凡五人戎狄不知官紀故皆稱相也路人漁陽縣人如淳云相其國宰相路人名也將軍王唊音頰一音協右渠子長按漢書表云長路音各子最路人子也名最參澅清侯韋昭云縣名屬齊顧氏澅音獲陰荻苴侯晉灼云屬勃海荻音狄苴音子餘反唊平州侯韋昭云屬梁父長幾侯韋昭云縣名屬河東最涅陽侯韋昭云屬齊也洌口蘇林曰縣名度海先得之西南夷列傳第五十六以什數劉氏音所其反鄒氏音所主反夜郎最大荀說云犍為屬國也韋昭云漢為縣屬牂牱按後漢書云夜郎東接交趾其地在胡南其君長木出於竹以竹為姓也靡莫夷邑名滇與同姓滇最大崔浩云後為縣越嶲太守所理也魋結魋漢書作椎音直追反結音計同師以東韋昭云邑名漢書作桐鄉楪榆韋昭曰益州縣楪音葉嶲昆明崔浩云二國名韋昭云嶲益州縣徙筰都服䖍云二國名韋昭云徙縣屬蜀筰縣在越嶲余廣云筰音昨冉駹按應劭云汶江郡本冉駹音亾江反白馬最大按夷邑名即白馬氐莊蹻音炬灼反楚莊王弟為盜者滇池方三百里地理志益州滇池縣澤在西北後漢書云其池水源深廣而更淺狹有似倒流故謂滇池通五尺道謂棧道廣五尺僰僮韋昭云僰屬犍為音蒲北反服䖍云舊京師有僰婢注枸一作蒟按晉灼音矩劉德云蒟樹如桑其椹長二三寸味酢取其實以為醤美又云蒟縁樹而生非木也今蜀土家出蒟實似桑椹味辛似薑不酢又云取葉此注又云葉似桑葉非也廣志云色黒味辛下氣消穀注音窶求羽反食重萬餘人按食貨輜重車也音時用反道䍧牱江崔浩云䍧牱繋船杙也以為地名道猶從也地理志夜郎又有豚水東至南海四會入海此䍧牱江身毒國身音捐毒音篤一本作乾毒漢書音義一名天竺也且蘭上音子余反小國名也後縣屬䍧牱誅頭蘭即且蘭也勞寢靡莫二國與滇王同姓後揃音剪揃謂被分割也剽分二方上音疋妙反言西夷後被揃迫逐遂剽居西南二方各屬郡縣剽亦分義史記索隱卷二十五
