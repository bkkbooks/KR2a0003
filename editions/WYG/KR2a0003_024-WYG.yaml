body:
  text: 史記索隱卷二十四唐司馬貞撰扁鵲倉公列傳第四十五鄭人按勃海無鄭縣當為鄚縣音莫今屬河間為舍長劉氏云守客館之帥長桑君隠者葢神人以上池之水按舊説云上池水未至地葢承取露竹木上水取之以和藥服之三十日當見鬼物也見垣一方人方猶邉也言能隔墻見彼邉之人則眼通神也診脉上鄒氏音丈忍反劉氏音陳忍反司馬彪云診占也當晉昭公時按左氏簡子專國在定頃二公之時非當昭公之世且趙系家叙此事亦在定公之初簡子疾五日不知人按韓子云十日不知人所記異也公孫支子輿按二子皆秦大夫公孫支子桑也子輿未詳適有所學適音釋言我適來有所受教命故云學也虢太子按傅𤣥云虢是晉獻所滅先此百二十餘年此時焉得有虢則此云虢太子非也然按虢後改稱郭春秋有郭公葢郭之太子也喜方喜音許既反喜好也愛也方方伎之人也蹷蹷音厥俞跗音臾附下又音趺鑱石撟引案杌毒熨鑱音七咸反謂石針也撟音九兆反謂為按摩之法夭撟引身如熊顧鳥伸也杌音玩亦謂按摩而玩弄身體使調也毒熨謂毒病之處以藥物熨帖也輸音束注反搦髓腦揲荒搦音女角反揲音舌揲荒膏荒也瓜幕幕音漠漠病也謂以瓜决之不可曲止也止語助也不可委曲具言目眩然而不瞚眩音縣瞚音舜舌撟然而不下撟音紀兆反撟舉也寡臣謂虢君自謙云已是偏逺之國寡小之臣也服臆上音皮力反下音憶長潸音山長潸謂長垂淚也承䀹音接䀹即睫也承䀹言淚恒垂以承於睫也繵音直延反子陽陽扁鵲之弟子也厲鍼砥石鍼音針厲謂摩也砥音脂五分之熨八減之齊按言五分之熨者謂熨之令温暖之氣入五分也八減之齊者謂藥之齊和所減有八並越人當時有此方也齊桓侯客之按傅𤣥曰是時齊無桓侯裴駰云謂是齊侯田和之子桓公午也葢與趙簡子頗亦相當痺音必二反當傳西之長安傳音竹戀反傳乗傳送之緹縈緹音啼縈音紆營反數忔食飲忔音疑乙反忔者風痺忔然不得動也重陽上音直隴反逷心逷依字讀湧疝上音勇下音訕所諫反鄒誕生疝音山也前後溲音所留反前溲謂小便後溲大便也風癉容脬癉病也音亶脬音普交反字或作胞滫劉氏音廵跗方符反適其共養適音釋共音恭按謂山跗家適近所持財物共養我我不敢當以言其人不堪療也瘕劉氏音加雅反舊音遐鄒氏音嫁迵風下云飲食下嗌輒出之是風疾洞徹五藏故曰迵風瀺水瀺音士咸反濟北王阿母按是王之妳母也病旋已言尋則已止也案法新謂於舊方伎能生新意也四百七十萬曹偶四人按當今之四千七百貫也曹偶猶等軰也即仆於厠仆音赴又音歩北反懷子而不乳乳音人喻反乳生也旋乳旋乳者言廻旋即生也血如豆比五六枚比音必利反大蟲即蚖蟲也拊其頭拊音附又音撫即竄以藥謂以藥燻之故云竄音七亂反汜音凡蟯瘕音饒檟舊音堯遐宛又如字循其尺其尺索刺麄而毛美奉髮循音廵按謂手循其尺索也刺音七賜反麄音七胡反言循其尺索刺人手而麄是婦人之病也徐氏云奉一作髼非其義也又云一作秦秦謂秦首言髪如蠐螬事葢近也閣都尉按閣者姓也為都尉一云閣即官閣都尉掌之故曰閣都尉也番陰脉番音芳袁反邪氣辟辟音必亦反猶聚也愈深愈音庾入缺盆死按缺盆人乳房上骨名也沓風沓音徒合反風病之名也瘖瘖者失瘖也讀如音又作厝厝者置也言使人運置其手足也公乘項處按公乘官名也項姓處名故上云倉公之師元里公乗陽慶亦然也牡疝上音母下音色諫反旦日日夕死按旦日明日也言明日之夕死也脈得番陽脈病之名曰番陽者以言陽脈之翻入虚裏也有數者能異之數音色住反謂術數之人乃可異其狀也方數數音術數之數注一作堇音謹為古傳方謂好能傳得古方也不為愛公所言於意所不愛惜方術也吾年中時按年中謂中年時也中年亦壯年也古人語自爾楊中倩倩音七見反人姓名也意好數數色句反謂好術數也聖儒言意儒德慕聖人之道故云聖儒也呉王濞列傳第四十六右五宗之國俱享大邦雖復逆亂萌心取汙朝典豈可謂非青社之國哉然淮南猶有後不絶衡山亦其罪差輕比三卿之分晉方暴秦之滅周可不優乎安得出其王國不上同五宗三王列於世家其吳濞請與楚元王同為一篇淮南宜與齊悼惠王為一篇吳王濞按澎濞字也音披位反間行謂獨行從他道逃走間音紀閑反郃陽地理志馮翊縣名在郃水之陽音合蘄西㑹甀地名也在蘄縣之西㑹音古兑反甀音錘塡塡音鎭拊拊音撫漢後五十年東南有亂按應氏之意以後五十年東南有亂本是占氣者所説髙祖素聞此説自以前難未弭恐後灾更生故説此言更以戒濞如淳之説亦合事理豫章按鄣郡後改曰故鄣或稱豫章為衍字也吳太子姚氏案楚漢春秋云吳太子名賢字徳明提音啼又音底又音弟秋請音淨孟説是也應劭所云斷獄先請不知何憑如淳云代已致請亦是臆説且文云使人為秋請謂使人為此秋請之禮也察見淵中魚不祥按此語見韓子及文子韋昭曰知臣下隂私使憂患生變為不祥故當赦宥使自新也銅鹽按吳國有鑄錢煑鹽之利故百姓不别徭賦也卒踐更輒與平賈按漢律卒更有三踐更居更過更也此言踐更輒與平賈者謂為踐更合自出錢今王欲得人心乃與平價官讐之也即山即山山名又即者就也河間郡按漢書作常山郡也誂音徒鳥反䑛糠及米按言䑛糠盡則至米謂削上盡則至滅國也瞿然劉氏音九具反又説文云瞿逺視貌音九縳反而愁勞聖人之所以起按所謂殷憂以啓明聖也越直長沙者服䖍云直音值謂其境相接也因王子定長沙以北按謂南越之地與長沙地相接值者因長沙王子以定長沙以北也摶胡衆摶音專專謂專統領胡兵擅適過適音值革反又音宅鏦殺吳王上音七江反謂以戈刺殺之鄭氏又音春亦音從容之從謂撞殺之盛其頭張勃云吳王濞葬丹徒縣南其地名相唐今注本云武進縣恐錯也由父省音所景反省者减也謂父仲從代王省封郃陽侯爭技謂與太子爭博為爭技也魏其武安侯列傳第四十七父世觀津按地理志觀津縣屬信都以言其累葉在觀津故云父世也宗室諸竇按謂宗室之中及諸竇之宗室又姚氏按酷吏傳周陽由父趙兼以淮南王舅侯周陽故因改氏由以宗室任為郎則似是與國有親戚屬籍者亦得呼為宗室也相提而論提音弟又音啼相提猶相抵也論音路頓反螫將軍上螫音釋謂怒也毒蟲怒必螫人又音火各反漢書作奭即螫也毋類矣謂見誅滅無遺類臣有愛音如字愛猶惜也沾沾音襜又音當牒反小顔音他兼反注一作怗音如字又天牒反注怗音憺音尺占反田蚡扶粉反如蚡䑕之蚡音墳晚節按謂晩年也推轂趙綰按推轂謂自卑下之如謂之推車轂也除關謂除關門之税以禮為服制按其時禮度踰侈多不依禮今令吉凶服制皆法於禮適諸竇上音直格反士郡諸侯按謂仕諸郡及仕諸侯王國者猶言仕郡國也武安貌侵按服䖍云侵短小也韋昭云刻确也按确音刻又孔文祥侵醜惡也音寢生貴甚按小顔云謂自尊髙示貴寵其説疎也按生謂蚡自生尊貴之勢特甚故下云諸侯王多長年也蚡以肺腑為相非痛折節以禮屈之則天下不肅者也以肺腑為京師相腑音府肺音廢言如肝肺之相附又云柿木札附木皮也詩云如塗塗附以言如皮之附木也非痛折節按痛甚也欲令其折節屈下於已不然天下不肅或解以為蚡欲折節下士非也按下文不讓其冗葢侯知非也立曲旃按曲旃旌旃柄上曲僭禮也通帛曰旃説文曰曲旃者所以招士也潁陰侯灌何按何是嬰子漢書作嬰誤也搏甫上音博謂擊也已諾上音以謂已許諾必使副其前言也引繩批根按劉氏云二人相倚事如合繩共相依引也批音歩結反枇者排也漢書作排排根者蘇林云賔客去之者不與通也孟康云音根格謂引繩排彈其根格平生慕嬰交而棄者令不得退也小顔作根音痕格音下各反駰謂引繩排彈根括以退之者也注持彈按漢書本作抨彈音普耕反仲孺有服按服謂期功之服也故應璩書曰仲孺不辭同生之服是也以服請宜徃按徐廣云以服請不宜徃其説非也正言夫請不以服為解蚡不宜妄言也故駕自迎之也屬丞相上之欲反屬猶付也小顔云若今之舞訖相勸也取燕王女按蚡娶燕王劉澤子康王嘉之女也注一作畢按漢書作畢畢盡也注灌嬰孫按漢書云臨汝侯灌賢則嬰之孫臨汝是改封也女兒猶云兒女也漢書作女曹兒曹軰也猶言兒女軰也呫囁耳語呫鄒音蚩輒反囁音汝輒反説文附耳小語也李將軍地乎按小顔云言今既毁程令李何地自安斬頭陷匈韋昭云言不避死亾也漢書作穴匈辟倪上普係反下五係反埤倉云睥睨邪視也不折必披按包愷音疋皮反藉吾第按晉灼云藉蹈也以言蹂藉之為石人耶謂帝不如石人得長存也設百嵗按設者脱也共一老秃翁按謂共治一老秃翁指竇嬰也服䖍云首䑕一前一却也君何不自喜按小顔云何不自謙遜為可喜之事音許既反齰舌按説文云齰齧也音側革反繫都司空按百官表云宗正屬官主詔獄大行無遺詔按尚書無此景帝崩時大行遺詔乃魏其家臣印封之如淳説非也五年十月徐氏非者校武紀四年五月蚡薨疑竇嬰在前今云五年故疑非也病痱音肥又音扶味反風病也十二月晦張晏云見日月者葢春垂至恐遇赦贖也衣襜褕上尺占反下音踰謂非正朝衣若婦人服也表云恬坐衣不敬國除不直武安按武帝以魏其灌夫事為枉於武安侯為不直特為太后故耳韓長孺列傳第四十八梁成安人按徐廣云在汝潁之間漢書地理志縣名屬陳留騶田生所按安國學韓子及雜家説於鄒縣田生之所將扞上音醬下音汗注景帝姊按即館陶公主弗省也音仙井反省者察也苛禮按謂苛細小禮以責之抵罪蒙上音丁禮反蒙縣名屬梁國也仛鄙縣上音丑亞反字如姹仛者誇也漢書作嫮音火亞反注一作絎音寒孟反足與治乎按謂不足與繩持之治音持也主辱臣死此語見國語悦一邪臣上音悅漢書作怵説文云怵誘也自上古不屬為人按晉灼云不内屬於漢為人聶翁壹聶姓也翁壹名也漢書云聶壹武州塞地理志縣名屬雁門又崔浩云今平城直西百里有武州城也逗橈按應劭云逗曲行而避敵音豆又音住住也謂留止也橈屈弱也女孝反一云橈顧望而出於忠厚按出者去也言安國為人無忠厚之行郅他上音質下徒何反謂三人姓名也壺遂也臧固也郅他也若漢書則云至他言至於他處亦舉名士也蘢城音龍李將軍列傳第四十九世受射按小顔云世受射法良家子按如淳云非醫巫商賈百工也為郎武騎常侍按謂為郎而補武騎常侍為騎郎將小顔云為騎郎將謂主騎郎也屬國公孫昆邪按典屬國官名公孫姓也昆邪名服䖍云中國人包愷云昆音魂也中貴人按董巴輿服志云黄門丞至宻近使聼察天下謂之中貴人使者崔浩云在中而貴幸非徳望故名不見也射雕按服䖍云雕鶚也説文云似鷲墨色多子一名鷲以其毛作矢羽韋昭云鶚一名雕也無部伍行陣按百官志云將軍領軍皆有部曲大將軍營五部部校尉一人部下有曲曲有軍候一人也自便音去聲刁斗上音貂按荀悦云刁斗小鈴如宫中傳夜鈴也蘇林云形如鋗以銅作之無縁受一斗故云刁斗鋗即鈴也注銅作鐎埤倉云鐎温器有柄斗似銚無縁音焦莫府按大顔云凡將軍謂之莫府者葢兵行舍於帷帳故稱莫府古字通用遂作莫爾雅訓莫為大非斥候按許慎注淮南子云斥度候視也候望也故潁陰侯孫按灌嬰之孫名强霸陵尉按百官志云尉大縣二人主盜賊凡有賊發則推索尋按之也竟死謂終竟廣身至死以為恒也大黄按大黄黄間弩名也故韋昭曰角弩也色黄體大是也有功中率中音丁仲反率音律亦音雙筆反小顔云率謂軍功封賞之科著在法令故曰中率在下中按以九品而論在下之中當第八不為後人按謂不在人後今得當單于按廣言自少時結髮而與匈奴戰唯今者得與單于相當遇也數竒按服䖍云作事數不偶也音朔也小顔音所具反竒蕭該音居宜反食其音異基按趙將軍名也或亦依字讀亾導謂無人導引軍故失道也韓嫣或音偃又音許乾反園壖地人絹反又音乃段反又音圖宣反按壖地神道之地也黄圖云陽陵門西出神道茂陵神道廣四十三丈也恨其父小顔云令其父恨而死上雍劉氏音尚大顔云雍地形髙故云上天山按晉灼云在西域近蒲類海又西河舊事云白山東夏有雪匈奴謂之天山也悛悛音七旬反漢書作恂恂音詢下自成蹊按姚氏云桃李本不能言但以華實感物故人不期而徃其下自成蹊徑也以喻廣雖不能出辭能有所感而忠心信物故也衛將軍驃騎列傳第五十衛媼通衛姓也媼婦人老少通稱漢書曰與主家僮衛媼通按既云家僮故非老或者媼是老稱後追稱媼耳又外戚傳云姬父與魏王宗女魏媪通則亦魏是媪姓而小顔云衛者舉其夫姓也然按此文云侯妾衛媪似更無别夫也下云同母兄衛長君及姊子夫皆冒衛姓又似有夫其所冒之姓為父與母未明也平陽公主家按如淳云本陽信長公主平陽侯所尚故稱平陽主注夷侯時按徐廣云夷侯曹參曽孫名襄又按世家及功臣表時或作疇漢書作夀並文字殘缺故不同也先母之子漢書作民母服䖍云母嫡妻也青之適母顧氏云鄭季本妻編於民户之間故曰民母今本亦或作民母也兄弟數音去聲長女衛孺漢書云君孺徃篡取之篡猶劫也奪也建章宫按晉灼云上林中宫名也衛夫人有男即衛太子據也至髙闕按山名也小顔云一曰塞名在朔方之北河南地為朔方郡按謂北地郡之北黄河之南岸頭侯按晉灼云河東皮氏縣之亭名也薄伐獫狁此小雅六月詩美宣王北伐也薄伐者言逐出之也按榆谷舊塞如淳云按行也尋也榆谷舊塞名也按水經云上郡之北有諸次水東經榆林塞為榆谿是榆谷舊塞也破符離晉灼云二王號崔浩云漠北塞名裨王十人賈逵云裨益也小顔云裨王小王也若裨將然音頻移反立號而歸按謂立大将軍之號令而歸傅校獲王顔祕監云傅領也五百人謂之校以致克㨗而獲王合騎侯按非邑地而以戰功為號謂以軍合驃騎故云合騎若冠軍從驃然也出窳渾音庾服䖍云塞名徐廣云在朔方漢書作窴渾窴音田也搏戰獲王上音博搏擊也小顔同今史漢本多作傳猶轉也南窌侯徐音匹教反韋昭云縣名或作窖音子校反與穴下卯並音匹教反周霸徐廣云儒生也按郊祀志議封禪有周霸故知也剽姚上音匹遥反下音遥大顔按荀悦漢紀作票鷂票鷂勁疾之貌上音頻妙反下音弋召反斬捕首虜過當按小顔云計其所將人數則捕首虜為多過於所當也一云漢軍亾失者少而殺獲匈奴數多故曰過當也大父行音胡浪反謂藉若侯是匈奴祖之行也漢書云藉若侯産産即大父之名季父羅姑比按顔氏云羅姑比單于季父名也小顔云比類也按下文既云再冠軍無容更言類也討遫濮音速卜二音按崔浩云匈奴部落名按下有遫濮王是國名也懾慴按説文云讋失氣也劉氏云上式渉反下之渉反休屠祭天金人按張晏云佛徒祠金人也如淳云祭天以金人為主也屠音儲祁連山小顔云即天山也匈奴謂天祁連西河舊事謂白山天山祁連恐非即天山也小月氏韋昭云音支西域傳大月氏本居敦煌祁連間餘衆保南山遂號小月氏師大率減什三按漢書云減什七不同也小顔云破匈奴之師十減其七一云漢兵亾失之數下皆類此按後説為是也酋涂王上音才由反下音途漢書云楊武平鱳得得單于單相酋涂王此文省也稽沮王沮音子余反千騎將得王按漢書云右千騎將王然則此千騎將漢之將屬趙破奴得匈奴五王及王母也或云右千騎將即匈奴王之名校尉句王髙不識按二人並匈奴人也呼于屠王按三字共為王號僕多按漢百官表作僕明疑多是誤煇渠侯上音暉所將常選音宣變反謂驃騎常選擇取精兵留落不遇按謂遲留零落不偶合也先要邊按謂先於邊境要候漢人言其欲降漯陰侯上音他合反按地理志縣名在平原郡鷹庇為煇渠侯漢書鷹作雍庇音必二反又音疋履反按漢書功臣表云元狩二年以煇渠封僕明至三年又封鷹庇其地俱屬魯陽未詳所以禽棃按表作鳥棃大當户銅離徐廣一作稠離與漢書功臣表同此文云銅離文異也獟駻上音邱昭反説文作趬行遮貎遮一作疾駻音胡旦反不能度幕輕留按幕即沙漢古字少耳輕留者謂匈奴以漢軍不能至故輕易留而不去也遲明上音值待也待天欲明謂平明也諸本多作黎明鄒氏云黎遲也然黎黒也候天將明猶黒也殺傷大當以言所殺傷大略相當谷蠡王上音祿下音黎又音離渉獲章渠小顔云渉謂渉水也章渠單于之近臣謂渉水而破獲之漢書云渉獲單于章渠也比車耆上必耳反轉擊左大將按漢書名雙歴渉離侯漢書作度離侯小顔云山名歴度也弓閭包愷音穹亦如字讀登臨翰海按崔浩云北海名羣鳥之所解羽故云翰海廣異志云在沙漠北連行音與卓同卓逺也檮余山音桃徒二音獲屯頭王按漢書云屯頭韓王等三人李竒曰皆匈奴王號復陸支復劉氏音伏小顔音福樓專王漢書作剸並音專小顔音之兖反也伊即靬九言反武昌侯安稽故匈奴王姓趙也校尉自為按徐自為也校尉敢李廣子也置大司馬按如淳云本無大司馬今新置耳按前太尉其官又省今武帝始置此位衛將軍霍驃騎皆加此官少言不泄按孔文祥云謂質重少言膽氣在中也周仁隂重不泄其行亦同也有氣敢徃謂果敢任氣也漢書作徃亦作任也穿域蹵鞠徐氏云穿地為營域蹵鞠書有域説篇又以杖打亦有限域也今之鞠戲以皮為之中實以毛蹵蹋為戲劉向别錄云躢鞠兵勢所以成武事知有材力也漢書作躢鞠三倉云鞠毛可躢以為戲鞠音巨六反象祁連山按崔浩云去病破昆邪於此山故令為冢象之以旌功也姚氏按冢在茂陵東北與衛青冢並西者是青東者是去病冢上有豎石前有石馬相對又有石人也諡之幷武與廣地曰景桓侯按景桓兩諡也諡法布義行剛曰景是武諡也又曰辟土服逺曰桓是廣地之諡也以去病平生有武藝及廣邉地之功故云諡之并武與廣地曰景桓侯子嬗音市戰反最謂凡計也已為將者十四人按漢書云為特將者十五人葢通李廣也此李廣一人自有傳若漢書則七人自有傳八人附見七人謂李廣張騫公孫賀李蔡曹襄韓説蘇建也郁郅人服䖍音窒小顔音質按北地縣名也因杅音于至余吾音餘又音徐按水名在朔方李沮音爼豆之爼祋祤人縣名在馮翊上音都活反下音詡祋又丁外反何與音預無稱焉謂不為賢士大夫所稱舉平津侯主父列傳第五十一辥縣人按辥縣屬魯國漢置菑川國後割入齊也緣飾以儒術謂以儒術飾文法如衣服之有領縁以為飾也宏不得一按韋昭以宏之才非不能得一以為不可不敢逆上故耳下比於人比音鼻比者近也小顔音比方之比丞相封平津侯按漢書漢興皆以列侯為丞相宏本無爵乃詔封宏髙成之平津鄉六百五十户為平津侯丞相封侯自宏始也為人意忌謂宏外寛内深意多有忌害也食一肉脫粟飯按一肉言不兼味也脱粟纔脱穀而已言不精鑿也恐竊病死按人臣委質於君死生由君今若一朝病死是竊死也天下通道五按此語出子思子今見禮記中庸篇遭遇右武小顔云右亦上也言遭遇亂時則上武也何恙不已恙憂也言罹霜露寒凉之疾輕何憂於病不止禮曰疾止復初也竟以丞相終漢書云凡為丞相御史六嵗年八十終也子度嗣坐法失侯漢書云坐不遣鉅野令史成詣公車論為城旦元始中詔復宏後為關内侯也春蒐秋獮按宋均云宗本仁義助少陽少隂之氣因而教以簡閱車徒黄腄縣名在東萊音逐瑞反注音縋靡弊上靡音糜弊猶彫敝也焳愁上音焦徐樂音岳棘矜下音勤矜今㦸柄棘㦸也嚴安上書按本姓莊避明帝諱後並改嚴也安及徐樂並拜郎中樂後為中大夫鍾虡下音巨鄒本作鐻音同上篤厚上猶尚也貴也下智巧謂智巧為下也尉他屠雎按尉官也他趙他也音徒何反屠雎人姓名雎音雖舉陳謂勝廣舉兵於陳音如字又音據恐疎也下同降羌僰下白北反又父逼反略濊州按濊州地名即濊貊國也音紆廢反燔其蘢城匈奴城名音龍上燔音煩燔燒也形束壤制按謂地形及土壤皆束制在諸侯也注篹音撰故倒行㬥施之按偃語吾日莫塗逺恐赴前塗不跌故須倒行而逆施乃可及耳今此木作暴者言已困久得申須急暴行事以快意也暴者率也急也洨孔車上户交反按縣名在沛下車音尺奢反太皇太后詔按徐廣云此是平帝元始中詔以續卷後則又非褚先生所録也較然上音角較明也困於燕雀按謂公孫𢎞等未遇為時所輕若飛鴻之未漸受困於燕雀也是燕雀安知鴻鵠之志也遠跡羊豕之間按公孫𢎞牧豕卜式牧羊也見主父而歎息按上文嚴安等上書上曰公等安在何相見之晚是也蒲輪迎枚生按謂枚乘也漢始迎申公亦以蒲輪謂以蒲裹車輪恐傷草木也且蒲是草之美者故禮有蒲壁葢畵蒲於輪以為榮飾也史記索隱卷二十四
