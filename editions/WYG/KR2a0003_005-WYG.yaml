body:
  text: 史記索隠卷五唐司馬貞撰三代系表第一應劭云表者録其事而見之按禮有表記而鄭𤣥云表明也謂事微而不著須表明也故言表也五帝三代之記按此表依帝繫及帝系本其實敘五帝三代而篇唯名三代系家者以三代代系長逺宜以名篇且三代皆出自五帝故敘三代要從五帝而起也尚矣劉氏猶久古也大戴禮彼文云黄帝尚矣余讀諜音牒牒者紀系諡之書也下云稽諸歴諜謂歴代之譜五徳之傳音轉謂帝王更王以金木水火土之五徳傳次相承終而復始故云終始五徳之傳也以五帝繫諜尚書按大戴禮有五帝徳及帝繫篇葢太史公取此二篇之諜及尚書集而紀黄帝以來為系表也黄帝生𤣥囂按宋哀曰太史公書𤣥囂青陽是為少昊繼黄帝立者葢少昊金徳王非五運之次故敘五帝不數之耳𤣥囂生蟜極蟜極生帝嚳黄帝𤣥孫顓頊生窮蟬系本作窮係宋衷云一云窮係諡也顓頊生鮌鮌生禹按漢書律歴志顓頊五代而生鮌而此及帝系皆云顓頊生鮌是古史闕其代系也帝予音直吕反亦作宁帝槐音回一音懐系本作芬也帝芒音亡一作荒帝泄音薛也帝扃古熒字帝厪其靳反又音勤帝臯宋衷云墓在崤南陵帝發帝臯子也系本云帝臯生發及履癸履癸一名桀帝小甲大庚弟按殷木紀及系木皆云小甲太庚子帝沃甲系本云開甲帝廩辛或作馮辛系本紀作祖辛誤也按上祖乙巳生辛知非也成王誦或作庸非康王釗克堯切乂音招康伯康叔子王孫牟父也昭王瑕音遐宋衷云昭王南伐楚辛由靡為右涉漢中流而隕由靡承王遂卒不復周乃侯其後于西翟也熊黮吐感反又徒感反又杜減反鄒氏又作㸃音疌伯音捷魏公系本作微公名弗其共和周召二公共相王室故曰共和皇甫謐云共伯干王位以共國伯爵之君和其名也干王位言篡也與史遷之説不同葢異説耳張夫子問褚先生褚先生名少孫元成間為博士張夫子未詳也父皆黄帝子也按上契及后稷皆帝嚳子此云黄帝子者謂是黄帝之子孫耳按嚳是皇帝曽孫而契棄是𤣥孫故云也契母有娀氏女曰簡狄浴於𤣥丘水出詩緯殷本紀云𤣥鳥翔水遺卵娀簡狄取而吞之也姜嫄有邰氏之女也韋昭云姜姓嫄字也抱之山上普交反又如字也遂生源也言太伯之讓季歴居吳不反者欲使傳文王武王撥亂反正成周道遂天下生生之源本也蜀王黄帝後世按系本蜀無姓相承云黄帝後且黄帝二十五子分封賜姓或於蠻夷葢當然也蜀王本紀云米提有男子杜宇從天而下自稱望帝亦蜀王也則杜姓出唐杜氏葢陸終氏之𦙍亦黄帝後也霍子孟按系本吕霍國真姓後周武王封其弟處於霍是姬姓亦黄帝後終始傳曰葢謂五行䜟緯之説若今之童謠言時有嬰兒主謂昭帝也郄行車言霍光持政擅權逼帝令如却行車使不前也為臣言豈不偉哉褚先生葢腐儒也設主客引詩傳云契棄無父及據帝系皆帝嚳之子是也而末引蜀王霍光竟欲證何事而言之不經蕪􅁾正史輒云豈不偉哉一何誣也十二諸侯年表第二按篇言十二實敘十三者賤夷狄不數吳乂霸在後故也不數而敘之者闔閭霸盟上國故也春秋厯譜諜按劉杳云三代系表旁行邪上放周譜譜起周代藝文志有古帝王譜又自古為春秋學者有年厯代系譜諜之説故杜元凱作春秋長厯及公子譜葢因於舊説故太史公得讀焉也象箸鄒氏及劉氏皆音直慮反即筯也今按箕子云為象箸者必為玉桮則箸者是樽也音治略反箕子唏唏嗚歎聲音許既反又音希希亦聲餘故記曰夫子曰嘻其甚也亦餼音也惡聞其過上烏故反下古卧反故國語厲王止謗道路以目是也遂奔于彘彘地名在河東後為永安縣也挾王室上音協也政由五伯伯音霸五霸者齊桓公晉文公秦穆公宋襄公楚莊王也恣行下孟切楚介江淮介音界言楚以江淮為界一云介者夾也文去重去羌吕反下逐龍反言約史記修春秋去其重文也其𫝊指𫝊音逐光反鐸氏微鐸椒所撰名鐸氏微者春秋有微婉之詞故也荀卿孟子公孫固韓非荀况孟軻韓非皆著書自稱子宋有公孫固無所述此固齊人韓固傳詩者張蒼厯譜五徳按張蒼著終始五徳傳也董仲舒作春秋繁露是數家上音疎具反謂陰陽術數之家也欲壹觀音官諸要難下奴丹反為成學冶文者要刪焉言表見春秋國語本為成學之人欲覽其要故刪為此篇焉周共和元年宣王少周召二公共相王室故曰共和宣王厲王之子也徐氏云元年至敬王四十三年凡三百六十五年共和在春秋前一百一十九年也魯真公濞系本作慎公摯鄒誕本作慎公嚊真公伯禽之𤣥孫齊武公夀太公五代孫獻公子也宋衷曰武公十年宣王大臣共行政號曰共和十四年宣王即位晉靖侯宜臼唐叔五代孫厲侯之子也宋衷曰唐叔已下五代無年紀秦仲非子曽孫公伯之子宣王命為大夫誅西戎也楚熊勇楚芈姓粥熊之後因氏熊熊勇熊延之子熊繹十一代孫宋釐公微仲六代孫子惠公覸音閑又下板反衛釐侯康叔七代孫頃侯之子頃侯賂周始命為侯陳幽公寧胡公五代孫蔡武侯蔡仲五代孫也曹夷伯名喜振鐸六代孫也燕惠侯召公奭九世孫也立三十八年共和十四年二相還政宣王稱元年也燕釐侯莊徐應云一無莊字按燕失年紀及名此言莊者衍字也秦莊王其其名也按秦之先公並不記名恐其非名晉穆公生按系家名費生成作㵒王系本名弗生則生是穆公名蔡釐侯所按系家釐侯名所事鄭桓公友宣王母弟宣王二十二年封之鄭立三十六年與幽王俱死犬戎之難也曹惠公伯雉一作兕齊莊公贖劉氏音神欲反系家及系木並作贖又上成公説系家作脱也楚若敖熊鄂子熊儀也號若敖也鄭武公滑突滑一作掘並音胡忽反魯惠公弗生系家作弗湟系本作弗皇楚甯敖按系家若敖子熊坎立是為霄敖此作甯敖恐是霄字訛變為甯也劉伯莊但隨字而音更不分析楚蚡冒鄒氏云蚡一作粉音債冒音亡報反又音黙也潘父殺昭侯昭侯文侯仇之子系家云晉大臣潘父殺昭侯迎曲沃桓叔晉人攻之立昭侯子平是為孝侯也鄂侯郤作都者誤也鄂邑郤其名孝侯子也魯隠公息系家名息系本名息故也魯桓公允一作兀五忽反徐廣云一作軏哀侯弟緡音旻弟他音徒何反陳大夫五父後立為厲公楚杜敖囏音艱系家作莊敖劉音壯此作杜敖劉氏云亦作堵堵壯聲相近與系家乖不詳其由也好城上去聲人罷音皮太子圉質晉惠公夷吾之子也圉音禦質音致又如字也泓之戰穀梁傳戰於泓水之上系家云十三年宋師大敗公傷股王奔汜似凡兩音趙成子名衰欒貞子名枝霍伯先且居也封之霍臼季皆卒臼季胥臣也四大夫皆在此年卒圉邧阮音晉靈公蜴音亦系家及左傳名夷臯此葢誤也秦康公罃音乙耕反宋昭公杵臼襄公少子非也按徐廣云一曰成公大子與系家同是也取北徵音澄葢今之澄城也取汜音凡鄭成公睔古囷反悼公弟楚康王略系家名招棫林音域敗楚于湛阪地名也湛音褚林反欒逞晉大夫欒盈此音如字也景王元年季札聘魯襄公二十九年齊景公四年晉平公十四年餘昧音秣居鄆音運宋景公頭曼音萬囊瓦伐吳囊瓦楚大夫子常也子囊之孫躁公音竈秦惠之子會齊侯夾谷司馬彪郡國志在祝其縣西南都鄀音若橐臯縣名在夀春也捄陳上音救弟鷔五髙反平公也石傅逐君起傅音補亦作旉音敷敬王四十三年卒皇甫謐云四十四年當魯哀公十八年二十七年卒齊平公四年二十五年卒晉定公三十五年三十七年卒秦悼公十四年子厲公立楚惠王章十二年五十七年卒宋景公四十年十四年卒衛君起元年陳湣公楚滅之前年蔡朔十四年十九年卒曹伯陽立十五年曹亡在敬王四十三年鄭聲公二十四年四十八年卒燕獻公十六年二十八年卒吳王夫差十九年二十三年滅六國年表第三六國魏韓趙楚燕齊并秦凡七國號曰七雄太史公讀秦記即秦國之史記也故下云秦燒書史記尤甚獨有秦記又不載日月是也臚於郊祀按臚字訓陳也出爾雅文以言秦是諸侯而陳天子郊祀實僭也猶季氏旅泰山然然世異變成功大以言人君制法當隨時代之異而變易其政則其成功大因舉而笑之舉猶皆也耳食按言俗學淺識舉而笑秦此猶耳食不能知味踵春秋後按此表起周元王元年春秋迄元王八年元王元年元王名仁系本名赤敬王子八年崩子定王介立也秦厲共公元年悼公子三十四年卒子躁公立衛出公輒二十一年季父黔逐出公而自立曰悼公也二年晉定公卒系本定公名午明年子荘公錯立系本名鑒也趙簡子按系家名鞅文子武之孫景叔成之子也四十二按簡子以頃公九年在位頃公十四年卒而定公立定公明年四十七年卒是四十三年為簡子在位之年又至出公十七年卒在位六十年也楚惠王章十三年五十七年燕獻公十七年二十八年卒齊平公驁五年二十九年卒已上當並元王元年蔡景侯按景字誤合作成侯徐廣不辨即言或作成按景侯即成侯之髙祖父也定王元年名介二十八年崩魯哀公系本名蒋魯悼公系本名寧蔡聲侯卒名産成侯之子子元侯立鄭聲公名勝獻公子也三十七年卒子哀公易立八年煞弟丑立為共公齊宣公就匝平公子立五十一年卒子康公貸立晉懿公驕哀公忌之子生幽公柳也魏桓子名駒韓康子名虎趙襄子名無恤三卿叛智伯晉陽分其地始有三晉也宋景公卒按系家景公元公子名頭曼已見十二諸侯表徐廣云按左傳景公卒至此十九年謬矣景公立六十四年卒公子持殺太子自立號昭公與前昭公杵臼又歴五君相去略九十年故誤也昭公立四十七年悼公􅀈立衛敬公悼公黔之子也威烈王元年名午考王子二年秦靈公元年生獻公魏文侯斯元年生武侯摯也韓武子啟章元年生景侯䖍趙桓公子嘉元年卒襄子弟也明年國人共立襄子子獻侯浣也威烈王二十三年九鼎震也魏文侯斯韓景侯䖍趙烈侯籍三國並初為侯初以君主妻河謂初以此年取他女為君主君主猶公主也妻河謂嫁之河伯故魏俗猶為河伯娶婦葢其遺風殊異其事故云初補龎城籍姑按龎及籍姑皆城邑之名修補者修龎而城籍姑秦惠公簡公子史無名韓烈侯名取系本作武侯也趙烈侯名籍取毌音館安王十六年秦出公惠公子元年魏武侯擊元年韓文侯元年趙敬侯章元年田和始立為諸侯田常曽孫二年亦號太公秦獻公立名師隰靈公大子誅出公元年田和子桓公午立魏敗我臺土故反字亦作菟也晉伐到鱄陵劉氏鱄音屬沉反又音専宋辟公音璧辟公名辟兵生剔成按宋後微弱君薨未必有諡辟兵其名也猶剔咸然也韓莊侯系家作估懿侯系木無名與秦過肜肜地名賜商君死肜地劉氏云阡陌遒非也趙肅侯名語王赧尼簡反宋衷云赧諡也皇甫謐云名誕也公子繇通音由秦公子韓姬弑其君姬一作􅀈同音怡韓之大夫姓名也弑其君悼公按韓無悼公所未詳也唐昧音秣屈匄下葢音楚大夫芷陽止音地名近北嫪毐上紀虬反下如字栗腹人姓字燕也扈輒人姓字趙将漢亦别有扈輒也鄱吾音婆又音盤縣名在常山秦楚之際月表第四張晏曰時天下未定㕘錯變易不可以年紀故列其月今按秦楚之際擾攘僭篡運數又促故以月紀事名表也號令三嬗古禪字音市戰反三嬗謂陳涉項氏漢髙祖矣斯之亟音已力反亟訓急也後乃放殺殺音弑謂湯放桀武王討紂也以徳若彼即契后稷及秦襄公文公穆公也用力如此謂湯武及始皇銷鋒鏑鏑音的注鍉字亦音的按秦銷鋒鏑作金人十二以弱天下之兵也維萬世維訓度謂訓度令萬代安也鄉秦之禁適足資賢者上鄉音向許亮反謂秦前時之禁兵及不封樹諸侯適足以資後之賢者即髙帝也言驅除患難耳為天下雄指漢髙祖傳之所謂大聖言髙祖起布衣卒傳之天位實所謂大聖秦二世元年七月楚隠王陳涉起二月葛嬰立襄彊涉之二月也至戲葛嬰殺彊五月周文死六月陳涉死然涉起凡六月當二世元年十二月武臣為趙王凡四月為李良所殺當二世元年八月項梁號武信君二世元年九月立至二年九月章邯殺梁於定陶齊王田儋立二世二年六月章邯殺儋儋立十月死齊立田假二世二年八月田榮立儋子市為王項羽又立市為膠東王封田都為臨淄王安為濟北王田榮殺田市田安自立為王羽擊榮平原人殺之田横立榮子廣為王也沛公初起凡十四月懐王封沛公為武安侯将碭郡兵韓廣為燕王二世三年十月破臧茶救趙項羽封荼為燕王徙廣封遼東王後臧茶殺韓廣魏王咎在陳四月咎自陳歸立二年六月咎自殺九月弟豹自立都平陽後豹歸漢尋叛韓信虜豹端月二世二年正月也秦諱正故云端月也秦王景駒立秦嘉立之八月項梁殺之趙王歇立張耳陳餘項羽立為代王後漢滅歇立張耳也六月二世二年六月也楚懷王都盱台故懷王之孫名心也項梁之起諸侯尊為義帝項羽徒而殺之韓王成立項羽更王之不使就封數月殺之立鄭昌為韓王降漢漢封韓信為王二世三年九月子嬰為王十月髙祖至霸上稱元年徐廣云嵗在乙未十二月項羽至闗誅子嬰分天下主命十八諸侯自稱西楚霸王都彭城十八國楚分為四西楚衡山臨江九江也趙為二代趙齊為三臨淄濟北膠東闗中為四漢雍塞翟燕為二燕遼東魏為二魏殷韓為二韓河南義帝元年諸侯尊懷王為義帝項羽徙之於郴至十月項籍使九江王布殺義帝漢王為舉哀也衡山王吳芮故番君從入闗都邾臨江王共敖故楚柱國都江陵九江王英布故楚将都六也常山王張耳故趙相都襄國代王歇趙王都代漢三年滅立張耳為趙王也臨菑王田都故齊將都臨菑濟北王田安故齊将都博陽膠東王田市故齊王都即墨漢王故沛公都南鄭雍王章邯故秦将都廢丘塞王司馬欣故秦長史都櫟陽翟王董翳故秦都尉都髙奴也燕王臧茶故燕将都薊也遼東王韓廣故燕王都無終漢四年漢将韓信擊殺廣西魏王魏豹故魏王都平陽豹從漢人叛韓信虜之漢四年周苛殺豹也韓王韓成故韓王都陽翟羽殺之河南王申陽故楚將都洛陽正月髙祖及十二諸侯受封之月漢書異姓王表云一月故應劭云諸侯王始受封之月十三王同時稱一月以非元正故云一月髙祖十月至霸上改元至此月漢四月二月應劭云諸王始都國之月十三王同時稱二月代王歇二十七月趙歇前與趙王已二十六月今從王代之二月故云二十九月其膠東王市之前為齊王十九月韓廣魏豹韓成五人並先為王已經多月故因舊月而數也韓王成都陽翟姚氏云韓成是項梁所立不與十七國封此云十八王並項羽所命不細區别又髙紀云項羽與成至彭城廢為侯又殺之是不令就國當以陽翟為都而不之國漢誅項籍在四年十二月五年正月漢王更號皇帝即位於定陶也臨江王驩漢虜之共敖之子亦在四年十二月梁王彭越始封長沙王吳芮始改封也九月虜臧荼漢書作四年九月誤也盧綰始王齊王信五年正月徙王於楚史記索隠卷五
