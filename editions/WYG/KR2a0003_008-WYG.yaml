body:
  text: 史記索隠卷八唐司馬貞撰禮書第一書者五經六籍總名也此之八書記國家大體班氏謂之志志記也洋洋音羊洋洋美盛貌鄒誕生音翔大行大行秦官主禮儀漢景帝改曰大鴻臚鴻臚掌九賔之儀也錯衡錯鏤衡扼為文飾也詩曰約軝錯衡毛傳云錯衡文衡也彫弊彫謂彫飾也言彫飾是奢侈之弊也門人之髙第言子夏是孔子門人之中髙第者謂才優而品第髙也故論語四科有文學子游子夏是芬茝音止又昌改反疏房疏謂忩也側載臭茝劉氏云側持也臭香也芷香草也言天子行持得以香自隨也其餘則否臭為香者山海經云臭如蘪蕪易云其臭如蘭是臭為草之香也今以側為邊側載者置也言天子之側恒置芳香於左右大抵按大抵猶大略也臣瓚以抵訓為歸則是大略大歸其義通也寢兕以兕牛皮為席持虎按以猛獸皮文飾倚較及伏軾故云持虎劉氏云畫之於旍竿及楯仗等以今所見為説也鮫韅以鮫皮飾韅韅馬腹帶也彌龍彌亦音弭謂金飾衡枙為龍此皆王者服御崇飾所以示威武故云所以養威也此文皆出大戴禮葢是荀卿所説金薄璆龍劉氏云薄猶飾也璆然龍貌璆音虬知夫士出死要節言人誰知夫志士推誠守死要立名節仍是養生安身之本故下云人茍生之為見若者必死是解上意言人茍以貪生之為見不能見危致命若者必死若猶如也言執心為見如此者必刑戮及身故云必死下文皆放此也情勝之為安覆解上禮義文理之所以養情墨者使人兩失之墨者不尚禮義而任儉嗇無仁恩故使人兩失之詩曰悦以使人人忘其死也强固之本也自此已下皆是儒分之功堅革利兵不足以為勝覆上功名之總施鑽鑽謂矛刀及矢鏃也莊蹻起蹻音其畧反楚将之名言其起兵亂後楚遂分為四按漢志滇王莊蹻之後也參是參者騐也言騐是楚豈無利兵哉阻之鄧林按裴氏引山海經以為夸父棄杖為鄧林其言北飲大澤葢非在中國也劉氏以為今襄州南鳯林山是古鄧祁侯之國是楚之北境故云阻以鄧林也莫必其命言無人必保其性命徧亡鄒音遍諸侯不敢懐懐恩也言諸侯不敢思以太祖配天而食也又一解王之子孫為諸侯不思祀其父母故禮云諸侯不敢祖天子是也郊疇乎天子疇類也天子類得郊天餘竝不合祭今大載禮作郊止乎天子是也止或作疇因誤耳社至諸侯言天子已下至諸侯得立社啗及士大夫啗音含含謂包容諸侯已下至士大夫得祭社故禮云大夫成羣立社曰置社亦曰里社也鄒誕生音啗谷念反音義亦通不見古文各以意為音耳今按大戴禮作導及士大夫導亦通也今此為㗖者當以導與蹈同後其字足失止唯有口存故使解者穿鑿也以歸太一是謂大隆貴本親用兩者合而成文以歸太一者天地之本也得禮之文理是合於太一也隆者盛也髙也得禮文理歸於太一禮之盛者也豆之先大羮一也樽之上𤣥樽俎之上生魚豆之先大羮三者如一皆是本故云一也利爵不啐按儀禮祭畢獻祝西面告成是為利爵祭初未行無􅈫爵故不啐入口也成事俎不嘗成事卒哭之祭故記曰卒哭曰成事既是卒哭之祭始從吉祭故受爵而不嘗俎也三侑之弗食禮祭必立侑以勸尸每食必三飯而止每飯有侑一人故有三侑之禮也勸尸故不相食也大婚之未發齊也發齊謂昏禮父親醮子而迎之前故曲禮云齋戒以告鬼神是婚禮有齊也始死之未小斂一也此五者皆禮之初始質而未備亦是貴本之義故云一也大路素幬音稠謂車葢以素帷亦質也喪服之先散麻一也大路已下三事相似如一故云一也散麻取其質無文飾亦貴本也縣一鍾尚拊隔隔懸鍾格拊音撫隔不擊其鍾而拊其格不取其聲亦質也鄒氏隔音膊葢依大戴禮九而鄭禮注云榑柎柷敔也朱絃而通越一也大瑟而練朱其絃又通其下孔使聲濁且遲上質而貴本不取其聲又自三年已下四事皆不取其聲也凡禮始乎脱脱猶脱略也始初也言禮之初尚疏略也成乎文言禮成就有文飾終乎税音悦言禮終卒和悦人情也按大戴禮作終於隆隆謂盛也情文代勝音昇又尸證反或文勝情或情勝文是情文更代相勝也大戴禮作迭興也其下復情以歸太一言其次情文俱失歸心混沌天地之初復禮之本是歸太一也太史公曰至矣哉已下亦是太史公取荀卿禮論之意極言禮之損益以結禮書之論也本末相順禮之盛文理合以歸太一至禮之煞復情以歸太一是本末相順也終始相應禮始於脱略終於悦悦亦煞也煞與脱略是終始亦相應也至文有以辨言禮之至文能辨尊卑貴賤故云有以辨也至察有以説言禮之至察有以明隆煞損益委曲情文足以悦人心故云有以悦之也禮之貌誠有本作懇誠者非也入焉而望言擅作興制及褊陋之説人焉謂入禮則自嗛望知其失而隊言訾毀禮者自取隊滅也恣雎恣雎猶毁訾也規矩誠錯錯置也規員也矩曲尺也禮之中能思索索求也隆文煞用隆猶厚也煞猶薄也君子之性守宫庭也言君子之性守正不慢逺行如常守宫庭也人域是域士君子也域居也言君子之行非人居亦弗居也外是人也外謂人域之外非人所居之地以喻禮義之外别為他行即是小人故云外是人也房皇周浹聖人也房音旁旁皇猶徘徊也周浹猶周匝言徘徊周浹委曲得禮之序動不失中則是聖人之行也故厚者禮之積言君子聖人有厚大之徳則為禮之所積益𢎞廣也故曰甘受和白受采忠信之人可以學禮茍無忠信則禮不虚道然此文皆荀卿禮論也樂書第二嘄噭上姑堯反又音叫下音擊也封君世辟辟亦君也與齊優遂容於魯齊人歸女樂而孔子行言不能遂容於魯而去也或作逐客誤也作五章以刺時按系家語所云孔子􅅓季桓子作歌引詩曰彼婦人之口可以出走彼婦人之謁可以死敗優哉㳺哉聊以卒嵗是五章之刺也髙祖過沛詩三侯之章即大風歌是也其歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方是也侯語辭也詩曰侯其偉而是也猶兮亦語辭沛詩有三兮故云三侯作十九章按禮樂志安世房中樂有十九章世多有故不論言四時歌多有其詞故此不論載今見漢書禮樂志也太一貢兮天馬下按禮樂志貢作況況與貢意亦通渥洼水中洼音一佳反烏花反蘇林音窐曲之窐窐即窳是也跇萬里亦逝鄒誕云一作世亦音跇跇起也名蒲梢音史交反又本作騷亦同音焦以殺焦音如字鄒云作噍音将妙反宫為君居中總四方宫絃最大用八十一絲聲重而尊故為君商為臣商是金金為決斷臣事也七十二絲次宫如臣次君也角為民用絲六十四聲居宫羽之中比君為劣比物為優故云清濁中人之象也徴為事徵屬夏夏時生長萬物皆成形體事亦有體故配事弦用絲五十四也羽為物羽為水最清物之象王肅云冬物聚故為物弦用四十八絲也苫滯又本作惉懘則槌鄒音都回反徐廣曰今禮作陂音詖也國之滅亡無日矣無日猶言無復一日也以言君臣陵慢如此無復一日也則國之滅亡朝夕可待無復日也級兆舒疾徐廣曰級今禮作綴綴舞者鄼列也又按下文其舞行及逺及短禮皆作綴葢是字之殘缺訛變也故此為級而下又為及也然竝依字讀義亦俱通達古耳樂著太始著明也太始天也言樂能明太始是法天禮居成物言地能成萬物故成物謂地也居亦法也言禮法地也著不息者天也著謂著明白運生不息者是天之功也故易乾卦云天行健君子以自强不息是著不動者地也著養萬物不動者是地之徳也故易坤卦云安貞吉是也南風之薰兮此詩之辭出尸子及家語葆龜葆與寳同史記多作此字公羊傳寳龜青縁何休以縁為甲􅏋千嵗之龜青􅏋明于吉凶􅏋音耳占反亷直經正孫炎曰經法也今禮本作勁肉好王肅曰肉好言音之洪潤狄成王肅曰狄成言成而似夷狄之音也類小大之稱類今禮作律孫炎曰作樂器小大稱十二律也奮至徳之光孫炎曰至徳之光天地之道也動四氣之和孫炎曰四氣之和四時之化蟠乎地音盤鄒誕本作播亦作蟠角觡牛羊有䚡曰角麋鹿無䚡曰觡干楊鄭𤣥曰干楯也楊鉞也則楊與鍚同皇偘以楊為舉恐非也禮主其謙王肅曰自謙慎也樂主其反孫炎曰反謂曲終還更始也壎箎壎以土為之大如鵞子形似鍾吹之為聲篪以竹為之六孔一孔上出名翹横吹之今之横笛是也詩云伯氏吹壎仲氏吹篪是也未給下車給禮文作及葢聲相近而字誤耳建櫜王肅云将帥能櫜弓矢而不用故建以為諸侯因謂建櫜也唯丘聞諸萇𢎞按大戴禮云孔子適周訪禮於老聃學樂於萇𢎞是也律書第三一稟於律按律有十二陽六為律黄鍾太蔟姑洗蕤賔夷則無射陰六為吕大吕夾鍾中吕林鍾南吕應鍾是也名曰律者釋名云律述也所以述陽氣也律厯志云吕旅助陽氣也按古律用竹又用玉漢末以銅為之吕亦稱間古有六律六間之説元間大吕二問夾鍾是也漢京房知五音六律之數十二律之變至六十猶八卦之變為六十四也故中吕上生執始執始下生去滅上下相生終於南吕而六十律畢也六律為萬事根本焉按律厯志云夫推厯生律制器規圓矩方權重衡平準繩嘉量探賾索隠鉤深致逺莫不用焉是萬事之根本望敵知吉凶按周禮太師執同律以聽軍聲而占其吉凶是也故左傳稱師曠知南風之不競即其類聞聲效勝負凡敵陣之上皆有氣色氣强則聲强其衆勁律者所以通氣故知吉凶也其於兵械尤重按易稱師出以律是於兵械尤重也武王伐紂吹律聴聲其事當有所出今則未詳齊用王子徐廣云王子成父大較大較大法也故淳于髠曰車不較則不勝其任是也音角也大至君辱徐廣曰宋襄公是也宿軍無用之地謂常擁兵於郊野之外選蠕音軟選蠕謂動身欲有進取之狀也新去湯火謂秦亂楚漢交兵之時如遺墜湯火即書云人墜塗炭是也孔子所稱有徳君子按論語孔子曰善人為邦百年亦可以勝殘去殺是七正二十八舍七正日月五星七者可以正天時又孔安國曰七政日月五星各異政也二十八宿之所舍也舍止也宿次也言日月五星運行或舍於二十八次之分也八正之氣八謂八節之氣以應八方之風主辟辟音闢危垝鬼毁反營室定星也定中而可以作室故曰營室其星有室象也故天官書主廟此言主營胎陽氣而産之是説異也須女婺女名也螾然音引又音慎寅以慎反符甲符甲猶孚甲也蜄也音振或作娠二同音故律厯志云振羨於辰亥該也按律厯志云該閡也於亥反未言有滋味律厯志云昧夔於未其意殊也隂陽交故曰午律厯志云愕布於午申賊萬物律厯志物堅於申酉者萬物之老律厯志留孰於酉盡滅故曰戍律厯志畢入於戍也於注音丁救反注咮也天官書云栁為鳥咮則注栁星也濁留按爾雅濁謂之畢留即夘毛傳亦以留為夘也至於奎按天官書奎為溝瀆婁為聚衆胃為天倉今此説竝異及六律十毋又與漢書不同今各是異家之説也黄鍾長八寸十分一宫按上文云律九九八十一以為宫故云長八寸十分一宫而云黄鍾長九寸者九分之寸也劉歆鄭𤣥等皆以為長九寸即十分之寸不依此法也云宫者黄鍾為律之首宫為五音之長卜一月以黄鍾為宫則聲得其正舊本多作七分葢誤也太吕長七寸五分三分一謂十一月以黄鍾為宫五行相次土生金故以大吕為商者大吕以助陽宣化也林鍾角水生木故為角不用蕤賔者以陰氣起陽不用事故去之也姑洗羽亦以金生水故也生鍾分此算術生鍾律之法也子一分自此已下十一辰皆以三乗之為黄鍾實積之數丑三分二按子律黄鍾長九寸林鍾丑衡長六寸以九比六三分少一故云丑三分二即是黄鍾三分去一下生林鍾之數也寅九分八十二律皆以黄鍾為主黄鍾長九寸太蔟長七寸寅九分八即是林鍾三分益一上生之義也夘二十七分十六此以丑三乗寅寅三乗夘得二十七南吕為夘衡長五寸三分寸之一以三約二十七得九即黄鍾之本數又以三約十六得五縣三分之一即南吕之長故云夘二十七分十六亦是太蔟二分去一下生之義已下八辰竝准此然云丑三分二寅九分八者皆分之餘數也黄鍾術曰以下生者按蔡邕曰陽生隂為下生陰生陽為上生子午已東為上生已西為下生又律厯志云隂陽相生自黄鍾始黄鍾生太蔟左旋八八為五從子至未得八下生林鍾是也又自未至寅亦得八上生太蔟然上下相生皆以此為率也倍其實三其法謂黄鍾下生林鍾黄鍾長九寸倍其實者二九十八三其法者以三為法約之得六為林鍾之長也以上生者四其實三其法四其實者謂林鍾上生太蔟林鍾長六寸以四乘六得二十四以三約之得八即為太蔟之長上九商八羽七角六宫五徵九此五聲之數亦上生三分益一下生三分去一宫下生徵徵益一上生商商下生羽羽益一上生角然此文似數錯未暇研覈也置一而九三之以為法按漢書律厯志曰太一元氣函三為一行之於十二辰始動於子參之於丑得三又參之於寅得九是謂因而九三之也韋昭曰置一而九以三乘之是也樂産云一氣生於子至丑而三是一三也又自丑至寅為九皆以三乗之是九三之也又參之夘得二十七參之於辰得八十一又參之於已得二百四十三又參之午得七百二十九又參於未得二千六百八十七又參之於申得六千五百六十三又參於酉得萬九千六百八十三又參於戌得五萬九千四十九又參至于亥得十七萬七千一百四十七謂之該數此陰陽合徳氣鍾於子化生萬物也然丑三分寅九分者即分之餘數也實如法得一實謂以子一乘丑三至亥得十七萬七千一百四十七為實數如法謂以上萬九千六百八十三之法除實得九為黄鍾之長言得一者􅈫術設法辭也得下有長一寸者皆衍術字也韋昭云得九寸之一也姚氏謂得一即黄鍾之子數也始於宫窮於角即如上文宫下生徵徵上生商商下生羽羽上生角是其窮也厯書第四昔自在古厯建正作於孟春按古厯者謂黄帝調厯以前有上元太初厯等皆以建寅為正謂之孟春也及顓頊夏禹亦以建寅為正唯黄帝及殷周魯竝建子為正而秦正建亥漢初因之至武帝元封七年始改用太初厯仍以周正建子為十一月朔旦冬至改元太初焉今按此文至於十二月節皆出大戴禮虞史伯夷之辭也秭鴂先􅗍按徐廣云秭音規者誤也當云秭音秭鴂音規葢遺失耳言子規鳥春氣發動則先出野澤而鳴也又按大戴禮作瑞雉無釋未測其㫖當是字體各訛變耳注秭規鳥一名鷤鴂上音弟下音桂按楚詞云慮鷤鴂之先鳴使夫百草為之不芳解者以鷤鴂為杜鵑卒於各分卒子律反分音如字卒盡也言建厯起孟春盡季冬則一嵗事具也冬盡之後分為來春故云冬分也時雞三號卒明三號三鳴也言夜至雞三鳴則天曉乃始為正月一日言異嵗也徐廣云卒一作平又作斯於文皆便推本天元言王者易姓而興必當推本天之元氣行運所在以定正朔以承天意故云承順厥意葢黄帝考定星厯按系本及律厯志黄帝使羲和占日常儀占月臾區占星氣伶倫造律吕大撓作甲子𨽻首作算數容成縱此六術而著調厯嘉生應劭云嘉穀也放物音昉依也薦至上音在見反古荐字改借用耳荐集也正不率天亦不由人此文出大戴禮是孔子稱周太史之詞南正重按左傳重為句芒木正黎為祝融火正此言南者劉氏以為南字誤非也葢重黎二人元是水火之官兼司天地職天是陽而南是陽位故木亦是陽所以木正為南正也而火是地正亦稱北正者火數二二地數地陰主北方故火正亦稱北正謂為此故也而臣瓉以為古文火字似北未為深得也孟陬按正月為陬陬音鄒又作侯反楚詞云攝提貞乎孟陬言厯數乖誤乃使孟陬殄滅不得其正也攝提失方按天官書云攝提三星若鼎足勾之直斗杓所指以建時節故曰攝提格格至也言攝提隨月建至故云格也疇人韋昭云疇類也孟康云同類之人明厯者也樂産云疇昔知星人而巴落下閎姚氏按益部耆舊傳云閎字長公明曉天文隠於落下武帝徵待詔太史於地中轉渾天改顓頊厯作太初厯拜侍中不受未能詹按漢書作讐故徐廣云一作售售即讐也韋昭云讐比校也鄭徳云相應為讐也名察度驗臣瓚云題名宿度候察進退以為吉凶之狀依文作解為得按漢書作名察發斂韋昭云發氣發斂氣斂又續漢書以為道之發斂景之長短則發斂是日行道去極盈縮也紬績日分紬音宙又如字紬績者女紬緝之意以言造厯算運者猶若女工緝而織之也夏至按夏至謂夏至冬至七年為太初元年按改元封七年為太初元年然漢始以建亥為年首今改以建寅故以年為元年韋昭云漢興至此百二嵗按律厯志云乃以前厯上元太初四年千六百一十七嵗至元封七年復得閼逢提攝之嵗十一月甲子朔旦冬至也年名焉逢攝提格按爾雅云嵗在甲曰焉逢寅曰攝提格則此甲寅之年十一月甲子朔旦夜半冬至也然此篇末亦云寅名攝提攝格則此甲寅之嵗也又據二年名單閼三年名執徐等年次分明而漢志以為其年在丙子當是班固用三統與太初厯不同故與太史公説有異而爾雅近代之作所記年名又不同也注嵗陰在寅左行按蘇林云嵗與星行所在之次月名畢聚聚音陬按虞喜云天元之始於十一月甲子夜半朔旦冬至日月若連珠俱起牽牛之初嵗雄在閼逢雌在攝提格月雄在畢雌在訾訾則陬訾之宿日雄在甲雌則在子此則甲寅之元天道之首厯術甲子篇以十一月朔旦冬至得甲子甲子是陽氣支干之首故以甲子命厯術為篇首非謂此年嵗在甲子也太初元年嵗名焉逢甲嵗雄也漢書作閼逢亦音焉與此音同攝提格寅嵗隂也此依爾雅甲寅之嵗若據漢志以為丙子之年月名畢聚謂月值畢及陬訾也畢月雄也聚月雌也日得甲子謂十一月冬至旦得甲子也夜半朔旦冬至以建子為正故以半夜為朔其至與朔同日故云夜半朔旦冬至若建寅為正者則以平旦為朔也正北謂蔀首十一月甲子朔旦時加子為冬至平旦故云正北也然毎嵗行周天全度外餘有四分之一以十二辰分之冬至常居四仲故子年在子丑年在夘寅年在午辰年在酉至後十九年蔀首在酉故云正西其正南正東並准此也十二嵗有十二至有閏則云十三也無大餘無小餘其嵗甲子朔旦日月合於牽牛之初餘分皆盡故無大小餘也大餘五十四嵗十二月六大六小合三百五十四日以六除之五六三十除三百日餘五十四日故下云大餘者日也小餘三百四十八太初厯法一月之日二十九日四十分日之四百四十九每兩月合成五十九日餘五十八分今十二月合餘六箇五十八得此數故云小餘者月也大餘五周天三百六十五度四分度之一日行一度去嵗十一月朔在牽牛初為冬至今嵗十一月十二日又至牽牛初為一周以六甲除之六六三十六除三百六十餘五故云大餘五也小餘八即四分之一小餘滿三十二從大餘一四八三十二故云小餘八明年又加八得十六故下云小餘十六次明年又加八得二十四故下云小餘二十四又明年加八得三十二為滿故下云無小餘此並依太初法行之也焉逢攝提格如漢志太初元年嵗在丙子據此則甲寅嵗也爾雅釋天云嵗陽者甲乙丙丁戊巳庚辛壬癸十干是也嵗陰者子丑寅夘辰巳午未申酉戌亥十二支是也嵗陽在甲云馬逢謂嵗干也嵗陰在寅云攝提格謂嵗支也端䝉乙也爾雅作旃䝉單閼夘也丹遏二音又音蟬馬二月嵗在乙夘也游兆景也爾雅作柔執徐辰也三年强梧丁也大芒駱已也四年徒維戊也敦䍧午也天漢元年祝犂已也爾雅作著雍訃洽未也二年商横庚也爾雅作上章赤奮若丑也天官書及爾雅申為汭漢丑為赤奮若今四葢自太初已來計嵗次與天官書不同者有後厯衍改故也三年也昭陽辛也爾雅作重光作鄂酉也四年撗艾壬也爾雅作𤣥黓淹茂戌也太始元年尚章癸也爾雅作昭陽也困敦亥也天官書子為困敦爾雅同二年焉逢甲也大淵獻子也天官書亥為大淵獻與爾雅同二年也端蒙乙也汭漢丑也天官書作赤奮若與爾雅同四年已俊自太始征和已下訖篇末具年次甲乙皆准此並褚光生所續史記索隠卷八
