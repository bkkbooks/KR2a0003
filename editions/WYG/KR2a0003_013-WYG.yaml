body:
  text: 史記索隠卷十三唐司馬貞撰趙系家第十三季勝生孟増是為宅臯狼按如此説是名孟增號宅臯狼而徐廣云或曰臯狼地名在河西按地理志臯狼是西河郡之縣名葢孟增幸於成王成王居之於臯狼故云臯狼取驥之乗匹言造父取八駿品其色齊其力使馴調也竝四曰乗竝兩曰匹見西王母穆天子傳曰穆王與西王母觴於瑤池之上作歌是樂而忘歸也譙周不信此事而云余嘗聞之代俗以東西陰陽所出入宗其神謂之王父母或曰地名在西域有何見乎攻徐偃王譙周曰徐偃王與楚文王同時去周王逺矣且王者行有周衞豈聞亂而獨長駈日行千里乎竝言此事非實也五世生趙夙夙生共共生孟孟生衰系本云公明生共孟及趙夙夙生成季衰衰生宣孟盾在左傳云趙夙弟而此系家云共孟生衰譙周亦以此為誤耳賜趙夙耿杜預曰耿今河東皮氏縣耿鄉是趙衰為原大夫系本云成季徙原宋忠云今鴈門原平縣太子母穆嬴也晉景公成公之子名據更立襄公曾孫周是為悼公徐廣云年表云襄公孫也晉系家襄公少子名周生景叔系本云景叔名成公孫支與子輿二子秦大夫公孫支子桑范魁之西范魁地名不知所在葢趙地胄女孟姚即姓嬴呉廣之女姚姓孟字也七代孫武靈王也吾有所見子晰也簡子見當道者乃寤曰嘻是吾前夢所見知其名曰子晰者籍秦據系本晉大夫籍游之孫籍談之子范氏系本云范氏晉大夫隰叔之子士蒍之後蒍生成伯􅆙􅆙生武子會會生文叔燮燮生宣叔匄匄生獻子鞅鞅生吉射中行氏系本云晉大夫逝敖生桓伯林父林父生宣伯庚宿庚宿生獻伯偃偃生穆伯呉呉生寅本姓荀自荀偃將中軍晉改中軍曰中行因氏焉元與智伯同祖逝遨故智氏亦稱荀智瑶系本云逝遨生莊子首首生武子罃罃生莊子朔朔生悼子盈盈生文子櫟櫟生宣子申申生智伯瑶荀櫟智文子韓不佞韓簡子魏哆魏簡子系本名取二子范吉射荀寅也中行文子荀寅也范昭子范吉射也昭公曾孫驕驕懿公也或作哀公其大父雍即昭公少子號藏子張孟同按戰國策作張孟談談者史遷之父名遷例改為同代成君子浣立代成君名周伯魯之子系本云代成子起起即襄子之子無伯魯非也治中牟此趙中牟在河北非鄭之中牟襄子弟桓子系本云襄子子桓子與此不同中山武公初立按中山古鮮虞國姬姓也系本云中山武公居顧桓公徙靈夀為趙武靈王所滅不言誰之子孫徐廣云中武公西周桓公之子亦無所據葢未能得其實耳槍石二人槍七羊反槍與石二人名弟武公立譙周云系本及説趙語者竝無其事葢别有據魏獻榮椽因以為檀臺劉氏云榮椽葢地名其中有一髙處可以為臺非也按榮椽是良材可為椽斲飾有光榮所以魏獻之故趙因用之以為檀臺肅侯系本名語子武靈王立名雍召公子職為燕王燕系家無其事葢是疎也今此云使樂池送之必是慿舊史為説且紀年之書其説又同則裴駰之解得其㫖矣孟姚也孟姚呉廣女也廣舜之後故上文云余思虞舜之勲故命其胄女孟姚以配而七代之孫是已然舜後封虞在河東太陽山西上虞城是亦曰呉城虞呉音相近故舜後亦姓呉非獨太伯虞仲之裔錯臂錯臂亦文身謂以丹青錯畫其臂孔衍作右臂左衽謂右袒其臂也使紲謁之叔為句甌越之人劉氏云今珠崖儋耳謂之甌人是有甌越三胡林胡樓煩東胡是三胡也且服奇者志淫按鄒魯好長纓是奇服非其志皆淫僻也而有孔門顔冉之屬豈是無奇行哉俗僻者人易言方俗僻處山谷而人皆改易不通大化則是呉越無秀士何得有延州來及大夫種之等至寜葭一作蔓葭縣名在中山而籍之籍録也謂當時即記録書之於籍二十五年恵后卒按謂武靈之前后太子章之母恵文王之嫡母也恵后卒後呉娃始當正室至孝成二年稱恵文后卒是也而下文又云孟姚卒後何寵衰欲并立亦誤也主父開之開謂開門而納之俗本亦作聞字者非也譙周及孔衍皆作閉之閉謂之藏也探爵􅑹而食之按曹大家云􅑹雀子也生受哺者謂之􅑹梗陽地理志云太原榆次有梗陽鄉與杜預所據小别也十四年樂毅将趙秦韓魏燕攻齊按年表及韓魏等系家五國攻齊在明年然此下文十五年重撃齊是此文為得葢此年同伐齊耳老婦恃輦而行耳按束晳云趙恵文王何者呉廣之甥娃嬴之子也如系家計之則武靈王十六年夢呉娃而納之至二十七年王薨及恵丈三十二年卒考成王元年遣長安君若娃年二十入王宫至此亦年六十左側亦可稱老而束廣㣲言太后纔三十有奇者誤也信期曰即下文髙信也公主死葢呉娃女恵文王之姉以徳與國與國趙也秦趙今為與國秦徵兵韓帥之共趙伐齊以威聲和趙是以徳與國上佼佼猶行也燕周趙人為趙將歐代東胡叛趙駈略代地人衆以叛燕相公孫操弑其王按樂資云其王即恵王也子義聞之子義趙之賢人長安君孔衍云恵文后之少子也趙亦有長安今其地闕趙上黨亦然信梁秦将也太子死趙之太子也史失名徒父祺出趙大夫名祺廥燒積芻藁之處為火所燒以尉文相國尉文葢地名或曰尉官文名謂以尉文所食之地以封亷頗也古文質略文省耳栗腹卿秦二人皆燕将姓名十四年平原君趙勝死按年表在十五年也趙與燕易音亦謂與燕換易縣也幽繆王遷徐廣云系本年表及古史考皆云今王遷無諡今唯此獨稱幽繆王者葢秦滅趙之後人臣竊追諡之太史公或别有所見故得而記之耳魏系家第十四畢公髙與周同姓左傳富辰説文王之子十六國有畢原郇豐言畢公是文王之子此云與周同姓似不用左氏之説馬融亦云畢毛文王庶子卜偃曰晉掌卜大夫郭偃也生魏武子左傳武子名犨系本云畢萬生芒季芒季生武仲州州與犨聲相近字異耳代亦不同生悼子徙治霍系本云武仲生莊子絳無悼子又系本居篇曰魏武子居魏悼子徙霍宋忠曰霍今河東彘縣也則是有悼子系本卿大夫代自脱耳然魏今河北魏縣是也生魏絳諡昭子系本云莊子文錯也居篇又曰昭子徙安邑亦與此文同也僇辱楊子左傳曰戮楊干之僕生魏嬴嬴生獻子系本云獻子名荼荼莊子之子無魏嬴獻子生魏侈侈他本亦作哆葢哆字誤而代數錯也按系本獻子生簡子取取生襄子多而左傳云魏曼多是也則侈是襄子中間少簡子一代魏侈之孫曰魏桓子系本云襄子生桓子駒桓子之孫曰文侯都系本云桓子生文侯斯其傳云孺子􅗢是魏駒之子與此系代亦不同也趙簡子趙鞅中行文子荀寅范獻子范吉射韓康子名䖍趙襄子名無恤智伯智瑶也本姓荀亦曰荀瑶韓武子系本武子名啟章康子子子擊生子罃乙耕反擊武侯也罃恵王也河内按大河在鄴東故名鄴為河内三十五年秦復侵我陰晉按年表作齊侵陰晉秦本紀云恵王六年魏納陰晉更名曰寜秦徐氏云今之華陰也三十八年秦敗我武下得其将識識将名也武下魏地文侯卒三十八年卒紀年云五十年卒武侯元年趙敬侯初立按紀年魏武侯之元年當趙列侯之十四年不同也又系本敬侯名章二年城安邑王垣按紀年十四年城洛陽及安邑王垣徐廣云垣縣在王屋山故曰王垣翟敗我于澮古外反于澮於澮水之側齊威王初立按紀年齊幽公之十八年而威王立十六年武侯卒按紀年武侯二十六年卒公孫頎音祈韓懿侯哀侯之子趙成侯系本云成侯名種子罃與公子緩爭為太子按紀年武侯元年封公子緩趙侯種韓懿侯伐我取蔡而恵王伐趙圍濁陽七年公子瑗如邯鄲以作難是説此事矣故曰君終無適子此葢古人之言及俗説故云故曰三年齊敗我觀津田完系家云敗魏於濁津而圍恵王恵王請獻觀以和解六年伐取宋儀臺按年表作義臺然義臺見莊子司馬彪亦曰臺名郭象云義臺靈臺中山君相魏按魏文侯滅中山其弟守之後尋復國至是始令相魏其中山後又為趙所滅十五年魯衛宋鄭來朝按紀年魯恭侯宋桓侯衛成侯鄭釐侯來朝皆在十四年是也鄭釐侯者韓昭侯也韓哀侯滅鄭而徙都之改號曰鄭三十年與齊人戰敗於馬陵徐廣曰在元城按紀年二十八年與齊田朌戰于馬陵上二年魏敗韓馬陵十八年趙又敗魏桂陵與馬陵異處三十一年秦趙齊共伐我按紀年二十九年五月齊田朌伐我東鄙九月秦衛鞅伐我西鄙十月邯鄲伐我北鄙王攻衛鞅我師敗績是也然言二十九年不同於是徙大梁紀年以為恵王九年葢誤也三十六年恵王卒按紀年恵成王三十六年改元稱一年未卒也子襄王立系本襄王名嗣子哀王立按系本襄王生昭王無哀王葢脱一代耳而紀年説恵成王三十六年又稱後元一十七年卒今此文分恵王之厯以為二王之年又有哀王凡二十二年紀事甚明葢無足疑而孔衍叙魏語亦有哀王葢紀年之作失哀王之代故分襄王之年為恵王後元即以襄王之年包哀王之代耳樗里子秦昭王弟疾居樗里因號焉犀首犀首官名即公孫衍岸門徐廣云潁陰有岸門亭劉氏云河東皮氏縣有岸頭亭也六年秦求立公子政魏公子也八年伐衛紀年云八年翟章伐衛昭魚昭奚恤也薛公田文也魏章章為魏将後又相秦太子之自相太子即襄王也陽晉封陵紀年作晉陽封谷二十三年哀王卒按汲冢紀年終於哀王二十年昭王三年喪畢始稱元年耳子昭王立系本昭王名遫芒夘以詐重謂夘以智詐見重於魏子安釐王立系本安僖王名圉郪丘七絲反又音妻中旗馮琴按戰國策作推琴者春秋後語作伏琴而韓子作推琴説苑作伏瑟文各不同願王之勿易也以豉反唐雎七餘反足以為與也與謂許與為親而結和也騎危上音奇危棟上也禮云中屋履危葢昇屋以避兵與大梁鄴戰國策鄴作鄰字為得是復閼與之事復音扶富反謂前年秦韓相攻閼與而趙奢破秦軍道涉谷道猶行也涉谷是徃楚之險路從秦向楚有兩道涉谷是西道河内是東道垝津在河北音九毁反所攻甚難攻亦作致戰國策見作致軍言致軍糧難也邢丘城按戰國策云邢丘安城此少安字耳河内共汲汲亦作波波及汲皆縣名俱屬河内聴使上平聲下去聲從林鄉軍劉氏云林地名葢春秋時鄭地之棐林在大梁之西北徐廣云在宛陵也五入囿中囿即圃田圃田鄭藪屬魏徐廣云一作城而戰國策作國中文臺隳文臺臺名列士傳曰𨼆隠陵君施酒文臺也垂都焚垂地名有廟曰都竝魏邑名異日從之不成也從音足松反秦撓之以講橈音尼孝反謂韓被秦之兵撓擾已經三年云欲講説與韓和識亡不聴識猶知也故戰國策云韓知亡猶不聴也故臣願以從事從音足松反從事言信而事王也戰國策亦然趙挾韓之質言韓以質子入趙則趙挾韓質而親韓也韓必効之効猶致也謂致故地於趙也或為增謂秦王按戰國策作蘇秦為公子增謂秦王公孫喜戰國策作公孫衍太子增立是為景湣王系本云安釐王生景湣王午説者皆曰魏以不用信陵云云雖得阿衡之徒曷益乎按譙周曰以予所聞所謂天之亡者有賢而不用也如用之何有亡哉使紂用三仁周不能王況秦虎狼乎韓系家第十五韓之先與周同姓按左氏傳云邘晉應韓武之穆是武子之子故詩稱韓侯出祖是有韓而先滅今據此文云其後裔事晉封于韓原曰韓武子則武子本是韓侯之後晉又封之於韓原即今之馮翊韓城是也然按系本及左傳舊説皆謂韓萬是曲沃桓叔之子即是晉之支庶又國語叔向謂韓宣子能修武子之徳起再拜謝曰自桓叔已下嘉吾子之賜亦言桓叔是韓之祖也今以韓侯之後别有桓叔非闗曲沃之桓叔如此則與太史公之意亦有違武子後三世系本云萬生賕伯賕伯生定伯簡簡生輿輿生獻子厥宣子徙居州宣子名起州今在河内是也貞子徙平陽系木作平子名須宣子子也又云景子居平陽平陽在山西宋忠曰今河東平陽縣簡子代徐廣云史記多無簡子莊子而云貞子生康子班氏亦同按系本有簡子名不信莊子名庚趙系家亦有簡子名不佞康子名虎武子名啟章子景侯立紀年及系本皆作景子名處子列侯取立系本作武侯列侯三年聶政殺韓相俠累戰國策作殺韓傀髙誘曰韓傀俠侯累也列侯子文侯立按紀年無文侯系本無列侯哀侯二年滅鄭按紀年魏武侯二十一年韓滅鄭哀侯入于鄭二十二年晉桓公邑哀侯于鄭是韓既徙都因改號曰鄭故戰國策謂韓恵王曰鄭恵王猶魏徙大梁稱梁王然也六年韓嚴弑其君哀侯而懿侯立按年表懿侯作莊侯又紀年云晉桓公邑哀侯于鄭韓山堅賊其君哀侯而立韓若山若山即懿侯也則韓嚴為韓山堅也而戰國策又有韓仲子名遂又恐是韓嚴也韓姬弑其君悼公紀年姬亦作玘竝音羊之反姬是韓大夫而王劭亦云不知悼公何君也二十六年昭侯卒按紀年鄭昭侯武薨次威侯立威侯七年與邯鄲圍襄陵五月梁恵王會威侯于巫沙十月鄭宣王朝梁不見威侯之卒下敗韓舉在威侯八年而此系家即以為宣恵王之年又上有殺悼公悼公又不知是誰之諡則韓㣲小國史失代系故此文及系本不同葢亦不可復考八年魏敗我将韓舉韓舉則是韓将不疑而紀年云韓舉趙将葢舉先為趙将後入韓又紀年云其敗當韓威王八年是不同也敗我修魚地名韓将䱸申差䱸申差二将䱸音瘦亦作鯁公仲韓相國名侈一易二之計一謂名都也二謂使不伐韓而又與之伐楚也警公仲之行警戒也戰國策作衞将西購於秦戰國策作講講亦謀議與購求意通韓不能聴我言韓王信楚之救雖不能聴待楚救至折入於秦猶徳於楚也韓之徳王也必不鴈行以來言韓以楚必救己已雖隨秦來戰猶徳於王故不為鴈行而來言不同心旅進也以楚殉韓殉從死也言以死助韓止公仲之行止不令西之秦丹陽故楚都在今均州方城之外方城楚之北境之外北境之北也殆不合矣殆不合於南鄭以到之到欺也猶俗云張到然戰國策作勁勁强也楚陰得秦之不用也言楚陰知秦不為公用亦必易為公相支拒也昭魚戰國策謂之昭􅈄言收璽劉氏云詐言昭魚來秦欲得秦官之印璽收即取之義也芈戎芈姓戎名秦宣太后弟號新成君公叔伯嬰按戰國策公叔伯嬰與蟣蝨及公子咎竝是襄王子然伯嬰即太子嬰嬰前死故咎與蟣蝨又爭立此取戰國策説伯嬰未立之前亦與蟣蝨爭立故事重而文到也為韓求質子令韓求楚更以别人為質以替蟣蝨也楚王聴入質子於韓質子蟣蝨也公又為秦求質子於楚令芈戎敎秦於楚索韓所送質子令入之於秦也陳筮徐廣云一作荃戰國策作田荼田敬仲完系家第十六陳厲公他音徒何反此系家以他為厲公而左傳厲公名躍陳系家又有利公躍利即厲也是厲公名躍葢他是厲公之兄未踰年無諡今此云厲公他非也他一名五父故經云蔡人殺陳他傳又云蔡人殺五父是也敬仲生穉孟夷系术作夷孟思葢穉是名孟夷字也孟夷生湣孟莊系本作閩孟克注一作芷昌改反以陳字為田氏據如此云敬仲奔齊以陳田二字聲相近遂以為田氏應劭云始食菜於田則田是地名未詳其處欒逞音盈史記多作逞字國恵子名夏髙昭子名張子荼音舒又如字槖中音託槖中謂皮槖之中御鞅御官也鞅名也亦田氏之族監止上音如字又音苦濫反監姓也名止嫗乎采芑言嫗之采芑莱皆歸入於田成子以刺齊國之政将歸陳子我者監止之宗人也按齊系家云子我夕賈逵云即監止也尋其文意當是監止今云宗人葢太史誤也需事之賊上音須需者疑也疑必致難故云事之賊也徐州音舒徐州齊邑薛縣是也非九州之徐襄子盤徐廣云一作暨音許既反系本作班莊子曰系本名伯自安平以東按司馬彪郡國志北海東安平六國時曰安平則徐廣云在北海是成子有七十餘男按鮑昱云陳成子有數十婦生男百餘人與此亦異然譙允南按春秋陳恒為人雖志大負殺君之名至於行事亦修整故能自保固非茍為禽獸之行夫成事在徳雖有姦子七十祗以長亂事豈然哉言其非實也莊子卒子太公和立按紀年齊宣公十五年田莊子卒明年立田悼子卒乃次立田和是莊子後有悼子葢立年無幾所以作系本及記史者不得録也而荘周及鬼谷子亦云田成子殺齊君十二代而有齊國今據系本系家自成子至王建之滅唯祗十代若如紀年則悼子及侯剡即有十二代乃與荘子鬼谷說同明紀年亦非妄宣公五十一年田會自廩丘反紀年宣公五十一年公孫會以廩丘叛於趙十二月宣公薨於周正為明年二月康公貸立音土代反注伐魯取最音祖外反伐衛取毌毌音貫古國名衛之邑今作毌者字殘缺耳與魏文侯會濁澤徐廣云康公十六年葢依年表為説而不省此上文貸立十四年又云明年會平陸又三年會濁津則是十八年表及此注竝誤也太公和卒子桓公午立紀年齊康公五年田侯午生二十二年田侯剡立後十年齊田午弑其君及孺子喜而為公春秋後傳亦云田午弑田侯及其孺子喜而兼齊是為桓侯與此系家不同也段干朋段干姓朋名也戰國策作段干綸田臣思戰國策作田期思紀年謂之徐州子期葢即田忌也桓公午五年秦魏攻韓求救於齊齊桓公召大臣而謀謂騶忌段干朋如戰國策威王二十六年邯戰之役有此謀臣耳又南梁之難在宣王二年有騶子田忌孫臏之謀戰國策又有張田其辭前後交互是記史者所取名異故不同耳六年救衛桓公卒按紀年梁恵王十二年當齊桓公十八年後威王始見則桓公十九年而卒與此不同大弦濁以溫者君也按春秋後語溫字作春春氣温義亦相通也蔡邕曰凡絃以緩急為清濁琴緊其弦則清縵其絃則濁醳之愉上音釋與下文舍字竝同愉音舒也得全全昌按得全謂人臣事君之禮全具無失故云得全也全昌者謂若無失則身名獲昌故云全昌也謹毋離前謂佩服此言常無離心目之前狶膏棘軸狶膏猪脂也棘軸以棘木為車軸至滑而堅也然而穿孔若方則不能運轉言逆理反經也故下忌曰請謹事左右言每事須順從弓膠昔幹音孤捍反昔久舊也幹弓幹也徐廣又曰一作乾考工記作㭊幹則㭊昔音相近言作弓之法以膠被昔幹而納諸檠中則是以勢令合耳而不能傅合疏罅傅音附罅音五嫁反以言膠幹可以勢暫合而久亦不能常傅合於疏罅隙縫以言人臣自宜彌縫得所豈待拘以禮制法式哉故下云請自附於萬人是也大車不較較者校量也言有常制若大車不較則車不能載常任琴不能成五音也魏王問曰王亦有寳乎威王曰有按韓嬰詩外傳以為齊宣王其説異也檀子者檀子齊臣檀姓子美稱大夫皆稱子盼子田盼也黔夫及種首皆臣名事悉具戰國策也泗上十二諸侯邾莒宋魯之比孫子孫臏也敗魏桂陵在威王二十六年破魏馬陵在宣王二年殺其大夫牟辛牟辛大夫姓字也徐廣曰一作夫人按年表亦作夫人字王劭按紀年云齊桓公十一年殺其君母宣王八年殺王后然則夫人之字或如紀年之説三十五年公孫閲戰國策作公孫閎謂成侯鄒忌曰云云田忌聞之因率其徒攻臨淄求成侯不勝而奔按戰國策田忌前敗魏於馬陵因被構不得入齊非是居齊歴十年乃出奔也是時齊都臨淄且孟嘗列傳云田忌襲齊之邊邑其言為得即與系家不同也戰於南梁晉太康地理記曰戰國謂梁為南梁者别之於大梁少梁也宣王二年戰南梁王召騶忌子按紀年威王十四年田朌伐梁戰馬陵戰國策南梁之難有張田對曰早救之此云鄒忌者王劭云此時鄒忌死已四年又齊威時未稱王故戰國策謂之田侯今此以田侯為宣王又横稱騶忌皆謬矣明年梁恵王卒按紀年梁恵王乃是齊湣王為東帝秦昭王為西帝時此時梁恵王改元稱一年未卒也而系家以其後即為魏襄王之年又以此文當齊宣王時實所不能詳考齊稷下學士復盛劉向别録曰齊有稷門齊城門也談説之士期會於其下齊地記曰齊城西門側系水左右有講室趾徃徃存焉葢因側系水出故曰稷門古側稷音相近耳又虞喜曰齊有稷山立館其下以待游士亦異説也春秋傳曰莒子如齊盟于稷門湣王地系本名遂寡人弗能拔能猶勝也言不勝其拔故聴齊拔之耳逐張儀逐隨也摶三國之兵摶音團團謂握領也徐作専亦通三川韓也公令楚王公謂陳軫執左券券要也左不正也言我以右執其左而責之宋治不安戰國策作宋地不安結軼軼音姪軼者車轍也言車轍徃還如結也戰國策作結靷淖齒淖音女敎反周子葢齊之謀臣史失名也戰國策以周子為蘇秦而楚字皆作燕然此時蘇秦死已久矣住建共者客耶音邪謂是建客邪客説建住言遂乃失策令建遷共共今在河内也用客之不詳也謂不詳審用客不知其善否也比犯二君比如字又頻律反二君即悼公簡公也僖子廢晏孺子鮑牧以乞故殺悼公而成子又殺簡公故云田氏比犯二君也史記索隠卷十三
