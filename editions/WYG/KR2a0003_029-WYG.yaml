body:
  text: 史記索隠卷二十九唐司馬貞撰十二本紀述贊五帝本紀帝出少典居于軒丘旣代炎厯遂禽蚩尤高陽嗣位靜深有謀大小逺近莫不懐柔爰洎帝嚳列聖同休帝摰之弟其名放勲就之如日望之如雲郁夷東作昧谷西曛明揚側陋𤣥徳升聞能讓天下賢哉二君夏本紀堯遭鴻水黎人阻饑禹勤溝洫手足胼胝言乘四載勲履四時娶妻有日過門不私九土既理𤣥珪錫茲帝啟嗣立有扈違命五子作歌太康失政羿浞侵侮夏室不競降于孔甲擾龍乖性嗟彼鳴條其終不令殷本紀簡狄吞乙是為殷祖𤣥王啓商伊尹負俎上開三面下獻九主旋師秦卷繼相臣扈遷囂圯耿不常厥土武乙無道禍因射天帝辛淫亂拒諫賊賢九侯見醢炮烙興焉黄鉞斯仗白旗是懸哀哉瓊室殷祀用遷周本紀后稷居邰太王作周丹開雀錄火降烏流三分旣有八百不謀蒼兕誓衆白魚入舟太師抱樂箕子拘囚成康之日政簡刑措南廵不還西服莫附共和之後王室多故檿弧興謡龍漦作蠧頽帶荏禍實傾周祚秦本紀栢翳佐舜皂斿是旌蜚廉事紂石椁斯營造父善馭封之趙城非子息馬厥號秦嬴禮樂射御西垂有聲襄公救周始命列國金祠白帝龍祚水徳祥應陳寳妖除豐特里奚致霸衛鞅任刻厥後吞并卒成凶慝秦始皇本紀六國陵替二周淪亡并一天下號為始皇阿房雲構金狄成行南遊勒石東瞰浮梁滈池見遺沙丘告喪二世矯制趙高是與詐因指鹿災生噬虎子嬰見推思報君父下乏忠佐上乃庸主欲振頽綱云誰克補項羽本紀亡秦鹿走偽楚狐鳴雲鬱沛谷劎挺吳城勲開魯甸勢合碭兵卿子無罪亞父推誠始救趙歇終誅子嬰違約王漢背闗懐楚常遷上游臣迫故主靈壁大振成臯久拒戰非無功天實不與嗟彼葢代卒為凶豎高祖本紀高祖初起始自徒中言從泗上即號沛公嘯命豪傑奮發材雄彤雲鬱碭素靈告豐龍變星聚虵分徑空項氏主命負約棄功王我巴蜀實憤于衷三秦既北五兵遂東汜水即位咸陽築宫威加四海還歌大風吕太后本紀高祖猶微吕氏作妃及正軒掖尚私食其志懐安忍情挾猜疑置鴆齊悼殘彘戚姬孝惠崩殞其哭不悲諸吕用事天下示私大臣葅醢支孽芟夷禍盈斯驗蒼狗為災孝文本紀孝文在代兆遇大横宋昌建册絳侯奉迎南面而讓天下歸誠務農先籍布徳偃兵除帑削謗政簡刑清綈衣率俗露臺罷營法寛張武獄恤緹縈霸陵如故千年頌聲孝景本紀景帝即位因修靜黙勉人於農率下以徳制度斯創禮法可則一朝吳楚乍起凶慝提局成舋拒輪致惑晁錯雖誅梁城未克條侯出將追奔逐北坐見梟剠立翦牟賊如何太尉後卒下獄惜哉明君斯功不録孝武本紀孝武纂極四海承平志尚奢麗尤敬神明壇開八道接通五城朝親五利夕拜文成祭非祀典廵乖卜征登嵩勒岱望景傳聲迎年祀日改厯定正疲耗中土事彼邊兵日不暇給人無聊生俯觀嬴政幾欲齊衡十表述贊三代年表高辛之𦙍大啓禎祥脩己吞薏石紐興王天命𤣥鳥簡夷生商姜嫄履跡祚流岐昌俱膺厯運互有興亡風餘周召刑措成康出彘之後諸侯日彊十二諸侯年表太史表次抑有條理起自共和終於孔子十二諸侯各編年紀興亡繼及盛衰臧否惡不揜過善必揚美絶筆獲麟義取同恥六國年表春秋之後王室益卑楚強南服秦霸西垂三卿分晉八代興媯遞主盟會互為雄雌二周前滅六國後隳壯哉嬴氏吞并若斯秦楚之際月表秦失其鹿羣雄競逐狐鳴楚祠龍興沛谷武臣自王魏豹必復田儋據齊英布居六項王主命義帝見戮以月繫年道悠運速洶洶天下瞻烏誰屋真人霸上卒享天禄漢興已來諸侯王年表漢有天下爰鑒興亡始誓河岳言峻寵章淮隂就楚彭越封梁荆燕懿戚齊趙棣棠犬牙相制麟趾有光降及文景代有英王魯恭梁孝濟北城陽仁賢足紀忠烈斯彰高祖功臣侯者年表凡三百三十三人聖賢影響風雲潛契高祖膺籙功臣命世起沛入秦憑謀仗計紀勲書爵河盟山誓蕭曹輕重絳灌權勢咸就封國或萌罪戾仁賢者祀昏虐者替永監前修良慙固蔕惠景間侯者年表惠景之際天下已平諸吕構禍吳楚連兵條侯出討壯武奉迎薄竇恩澤張趙忠貞本枝分䕃肺腑歸誠新市死事建陵勲榮或開青社俱受丹旌旋窺甲令吳芮有聲建元以來侯者年表七十二國太史公舊四十五國褚先生補也孝武之代天下多虞南討甌越北擊單于長平鞠旅冠軍前驅術陽銜璧臨蔡破禺博陸上宰平津巨儒金章且佩紫綬行紆昭帝已後勲寵不殊惜哉絶筆褚氏補諸建元以來王子侯者年表漢氏之初矯枉過正欲大本枝先封同姓建元已後蕃翰克盛主父上言推恩下令長沙濟北中山趙敬分邑廣封振振在詠扞城禦侮􅁮􅁮輝映百足不僵一人有慶漢興已來將相名臣年表高祖初起嘯命羣雄天下未定王我漢中三傑既得六奇獻功章邯已破蕭何築宫周勃厚重朱虚至忠陳平作相條侯總戎邴魏立志湯堯飾躬天漢之後表述非工八書述贊禮因人心非從天下合誠飾貌救弊興雅以制黎甿以事宗社情文可重豐殺難假仲尼坐樹孫通蕝野聖人作教罔不由者樂書樂之所興在乎防慾陶心暢志舞手蹈足舜曰簫韶融稱屬續審音知政觀風變俗端如貫珠清同叩玉洋洋盈耳咸英餘曲律書自昔軒后爰命伶倫雄雌是聽厚薄伊均以調氣候以軌星辰軍容取節樂器斯因自微至著測化窮神大哉虚受含養生人厯書厯數之興其來尚矣重黎是司容成斯紀推歩天象消息母子五勝輪環三正互起孟陬貞嵗疇人順軌敬授之方履端為美天官書在天成象有同影響觀天察變其來自徃天官既書太史攸掌雲物必記星辰可仰盈縮匪􅄽應驗無爽至哉𤣥監云誰欲誷封禪書禮載升中書稱肆類古今盛典皇王能事登封報天降禪除地飛英騰實金泥石記漢承遺緒斯道不墜仙閭蕭然揚休勒誌河渠書水之利害自古而然禹疏溝洫隨山濬川爰洎後世非無聖賢鴻溝既劃龍骨斯穿填淤攸墾黎蒸有年宣房在詠梁楚獲全平準書平準之立通貨天下既入縣官或振華夏其名刀布其文龍馬增算告緡裒多益寡𢎞羊心計卜式長者都内克殷取贍郊野三十系家述贊吳太伯系家太伯作吳高讓雄圖周章受國别封於虞夀夢初罷始用兵車三子遞立延陵不居光既篡位是稱闔閭王僚見殺賊由專諸夫差輕越取敗姑蘇甬東之恥空慙伍胥齊太公系家太公佐周實秉隂謀既表東海乃居營丘小白致霸九合諸侯及溺内寵舋鍾蟲流莊公失徳崔杼作仇陳氏專政原貨輕收悼簡遘禍田闞非儔渢渢餘烈一變何由魯周公系家武王既沒成王幼孤周公攝政負扆據圖及還臣列北面躬如元子封魯少昊之墟夾輔王室系職不渝降及孝公穆仲致譽隠能讓國春秋之初丘明執簡襃貶備書燕召公系家召伯作相分陜而治人惠其徳甘棠是思莊送霸主惠羅寵姬文公從趙蘇秦騁辭易王初立齊宣我欺燕噲無道禪位子之昭王待士思報臨淄督亢不就卒見芟夷管蔡系家武王之弟管蔡及霍周公居相流言是作狼跋致艱鴟鴞討惡胡能改行克復其爵獻舞執楚遇息禮薄穆侯虜齊蕩舟乖謔曹共輕晉負羈先覺伯陽夢社祚傾振鐸陳把系家盛徳之祀必及百世舜禹餘烈陳把是繼媯滿受封東樓纂系閼路篡逆夏姬淫嬖二國衰微或興或替前并後虜皆亡楚惠勾踐勃興田和吞噬蟬聯血食豈其苗裔衛康叔系家司寇受封梓材有作成錫厥器夷加其爵暨武能修從文始約詩美歸燕傳矜石碏皮冠射鴻乗軒使鶴宣縱淫嬖舋生伋朔蒯聵得罪出公行惡衛祚日衰失於君角宋微子系家殷有三仁微箕紂親一囚一去不顧其身頌美有客書稱作賓卒傳冢嗣或叙彞倫微仲之後世載忠勤穆亦能讓實為知人傷泓之役有君無臣偃號桀宋天之棄殷晉唐叔系家天命叔虞卒封於唐桐珪既削河汾是荒文侯雖嗣曲沃日強未知本末祚傾桓莊獻公昏惑太子罹殃重耳致霸朝周河陽靈既喪徳厲亦無防四卿侵侮晉祚遽亡楚系家鬻熊之嗣周封於楚僻在荆蠻蓽路藍縷及通而霸僭號曰武文既伐申成亦赦許子圉篡嫡商臣殺父天禍未悔憑奸自怙昭困奔亡懐迫囚虜傾襄考烈祚衰南土越勾踐系家越祖少庸至于允常其子始霸與吳爭强欈李之役闔閭見傷會稽之恥勾踐欲當種誘以利蠡悉其良折節下士致膽思嘗卒復讎寇遂殄大邦後不量力滅於無疆鄭系家厲王之子得封於鄭代職司徒緇衣在詠虢鄶獻邑祭祝專命莊既犯王厲亦奔命居櫟克入夢蘭毓慶伯儵生囚叔瞻尸政釐簡之後公室不競負黍雖還韓哀日盛趙系家趙氏之系與秦同祖周穆平徐乃封造父帶始事晉夙初有上岸霸矯誅韓厥立武寳符臨代卒居伯魯簡夢翟犬靈歌處女胡服雖强建立非所頗牧不用王遷囚虜魏系家畢公之苖因國為姓大名始賞盈數自正𦙍裔繁昌系載忠正楊干就戮智氏奔命文始建侯武實强盛大梁東徙長安北偵夘既無功卭亦外騁王假削弱虜於秦政韓系家韓氏之先實宗周武事微國小春秋無語後裔事晉韓原是處趙孤克立智伯可取既徙平陽又侵負黍景趙俱侯惠又僭主秦敗修魚魏㑹區鼠韓非雖使不禁狼虎田敬叔系家田完避難奔于大姜始辭羇旅終然鳯凰物莫兩盛代五其昌二君比犯三晉爭强和始擅命威遂稱王祭急燕趙弟列康莊秦假東帝莒立法章王建失國松栢蒼蒼孔子系家孔子之胄出于商國弗父能讓正考銘勒防叔來奔鄒人掎足尼丘誕聖闕里生徳七十升堂四方取則夘誅兩觀攝相夾谷歌鳯遽衰泣麟何促九流仰鏡萬古欽躅陳渉系家天下匈匈海内乏主掎鹿爭捷瞻烏爰處陳勝首事厥號張楚鬼怪是憑鴻鵠自許葛嬰東下周文西拒始親朱房又任胡武顆頤見殺腹心不與莊賈何人反噬城父外戚系家禮貴夫婦易叙乾坤配陽成化比月居尊河洲降淑天曜垂軒徳著任姒慶流娀嫄逮我炎厯斯道克存吕權大寳竇喜𤣥言自茲已降立嬖以恩内無常主後嗣不繁楚元王系家漢封同姓楚有令名既滅韓信王失彭城穆生置醴韋孟作程王戊棄徳與吳連兵太后命禮為楚罪輕文襄繼立世挺才英如何趙遂代殞厥聲興亡之兆所任宜明荆燕系家劉賈初從首定三秦既渡白馬遂圍夀春始迎黥布絶間周殷賞功祚土與楚為隣營陵始爵勲由擊陳田生遊說受賜千斤權激諸吕事發榮身徙封傳嗣亾於郢人齊悼惠系家漢矯秦制樹屏自彊表海大國悉封齊王吕后肆怒乃獻城陽哀王嗣立其力不量朱虚仕漢功大䇿長東牟受賞稱亂貽殃膠東濟北雄渠辟光齊雖七國忠孝者昌蕭相國系家蕭何為吏文而無害及佐興王舉宗從沛闗中既守轉輸是賴漢軍屢疲秦兵必㑹約法可久收圖可大指獸發蹤其功實最政稱畫一居乃非泰繼絶寵勤式旌礪帶曹相國系家曹㕘初起為沛豪吏始從中涓先圍善置執珪執帛攻城略地衍氏既誅昆陽失位北禽夏説東討田溉剖符定封功無與二市獄勿擾清淨不事尚主平陽代享其利留侯系家留侯倜儻志懐憤惋五代相韓一朝歸漢進履宜假運籌神算横陽既立申徒作扞灞上扶危固陵静亂人稱三傑辯稱八難赤松願遊白駒難絆嗟彼雄略曾非魁岸陳丞相系家曲逆窮巷門多長者宰肉先均佐喪後罷魏楚更用腹心難假棄印封金刺船露倮間行歸漢委質麾下滎陽計全平城圍解推陵讓勃裒多益寡應變合權克定宗社絳侯系家絳侯佐漢質厚敦篤始擊碭東亦圍尸北所攻必取所討咸克陳狶伏誅臧荼破國事居送徃推功伏徳列侯還第太尉下獄繼相條侯紹封平曲惜哉賢將父子代辱梁孝王系家文帝少子徙封於梁太后鍾愛廣築睢陽旌旂警蹕勢擬天王功扞吳楚計醜孫羊竇嬰正議袁盎劫傷漢窮梁獄冠葢相望禍成驕子致此猖狂雖分五國卒亦不昌五宗系家景十三子五宗親睦栗姬既廢臨江折軸閼于早薨河間儒服餘好宫苑端事馳逐江都有才中山禔福長沙地小膠東造鏃仁賢者代悖亂者族兒姁四王分封為六三王系家三王封系舊史爛然褚氏後補册書存焉去病建議青翟上言天子冲挹志在急賢太常具禮請立齊燕閎國負海且社惟𤣥霄人不通葷粥遠邊明哉監戒式防厥愆史記索隠卷二十九
