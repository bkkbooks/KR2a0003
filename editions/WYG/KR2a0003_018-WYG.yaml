body:
  text: 史記索隠卷十八唐司馬貞撰仲尼弟子列傳第七孔子曰受業身通者七十有七人按孔子家語亦有七十七人唯文翁孔廟圖作七十二人也冉有季路按論語一曰徳行二曰言語三曰政事四曰文學今此文學政事在言語上是其記異耳師也僻參也魯按論語先言柴次言由今此傳序之亦與論語不同不得輒言其誤也孔子皆後之不竝世按自臧文仲已下孔子皆後之不竝世其所嚴事自老子及公綽已上皆孔子同時也注大戴禮記按戴徳撰禮號曰大戴禮合八十五篇其四十七篇亡見今存者有三十八篇今裴氏所引在衛將軍篇孔子稱祈傒對晉平公之辭唯舉銅鞮介山二人行耳蘧伯玉按大戴禮又云外寛而内直自娱於隠括之中直已而不直人汲汲于仁以善存亾葢蘧伯玉之行也老萊子大戴記又云徳恭而行信終日言不在悔尤之内貧而樂也葢老萊子之行也晏平仲大戴記曰君擇臣而使之臣擇君而仕之有道順命無道衡命葢晏平仲之行也栁下惠大戴記又云孝恭慈仁允徳圖義約貨亡怨葢桞下惠之行也銅鞮地理志縣名屬上黨顔囘年二十九髪白蚤死按家語亦云年二十九而髪白三十二而死王肅云此久逺之書年數錯誤未可詳也挍其年則顔囘死時孔子年六十一然則伯魚年五十先孔子卒時孔子且七十也今此為顔囘先伯魚死而論語曰顔囘死顔路請子之車孔子曰鯉也死有棺而無槨或為設事之辭按顔囘死在伯魚之前故以論語為設詞注衞瓘按瓘字伯玉晉太保亦注論語裴氏引之閔損家語亦云魯人少孔子十五嵗不仕大夫按論語季氏使閔子騫為費宰子騫曰善為我辭焉是不仕大夫不食汙君之禄冉耕字伯牛按家語云魯人冉雍字仲弓家語云伯牛之宗族少孔子二十九嵗仲由字子路家語一字季路亦云是卞人委質按服䖍注左氏云古者始仕必先書其名於策委死之質於君然後為臣示必死節於君也注李充曰按充字𢎞度晉中書侍郎亦作論語解也變肇按肇字永初晉尚書郎作論語義也為蒲大夫蒲衞邑子路為之宰也為衞大夫按服䖍云為孔悝之邑宰方孔悝作亂按左傳蒯聵入孔悝家悝母伯姫劫悝於厠強與之盟而立蒯聵非悝本心自作亂也宰予家語亦云魯人為臨淄大夫按謂仕齊齊都臨淄故云為臨淄大夫也與田常作亂按左氏傳無宰我與田常作亂之文然有闞止字子我而因爭寵遂為陳恒所殺恐字與宰予相渉因誤云然端沐賜衞人家語作木子石公孫龍也地狹以泄按越絶書其泄字作淺王必惡越按惡猶畏惡也子胥以諫死王劭按家語越絶竝無此五字是時子胥未死國為虚莽有本作棘恐誤也鈇屈盧上鈇音膚鈇斧也劉氏一本無此字屈盧矛名不可以應卒按卒謂急卒也言計慮不先定不可以應卒有非常之事吳王果與齊人戰於艾陵按左傳在哀十一年與晉相遇黄池按左傳黄池之會在哀十三年越入吳吳與越平也越圍王宫夫差自殺按左傳越滅吳在哀二十二年則事竝懸隔數年葢此文欲終説其事故其辭相連五國各有變按左傳謂魯齊晉吳越也故云子貢一出存魯亂齊破吳強晉而霸越好廢舉與時轉貨資按家語貨作化王肅云廢舉謂買賤賣貴也隨時轉貨以殖其資也劉氏云廢謂物貴而賣之舉謂物賤而収買之轉貨謂轉貴収賤也是時子貢為魯使於齊按左傳子貢為魯使齊在哀十五年葢此文誤也言偃吳人家語云魯人按偃仕魯為武城宰耳今吳郡有言偃冢葢吳郡人為是也卜商按家語云衞人鄭𤣥云温國人不同者温國今河内温縣元屬衞故子夏居西河在河東郡之西界葢近龍門劉氏云今同州西縣有子夏石室學堂也為魏文侯師按子夏文學著於四科序詩傳易又孔子以春秋屬商又傳禮著在禮志而此史竝不論空記論語小事亦其疎也顓孫師陳人鄭𤣥目録陽城人陽城縣名屬陳郡曾參南武城人按武城屬魯當時魯更有北武城故言南也澹臺滅明南遊至江按今吳國東南有澹臺湖即其遺跡所在以貌取人失之子羽按家語子羽有君子之容而行不勝其貌而上文云滅明狀貌甚惡則以子羽形陋也今此孔子云以貌取人失之子羽與家語正相反宓不齊家語云魯人字子賤少孔子四十九嵗此云三十不同賢不齊者五人按家語云不齊所父事者三人所兄事者五人所友者十一人不同也原憲鄭𤣥云魯人家語宋人少孔子三十六嵗原憲遂亡家語云隠居衞公冶長齊人家語云魯人名萇字子長范寗云字子芝南宫括字子容家語作南宫縚按其人是魯孟僖子之子仲孫閲也葢居南宫因姓焉公晳哀字季次家語作公晳尅唯季次未嘗仕家語云未嘗屈節為人臣故子特賞歎之亦見游俠傳也曾蒧音㸃又音其炎反字晳家語云曾㸃字子晳曽參之父顔無繇字路囘父家語云顔由字路囘之父也孔子始教於闕里而受學焉少孔子六嵗故此傳云父子異時事孔子故易稱顔氏之子者是父子俱學孔門也商瞿魯人字子木家語云瞿年三十八無子母欲更娶室孔子曰瞿過四十當有五丈夫子果然瞿謂梁鱣勿娶吾恐子或晩生非妻之過也馯臂子𢎞馯徐廣音韓鄒誕生音汗按儒林傳蘭鄉子及漢書皆云馯臂字子弓今此獨作𢎞葢誤耳應劭云子弓是子夏門人矯子庸疵儒林傳及系本皆作蟜疵音自移反疵字或作疵蟜是姓疪名也字子肩然蟜姓魯莊公族也禮記蟜固見季武子葢魯人史儒林傳皆云魯人獨此云江東人葢亦誤耳儒林傳云馯臂江東人蟜疵楚人也燕人周子家豎周豎字子家有本作林淳于人光子乗羽淳于縣名在北海光羽字子乗齊人田子莊何田何字子莊東武人王子中同王同字子中菑川人楊何自商瞿傳易至楊何凡八代相傳儒林傳何字叔元高柴鄭𤣥云衞人家語齊人高氏之别族長不盈六尺狀貌甚惡此傳作五尺誤也漆彫開鄭𤣥云魯人家語云蔡人字子若少孔子十一嵗又云習尚書不樂仕孔子曰可以仕矣對曰吾斯之未能信王肅云未得用斯書之意故曰未能信也公伯繚字周馬融云魯人家語無公伯繚而有申子周而譙周云疑公伯繚是讒愬之人孔子不責而云其如命何非弟子之流也今亦列比在七十二賢之數葢太史公誤且僚亦作􅈙也司馬耕字子牛家語云宋人字子牛孔安國亦云宋人弟安子曰司馬犁也牛是桓魋之弟以魋為宋司馬故牛遂以司馬為氏也樊須字遲鄭𤣥云齊人家語云魯人也有若家語云魯人字子有少孔子三十三嵗今此傳云四十二嵗不知傳誤又所見不同也五丈夫子謂五男也巫馬施字子旗鄭𤣥云魯人家語云陳人字子期梁鱣字叔魚家語云齊人字叔魚也顔幸字子栁家語云顔幸字栁按禮記有顔栁或此人少孔子四十六嵗家語云少三十六嵗魯人與鄭𤣥同冉孺字子魯家語字子魯魯人作冉儒曹䘏少孔子五十嵗家語同伯䖍字子折家語作伯處字子晳皆轉寫字誤未知適從公孫龍字子石家語或作寵又云礱七十子圖非礱也按字子石則礱或非謬鄭𤣥云楚人家語衞人然莊子所云堅白之談則其人也子石已右冉季産家語冉季字産秦祖字南家語字子南漆彫哆赤者反家語字子斂顔子驕家語名産孔子在衞南子招夫子為次過市時産為御也漆彫徒父家語字固也壤駟赤字徒家語字子徒者石高澤家語字季石作蜀字明家語同任不齊字選家語字子選也公良孺家語作良儒陳人字子正賢以有勇孔子周遊常以家車五乗孔子家語在三十五人之中亦見系家在三十二人不見葢傳之數亦誤也鄒誕本作公襄儒后處字里家語同也公夏首字乘家語同也奚容箴字子晳家語同也公肩定字中家語同也顔祖字襄家語無此人也鄡單字子家鄡音苦堯反單音善則單名徐廣云一作鄡單鉅鹿有鄡縣太原有鄡縣家語無此人也罕父黒字子索家語作罕父黑字索秦商家語魯人字丕慈少孔子四嵗其人菫與孔子父紇俱以力聞也申黨字周家語有申繚字周論語有申棖鄭𤣥云申棖魯人弟子也葢申黨是棖不疑以棖黨聲相近上文又有公伯繚亦字周家語則無伯繚是史記述伯繚一人者也公祖句茲字子之句音鈎榮子祺家語榮祈字子顔也縣成字子祺家語作子謀也左人郢字行家詰同也燕伋字思家語同也鄭國字子徒家語薛邦字徒史記作國而家語稱邦者葢避漢祖諱而改鄭與薛字誤也秦非字子之施之常字子恒顔噲字子聲歩叔乘字子車顔之僕字叔家語竝同原亢籍家語名亢字籍樂欬字子聲家語同也亷潔字子庸家語同也叔仲會字子期鄭𤣥云晉人家語魯人少孔子五十四嵗與孔璇年相比二孺子俱執筆迭侍於夫子孟武伯見而放之是也顔何字冉家語字稱狄黑字晳家語同邦巽字子斂家語巽作選字子斂文翁圗作國選葢亦由避漢諱改也劉氏作邽巽邽音圭所見各異也孔忠家語云忠字子蔑孔子兄之子也公西輿如字子上家語冋公西箴字子上家語子上作子尚也已上四十二人無年及不見書傳者按家語此例唯有三十七人其公良孺秦商歩叔仲會四人家語有事迹史記闕然自公伯遼秦冉鄡單三人家語不載而别有琴牢陳亢縣豐當此三人數皆互有也如文翁圖所記又有林放蘧伯玉申棖申黨俱是後人以所見增益於今殆不可考商君列傳第八公叔座公叔氏座名也座音在戈反為中庶子官名也魏已置之非自秦也周禮夏官謂之諸子禮記文王世子謂之庶子掌公族也座之中庶子按戰國策云御庶子也魏惠王即魏侯之子名罃後徙大梁而稱梁也豈不悖哉謂疾重而悖亂也景監景姓楚之族也監音去聲平聲亦通比三比者頻也謂頻三見孝公言帝王之道也比音必耳反説君音税下同君大説音悦固見非於世按商君書非作負見敖於人商君書作必見驁於人也不法其故言救弊為政之術所為茍可以强國則不必須要法於故事也甘龍曰孝公之臣甘姓龍名也按甘氏出春秋時甘昭公王子帶後也不肖者拘焉言賢智之人作法更禮而愚不肖者不明變通而輒拘制不使之行斯亦信然矣湯武不循古商君書作修古殷夏不易禮指殷紂夏桀也令人為什伍劉氏云五家為保十保相連而相牧司連坐按牧司為相糺發也一家有罪則九家連舉發若不糺舉則十家連坐恐變令不行故設重禁告姧者與斬敵首同賞按謂告姧一人則得爵一級故云與斬敵首同賞也匿姧者與降敵同罰按律降敵者誅其身没其家今匿姧者與之同罪也事末利及怠而貧者舉以為収孥末謂工商也葢農桑為本故上云本業耕織也怠者懈也周禮謂之疲民以言懈怠不事事之人而貧者則糺舉而収録其妻子沒為官奴婢葢其法特重於古也宗室非有軍功論不得為屬籍按謂宗室若無軍功則不得入屬籍謂除其籍則雖無功不及爵秩也臣妾衣服以家次謂各隨其家爵秩之班次亦不使僣侈踰等也言初令謂鞅新變之法令為初令皆趨令行之趨音七踰反趨者向也附也為大良造即大上造也即秦之第十六爵名也今云良造者或後變其名耳冀闕冀闕即魏闕也冀記也出列教令當記於此門闕平斗桶音統量器名鄭𤣥音勇今之斛也居領阨之西葢即安邑之東山領險阨之地即今蒲州之中條已東連汾晉之嶮嶝也西魏遂去安邑徙都大梁按紀年曰梁惠王二十九年秦衞鞅伐梁西鄙則徙大梁在惠王之二十九年也秦封之於商於商二縣名在𢎞農按紀年云秦封商鞅在惠王三十年與此文合商君相秦十年又下云五月而秦孝公卒按戰國策云孝公行商君法十八年而死與此文不同者按此直云相秦十年耳而戰國策乃云行商君法十八年葢連其未作相之年耳鞅之得見也從孟蘭臯按孟蘭臯人姓名也言鞅前因蘭臯得與趙良相見也子不説吾治秦與上説音悦下與音予自勝之謂强謂守謙敬之人是為自勝若是者乃為强若爭名得勝此非強之道三置晉國之君謂立晉惠公懷公文公也一救荆國之禍按六國年表穆公二十八年會晉救楚朝周是也教之化人也深於命按劉氏云教謂商鞅之令也命謂秦君之命也言人畏鞅甚於秦君也人之効上捷於令上謂鞅之處分也令謂秦君之令也今君又左建外易按左建謂以左道建立威權也外易謂在外革易君命也闟㦸闟亦鈒同所及反鄒又音吐臈注􅀢屈盧上音遼下音九物反按屈盧干將竝古良匠造矛㦸者之名書曰恃徳者昌此是周書之言孔子所刪之餘也歸十五都衞鞅所封商於二縣以為國其中凡有十五都故趙良勸令歸之所以収君豈其微哉謂鞅於秦無仁恩故秦國之所以將収録鞅者其効甚明故云豈其微哉走商邑上音奏奏走向也注京兆鄭縣按地理志京兆有鄭縣秦本紀云初縣杜鄭按其地是鄭桓公友之所封也於鄭黽池按云鄭黽池者時黽池屬鄭故也而徐廣云黽或作彭池者按鹽鐵論云商君困於彭池黽音亾忍反天資刻薄人也謂天資其人為刻薄之行刻謂用刑深刻薄謂棄仁義不悃誠是薄也挾持浮説説音如字浮説即虚説也謂鞅得用刑政深刻又欺魏將是其天資自有狙詐則初為孝公論帝王之術是浮説耳非其本性也開塞耕戰書按商君開謂刑嚴峻則政化開塞謂布恩賞則政化塞其意本於嚴刑少恩又為田開阡陌及言斬敵首賜爵是耕戰書也注新序論曰按新序是劉歆所撰其中論商君故裴氏引之注歸藉音胙字合作胙誤為藉耳按本紀周歸文武胙於孝公是也注刑用棄灰按説苑云秦法弃灰於道者有刑是其事也蘇秦列傳第九蘇秦東周雒陽人也蘇秦字季子葢蘇忿生之後已姓也譙周云秦兄弟五人秦最少兄代代弟厲及辟鵠並為游説之士此下云秦弟代代弟厲也鬼谷先生按鬼谷地名也扶風池陽潁川陽城並有鬼谷墟葢是其人所居因為號又樂壹注鬼谷子書云蘇秦欲神祕其道故假名曰鬼谷出游數嵗大困而歸按戰國策此語在説秦王之後夫士業已屈首受書按謂士之立操業者素也本也言本已屈首低頭受書於師也徧觀之音遍官二音按謂盡觀覧其書也得周書隂符按戰國策云得太公隂符之謀則隂符是太公之兵符也以出揣摩揣音初委反摩姥何反鄒誕本作揣靡靡讀亦為摩王邵云揣情摩意是鬼谷之二章名非為一篇也高誘曰揣定也摩合也定諸侯使讐其術以成六國之從也江邃曰揣人主之情摩而近之其意當矣皆少之謂王之左右素慣習知秦浮説多不中當世而以為蘇秦智識淺故云少之劉氏云少謂輕之也北有代馬按謂代郡馬邑也地理志代郡又有馬城縣一云代馬謂代郡兼有胡馬之利此天府按周禮春官有天府鄭𤣥云府物所藏言天尊此所藏若天府然説燕文侯上音税下並同燕文侯史失名東有朝鮮潮仙二音朝鮮水名北有林胡樓煩地理志樓煩屬雁門郡西有雲中九原按地理志雲中九原二郡名秦曰九原漢武帝改曰五原郡注滹沲出鹵城按滹沲水名并州之川也音呼沲又地理志鹵城縣名屬代郡滹沲河自縣東至參谷又東至文安入海也車六百乗粟支數年按戰國策車七百乘粟支十年南有碣石戰國策碣石山在常山九門縣地理志大碣石山在右北平驪城縣西南軍於東垣矣地理志高帝改曰真定也趙肅侯按世本云肅侯名言請别白黑所以異隂陽按戰國策云請屏左右白言所以異隂陽其説異此然言别白黑者蘇秦言已今論趙國之利必使分明有如白黒分明隂陽殊異也則趙氏自操兵戰國策作自銷鑠據衞取卷地理志卷縣屬河南按戰國策云取淇注常山有蒲吾按徐氏所引據地理志云然也前有樓闕軒轅戰國策云前有軒轅又史記俗本亦有作軒冕者非本文也長姣音交説文云姣美也臣人之與臣於人按臣人謂已為彼臣也臣於人者謂我為主使彼臣己也夫衡人者按衡人即游説從横之士也東西為橫南北為從地形東西横長故張儀相秦為秦連横恐愒諸侯上起拱反下許曷反謂相恐脅鄒氏愒音憩其意疎也通質音如字又音躓以言通其交質之情韓絶其糧道謂擁兵於嶢闗之外又守宜陽也趙渉河漳謂趙亦渉河漳而西欲與韓作援以阻秦軍楚絶其後謂出兵武闗以絶秦兵之後魏塞其道按其道即河内之道戰國策其作午魏軍河外河外謂陜及曲沃等處也六國從親以賓秦謂六國之軍共為合從相親獨以秦為賓而共伐之黄金千鎰戰國策作萬鎰一鎰為一金則二十兩曰一鎰為米二升鄭𤣥以一鎰為二十四分之一其説異也錦繡千純音淳裴氏云純端疋名高誘注戰國策音屯屯束也又禮鄉射云某賢於某若干純純數也音旋也雕隂魏地也劉氏曰在龍門河之西北按地理志雕隂屬上郡説韓宣王按世本韓宣王昭侯之子也鞏成臯二邑本屬東周後為韓邑地理志二縣並屬河南商阪之塞劉氏云葢在商洛之間適秦楚之險塞是也東有宛穰地理志宛穰二縣名並屬南陽洧水音于軌反水名出南方谿子按許慎注淮南子以為南方谿子蠻出柘弩及竹弩少府時力距來韓又有少府所造時力距來二種之弩按時力者謂作之得時則力倍於常故有時力也距來者謂以弩埶勁利足以距於來敵也其名並見淮南子超足而射按超足謂超騰用埶葢起足蹋之而射也故下云蹠勁弩是也皆出於㝠山莊子云南行至郢北面而不見冥山司馬彪云冥山在朔州北郭象云冥山在乎太極李軌云在韓國棠谿地理志棠谿亭在汝南吳房縣墨陽淮南子云服劒者貴於剡利而不期於墨陽莫耶則墨陽匠名也合賻按戰國策作合伯春秋後語作合相鄧師鄧國有工鑄劒而師名焉宛馮徐廣云滎陽有馮池謂宛人於馮池鑄劍故號宛馮龍泉太阿按吳越春秋楚王令風胡子請吳干將越歐冶作劍二其一曰龍泉二曰太阿又太康地記曰汝南西平有龍泉水可以淬刀劍特堅利故有龍泉水之劍楚之寳劍也以特堅利故有堅白之論云黄所以為堅也白所以為利也齊辨之曰白所以為不堅黄所以為不利也故天下之寳劍韓為衆一曰棠谿二曰墨陽三曰合伯四曰鄧師五曰宛馮六曰龍泉七曰太阿八曰莫耶九曰干將也然干將莫耶匠名也其劍皆出西平縣今有鐵官令一别領戸是古鑄劍之地也當敵則斬堅甲鐵幕按戰國策云當敵則斬甲盾提鍪鐵幕也鄒誕幕一作陌劉云謂以鐵為臂脛之衣言其劍利能斬之也革抉音决謂以革為射决决射韝也㕹芮㕹與瞂同音伐謂楯也芮音如字謂繋楯之綬也今茲效之按鄭𤣥注禮云效猶呈也見也寧為雞口不為牛後按戰國策云寧為雞尸不為牛從延篤注云尸雞中主也從謂牛子也言寧為雞中之主不為牛之從後也太息曰太息謂久蓄氣而大吁也今主君謂指蘇秦也禮卿大夫稱主今嘉蘇子合從諸侯褎而美之故稱曰主説魏襄王世本恵王子名嗣許郾音偃又於建反戰國策作鄢按地理志潁川有許郾二縣又有傿陵縣故所稱惑也傿音焉注一篇邊田反昆陽召陵地理志昆陽屬潁川召陵屬汝南也舞陽新都新郪地理志舞陽屬潁川新郪屬汝南按即郪丘章帝以封殷後於宋新都屬南陽按戰國策直云新郪無新都二字無胥按其地闕西有長城徐廣云滎陽卷縣有長城葢據地險為説也築帝宫謂為秦築宫備其廵狩而舍之故謂之帝宫受冠帶謂冠帶制度皆受秦法祠春秋言春秋貢奉以助秦祭祀禽夫差於干遂按干遂地名不知所在然按干是水旁之髙地故有江干河干是也又左思吳都賦云長干延屬是干為江旁之地遂者道也於干有道因為地名注衣三屬之甲衣音意屬音燭按三屬謂甲衣也覆􅈩一也甲裳二也脛衣三也甲之有裳見左傳也注贏三日上音盈謂齎糗糧注中試音竹仲反謂其筋力能負重所以得中試也則復利其宅復音福謂中試之人國家當優復賜之上田宅故云利其田宅也蒼頭二十萬謂以青巾裹頭以異於衆荀卿魏有蒼頭二十萬是也厮徒十萬厮音斯謂厮養之卒厮養馬之賤者今起為之卒割地以效實謂割地獻秦以效已之誠實效愚計此效猶呈也見也説齊宣王世本名辟疆威王之子也五家之兵按高誘注戰國策云五家即五國也進如鋒矢按戰國策作疾如錐矢髙誘曰錐矢小矢喻徑疾也吕氏春秋曰所貴錐矢者為應聲而至六博按王逸注楚詞云博著也行六棊故曰六博蹋鞠上徒臈反下居六反注云蹴踘促六反蹴亦蹋也崔豹云起黄帝時習兵之埶過衞陽晉之道按陽晉魏邑也魏世家哀王十六年秦拔魏蒲阪陽晉封陵是也劉氏云陽晉地名葢適齊之道衞之西南也徑乎亢父亢音剛又苦浪反地理志縣名屬梁國也恫疑上音通一音洞恐懼也虚猲猲本一作喝並呼葛反高誘曰虚猲喘息懼貌也劉氏云秦自疑懼不敢進兵虚作恐怯之詞以脅韓魏也説楚威王威王名商宣王之子夏州裴駰據左氏及車𦙍説夏州其文甚明而劉伯莊以為夏州侯之本國亦未為得也海陽按地理志無海陽劉氏云楚之東境南有洞庭今之青草湖是也在岳州界也蒼梧地名地理志有蒼梧郡北有陘塞陘山在楚北境威王十一年魏敗楚陘山是也郇陽上音荀北有郇陽其地當在汝南潁川之界驗地理志及太康地記北境並無郇邑郇邑在河東晉地計郇陽當是新陽聲相近字變耳汝南有新陽縣應劭云在新水之陽猶豳邑變為栒亦當然也徐氏郇陽當是慎陽葢其疎也疑於王者疑作擬讀委虵蒲服委虵謂以面掩地而進若虵行也蒲服即匍匐並音蒲卜注秦字季子按其嫂呼小叔為季子耳未必即其字允南即以為字未之得也負郭田負者背也枕也近城之地沃潤流澤最為膏腴故曰負郭也乃投從約書按諸本亦作設言設者謂宣布其從約六國之事以告於秦若作投亦為易解俯而慶仰而弔劉氏云當時慶弔應有其詞但書家不録耳烏啄音卓又音許穢反今之毒藥烏頭是為其愈充腹劉氏以愈猶暫非也謂食烏頭為其暫愈飢而充腹少時毒發而死亦與飢死同患也今齊長主按謂齊王年長也或作齊强故言長主覆三軍得二將按徐廣云齊覆三軍而燕失二將又戰國策云獲二將亦謂燕之二將是燕之失也從子母弟戰國策從作寵而賈十倍按謂紫色價貴於帛十倍而本是敗素以喻齊雖有大名而其國中困斃也北夷方七百里謂山戎北狄附齊者必長賓之長音如字賓為擯涇陽君高陵君二人秦王母弟也髙陵君名顯涇陽君名悝正告正告謂顯然而告天下也浮於汶音旻即江所出之岷山也乘夏水夏音暇謂夏潦之水盛長時也宛東下隨宛縣之東而下隨邑乗船出於巴巴水名與漢水近五渚按五渚五處洲渚也劉氏以為宛鄧之間臨漢水不得在洞庭或説五渚即五湖益與劉説不同也寡人射隼矣按易曰射隼於高墉之上獲無不利秦王言我今伐楚必當捷獲也起乎少曲地名近宜陽也莫不盡繇音揺搖動也我離兩周離如字謂屯兵以罹二周也而乃觸擊于鄭故五日國舉舉猶拔也塞女㦸女㦸地名葢在太行山之西韓氏太原卷劉氏卷音軌龟反也按舉安邑塞女㦸及至韓氏之輯國宜陽也太原者魏地不至太原亦無别名太原者葢太衍字也原當為京及卷皆屬滎陽是魏境又下軹道是河内軹縣言道者亦衍字徐廣云霸陵有軹道亭非魏之境其疎謬如此南陽封冀按魏之南陽即河内也封封陵也冀冀邑皆在魏境故徐廣云河東皮氏縣有冀亭決滎口滎澤之口與今汴河口通其水深可以灌大梁故云無大梁也決白馬之口白馬河津在東郡決其流以灌外黄及濟陽決宿胥之口按紀年作胥葢亦津之名今其地不知所在也魏無虚頓丘虚邑名地與酸棗相近為齊罪秦令齊滅宋仍以破宋為齊之罪名攻魏重楚重猶附也尊也殘均陵在南陽葢今之均州安黽厄音盲縣名在江夏得講於魏講和也解也秦與魏和也至公子延至當為質謂以公子延為質也因犀首屬行犀首公孫衍本魏將因之以屬軍行行音胡郎反謂連兵相續也傷於譙石而遇敗於陽馬按譙石陽馬並趙地名非縣邑也贏則兼欺舅與母按贏猶勝也舅穰侯魏冉也母太后也適燕者適音宅適者責也下同三川晉國之禍三晉之半以言西河之外上頟之地及三川晉國皆是秦與魏戰之處秦兵禍敗我三晉之半是秦禍如此其大者乎而燕趙之秦者燕趙之人徃秦者謂游説之士也蘇秦兄弟三人按譙允南以為蘇氏兄弟五人更有蘇辟蘇鵠典略亦同其説按蘇氏譜云然張儀列傳第十張儀者魏人也按晉有大夫張老又河東有張城張氏為魏氏人必也而吕覽以為魏氏餘子則葢魏之支庶也又書略説餘子謂庶子也游說音稅醳之古釋字曰嘻音僖鄭𤣥曰嘻悲恨之聲相約從親從音足容反而數讓之按謂數設詞而讓之讓亦責也數音朔寧渠能乎渠音詎古字少假借耳為文檄桉徐廣云一作丈二檄王劭按春秋後語云文二尺檄許慎云檄二尺書從若飲若者汝也下文而亦訓汝苴蜀相攻擊上苴音巴謂巴蜀之夷自相攻擊也今字作苴者按巴苴是草名今論巴遂誤作苴也或巴人巴郡本因芭苴得名所以其字遂以苴為巴也注益州天苴讀為芭黎天苴即巴苴也譙周蜀人也知天苴之音讀為芭黎之芭按芭黎即織木葺為葦蘺也今江南亦謂葦蘺曰芭蘺也司馬錯七各反又七故反二音什谷之口一本作尋谷尋什聲相近故其名惑也戰國策云轘轅緱氏之口亦其地相近也秦攻新城此新城當在河南伊闕之左右去王逺矣王音于放反遇其財足以富人戰國策遇作得利盡西海西海謂蜀川也海者珍藏所聚生猶謂秦中為陸海然也其實西亦有海也名實附也按名謂傳其徳也實謂得土地財寳臣請謁其故謁者告也陳也故謂陳不宜伐之端由也起兵伐蜀十月取之六國年表在惠王二十二年十月也蒲陽魏邑名也曰夏陽音下夏山名也亦曰大夏是蜀所都秦下兵攻河外河之西即曲沃平周之邑等據卷衍卷縣在河南衍地名秦折韓而攻梁戰國策折作挾也獻商於之地劉氏云商即今之商州有古商城其西二百餘里有古於城不欲出之按不字當作必時張儀為楚所囚故必欲出之也聞蘇秦死按此時當秦惠王之後元十四年必折天下之脊按常山於天下在北有若人之背脊也枋船枋音方謂並兩舫也亦音船扞闗在楚之西界注巴郡魚復音伏按地理志巴郡有魚復縣偏守新城上是連反此云新城當在吳楚之間漢中其地在秦南山之南楚之西北漢水之北名曰漢中攻衞陽晉大關天下胷夫以常山為天下脊則此衞及陽晉當天下胷葢其地是秦晉齊楚之交道也以言秦兵據陽晉是大關天下胷則他國不得動也泗上十二諸侯謂邊近泗水之側當戰國之時有十二諸侯宋魯邾莒之比也混一諸侯混本作棍同胡本反而厮徒負養厮音斯謂雜役之賤者負養謂負擔以給養公家亦賤人也虎賁之士跿跔科頭上跿跔音徒俱二音又音劬劉氏云謂跳躍也又集韻云偏舉一足曰跔􅕭戰國策曰虎摯之士虎跔科頭謂不著兜鍪貫頥謂兩手捧頥而直入敵言其勇也奮㦸謂又有執㦸者奮怒而趨入陣探前趹後謂馬前足探向前後足趹於後趹音烏穴反趹謂後足趹地言馬之走埶疾也蹄間三尋按七尺曰尋言馬走之疾前後蹄間一擲過三尋也徒裼徒者徒跣也裼袒也謂袒而見肉也鴻臺之宫桑林之苑按此皆韓之宫苑亦見戰國策番吾上音盤又音婆趙之邑也梁效河外按河外河之南邑若曲沃平周等也割河間謂河漳之間邑暫割以事秦耳督過之督者正其事而責之督過是深責其過也塞午道此午道當在趙之東齊之西也午道地名也鄭𤣥云一縱一横為午謂交道也金斗長其尾斗音主凡方者為斗若安長柄則名為枓音主尾即斗之柄其形若刀也熱啜音昌悦反按謂熱而啜之是羮也於下云厨人進斟斟謂羮勺故因名羮曰斟故左氏羊羮不斟是也恒山之尾尾猶末也謂獻恒山城以與秦馮喜此與戰國策同舊本憙者誤也祭器必出凡王者大祭祀必陳設文物軒車彜器等因謂此等為祭器也外伐與國謂齊之伐梁也梁之與齊先相許與約從為隣故云與國也張儀相魏一嵗卒年表張儀以安僖王十年卒紀年云梁安僖王九年五月卒吾為事來軫語犀首言我故來欲有教汝之事何不相見厭事矣上一艶反厭者飽也謂欲令其多事也田需需時為魏相也中謝葢謂侍御之官館莊子謂逆旅舍其人字莊子者或作卞莊子也或曰勿救便此葢張儀等之計䇿願子為子主計子指陳軫也子主謂楚王臣主與王何異臣主謂軫之主楚王也王秦惠王以言我主與王俱宜待韓魏之斃而擊之亦無異也秦魏之交可錯矣錯音措按錯停止也不得復過音戈言義渠道逺今日已後不復得更過相見請謁事情謂欲以秦之緩急告語之也曰中國無事按謂山東諸侯齊魏之大國等秦得燒掇焚杆上掇音都活反謂焚燒而侵掠焚杆音煩烏二音按焚揉而牽掣也戰國策云秦且燒􅌊君之國是説其事也君之有事謂山東諸國共伐秦事君之國謂秦求親義渠君也五國伐秦按表秦惠王後元七年楚魏齊韓趙五國共攻秦是其事也千純凡絲綿布帛等一段為一純純音屯此公孫衍所謂耶按謂上文犀首云君之國有事秦將輕使重幣事君之國故云衍之所謂因起兵襲秦以傷張儀也入李伯之下謂義渠破秦而収軍而入於李伯之下則李伯人名或邑號戰國策伯作帛佩五國之印為約長犀首後相五國或從或横常為約長振㬥下音歩卜反振謂振揚而暴露其短以扶其説按扶謂説彼之非成我之是扶會已之説辭成其衡道張儀説六國使連衡而事秦故云成其衡道然山東地形從長蘇秦相六國令從親而賓秦也闗西地形衡長張儀相六國令破其従而連秦之衡故謂張儀為連横矣史記索隠卷十八
