body:
  text: 史記索隱卷十九唐司馬貞撰樗里子甘茂列傳第十一樗里子名疾按樗木名也音攄高誘曰其里有大樗樹曰樗里然疾居渭南隂鄉之樗里故號曰樗里子又按紀年則謂之楮里疾也滑稽多智滑音骨稽音雞鄒誕又音滑稽或解云滑亂也稽同也言使捷之人言非若是言是若非謂能亂同異也一云滑稽酒器可轉注吐酒不已以言俳優之人出口成章詞不窮竭如滑稽之吐酒不已也爵右更按右更秦之第十四爵名也惠王八年使伐曲沃出其人按年表云十一年拔魏曲沃歸其人又秦本紀惠文王後元八年五國共圍秦秦使庶長疾與戰修魚斬首八萬十一年樗里疾攻魏焦降之則焦與曲沃同在十一年明矣而傳云八年拔之不同王劭按本紀年表及此傳三處記秦伐國竝不同又與紀年不合今亦殆不可考號為嚴君按嚴君是爵邑之號當是封之嚴道游騰游姓騰名也知伯之伐仇猶戰國策云知伯欲伐仇猶遺之大鍾載以廣車高誘注以仇猶為厹由韓子作仇由地理志臨淮有厹猶縣也昭王元年樗里子將伐蒲按紀年云楮里疾圍蒲不克而秦惠王薨事與此合胡衍人姓名也衛必折而從之戰國策云今蒲入於秦衛必折而入於衛與此文相反章臺之東按黃圖在漢長安故城西武庫正直其墓直如字讀直猶當也甘茂者下蔡人地理志下蔡縣屬汝南也事下蔡史舉先生戰國策及韓子皆云史舉上蔡監門蜀侯輝音暉又音胡昆反秦之公子封蜀也華陽國志作輝相壯反側狀反姓陳也迎甘茂於息壤按山海經啓筮云鮌竊帝之息壤以堙洪水或是此也南陽積之久矣謂上黨南陽並積貯日久矣倍數險行千里數音率腴反公孫奭按戰國策作公孫衍其弟立為昭王按趙系家昭王名稷系本云名側也楚圍韓雍氏按秦惠王二十六年楚圍雍氏至昭王七年又圍雍氏韓求救於秦是再圍也劉氏云此是前圍雍氏當赧王之三年戰國策及紀年與此並不同解口地解口秦地名近韓今將與楚也封小令尹又封楚之小令尹以杜陽亦秦地今以封楚令尹是秦楚合也彼有以失之彼公孫奭及甘茂也有以失之謂不見委任情有所失而交走秦也韓楚怨不解二國交走向秦也與魏講罷兵鄒氏云講讀曰媾媾猶和也置之鬼谷按徐廣云在陽城劉氏云此鬼谷在關內雲陽是矣位之上卿而處之按處猶留也范蜎音休緣反又休軟反注一作蠉休緣反戰國策云作蝝也內行章義之難謂召滑內心猜詐外則佯章恩義而卒包藏禍心搆難於楚也注一云內句章昧之難按戰國策云納章句之難事文信侯戰國策云甘羅事吕不韋為庶子請張卿即張唐也卿字也大項橐音託尊其道德故云大項應侯范雎齎臣五城上音側奚反一音齎並謂割五城與臣也得上谷三十城戰國策云得三十六縣今秦有十一謂以十一城與秦也穰侯列傳第十二穰侯魏冉宣太后之異父長弟也姓魏名冉封之穰地理志穰縣在南陽宣太后者惠王之妃姓芈氏曰芈八子者是也惠文后先武王死秦本紀云昭王二年庶長壯與大臣公子為逆皆誅及惠文后皆不得良死又按紀年云秦內亂殺其太后及公子雍公子壯是也華陽君華陽韓地後屬秦芈戎後又號新城君高陵君名顯涇陽君名悝誅季君按季君即公子壯僭立而號曰季君穰侯力能立昭王為將軍衛咸陽誅季君及惠文后故本紀言伏誅又云及惠文后皆不得良死蓋謂惠文后時黨公子壯欲立之及壯誅而太后憂死故云不得良死亦史諱之也又逐武王后出之魏亦事勢然也仇液戰國策作機郝蓋是一人而記别也宋公戰國策作宋交陶陶即定陶也徐廣云作隂陶隂字本易惑也王劭按定陶見有魏冉冢作隂誤也三梁即南梁也故國衛之故國蓋楚丘也下文故地亦同謂楚丘也戰國策衛字皆作燕子良作子之恐非也盡晉國河東河西河內竝是魏地即故晉國今言秦蠶食魏氏盡晉國之地也講和也必見欺謂與秦欲講少割地而求秦質子恐不然必被秦欺也所聞於魏須賈說穰侯言魏人謂梁王若少割地而求秦質必是欺我即聞魏見欺於秦也陶邑必亡陶一作魏言秦前攻得魏之城邑秦罷則亡而還於魏也魏氏方疑賈引魏人之說不許王講于秦是言魏氏方疑可以少割地而收魏也從以此散楚趙怒魏之與秦講皆爭事秦是東方從國於是解散也故云從以此散兩道穰侯封陶魏效絳與安邑是得河東地言從秦適陶開河西河東之兩道幾盡故宋上音祈此時宋已滅是秦將盡得宋地也無行危言莫行圍梁之危事益趙既得觀津仍令趙伐齊而秦又以兵益助趙也臣竊必之告齊王言秦必定不益兵以助趙白起王翦列傳第十三新城在河南也安邑魏以安邑入秦然安邑以東至乾河皆韓故地故云取韓安邑之地光狼城地理志不載光狼城蓋屬趙國野王地理志野王縣屬河內在大行東南孟康曰古邢國也鄭道已絶鄭國即韓之都在河南秦伐野王是上黨歸韓之道絶也平陽君平陽君未詳何人藺今其地闕西河别有藺縣也注泫氏地理志泫氏今在上黨郡也上黨謂屯兵長平以據援上黨斥兵謂犯秦之斥候兵也茄音加裨將名也鄣鄣堡城尉官也發年十五以上時已屬秦故發其兵定上黨秦前攻趙已破上黨今回兵復定其郡其餘城猶屬趙也杜郵按故咸陽城在渭北杜郵今在咸陽城中注張虛捲猶可畏也非但憂平原君之補袒諸侯之救至也捲音拳袒音濁莧反字亦作綻救音救頻陽地理志頻陽縣屬左馮翊應劭曰在頻水之陽也王賁賁音奔寢徐廣云固始寢丘固始縣屬淮陽寢丘地名也城父在汝南即應鄉使使還請善田五輩謂使者五度請也超距猶跳躍也孟子荀卿列傳第十四按序傳孟嘗君弟十四而此傳為第十五蓋後人差降之矣孟軻騶人也軻音苦何反又苦賀反鄒魯地名又云邾邾人徙鄒故也受業子思之門人王劭以人為衍字則以軻親受業孔伋之門也今言門人者乃受業於子思之弟子也萬章之徒孟子有萬章公明高等蓋竝軻之門人也萬姓章名大竝世盛衰言其大體隨代盛衰觀時而說事騶衍桓寬王充竝以衍之所言迂怪虛妄干惑六國之君因納其異說所謂匹夫而熒惑諸侯者是也裨海裨音脾裨海小海也九洲之外更有大瀛海故知此裨是小海也且將有裨將裨是小義也始也濫耳濫即濫觴是江原之初始故此文意以濫為初也謂衍之術言君臣上下六親之際行事之所施所始皆可為後代之宗本故云濫耳懼然顧化懼音劬謂衍之術皆動人心見者莫不懼然駐想又內心留顧而已化之謂欲從其術也按化者是易常聞而貴異術也襒席按字林曰匹結反韋昭曰敷蔑反張揖三蒼訓誥云襒拂也謂側而行以衣襒席為敬不敢正坐當賓主之禮也擁彗按彗帚也謂為之掃地以衣擁帚而却行恐塵埃之及長者所以為敬也作主運按劉向别録云鄒子書有主運篇孟軻困於齊梁同乎哉按仲尼孟子法先王之道行仁義之化且菜色困窮而鄒衍執詭怪熒惑諸侯其見禮重如此可為長太息哉梁惠王謀攻趙孟軻稱太王去邠今按孟子太王去邠是軻對滕文公語今云梁惠王謀攻趙與孟子不同持方枘欲內圜鑿按方枘是筍也圜鑿是孔也謂工人斫木上方筍而內之圜孔不可入也故楚詞云以方枘而內圜鑿吾固知其鉏鋙而不入是也謂戰國之時仲尼孟軻以仁義于聖主猶方枘圜鑿然儻亦有牛鼎之意乎按吕氏春秋云函牛之鼎不可以烹雞是牛鼎言衍之術迂大儻若大用之是有牛鼎之意而譙周亦云觀太史公此論是其愛竒之甚齊之稷下先生稷下齊之城門也或云稷下山名謂齊之學士集於稷門之下環淵按劉向别録環作姓也接子古著書人之稱號私心在彼有之謂私心實在彼焉與謳也有之謂我實有此二事也荀卿趙人名況卿者時人相尊而號曰卿也仕齊為祭酒仕楚為蘭陵令後亦謂之孫卿子者避漢宣帝諱改也談天衍謂鄒衍談天地廣大及終始五行言天事故云談天雕龍奭謂鄒奭修衍文飾若雕龍之文炙轂過髠按劉向别録過字作輠輠車之盛膏器也炙之雖盡猶有餘津言髠智不盡如炙輠也按劉氏云轂衍字也今按文稱炙轂過則是器名音如字讀謂盛脂之器名過過與鍋字相近蓋即脂器也轂即車轂過為潤轂之物則轂非衍字矣齊襄王時按襄王名法章湣王子莒人所立者荀卿三為祭酒按禮食必祭先飲酒亦然必以席中之尊者一人祭耳後因以為官名故吳王濞為劉氏祭酒是也而卿三為祭酒者謂荀卿出入前後三度處列大夫康莊之位而皆為其所尊故云三為祭酒也趙亦有公孫龍按即仲尼弟子名也此云趙人弟子傳作衛人鄭𤣥云楚人各不能知其真也又下文云並孔子同時或曰在後所以知非趙人也田駢步堅步經反二音劇子之言按著書之人姓劇氏而稱子也前史不記其名也故趙有劇孟及劇辛也楚有尸子長盧按尸子名佼音絞晉人事具别録長盧未詳阿之吁子阿齊之東阿也吁音芋别録作芈子今吁亦如字也注為雲梯之械按梯者構木瞰高也言雲者言其升高入雲故曰雲梯械者器也謂攻城之樓櫓也注解帶為城謂墨子為術解身上革帶以為城也注以牒為械按牒者小木札也械者樓櫓等也注公輸般之攻械盡劉氏音械謂飛梯撞車飛石車弩之具注般詘詘音邱勿反所謂般技已盡墨之守有餘禽滑釐墨子弟子之姓字也釐音里或曰竝孔子時或曰在其後按别録云今按墨子書有文子文子即子夏之弟子問於墨子如此則墨子在七十子之後也孟嘗君列傳第十五田嬰者齊威王少子宣王庶弟也按戰國策及諸書並無此言蓋諸田之别子也故戰國策每稱田蚡田嬰云朌子嬰子也王劭又按戰國策云齊豹辨謂齊宣王曰王方為太子時辨謂靖郭君不若廢太子更立郊師靖郭君不忍宣王太息曰寡人少殊不知以此言之嬰非宣王弟明也宣王二年田忌與孫臏田嬰俱伐魏敗之馬陵紀年當梁惠王二十八年至三十一年改為後元宣王七年嬰與韓昭侯魏惠王會東阿紀年當惠王之後元十一年彼文作平阿又云十三年會齊威王于鄄與此明年齊宣王與梁惠王會鄄文同但齊之威宣二王文舛互並不同湣王即位三年而封田嬰於嶭紀年以為梁惠王後元十三年四月齊威王封田嬰于薛十月齊薛十四年薛子嬰來朝十五年齊威王薨嬰初封彭城皆與此文異也母竊舉生之按上舉謂初誕而舉之下舉謂浴而乳之生謂長養之也不利其父母按風俗通云俗說五月五日生男害父女害母𤣥孫之孫為何曰不能知也按爾雅云𤣥孫之子為來孫來孫之子為昆孫昆孫之子為仍孫仍孫之子為雲孫又有耳孫亦是𤣥孫之子不同也短褐短亦音豎豎褐謂褐衣而豎裁之以其省而便諡為靖郭君按謂死後别號之曰靖郭耳則靖郭或封邑號故漢齊王舅父駟鈞封靖郭侯是也欲以遺所不知何人按遺音唯季反猶言不知欲遺以與何人注南陬音鄒亦音陬陬者城隅也舍業厚遇之按舍業者捨棄其家産業而厚事賓客也劉氏云舍音赦謂為之築舍立居業木禺人音偶又音寓謂以土木為之偶類於人也蘇代以土偶比涇陽君木偶比孟嘗君也抵昭王幸姬抵音丁禮反按抵謂觸冒而求之也更封傳更者改也改前封傳而易姓名不言是孟嘗之名封傳猶今之驛券不自德是愍王遣孟嘗君自言已無德也蘇代為西周戰國策韓慶為西周謂薛公舍人魏子舍人官微記姓而略其名故云魏子收邑人收其國之租稅也而聽親弗親姓弗名也戰國策作祝弗蓋祝為得也收周最以厚行周最本厚於齊今欲逐之而相秦之亡將蘇代謂孟嘗君令齊收周最以自厚其行又且得反齊王之有信以不逐周最也又禁天下之變變謂齊秦合則親弗吕禮用用則秦齊輕孟嘗諡為孟嘗君按孟嘗襲父封薛而號曰孟嘗君云諡非也孟字也嘗邑名詩云居嘗與許鄭箋云嘗或作常嘗邑在薛之旁是也馮歡音歡字或作諼音況逺反躡蹻蹻音腳字亦作蹻又作屩亦作僑傳舍遂緣反又蒯緱蒯草名蒯聵之蒯緱音侯字亦作侯謂把劒之物言其劒無物可裝但以蒯繩纏之故云蒯緱遷之幸舍按傳舍幸舍及代舍並當上中下三等之客所舍之名耳貸錢多者不能與其息按與猶還也息猶利也文奉邑少也言文奉之邑少故令出息於薛夫朝趣市趣音娶趣向也過市朝上音光卧反下音潮謂市之行位有如朝列因言市朝耳所期物忘其中按其物謂入市心中所期之物利故平明側肩爭門而入今日暮所期忘其中忘者無也其中市朝之中言日暮物盡故掉臂不顧也平原君虞卿列傳第十六有躄者槃散上躄音壁跚音先寒反亦作散同音罷癃上音皮下吕宫反罷癃謂背疾也言腰曲而背癃高乃穎脫而出按鄭𤣥曰穎環也脫音吐活反目笑而未廢也按鄭𤣥曰皆目視而輕笑之未能即廢棄之奉銅盤上敷奉反若周禮則用珠盤也取雞狗馬之血按盟之所用牲貴賤不同天子用牛及馬諸侯用犬及豭大夫已下用雞今此總言盟之用血故云取雞狗馬之血來耳喋此血音所甲反公等録録音祿按王劭云録借字耳又說文云録録隨從之貌使趙重於九鼎大吕九鼎大吕國之寶器言毛遂至楚使趙重於九鼎大吕言為天下所重也操右劵以責言虞卿論平原君取封事成則操其右券以責其報德也平原君以孝成王十五年卒按六國年表及世家並云十四年卒與此不同鄒衍過音戈注杼意通指上杼音墅杼者舒也注繳紛繳音叫謂繳繞紛亂爭言而競後息不能無害也躡蹻蹻亦作繑音腳徐廣云繑草履也注食邑虞趙之虞在河東太陽縣今之虞鄉縣也發重使而為媾古候反按求和曰媾媾亦講講亦和也趙郝音釋為足下解負親攻之言為足下解其負擔而親自攻之也試言公之私按私謂私心也過平原上音戈虞卿既以魏齊之故魏齊魏相與應侯有仇秦求之急乃抵虞卿卿棄相印乃與齊間行亡歸梁以託信陵君信陵君疑未決齊自殺故虞卿失相乃窮愁而著書也魏公子列傳第十七信陵君按地理志無信陵或是鄉邑名也有能深得趙王隂事按譙周作探得趙王隂事曰侯嬴音盈又曹植音嬴瘦之嬴俾倪上音浦計反下音五計反鄒誕云又上音匹未反下五第反遍贊賓客上音遍贊者告也謂以侯生遍告賓客屏人間語間音間間語謂靜語也晉鄙魏將姓名也如姬資之三年舊解資之三年謂服齊衰也今按資者畜也謂欲為父復讐之資畜於心已得三年矣嚄唶上烏白反下爭格反按嚄唶謂多詞句也負䪍矢音蘭謂以盛矢如今之胡簏而短也注吕忱吕姓忱名作字林言䪍盛弩矢之器以鄗音臛趙邑名屬常山以負於魏上負音佩注漿一作醪按别録云槳或作醪字徒豪舉耳謂豪者舉之舉亦音據也毛公薛公史不記其名抑秦抑音憶按抑謂以兵蹙之公子皆名言公子所得進兵法而必稱其名以言其恕也而虜魏王魏王名假春申君列傳第十八楚頃襄王名橫考烈王完之父駑犬受其弊按謂兩虎鬬乃受弊於駑犬也劉氏云受猶承也從親之要音腰以言山東從韓魏是其腰使盛橋守於韓按秦使盛橋守事於韓亦如楚使召滑相越然也竝內行章義之難不信威信音申又并蒲衍首垣此蒲在衛之長垣蒲鄉也行在河南與卷相近首蓋牛首垣即長垣非河東之垣也以臨仁平丘仁及平丘二縣名謂以兵臨此二縣則黃及濟陽等自嬰城而守也按地理志平丘屬陳留今不知所在濮磨之北地名蓋地近濮也亦單矣音丹單者盡也言王之威盡行矣榆次之禍智伯敗於榆次也地理志屬太原有梗陽鄉不知干隧之敗干隧吳之敗處地名干水邊也隧道路也沒利於前謂智伯及吳王沒伐趙及伐齊之利於前而自易其患於後後即榆次干隧之難也從而伐齊上從音絶用反劉氏云從猶領躍躍毚兔上天歷反下音讒欲欺大國也大國謂秦也王無重世之德重世猶纍世也摺頤上音拉下音夷必攻隨水右壤楚都陳隨水之右壤蓋在隨之西即今鄧州之西其地多山林者矣而使獨攻若秦楚構兵不休則魏盡故家齊取泗上是使齊魏獨攻伐而得其利也足以挍於秦矣挍音教謂足以與秦為敵也一云挍者報也言力能報秦為帝未能言齊一年之後未即能為帝而能禁秦為帝有餘力矣然禁字作楚者誤也遲令上音值值猶乃也令音力呈反韓魏歸帝重齊謂韓魏重齊令歸帝號此秦之計失注地於齊注謂以兵裁之也一經兩海謂西海至東海皆是秦地八年為楚北伐滅魯按年表云八年取魯封魯君於莒十四年而滅也毋望之禍周易有無妄卦其義殊也李園君之仇也言園是春申之仇也戰國策作君之舅也謂為王之舅意異也朱亥即上之朱英也作亥者史因趙有朱亥誤也李園弟所生子遂立是為楚幽王按楚捍有母弟猶猶有庶兄負芻及昌平君是楚君完非無子而上文云考烈王無子誤也史記索隱卷十九
