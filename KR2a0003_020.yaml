body:
  text: 史記索隱卷二十唐司馬貞撰范雎蔡澤列傳十九魏中大夫按漢書百官表中大夫秦官此魏有中大夫蓋古官也須賈須姓賈名也須氏蓋密須之後為魏昭王使按世本昭王名遫襄王之子也齊襄王名法章摺齒上對答反謂打折其脅而又折其齒卷以簀簀謂葦荻之薄也用之以裹尸也更溺范雎更音羹溺即溲也溺音年弔反溲音所留反三亭之南按三亭亭名在魏境之邊道亭也今無其處一云魏之郊境總有三亭皆祖餞之處與期三亭之南蓋送餞已畢無人處至湖按地理志京兆有湖縣本名胡武帝更名湖即今湖城縣也惡內諸侯客內音納亦如字內者亦猶入也忘索之索猶搜也音柵又先格反舍食草具謂亦舍之而食以下客之具然草具謂粗食草萊之饌具穰侯華陽君穰侯謂魏冉宣太后之異父弟穰縣在南陽華陽君芈戎宣太后之同父弟亦號為新城君是也明主立政按戰國策立作蒞也當椹質椹音陟林反按椹者莝椹也質者銼刃也腰斬者當椹質也為其割榮也割榮即上之擅厚謂擅權也而不概於王心按戰國策概作關謂關涉於王心也徐注音同非也亡其言亡猶輕蔑也注一云使持車戰國策之文也竊閔然不敏鄒誕本作惛然音昏又云一作閔音敏閔猶昏暗也莫不灑然變色鄭玄曰灑然肅敬之貌也秦王跽音其紀反跽者長跪兩膝枝地漆身為厲音賴癩病也言漆塗身生瘡如病癩至於陵水劉氏云陵水即栗水也按陵栗聲相近故惑也下惑姦臣之態按態謂姦臣諂詐之志也慁先生及注溷字並胡困反慁猶汨亂之意施韓盧而搏蹇兔戰國策云韓盧者天下之壯犬也是韓呼盧為犬謂施韓盧而搏蹇兔以喻秦強言取諸侯之易文子為之謂田文即孟嘗君也猶戰國策謂田朌田嬰為朌子嬰子然也借賊兵上子夜反一作藉字音亦同上而齎盜糧上音側奚反言為盜齎糧也擊斷無諱無諱猶無畏也弊御於諸侯按弊者斷也御制也言穰侯執權以制御主斷於諸侯也崔杼淖齒管齊淖姓也音泥教反漢有淖姬是也高誘曰管典也言二人典齊權而行弒逆也射王股擢王筋按言射王股誤也崔杼射齊王之股淖齒擢湣王之筋是説二君事也封范雎於應按劉氏云河東臨晉縣有應亭即秦地有應也又按本紀以應為太后養地解者云在潁川之應鄉未知孰是孺子劉氏云蓋謂睢為小子也以綈袍賜之按綈厚繒也音啼蓋今之絁也睚眥之怨睚音崖賣反眥音士賣反又音崖債二音睚眥謂相嗔而怒目切齒韓少曲按蘇云起少曲一日而斷太行故劉氏以為蓋在太行西南貴而為交者為賤也上為音如字下為音于偽反以言富貴而結交情深者為有貧賤之時不可忘之也秦攻韓汾陘音刑陘蓋在韓之西界與汾相近也因城河上劉氏云此河上蓋近河之地本屬韓今秦得而城馬服子趙括之號也故虞喜志林云馬兵之首也號曰馬服者言能服馬也代廉頗鄒氏音匹波反注徐云五十年據秦本紀年號表而知之也激厲上音擊從唐舉相荀卿書作唐莒持國秉按左傳國子實執齊秉服虔曰秉權柄曷鼻巨肩曷鼻謂鼻如蝎蟲也巨肩謂巨肩於項也蓋項低而肩豎注一作偈音其例反魋顔蹙齃上魋音徒回反魋顔謂顔貌魋回若魋梧然也齃音烏曷反蹙齃謂鼻蹙眉膝攣謂兩膝又攣曲也持粱謂飯粱米飯而持其器以食也刺齒肥按刺齒二字字誤當為齧字也齧肥謂食肥肉也釡鬲父歷二音注款足謂之鬲款者空也言其足中空也空足是曲足云見爾雅郭氏云鼎曲腳也按以款訓曲故云曲腳也以其君父為僇辱言以比于子胥申生皆以至忠孝而見誅放故天下言為其君父之所僇而憐其臣子也批患折難上白結反又音豐雞反批患謂擊而却之折音之列反夏育太史噭叱呼駭三軍二人勇者夏育賁育也噭音皎而身死庸夫按高誘云夏育為田摶所殺然太史噭未知為誰所殺恐非齊襄王時太史也入邑劉氏云入猶充也謂招攜離散充滿城邑信而不能詘上信音申下詘音屈謂志已展而不退或欲大投或欲分功言夫博奕或欲大投其瓊以致勝或欲分功者謂觀其勢弱則投地而分功以逺救也事具爾雅也注博縣於枰不必在行按方言云所以投博謂之枰音平局也二子不困厄惡能激乎二子范雎蔡澤也睢厄於魏齊折脅摺齒澤困於趙被逐棄鬲是也惡音烏激音擊也樂毅列傳第二十魏文侯封樂羊以靈壽地理志常山有靈夀縣中山桓公所都也中山復國中山魏雖滅之尚不絶祀故後更復國至趙武靈王又滅之也楚相唐昧莫葛反於重丘地理志縣名屬平原於觀津地理志觀津縣名屬信都漢初屬淸河也令趙嚪説秦上嚪音田濫反字與啖字同也并護護謂總領之也封樂毅於昌國地理志縣名屬齊郡騎劫燕將姓名也號曰望諸君望諸澤名在齊蓋趙有之故號焉戰國策望作藍也寧臺燕臺也大吕陳於元英大吕齊鐘名元英燕宫殿名也故鼎反于磨室燕鼎前輸于齊今反入于磨室磨室亦宮名戰國策作厯室也薊丘之植植於汶篁薊丘燕所都之地也言燕之薊丘所植皆植齊王汶上之竹也徐注非也以為慊於志按慊音苦簟反作嗛嗛者常慊然而不愜其志也入江而不化言子胥懷恨故雖投江而神不化猶為波濤之臣也誹謗隳上音方味反下音許規反以幸為利謂既臨不測之罪以幸免為利今我仍義先生之恩雖身託外國而心亦不敢出也忠臣去國不潔名言忠臣去離本國不自潔其名云已無罪故禮曰大夫去其國不説人以無罪是也臣雖不佞不佞猶不才也數奉教於君子矣上數音朔言我已數經奉教令於君子君子即識禮之人謂已在外猶云已罪不説王之有非故下云不察疏逺之行斯亦忠臣之節也樂間音紀間反樂毅之子也其相栗腹栗姓腹名也漢有栗姫趙四戰之國也言趙數距四方之敵故云四戰之國及人志不入謂國亂而人離心向外故云不入又獄囚自出是政亂而士師不為守法也趙封樂乘為武襄君樂乘樂毅之宗人也樂臣公本亦作巨公也教蓋公古闔反蓋公史不記名廉頗藺相如列傳第二十一廉頗為趙將伐齊大破之取陽晉按陽晉衛地後屬齊今趙取之司馬彪郡國志曰今衛國陽晉城是也有本作晉陽非也晉陽在太原雖亦趙地非齊所取廣成傳廣成是傳舍之名傳音張戀反設九賓周禮大行人别九賓謂九服之賓客也列傳云設九牢視而嘻音希乃驚而怒之辭也拔石城劉氏云蓋謂石邑會於西河外澠池在西河之南故云外按表在趙惠文王二十年也盆缶盆缶二音位在廉頗之右王劭按董勛答禮曰職高者名録在上於人為右職卑者名録在下於人為左是以謂下遷為左肉袒負荆肉袒者謂袒衣而露肉也負荆者荆楚也可以為鞭為刎頸乏交崔浩云言要齊生死而刎頸無悔也居二年廉頗復伐齊幾拔之世家云惠文王二十三年頗將攻魏之幾邑取之與此列傳合戰國策云秦敗閼於及攻魏幾幾亦屬魏而裴駰引齊世家及年表無伐齊拔幾之事疑其幾是故邑或屬齊魏故耳攻魏之防陵按防陵在楚之西屬漢中郡魏有房子蓋陵字誤也胥後令按胥須古人通用今者胥後令謂胥為須須者待也待後令謂許歷之言更不擬誅之故更待後也邯鄲許歷請復諫按邯鄲二字當為欲戰謂臨戰之時許歷復諫也王粲詩云許歷為完士一言猶敗秦是言趙奢用其計遂破秦軍也江遂曰漢令稱完而不髠曰耐是完士未免從軍也趙以尉文封亷頗為信平君信平號也徐廣云尉文邑名按漢書表有尉文節侯云在南郡蓋尉官也文名也謂取尉文所食之邑復以封頗而後號為信平君李牧攻燕拔武遂方城按地理志武遂屬河間國方城屬廣陽也頃之三遺矢矣謂數起便矢一作屎輸入莫府按注如淳解莫大也云云又崔浩云古者出征為師軍還則罷無事處以幕帟為府署故曰莫府則莫當作幕字之訛耳多間諜上紀莧反下音牒百金之士五萬管子曰能破敵禽將者賞之百金彀者十萬人上音古候反彀謂能射也數千人委之委謂棄之恣其殺略也滅襜襤上音都甘反下音路郯反如淳云胡名也龎暖破燕軍按即馮暖也龎音皮江反暖音况逺反亦音喧劇辛本趙人仕燕者秦破殺趙將扈輒扈氏輒名漢張耳時别有扈輒於武遂按劉氏云此本韓地在趙西恐非地理志河間武遂也桓齮音蟻番吾縣名地理志在常山音婆又音盤威信敵國信音伸田單列傳第二十二田單音丹注今之東安平按地理志東安平屬淄川國也斷其車軸末上音斷都緩反斷其軸恐長相撥也以鐵裹軸頭堅而易進也傅鐵籠傅音附按截其軸與轂齊以鐵鍱附軸末施轄於鐵中以制轂也又方言曰車轊齊謂之籠郭璞云車軸也操版插上七高反下初洽反卒至河上河上即齊之北界近河東齊之舊地號曰安平君以單初起安平故以為號兵以正合以竒勝按竒謂權詐也注引魏武蓋亦軍令也善之者兵不厭詐故云善之出竒無窮謂權變也竒正還相生言用兵之術或用正法或用竒計使前敵不可測量如尋環中不知端際也始如處女言兵之始如處女之軟弱也適人開戶上音敵若如處女之弱則敵人輕侮開戶不為備也後如脫兔適不及距言克敵之後卷甲而趨如兔之得脫而走疾也適不及距者若脫兔忽過而敵忘其所距也聞畫邑人王蠋賢畫一音獲又音胡卦反劉熙云齊西南近邑蠋音觸又音歜乃經其頸按經猶繫也自奮絶脰而死何休云脰頸齊語也音豆魯仲連鄒陽列傳第二十三好奇偉俶儻按廣雅云俶儻卓異也新垣衍新垣姓衍名也為梁將故漢有新垣平令趙帝秦新垣衍欲令趙尊秦為帝也勝請為紹介按紹介猶媒介也且禮賓至必因介以傳辭紹者繼也介不一人故禮云介紹而傳命是也世以鮑焦為無從頌而死者皆非也從頌者從容也世人見鮑焦之死皆以為不能自寬容而取死此言非也衆人不知則為一身言衆人不識鮑焦之意焦以恥居濁世而避之非是自為一身而憂死事見莊子也上首功之國秦法斬首多為上功謂斬一人首賜爵一級故謂秦為首功之國也權使其士言秦人以權詐使其戰士虜使其人以奴虜使其人言無恩以恤下肆然而為帝肆然猶肆志也過而為政謂以過惡而為政也天子下席按謂烈王太子安王驕也下席言其寢苫居廬而智不若耶畏之也言僕夫十人而從一人者寧是力不勝亦非智不如正是畏懼其主耳曰噫嘻上音依者不平之聲下音僖者驚恨之聲夷維子按維東萊之邑其居夷也號夷維子故晏子為萊之維人是也諸侯辟舍辟音避避正寢按禮天子適諸侯必舍於祖廟納管籥音管藥攝衽抱機音紀魯人投其籥不果納謂闔內門不入齊君將倍殯棺設北面倍音佩謂主人不在殯東將背其殯棺立西階上北面哭是背也天子乃於階上南面而弔也鄒魯之臣生則不得事養謂時君弱臣強故鄒魯君生時臣並不得盡事養死亦不得行􅉠襚之禮然齊欲行天子禮於鄒魯之臣皆不果納之是猶秉禮而存大體其後三十餘年按徐廣據年表以為田單攻聊城在長平後十餘年耳言三十餘年誤也勇士不却死而滅名却死猶避死也齊之南陽即楚之淮北泗上之地也魏攻平陸平陸邑名在西界得濟北之利即聊城之地也衡秦之勢成此時秦與齊和故云衡秦之勢成也齊棄南陽棄楚所攻之泗上也斷右壤又斷絶魏之所攻齊右壤之地平陸是也言右壤斷棄而不救也定濟北志在攻聊城而定濟北也今楚魏交退於齊按交者俱也前時楚攻南陽魏攻平陸二國之兵俱退而燕救又不至勢危也以資説士言既養百姓又資説士終擬強國也劉氏云讀説士為鋭士意雖亦便不如依字矯國更俗欲令燕將歸燕矯正國事改更弊俗也亡意上音無言若必無還燕意則捐燕而東遊於齊乎富比陶衛按延篤注戰國策云陶陶朱公也衛衛公子荆非也王劭云魏冉封陶商君姓衛富比陶衛謂此也遺公子糾遺棄也謂棄子糾而事小白也曹子魯將曹昧是也枝桓公之心按枝猶擬也肆志肆猶放也莊忌夫子忌會稽人姓莊氏字夫子後避漢明帝諱改曰嚴淮隂枚生名乘字叔其子臯漢書並有傳蓋以銜枚氏而得姓也而介於羊勝公孫詭之間言鄒陽上書自達而遊於二人之間或往彼或往此介者言有隔於其間故杜預曰介猶間也白虹貫日太子畏之烈士傳曰荆軻發後太子日相氣見虹貫日不徹曰吾事不成後聞軻死事不就曰吾知其然是畏也又王劭云軻將入秦待其客未發太子丹疑其畏故曰畏之其解不如見虹貫日不徹也戰國策又云聶政刺韓傀亦曰白虹貫日也衛先生為長平之事太白食昴服虔云衛先生秦人白起攻趙軍於長平遣衛先生説昭王請益兵糧為穰侯所害事不成精誠感天故太白食昴昴趙分也如淳云太白主西方秦在西敗趙之兆也食謂干歷之也又王充云夫言白虹貫日者太白食昴實也夫言荆軻之謀衛先生之䇿感動皇天而貫日食昴是虛也左右不明言左右之不明不欲斥王昔玉人獻寶楚王誅之楚人卞和得玉璞事見闕語及吕氏春秋注武王按世家楚武王名熊通注復獻文王文王名賢武王子也至成王時文王子也名惲箕子佯狂佯音陽謂詐為狂也司馬彪曰箕子名胥餘是也接輿避世張晏曰楚賢人高士傳曰楚人陸通字接輿也而後楚王胡亥之聽謂以楚王胡亥之聽為謬故後之而不用後猶下也子胥鴟夷按韋昭云以皮作鴟鳥形名曰鴟夷鴟夷皮㯼也服虔曰用馬革作囊也以裹尸投之于江白頭如新按服虔云人不相知自初交至白頭猶如新也傾蓋如故服虔云如吳札鄭僑也按家語孔子遇程子於途傾蓋而語又志林云傾蓋者道行相遇軿車對語兩蓋相切小牧之故曰傾也藉荆軻首上音子夜反韋昭云謂於期逃秦之燕以頭與軻使入秦以示信也為燕尾生服虔云蘇秦不見信於天下於燕則出尾生之信韋昭云尾生守信而死者按言蘇秦於燕獨守信如尾生故云如燕之尾生也注白圭為中山將按事見戰國策及吕氏春秋也食以駃騠按字林云決啼二音北狄之良馬也馬父騾母司馬喜臏腳於宋事見戰國策及吕氏春秋蘇林云六國時人相中山也范睢摺脅折齒按應侯傳作折脅摺齒是也説文拉摧也音力合反申屠狄自沈於河按莊子申屠狄諌而不用負石自投河韋昭云六國時人漢書云自沈於雍河服虔曰雍州之河又新序作抱甕自沈於河不同也徐衍負石於海亦見莊子張晏曰負石欲沈注齊桓公夜出迎客按此事見吕氏春秋注擊牛角商歌按謂為商聲而歌也或云商旅人歌也二音並通注南山矸矸音公彈反矸者白淨貌也顧野王又作岸音也注與舜禪膳音如字讀協韻失之故也適至骭按埤蒼云骭脛也字林音下諫反魯聽季孫之説逐孔子論語齊人歸女樂季桓子受之三日不朝孔子行也宋信子罕之計囚墨翟按左氏司城子罕姓樂名喜乃宋之賢臣也漢書作子冉不知子冉是何人文頴曰子冉子罕也又按荀卿傳云墨翟孔子時人或云在孔子後又襄二十九年左傳宋飢子罕請出粟按時孔子適八嵗則墨翟與子罕不得相輩或以子冉為是也衆口鑠金按國語云衆心成城衆口鑠金賈逵云鑠消也衆口所惡雖金亦為之消亡又風俗通云或説有美金於此衆人或共詆訿言其不純金賣者欲其必售因取鍛燒以見其真是為衆口鑠金也積毁銷骨按大顔云讒人積久譖毁則父兄伯叔自相誅戮骨肉為之相滅也齊用越人蒙越人蒙未見所出漢書作子臧又張晏云子臧越人或蒙之字也公聽並觀小顔云公聽言不私並觀所見齊同也封比干之後修孕婦之墓按比干之後後謂子也不見其文尚書封比干之墓又云刳剔孕婦則武王雖反商政亦未必修孕婦之墓也孫叔敖三去相不悔按三得相不喜知其才之自得也三去相不悔知非己之罪也於陵子仲辭三公為人灌園按孟子云陳仲子齊陳氏之族兄為齊卿仲子以為不義乃適楚居于於陵自謂於陵子仲楚王聘以為相子仲遂夫妻相與逃為人灌圍烈士傳云字子終桀之狗可使吠堯及下跖之客可使刺由此並見戰國策服虔云仲由也應劭云許由也荆軻之湛七族湛音沈張晏云七族上至曾祖下至玄孫又一説云父之族一也姑之子二也姊妹之子三也姊女子之子四也母之族五也從子六也及妻父母凡七要離之燒妻子事見吕氏春秋蟠木根柢孟康云盤結之木也晉灼云盤柢木根也左右先為之容謂左右先加雕刻是為之容飾也雖蒙堯舜之術按言雖蒙被堯舜之道獨化於陶鈞之上張晏云陶冶鈞範也作器下所轉者名鈞韋昭曰陶燒瓦之竈鈞木長七尺有絃所以調為器具也崔浩云以鈞制器萬殊故知造化也匕首竊發按風俗通云其頭類匕故曰匕首短而便用也周用烏集韋昭云吕尚適周如烏之集使不羈之士按言駿足不可羈絆以比逸才之人與牛驥同皂應劭云皂櫪也韋昭云皂養馬之官下士也按養馬之官其衣皂也又郭璞云皂養馬器也此鮑焦所以忿世按晉灼云烈士傳鮑焦怨世不用以採蔬於道子貢難曰非其代而採其蔬此焦之有哉棄其蔬乃立枮洛水之上按此事見莊子及説苑韓詩外傳小有不同耳縣名為勝母曽子不入按淮南子及鹽鐵論並云里名勝母曾子不入蓋以名不順故也尸子以為孔子至勝母縣暮而不宿則不同也回面杜預云回邪也屈原賈生列傳第二十四屈原屬草稿屬音燭草稿謂創制憲令之本也漢書作草具崔浩謂發地造端也而作離㥰㥰亦作騷按楚詞㥰作騷音素刀反應劭云離遭也騷憂也又離騷序云離别也騷愁也濯淖上音濁下音閙汙泥上音烏故反下音奴計反皭然音自若反徐廣云疏淨之貌泥而不滓泥亦音涅滓亦音淄又並如字破楚師於丹浙二水名謂於丹水之北浙水之南丹水浙水皆縣名在𢎞農所謂丹陽浙破楚將屈丐屈姓丐名音蓋也襲楚至鄧按此鄧在漢水之北故鄧侯城也懷王悔追儀不及按張儀傳無此語也不如毋行按楚世家昭顧有此言蓋二人同諫王故彼此各隨録之也長子頃襄王立名橫人君無愚知賢不肖此已下太史公傷楚懷王之不任賢信讒而不能反國之論也注向秀向秀字子期晉人注易注張璠張璠亦晉人注易也可以汲按京房易章句言我道可汲而用也王明並受其福京房章句曰上有明王汲我道而用之天下並受其福故曰王明並受其福也漁父魚甫二音隨其流按楚詞作滑其泥何故懷瑾握瑜按楚詞此懷瑾握瑜作深思高舉也汶汶者乎汶汶者音閔汶汶猶昏暗也寧赴常流常流猶長流也蒙代俗之溫蠖乎音烏廓反溫蠖猶惛憤楚詞作蒙世之塵埃哉乃作懷沙賦按楚詞九懷曰懷沙礫以自沈此其義也莽莽音姥汨徂南土王師叔曰汨行貌也方言曰謂疾行也眴兮窈窈眴音舜徐氏云眴音眩窈音烏鳥反離湣之長鞠湣病鞠窮刓方以為圜兮上五官反謂刻刳方木為圓其常法度尚未廢章畫職墨兮前度未改章明也畫計畫也楚詞職作志志念也餘如注解以為下音戶鳯皇在笯音奴又女加反徐云一作郊注奴籠落按籠落謂藤蘿之相籠絡雞雉翔舞楚詞雉作鶩羌不知吾王師叔云羌楚人語辭言卿何為也誹駿疑桀兮按尹文子云千人曰俊萬人曰桀今乃誹俊疑桀固是庸人之態也重華不可牾兮楚詞作遌並吳故反王師叔云牾逢也豈知其故也楚詞作莫知其何故含憂虞哀兮楚詞作舒憂娛哀娛音虞娛者樂也亂曰王師叔曰亂者理也所以發理辭指撮總其要而重理前意也浩浩沅湘兮二水名按地理志湘水出零陵海陽山北入江沅即湘之後流也修路幽拂兮楚詞作幽蔽也曾吟恆悲至不可謂兮楚詞無此二十一字餘何畏懼楚詞餘並作余遂自沈汨羅而死汨水在羅故曰汨羅地理志長沙有羅縣羅子之所徙荆州記羅縣北帶汨水汨音覓也景差按揚子法言及漢書古今人表皆作景瑳今作差是字省耳又按徐裴鄒三家皆無音是讀如字也賈生名義漢書並作誼也河南守吳公按吳姓也史失名故稱公適去韋昭云適譴也字林云丈厄切造託上音七到反伏竄下音如字又七外反闒茸上音天臘反下音而隴反按應劭胡廣云闒茸不才之人無六翮翺翔之用反尊貴字林曰闒茸不肖之人賢聖逆曳兮方正倒植胡廣云逆曳不得順隨道而行也倒植賢不肖顛倒易位也世謂伯夷貪兮謂盜跖廉按漢書作隨夷溷兮跖蹻廉一句皆兼兩人隨卞隨也夷伯夷也跖盜跖也蹻莊蹻也莫耶為頓兮應劭曰莫耶吳大夫也作寶劍因名焉吳越春秋曰吳王使干將造劍二枚一曰干將二曰莫耶干將劍名也頓鈍也鉛刀為銛鉛者錫也銛利也音纎言其暗惑也斡棄周鼎兮寶康瓠斡轉也烏活反爾雅云康瓠謂之甈甈音丘列反李巡云康謂大瓠也康空也晉灼云斡古管字也驥垂兩耳兮服鹽車戰國策曰夫驥服鹽車上太山中坂遷延負轅不能上伯樂下車哭之也誶曰李奇曰誶告也音信張晏曰訊離騷下章誶亂也劉伯莊音素對反訊猶宣也重宣其意周戍師古音碎也高遰音逝也獨煙鬱漢書作一鬱意亦通自縮而逺縮漢書作引也襲九淵神龍襲復也莊子曰千金之珠必在九重之淵而驪龍頷下故云九淵之祌龍也沕深潛以自珍張晏曰沕潛藏也音密又音勿也彌融爚以隱處漢書作偭蟂獺徐廣又一本作彌蝎􅭃以隱處蓋總三本不同也按蘇林云偭音面應劭云偭背也蟂獺水蟲害魚者以云背惡從善也郭璞注爾雅似鳬江東謂之魚鵁夫豈從蟻與蛭蚓蟻音蟻漢書作蝦言偭然絶於蟂獺況從蝦與蛭蚓也蛭音質蚓音引也般紛紛其離此尤兮般音班又音盤槃桓也紛紛猶藉藉構讒之意也尤謂怨咎也亦夫子之辜也漢書辜作故夫子謂屈原也李竒曰亦夫子不如麟鳯翔逝之故罹此咎也瞝九州上丑知反謂歷觀也漢書作歷九州覽德輝而下之按言鳯皇翔見人君有德乃下故禮曰德輝動乎內是也汙瀆兮音烏獨二音汙潢汙瀆小渠也橫江湖之鱣鱏兮固將制於蟻螻莊子云庚桑楚謂弟子曰吞舟之魚蕩而失水則螻蟻能制之戰國策齊人説靜郭君亦同按以此喻小國暗主不容忠臣而為讒賊小臣之所見害為長沙傅按誼為傅是吳芮之玄孫襲長沙王之時也非景帝之子長沙王發也荆州記長沙城西北隅有賈誼宅及誼石牀在矣楚人命梟曰服按鄧展云似鵲而大晉灼云巴蜀異物志云有鳥小雞體有文色土俗因形名之曰服不能逺飛行不出域荆州記云巫縣有鳥如雌雞其名為梟楚人謂之服吳録云服黑色鳴自呼以自廣按姚氏云廣猶寬也單閼之嵗爾雅云嵗在卯曰單閼李巡云單閼起也陽氣推萬物而起故曰單閼孫炎本作蟬焉蟬猶伸也庚子日施兮施音移施猶西斜也漢書作斜也策言其度漢書作讖按説文云讖驗言也今此策蓋雜策辭云然請問于服于於也漢書本有作子服者小顔云子加美辭也對以意協音臆也斡流而遷斡音管斡轉也變化而嬗韋昭云而如也如蟬之蛻化也蘇林云嬗音禪謂其相傳與也沕穆無窮漢書作無間沕音密又音昧沕穆深微之貌以言其理昧深微不可盡言也禍兮福所倚此老子之言然禍字古作禍按倚者立身也伏下身也以言禍福遞來猶如倚伏也傅説胥靡徐廣云胥靡腐形也晉云胥相也靡隨也古者相隨坐輕刑之名墨子云傳説衣褐帶素傭築於傳巖在河東太陽夏縣又夏靖書云猗氏六十里黃河西岸吳坂下便得隱穴是説所潛身處也何異糾纆韋昭云纆徽也又風俗通云合繩為糾字林云纆三合繩也又音墨水激則旱矢激則逺此乃淮南子及鶡冠子文也彼則水激則悍吕氏春秋作悍以言水激疾則去疾不能浸潤矢激疾則逺去也然説文旱與悍同音以言水矢流飛本以無礙為通利今遇物觸之則激怒更徑疾而逺悍猶人或因禍致福倚伏無常也大專槃物漢書云大鈞播物此專讀曰鈞槃猶轉也與播義同如淳曰陶者作器於鈞上以造化為大鈞也虞喜字林云大鈞造化之神鈞陶萬物品授羣形者也虞喜按上鄒陽傳注云陶家名模下圓轉者為鈞言其能制器大小以比之於天也坱圠無垠應劭云其氣坱圠非有限齊也按無垠謂無有際畔也説文云垠圻也郭璞注方言云坱圠云不測也又王逸注楚詞云坱圠雲霧氣昧也天不可與慮與音預也天地為爐造化為工此莊子文隂陽為炭萬物為銅既以陶冶喻造化故以隂陽為炭萬物為銅合散消息莊子云人之生也氣之聚也聚則為生散則為死千變萬化莊子云人之形千變萬化未始有極忽然為人何足控摶按控引也摶音徒端反控摶謂引持而自玩弄貴生之意也又本作控揣揣音初委反又音丁果反揣者量也故晉灼云或然為人言此生甚輕耳何足引物量度已年命之長短而愛惜乎化為異物謂死而形化為鬼是為異物也足患協音環賤彼貴我莊子云以物觀之自貴而相賤是也物無不可莊子云物固有所然物固有所可無物不然無物不可也貪夫殉財烈士殉名此語亦出莊子臣瓚云亡身從物謂之殉也夸者死權言好夸毗者死於權利是言貪權勢以自矜夸者至死不休也注夸毗按犍為舍人注爾雅云夸毗卑身屈己也曹大家云體柔人之夸毗也注權勢不尤則夸者不悲按尤者甚也告勢不甚用則夸毗者可悲也品庶馮生漢書作每生音謀在反孟康云每者貪也服虔云每念生也鄒誕本亦作每言唯念生而已今此作馮馮亦持念之意也然按方言每字合從手旁每音莫改反也怵迫西東漢書作亦有作私東應劭云諸侯為私時天子居長安諸王悉在關東羣小怵然內迫私家樂仕諸侯故云怵迫私東也李奇曰私名作西者言東西趨利也怵音黜又言怵者誘也大人不曲張譏云德無不包靈府𢎞曠故名大人也􅀈如囚拘􅀈音和板反説文云􅀈大木柵也漢書作僒音去隕反至人遣物莊子云古之至人先存諸已後存諸人張譏云體盡於聖德美之極謂之至人真人淡漠莊子云古之真人不知悅生不知惡死不以心損道不以人助天吕氏春秋曰精氣曰新斜氣盡去反其天年謂之真人也釋知遺形按釋智謂絶聖棄智也遺形者形故可使如稿木是也超然自喪謂心若死灰也莊周云今者吾喪我汝知之乎得坻則止漢書坻作坎按周易坎九二有險言君子見險則止其死兮若休莊子云勞我以生休我以死也汜乎若不繫之舟出莊子也不以生故自寶鄧展云自寶自貴也養空而浮言體道之人但養空性而心若浮舟也德人無纍按德人謂上德之人心中無物纍是得道之士也細故慸葪葪音介漢書作介張楫云遰介鯁刺也以言細微事故不足遰介我心故云何足以疑也受釐宣室三輔故事云宣室在未央殿北應劭云釐祭餘肉也音僖梁懷王太傅梁懷王名楫文帝子觀屈原所自沈淵按荆州記云長沙羅縣北帶汨水去縣四十里是原自沈處北岸有廟也史記索隱卷二十
